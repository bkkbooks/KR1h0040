body:
  text: 欽定四庫全書經部八四書管窺四書類提要臣等謹案四書管窺八卷元史伯璿撰伯璿字文璣温州平陽人據所作管窺外篇成於至元丁未即元亡之年計其人當已入明然始末不可考矣是編見於祕閣書目者五冊楊士奇東里集則稱有四冊刻板在永嘉郡學永嘉葉琮知黄州府又刋置府學是明初印行已有二本然刋板皆散佚不傳故朱彝尊經義考注云未見此本乃毛晉汲古閣舊抄大學中庸孟子尚全惟論語闕先進篇以下蓋傳寫有所佚脫然量其篇頁釐而析之已成八卷經義考乃作五卷或誤以五冊為五卷歟其書引趙順孫四書纂疏呉真子四書集成胡炳文四書通許謙四書叢說陳櫟四書𤼵明及饒氏張氏諸說取其與集注異同者各加論辨於下諸說之自相矛盾者亦為條列而釐訂之凡三十年而後成於朱子之學頗有所闡𤼵考朱子著述最多辨說亦最夥其間有偶然問答未及審核者有後來考正未及追改者亦有門人各自記録潤色増減或失其本真者故文集語録之内異同矛盾不一而足即四書章句集注與或問亦時有牴牾原書具在可一一覆按也當時門人編次既不敢有所别擇後來門户既成主持彌力讀朱子書者遂一字一句奉為經典不復究其傳述之真偽與年月之先後但執所見一條即據以詆排衆論紛紜四出而朱子之本旨轉為尊信者所淆矣夫載寳而朝論南宫者有故越境乃免惜趙盾者原誣述孔子之言者尚不免於舛異況於朱門弟子斷不及七十二賢又安能據其所傳漫無釐正伯璿此書大㫖與劉因四書集義精要同而因但稍為刋除伯璿更加以别白昔朱子嘗憾孔門諸子留家語作病痛如伯璿者可不謂深得朱子之心歟乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
