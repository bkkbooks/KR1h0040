body:
  text: 欽定四庫全書四書管窺卷八元史伯璿撰中庸二十二章至誠盡性饒氏曰此與首章一般至誠便是致中和贊化育便是天地位萬物育輯釋亦引之此只因以致中和之致為坐致之致故如此説其實致中和之致與致曲之致何異前辯已明此不再述集成或疑此章以後天道人道間見迭出永嘉陳氏曰道理縱橫説之無盡如何立定様子只合逐章體認才不費力處便是天道着力處便是人道或者之疑亦有理陳氏所答雖善而終未瑩徹恐必有説當於第二十六章章下求之但陳氏之説却可以破饒氏大哉聖人之道以下六章不説天道人道之誤可謂有功於章句矣第二十三章致曲輯講問章句曲一偏也就一偏推致如何得有誠饒氏謂子思之意如舉隅絜矩相似隅有四角矩有四方曲有四面曲字已有四偏形如惻隠羞惡辭讓是非四者各是一偏自此一一推致則便可以㑹徳之全按章句既曰曲一偏也又曰自其善端發見之偏而悉推致之以各造其極也盖人之氣質不同徳性之發見有厚薄𤼵見之厚處便是一偏之曲致者推而極之之謂謂以此一偏𤼵見之厚處而推其餘悉使之一一如此一偏之厚所謂各造其極也問者疑就一偏推致如何得有誠盖以章句為但就一偏推致而不察章句自字悉字各字極字之意也若達則豈宜有此問哉雙峰之答固是但曰子思之意云云則隠然似乎以章句為未盡者盖若以所言𤼵明章句則當提起章句無病之實以釋問者之疑今既不然則是亦不知己意不出章句意也讀者詳之饒氏又謂自篇首便見喜怒哀樂四件喜仁怒義樂禮哀知云云先儒謂七情不可分配四端又謂七情於四端處橫貫過推此則饒説似有可疑况喜仁怒義樂禮三者猶有意思哀知一説殊所未喻第二十五章誠自成道自道章句曰言誠者物之所以自成而道者人之所當行也誠以心言本也道以理言用也為子而實能孝其親便是成就自家做个孝子云云又謂誠即道也似不可分本與用誠者自成是自然成就厎道理未説人力上下句道自道方是當着力處語録説此意極分曉雙峰為子實能孝之説能字下得早了是把自然道理作人力説所以於下句當用力處意便重叠説去不得遂以為誠即是道不可分本與用言之以此見章句之未易看亦未易病也饒氏又謂誠者物之終始不誠無物此兩句是解誠者自成之義是故君子誠之為貴是解道自道一句之意語録有兩説一以不誠無物屬上句一以不誠無物屬下句其屬上句之説往往章句未定時所言其屬下句之意盖曰不是誰不他盖人則有不誠而理則無不誠者故此下句已是説道自道了雙峰因看上節誠字為人力故看此不字亦不出而謂不誠無物為解誠者自成殊不知此盖朱子未定之意也讀者詳之輯講問章句又曰誠以心言本也道以理言用也竊疑上是實心下是實理看來都是體如何分體用饒氏曰真个可疑此章頗難看章句反為所纒盖誠即道也非是兩般如誠者天之道是也按通云誠自成也誠即是天命之性道自道上一道字是率性之道誠以心言本也道以理言用也專為人之所當自行者而言如此分别儘佳愚往年毎與同志説如此後來四書通板行其説果與管見有契達此則饒氏師弟子之疑可氷釋矣或者猶因雙峰之疑而疵章句曰誠者自成章句既以為兼人物而言則草木禽獸皆不外乎此矣又曰誠以心言然則草木亦有心耶是又不詳章句之㫖而妄肆般疵者也盍亦觀於章句上曰誠者物之所以自成下曰道者人之所當自行上曰物而下曰人意便可見然則下文心字又豈指物而言哉不過指人之所當自行者之心而可耳請因通者之意而申之夫性是本道是用性是本然之實理自人言之則舍心無以見性故朱子直以心言此節誠自成一句固兼人物而言似不可專指心説然道自道一句便是專指人説了觀章句下句變物言人之意可見人則能自行其道物豈可以行道責之觀於下節君子誠之之意又可見朱子此節章句凡四句上二句只順經文解盡經㫖下二句却專為指示學者設則其專為人之所當自行者言尚何疑乎章句之意正以見誠就人分上説是以心言心主於一身故為本道以理言理散於萬事如君臣之義父子之親皆是故為用變誠言心有二意一則心有覺而道無為心所以為行道之本一則行道惟人為能故以心為在人之誠亦猶首章章句蒨本不言性之所以為性而言人之所以為人之意皆是自此以後專為學者言之也知彼則知此矣朱子嘗曰心雖主乎一身而其體之虚靈足以管乎天下之理理雖散在事物而其用之微妙實不外乎一人之心盖理具於心而散在事物心主乎身而管攝衆理問者謂實理實心看來都是體者盖但就心主乎身理具於心處言殊不思理具於心者又只是性可以言誠不可以言道朱子謂誠以心言此就管攝衆理處説心道以理言是就散在事物處説理就管攝衆理處説心故曰本就散在事物處説理故曰用問者但知具於心者之為理而不知散在事物者之乃所以為理故如此疑耳雙峰所見正與問者有契故曰誠即道也非有兩般如誠者天之道是也盖皆不達子思朱子之意而致誤耳其以誠者天之道為證後段辨之且饒氏謂此章頗難看則是矣謂章句反為所纒則非也特饒氏自為所纒耳發明謂道即誠之道也如云誠者天之道至誠之道自其真實無妄言之則曰誠自其天下通行言之則曰道一而已矣此其勦饒説以為己意其迹甚顯但誠者天道至誠之道只是一句此以誠與道相對言之分明是一本一用而以彼為證可乎以此觀之𤼵明之不及通逺甚輯釋引通而不取𤼵明宜矣成己成物發明引陳氏曰異端但知成己不知成物吾儒以成物為成異端以空寂為成彼之成己自我觀之見其自壞而已天下豈有真能成己而不知成物者耶𤼵明愚嘗深繹此章誠本自成己也誠之為道内自道於己也此為己之學也天命之性具此實理誠者實此者也實有諸已故曰自成率性之道躬自行之道者行此者也躬行於己故曰自道輯釋亦引之按誠者自成是理之自然未説到人力上𤼵明實此者也實有諸已之言則未免有攙説人力之病盖未達誠自成只是物物各具一太極之實理而已之意也唯其所見如此故於雙峰之説毎惓惓而不能捨也已於辨饒説處及之其曰率性之道躬自行之亦似未當躬自行之亦非所以言率也其曰誠之為道云者此則饒氏誠者天道之意爾前辨已明此不再述第二十六章故至誠無息饒氏謂人之誠有至有不至聖人誠之至故可以説至誠若天地只是誠更無至不至輯釋亦引之按論語集註一貫章有曰譬則天地之至誠無息則似不必拘也但此處言聖人配天地之意則是説聖人而非指天地爾輯講問悠久悠逺有以異乎饒氏謂無以異也不息則久云云愽厚則高明此推其無息之效故其序如此下一截指其成徳而言故先博厚高明而後悠久輯釋亦引此説按章句於徴則悠逺以下以為皆以其驗於外者言之於悠久成物處云悠久即悠逺兼内外而言之也猶宜亦有斟酌饒氏直以為無以異則言之太快而不免有所遺矣至謂下一截指其成徳而言則尤恐未當盖至誠已是成徳事了下文但言其常於中而驗於外者如此耳非如此而後徳始成也雙峰乃曰下一截指成徳而言然則上一截非成徳之事耶此則所未喻者餘於後二段究之輯講問不息則久與悠久兩个久字似無異義而朱子以久為内以悠久為兼内外是如何饒氏曰上面久字是在内下面悠久是指外面前段悠久悠逺無異之言病根在此輯釋亦引之按問者兩久字似無異義之疑是矣而謂朱子以悠久為兼内外異乎上文以久為内之㫖則未悉章句之㫖者也為雙峰者宜告之曰悠久之悠即悠逺之悠此指驗於外者言也悠久之久即久則徴之久此指常於中者言也兼内外者外主悠言内主久言爾如此則兩久字皆在内章句無可疑矣今不以此告之而曰上久字是在内下悠久是外面厎則二乆字果有不同矣不惟不足以釋問者之疑又且勇於背章句之㫖亦獨何哉盖朱子皆以久為在内者其意若曰唯其常於中故驗於外者悠逺而愽厚高明惟博厚高明故又如此之悠久悠久則驗於外者又未嘗不常於中也首尾相應如此况同一久字不應頓有内外之異若以久亦可以言外耶則上文久與悠逺分内與外又何為而不易耶以此見朱子之精宻似非雙峰所及輯講問章句云天地山川實非由積累而後大看來及其二字似解不去饒氏曰子思大意只是形容不息之義云云以此見得人之徳固以誠為貴然非不息則亦不能博厚高明與天地同其功用須是無息始得前段下截指其成徳而言之説病根在此至誠則自然無息無息則自然常於中驗於外而與天地同其體用非至誠之後猶有待於不息而後能與天地同其功用也或問力辨諸家之失皆為其如此讀者攷焉可也雙峰以此見人之徳固以誠為貴至須是無息始得一段議論皆似以為至誠之後又須使之無息始得然者此則誠所未喻也章句曰既無虚假自無間斷自之一字豈非預為雙峰對證之藥耶讀者其詳味之章句云云然天地山川實非積累而後大讀者不以辭害意可也叢説帝堯自明徳後以至於黎民於變時雍豈無次第之序孔子自志學至不踰矩豈無造詣之極則子思四及字之意豈亦無意按章句上文曰此四條皆𤼵明由其不貳不息以致盛大而能生物之意此曰然天地山川實非由積累而後大讀者不以辭害意可也兩意字正相應盖至誠之徳固無積累之漸然其及物之功則未嘗不自近而及逺自小而至大也故以天地山川積盛而能生物者為喻其意只欲以此𤼵明由其不貳不息以致盛大而能生物之義其辭則似乎天地山川由積累而後大者而實則非有此事也故章句曰然天地山川實非由積累而後大讀者不以辭害意可也輯讀及其二字似解不去之疑與叢説四及字豈亦無意之語皆是以辭害意不達至誠之徳無積累之漸而成物之功則有積累之漸者而又泥於辭不知天地山川實非積累而後大遂謂至誠之徳亦有積累之漸者皆不可不察且叢説以堯為證堯之克明峻徳其亦異乎自格致誠正以修其身者之明明徳矣固未可以此一言為至誠亦有漸次之證也若夫親九族至協和萬邦以下自是及物之功章句何嘗亦以此為無漸次哉觀其所言由其不貳不息以致盛大而能生物致之一字則及物之功為有漸次可知至於孔子所言自是下學之次第聖人特因其近似者以自名為學者之法程耳遽以近似之言為至誠真有漸次之證毋乃於夫子子思之意兩失之歟叢説此意正是蹈襲雙峰下截指其成徳而言與須是不息始得之言以為説饒説愚已辨之於前矣但雙峰説天道不成天道人道不成人道何則天道有效驗無工夫雙峰則以為須是無息始得是猶有待於用力而後不息也非天道不成天道乎人道必先知後仁雙峰於致曲以後説人道處皆説為先仁後知非人道不成人道乎叢説不辯其失而效其尤尚可自謂得朱子之傳乎噫甚矣雙峰之説易惑人也豈特叢説為然自至誠盡性章至至誠無息章五章饒氏謂至誠盡性章以誠者之仁而言致曲章以誠之者之仁而言至誠前知章以誠者之知而言誠自成章以誠之者之知而言至誠無息章以誠者之勇而言或問前章誠者之仁知即繼以誠之者之仁知至誠無息章論誠者之勇而不復以誠之者之勇言之何也饒氏曰誠者不勉而仁不思而知若無以見其勇者故特以悠久不息著其勇若夫誠之者則非勉無以仁非思無以知而所謂勇者已存於思勉之中而不復别以勇言也况誠之之工至此則人道已盡而其至誠無息固将與天道為一所謂誠則明明則誠也又豈可以差等言哉又以此數章皆先仁後知而勇以終之成徳之序然也按此説似乎與章句不同然詳味之似亦不為無理何則此五章以天道人道相同而言若無説以貫之則似乎雜亂無統紀者觀於篇首言不明不行之意以下諸章所論三達徳相承之次秩然如彼其有條也豈容於此處乃無一説以貫之耶愚竊以雙峰配此五章為三達徳不為無理而此五章皆是以三達徳𤼵明天道人道之義與章句之意自不相妨却又得相承之次有條不紊不為無功於章句也但其為説猶有未透徹處則不可不為之𤼵明耳夫誠者之三達徳固以先仁後知為序致曲之仁亦先成物之知何歟此特承上章天道遂言人道以為進道之階梯固非以此亦為先仁後知之序而亦不容改為之序也尚何疑乎或又疑盡性之盡致曲之致似不可專主行而為仁也曰章句釋誠明之義以徳無不實為誠以明無不照為明誠即仁明即知也盡性雖兼察之由之而言其實只是徳無不實之事故但當為誠者之仁致曲之上既以其次二字𤼵之章末又以至誠能化終之止是承上章言學者由教而入以上同乎聖人盡性之事則亦但當承上章為誠之者之仁耳前知章正是明無不照之事以為誠者之知固無可疑獨誠自成章為誠之者之知乃不承上章前知如神之意而言而别取成物之義似與致曲承盡性而言者不類為可疑耳盖誠明明誠二誠字雖有淺深然其皆為徳實於己之意則亦初無甚異故誠之者之仁可以承誠者之仁而言二明字則一在誠前為入徳工夫先明乎善之明也一在誠後為至誠之效驗明無不照之明也義全不同若以欲以誠之者之知承前知如神之明而言則又只説得誠明之明而不得為明誠之明豈得為誠之者之知哉故不取明意但主成物言之既可少異於入徳明善之工又不害其為學者致用之事其㫖深矣或猶以為誠自成一章僅有成物知也一句又對成已仁也一句而言何以見得是誠之者之知曰中庸諸章言仁者未嘗截然不及知意言知者未嘗截然不及仁意顧其所主如何耳此章自君子誠之為貴以上雖未及成物正是先言此以為成物之本亦猶大學新民章先説自新以為新民之本者相似自此以下却全是説歸成物上去其曰非自成已而已也所以成物也觀非自字而已也字所以字抑揚之意盖可見矣下文成已仁也成物知也性之徳也合外内之道也四句雖以仁知對言却正是恐人以成已為内成物為外則将但知成已而不知成物故以仁知對舉以見其皆為性之徳不可判内外為二致而不復以成物為事也成物可以外言知可以外言乎此仁知之所以合外内之道也内是成已外是成物所以合外内之道是仁知正以仁知皆性之徳故耳詳此文勢全是解常人分内外輕成物之惑而專歸重於知者故結之曰故時措之宜也時措之宜正是知用萬物道濟天下也事全是説成物之知分曉所以章句曰既得於已則見於事者以時措之而皆得其宜也饒氏亦曰時措之宜是專説成物由是而觀則此五章皆是説三達徳如雙峰之説無可疑矣餘於後段究之饒氏以哀公問政章以下至至誠無息章八章為第四大節皆主誠而言而分三達徳以配之雙峰折二十章為二章故曰八章又以自大哉聖人之道以下六章為第五大節皆言大徳小徳非對上文為天道人道之分也按中庸一篇朱子分為三十三章總為五大節饒氏變章句之序分哀公問政章為兩章故有三十四章而總為六大節首節次節末節皆與章句無異惟析章句第三第四節兩節為三節為不同耳其析哀公問政章為兩章與併以之屬下章之失已於前章及孟子離婁上篇辯之此不再述其以盡性至無息五章分配三達徳則似不為無理已於前段明之但以諸章自為一節分大哉聖人之道以下六章亦自為一節二節前後不相貫通後節非有天道人道之分又謂自誠明章至經綸章皆以先仁後知為序則皆未必然耳盖就此十二章中指盡性至無息五章分配三達徳則可而欲分十二章為兩節則不可其實十二章皆言天道人道共作一大節本無可議只因雙峰分配三達徳至無息章議論已盡故只得如此分節耳其得失當續論之但此十二章前六章言天道人道以一章間一章為次先天道而後人道後六章言天道人道以三章間三章為次先人道而後天道則不容無少分别如此則一大節之中不妨前後自含兩意耳故愚既辨雙峰之失復取其是而補其缺僭為臆説如左以俟有道而就正焉其謂十二章皆以先仁後知為序之誤後段及下章辯之愚妄謂此十二章除誠明章統説起外自盡性以下五章此是申言三達徳以𤼵天道人道之義也自大哉聖人之道以下六章此是申言費隠以𤼵明天道人道之義也其以前五章為申言三達徳以𤼵明天道人道之説此則雙峰之所已言愚既於前段詳之矣此不再述其以後六章為申言費隠以𤼵明天道人道之義何以知其然耶曰此亦因章句之意而推之爾章句以𤼵育峻極為極於至大而無外以三千三百為入於至小而無間以存心為極乎道體之大以致知為盡乎道體之細所謂大小非即費之大小乎下二章皆承此章言之前章承為下不倍言則亦語小之意後章承居上不驕言則亦語大之意雙峰有此説則亦莫非費之大小而已然此皆言費而隠在其中亦猶前章之意爾繼此則仲尼祖述章𤼵出小徳川流大徳敦化之意小徳大徳非隠乎川流敦化則費矣川流即三千三百之意敦化即𤼵育峻極之意其下二章又承此章而言前章承小徳川流而言即費意後章承大徳敦化而言即隠意小徳川流大徳敦化經文就天地分上言則交互分體用下二章只就聖人分上言故又如此分費隠餘於下章及篇末詳之亦不過皆斯道之體用耳其詳於下章言之愚故以此十二章為申言三達徳費隠以𤼵明天道人道之義也至若此十二章中前五章先天道而後人道者是欲學者先知天道以為造道之準的然後由人道以求至乎其極耳後六章先人道而後天道者是又欲學者先得人道以為進道之階梯然後可以盡乎天道之極至耳前五章言天道人道以一章間一章為序者因三達徳而分也後六章言天道人道以三章間三章為序者因費隠大小而分也不過皆是反覆𤼵明天道人道之義而已而天道人道又不過皆所以𤼵明中庸也抑愚又嘗因此一節十二章之㫖以推前二節十九章之義則似乎有相同者何則中庸除首末二章始之終之外中間分三大節前十章是一節言中庸次九章是一節言費隠愚嘗合而觀之是自三達徳説入費隠上去其實皆所以明中庸之義也後十二章是一節皆言天道人道愚嘗析而辨之亦是自三達徳説入費隠上去其實亦所以明中庸之義也三達徳與費隠前則析為二節而詳言之後則合為一節而統言之是後一節之中却該前二節所言之意也前二節則主於立本用工以立其本故但言三達徳與費隠以𤼵明中庸後一節則主於致用成功而致其用故分别天道人道以𤼵明中庸其實天道人道亦但於達徳費隠上見之此其大畧也其詳論之如左一何以見得三節皆𤼵明中庸二何為前後皆自知仁勇説入費隠上去三三達徳與費隠何故前析為二節而言後統為一節而言四何故天道人道亦但於達徳費隠上見五何以見得前二節主於立本後一節主於致用六中庸知仁勇費隠天道人道名目不同何以貫而通之一第二節言中庸此章句成説無可疑者第三節章句以為言費隠第四節章句以為言天道人道今皆以為𤼵明中庸何也曰自第二章以下十章章句以為皆論中庸以釋首章之義費隠章章句亦以為申明首章道不可離之意下八章又皆以明此章之義者然則亦承第二節以𤼵明中庸可知矣况下章即言庸徳之行舜大孝章章句又以為此由庸行之常推之以極其至後二章亦此意然則此九章皆為以費隠大小𤼵明中庸又可知矣以此二節言三達徳費隠為皆𤼵明中庸之意推之則誠明以下十二章言天道人道處不過亦是申言三達徳費隠而已又何獨不得為𤼵明中庸之意耶大抵三達徳與費隠不外乎中庸而天道人道又不外乎達徳費隠然則又豈中庸之外他有天道人道之分哉則其皆為𤼵明中庸之義尚何疑乎二知仜勇是徳費隠是道其理雖無二致然德則存於夫人之心道則散在天下之事徳是人所能知能行之器具道是人所當知當行之材料徳譬如匠者之有䋲墨斧斤一般道譬如匠者之有楩梓豫章一般以此徳而知行此道譬如匠者施䋲墨斧斤於楩梓豫章以為宫室舟車一般所以前後皆自知仁勇説入費隠上去者盖必先有能知能行之器具然後可以施之於當知當行之材料也今以前後所言推之則自第二章以下十章論三達徳處皆反覆言擇守知行之義盖先以人所能知能行者言也直至第十二章説君子之道費而隠其下即以夫婦之所與知與能聖人之所不知不能與天地猶有憾者繼之此所謂知即達徳知所能知之知此所謂行即達徳仁所能行之行爾以見斯道之用自一事以極乎全體皆夫人之所當知當行者也故其下章或言費之大或言費之小大小雖不同皆不過是全體中所該何莫非人所當知當行者乎末後二十章所以終十二章之義者又彰彰然以達徳所以行乎達道者言於章中其意尤為易見自二十一章以下論三達徳處亦皆反覆分别誠明明誠難易淺深之不同盖亦先以聖人學者所能行能知者言也直至二十七章説大哉聖人之道其下即以道體之大無外小無間者繼之此即申言費隠之義所謂大小即費之大小耳然後言尊徳性道問學以下五句為學者修徳凝道之方其事不外乎知行兩端而已徳性即知仁所以為知行之體者問學即知行所以為知仁之用也以見道之全體皆夫人所當知當行者也故其下二章反覆乎不驕不倍之義又何莫非全體中之事亦行道者所當知爾知行之至必如仲尼祖述章取譬之意與下二章所謂至誠非至聖不能知至聖非至誠不能為之意而後於道之全體無所遺耳然則前後皆自知仁勇説入費隠上去者於此不難見矣三三達徳與費隠是道理之名目天道人道是聖賢之等級前欲指道理之名目以示人故不容不分達徳與費隠為二節而詳言之後欲明聖賢之等級以示人故不容不致意於天道人道之分别若達徳費隠之㫖則已於前二節詳之此但申言其理以顯天道人道之同異處爾政不必再分達徳與費隠為二節但為一節主於分别天道人道而於一節之中自該前兩節之意足矣尚何疑乎四道理之名目其義實聖賢之等級其義虚將欲明天道人道之同異以示人而不就達徳費隠上言之則義之虚者懸空無所着落其不陷於老莊之窈冥昏黙者幾希故必就達徳費隠上分别出天道人道之同異然後義之虚者於義之實上見而聖賢之品級明矣五中間三大節前二節主於立本後一節主於致用大抵中庸一書專為開來學而設故於學者立本致用之意為詳其説聖人事與至誠之功用亦不過皆為學者立本致用之準的而已若聖人則又何假於言哉唯前二節主於立本故於入徳之工夫為詳而於聖人之事為畧其𤼵明中庸所以致詳於三達徳費隠之義者盖以學者立本之要非三達徳無以為入道之門非費隠無以見道不可離之意也惟後一節主於致用故於成徳之效驗為詳而於下學之事為畧其𤼵明中庸所以反覆乎天道人道之同異者盖以聖人之功用學者之致用有難易淺深之不同也前二節亦有言聖人之事處如依乎中庸遯世不見知而不悔舜大孝文無憂武王周公達孝議者天之道不勉不思從容中道之類不過數處不過皆愚所謂以為學者立本之準的而已者也自此之外則皆學者入徳之工夫也何莫非主於立本而言乎後一節亦有言下學之事處如明誠致的道自道尊徳性道問學至敦厚崇禮之類亦不過數處然皆不過是言此以引起致用之意故致曲自形著動變以下道自道自成已成物以下尊徳性自居上不驕以下以盡乎二章之㫖亦皆以致用之效驗與致用之當否而言也愚自用章三重章皆以致用之當否而言故為人道若是天道則𤼵見當其可有當而無否矣其餘説天道處則皆全是聖人之功用亦不過皆愚所謂以為學者致用之準的者也何莫非主於致用而言乎是以前後所言三逹徳費隠之義推之尤為易見前二節惟主於立本故其論三達徳處於學者事則言知擇中庸言仁守中庸而又言勇强中庸以見學者非勇則無以至於知之成功而一也於聖人事則但言知知之盡言仁仁之至而又言勇不賴勇而裕如以見聖人雖未嘗無勇然不賴勇而裕如也其論費隠大小處則以君子之道𤼵其端道雖即是聖人之道而君子則為學者期之也非愚所謂於入徳之工夫為詳於聖人之事為畧之意乎後一節唯主於致用故其論達徳處於聖人之事則言仁盡性言知前知而又言勇無息以見聖人雖無所賴乎勇而亦未嘗無勇也於學者事則但言仁致曲言知成物而不言勇以見學問之極功即是聖神之能事至誠能化時措之宜皆是自學者至聖人處其勇亦統於至誠無息之中矣其論大小費隠處則以聖人之道𤼵其端道雖無異於君子之道然聖人則非學者所可稱也非愚所謂於成徳之效驗為詳於下學之事為畧之意乎所以前二節中雖有聖人之事亦是為學者之法不過主於立本皆以人道言之故但當以先知後仁為序也後一節則分天道人道而言其説天道處則是自誠而明固當以先仁後知為序其説人道處則依舊是學者事雖則主於致用既是自明而誠由教而入只當以先知後仁為序耳饒氏乃謂自誠明章後皆以先仁後知為序强説尊徳性而道問學亦為先仁後知之事則泥而不通矣其誤於下章辯之唯二十章介在立本致用之間故其説最為詳備所以知仁勇天道人道之言皆於此章説出以此見得此章正是承前啟後所在也或者猶疑舜大知聖人事也而亦統於學者立本之事可乎曰舜雖聖人好問用中則學者入徳之法也尚何疑乎六中庸之與達徳費隠非有二也知所以知此中庸仁所以行此中庸勇所以强此中庸者也費即中庸之用隠即中庸之體也中庸即知所知仁所行勇所强體之隠用之費不偏不倚無過不及而平常者也中庸之與天道人道亦豈有二哉天道特自然盡此中庸人道特用力求盡此中庸者也達徳費隠之與天道人道非有二也天道之於達徳性焉安焉者也故其於費隠之體用自然與之一矣人道之於達徳復焉執焉者也故其於費隠之體用始猶與之為二終乃與之為一矣又細分之則三達徳與費隠亦豈有三乎哉三達徳之具於性者體也非即體之隠者乎三達徳之見於事者用也非即用之費者乎如此則中庸一書似覺首尾貫通義理明白管見如此夫敢自信姑筆於此以俟有道而取正云第二十七章饒氏以自此以下六章為第五大節説大徳小徳又以致廣大等為充其大徳盡精微等為充其小徳以六章自為一節其得失已辯於前矣雙峰此意似以𤼵育峻極極於至大而無外者即為大徳以三千三百入於至小而無間者即為小徳愚竊以為得之而未盡請以管見陳之於左以俟明者之折衷焉竊意此二節洋洋優優且就敦化川流上説皆是説費未説到隠處若小徳大徳則為隠矣雙峰充大徳小徳之説所謂小徳大徳似指費説與經文大徳小徳之㫖不類似未可牽合以為説也夫𤼵育峻極便是敦化處𤼵育即化意峻極即敦意三千三百便是川流意此於川流意自易見皆只言費之大小雖費中有隠然未説出以示人也下文自尊徳性道問學以盡乎二下章所言皆是但言費而隠在其中直至仲尼祖述章方説出小徳川流大徳敦化二句小徳大徳正是隠川流敦化則費矣或疑大徳為萬殊之本以為言隠可也小徳為全體之分亦以為隠可乎曰萬殊之本即萬物全體一太極全體之分即物物各具一太極耳太極不離乎隂陽而亦不雜乎隂陽萬物統體處與物物各具處皆如此不離乎隂陽者即費也川流敦化是已不雜乎隂陽者非隱乎舍大徳小徳將何以當之盖費有大小大處小處皆有隠大處之隠非即敦化者之大徳乎小處之隠非即川流者之小徳乎若但以大徳為隠小徳不為隠則是費之大處有隠費之小處却無隠也造化本原上有隠事物各具上却無隠也而可乎盍亦以天道流行人性感通之理而驗之乎盖以天道對人性言之則天道即是全體處所謂萬殊之本也非大徳而何人性即是萬殊處所謂全體之分也非小徳而何然天道之流行處便是敦化之意固費也人性之感通處便是川流之意亦費也天道之沖漠無朕處固是費中之隠即大徳是已人性之寂然不動處亦豈非費中之隠乎不謂之小徳不可也以此推之則費隠之義尤為易見或又疑小徳為全體之分大徳為萬殊之本正與一貫忠恕章集註以萬殊所以一本為體一本所以萬殊為用者相類今以小徳大徳皆為隠則全體之分亦當為體而不為用與言一本所以萬殊為用之意不合豈朱子意耶曰一貫費隠皆是以一體對一用言易曉惟此章分體用則當以二句相對見一本萬殊之義又以毎句分作兩截見費隠之義而不可偏主也難曉所以然者盖一以貫之是就聖人分上言小徳川流大徳敦化是就天地分上言費隠則無間乎聖人天地皆可言也就聖人分上言不過只是小徳川流一脚事故但以一體一用相對言之足矣就天地分上言則包人物於其中是故以屬之天地者對屬之人物者言則以屬之天地者為體屬之人物者為用此一本萬殊之正義也然屬之天地者亦自有體有用屬之人物者亦自有體有用用皆可以費言體皆可以隠言也然則子思小徳川流大徳敦化二句正是言天地之道以明聖人之道耳者只就聖人之道言之所謂一以貫之其實亦只是全得个全體之分者以為體之一全得个如川之流者以為用之貫有似於天地之化一本而萬殊者耳非不過只是小徳川流一脚事而何觀朱子於一貫章亦曰譬則天地之至誠無息而萬物各得其所也朱子所謂譬則子思所謂譬如皆只謂聖人之道與天地之道相似而已何嘗以屬之聖人者即為屬之天地者哉然則此與一貫章集註亦無所謂背矣勉齊雙峰正如此交互分體用當於後段及之更以章句析小徳大徳川流敦化為四節而解之之意推之亦自可見朱子雖未如此分析然如此分析亦於經註之㫖無所謂悖不知明者以為然否尊徳性至崇禮輯講此五句上一句為綱下四句為目乃修徳凝道之方也欲修是徳必先尊徳性以為之本既尊徳性又必由問學之功以充其大小之徳致廣大至崇禮八者道問學之目也此説與章句不同盖由不達章句存心之義而以力行當之故致誤耳後段辯之輯講致廣大以行言盡精微以知言極高明以知言道中庸以行言温故知新皆以知言敦厚崇禮皆以行言同上問章句分存心致知之屬竊謂致廣大敦厚固屬存心盡精微知新固屬致知若以極高明温故屬存心道中庸崇禮屬致知恐未安講義之分知行似為親切饒氏曰如此似乎無病如此分知行與章句異雖似可通然章句以存心對致知而言饒氏以行對知而言此則似是而非大有可辯盖存心是心上主敬工夫行是身上踐履工夫存心是且存其本然之理力行則為其事矣存心是該貫動静工夫動時存心方能省察所以為知行之本行則全是動時工夫又是存心致知以後事行事時循理而不徇欲非存心有素者不能然不可不精别遂謂力行為存心也四書通謂讀者因陳氏謂存心是力行工夫遂疑高明温故屬知此言可謂切中雙峰致誤之由矣殊不知泛而言之謂存心屬行猶言省察屬知者相似若未甚害若細分之則存心與行實不同雖知行皆不可不存心但此章章句以存心居致知之前則是以存心為致知之本也觀朱子於大學或問引尊徳性而道問學為主敬以格物致知之證而此章語録又引程子存養須用敬進學則在致知之言為證則可見矣雙峰只因誤認存心為行故疑高明温故之不可為行又因此疑行之事不當只有致廣大敦厚二者遂併意下節道中庸崇禮之亦為行而非致知故如此分知行耳愚請先辯雙峰之誤然後𤼵明章句之㫖以究之夫雙峰之意豈不以高明有知之意知主於知極其高明非知而何故者舊所聞亦知之意温故又非知而何殊不思高明與廣大皆吾心本然之體段非由外鑠我也但為私意所蔽私欲所累則失之耳致之極之非著力求之於外而得也但不以私意自蔽則為有以致其廣大不以私欲自累則為有以極其高明矣故雖舊所聞然亦心之所已知者與厚為所已能之意只一般温之敦之亦非著力求加之謂但尋繹使之不忘則為有以温其故敦篤使之不失則為有以敦其厚矣由是觀之則廣大也高明也皆吾心之所自有故也厚也皆吾心之所已得致之極之温之敦之皆不過以存其心使其所固有所已得者無所虧䘮而已又何可以極高明温故獨不為存心而為致知乎雙峰之意又豈不以中庸乃無過不及而平常之理道則有行之意道乎中庸非行而何禮者理之節文非行何以崇其禮殊不思中庸與精微皆事物當然之理非學無以知之盡精微固無可疑道中庸之道章句雖不之釋然上文道問學之道既以由字為訓則道中庸之道亦但如其訓耳由不必遽以為行之義猶曰為小學者不由乎此為大學者不由乎此之由而已此所謂由其意盖曰致其知者不可如知者之過愚者之不及而皆由乎中庸也知新為致知固無可疑禮雖理之節文然不學以明其理則節文之未謹者亦不知其為當如何謹矣将何以崇其禮乎由是觀之則精微也中庸也皆理之所當然新也禮也亦皆理之未得於我者盡之道之知之崇之皆所以求知其所當然求得其所未得何莫非致知之謂又何可以道中庸崇禮獨不為致知而為行乎雙峰唯不思存心之未可為行又不思此五句但以存心為致知之本故致此誤耳若夫章句以上四者皆為存心之屬下四者皆為致知之屬者盖上四者皆是已如此者常欲保全之便不至於不如此下四者皆是未如此者亦欲窮究之求其得至於如此詳玩章句之㫖可見上曰不以自蔽不以自累涵泳已知敦篤已能曰自曰已便見得皆是已如此之意此譬如穀之已在倉者不須多用得力但須常常照管使倉不至破弊穀不至散失毋為雀䑕所耗毋為盜賊所竊而已何莫非存心之事乎下曰析理不使差處事不使謬日知所未知日謹所未謹曰不使曰所未便可見皆是未如此之意曰不使有差謬曰知謹所未知謹便可見亦欲窮究之求其得至於如此之意此譬如穀之未得入倉者便須着力搬運使先後接續入倉未穫者穫之未收者收之無有顆粒之或棄不為他人之所得必至於倉實而後已何莫非致知之謂乎或疑故是舊所聞乃得之於外者與廣大高明本自如此者不同何乃皆為存心之事曰廣大高明是得於賦予之本然者故是所已知厚是所已能又是得於前日學力之已然者二者雖有不同然既皆為吾心所有則但皆為存心之事而已况性無内外得於學力之已然者亦不過復其賦予之本然者而已又何不同之有往嵗雙峰之説方行學者翕然尊信愚獨疑其不然而辯析之如此數年後四書通刋行其説適與管見有契今併録其説與諸編不同之見於後以俟明者擇焉謹按章句存心致知之分固無以加愚竊以為四句上半截皆屬存心已無可疑下半截皆屬致知則似聖賢之學偏於知而不及行此所以不免諸家紛紛之論也意者於下截四者以盡精微知新屬知道中庸崇禮屬行如此則上句尊徳性依舊只是存心道問學却是兼知行為下四句之綱尊徳性是存心統四句上半截道問學兼知行統四句下半截亦與章句無大背馳盖知所以造其理行所以履其事而心則所以具衆理而應萬事者也故致知而不先存其心則具衆理之體不立而無以為造理之本矣力行而不先存其心則應萬事之用不行而無以為履事之本矣故能存心則不以私意自蔽而後可以盡精微存心則能涵泳其所已知而後可以知新此皆存心以致知也存心則不以私欲自累而後可以道中庸存心則可敦篤其所已能而後可以崇禮此皆存心以力行也存心所以為知行之本者固如此若以知行相對言之則盡精微與道中庸知新與崇禮又未嘗不先知而後行也饒雙峰陳定字惟不察此意故以知行互有先後為説饒氏猶知其不可為訓强説為先行後知之序陳氏并不達雙峰之㫖但直以知行先後交互為説行先於知天下寧有是哉今以愚見質諸古訓則程子曰涵養須用敬進學則在致知此以存心為致知之本也孟子言存心養性以事天此以存心為力行之事存心乃能力行孟子盖亦以存心為力行之本但指其本以示人耳集註曰存心養性以事天所以履其事也觀所以二字則存心為力行之本者可見矣又按章句於致廣大言私意私意所蔽則有害於知不以私意自蔽則能盡精微而知可致矣於極高明言私欲私欲所累則有害於行不以私欲自累則能道中庸而行之力矣於温故言已知於敦厚言已能以知對能而言正與論語學而章或問之言有契何嘗不帶行意但曰已知已能則是心所已得非求知求能之事則温之敦之但當屬之存心為知行之本耳故已知者温之則能日知所未知而致知之功愈密矣已能者敦之則能日謹所未謹而力行之功愈至矣觀其釋道中庸為處事崇禮為謹節文二者亦皆帶行意思又可見下截兼知行未必不合經註意處至其以知行相對而言之複者蓋以上截存心言之則致廣大極高明是以得於賦與之本然者言温故敦厚是以得於前日學力之已然者言則言之固不容於不複愚於前段既及之矣若通下截言之則上截章句故曰已知即前日所盡之精微耳前日所盡之精微今日不謂之已知不可也厚曰已能即前日所道之中庸耳前日所道之中庸今日不謂之已能不可也不然求知求能當如何而但就已知已能者言之耶知新便是故中猶有精微之當盡崇禮便是厚中猶有中庸之當道非判然不相入也是故自存心以致知者言之則必致廣大而後能盡精微盡精微譬如讀始讀之書皆爛熟一般温故則已熟者永不忘之意知新則就故之中又盡得無限精微意思自存心以力行者言之則必極高明而後道中庸道中庸譬如行始行之路無差錯相似敦厚則無差錯者永無差錯且不退轉之謂崇禮則就厚之中更無一時一事不道中庸之意禮是節文節則無太過文則無不及非即中庸而何如此則知行之始終始備而非復也管見區區姑記於此以俟有道而就正焉通曰讀此者往徃因陳氏謂存心是力行工夫遂疑高明温故知新殊不知章句但曰存心致知未嘗曰力行致知朱子不曰尊徳性所以力行而必曰存心何也大學或問取程子十二節即致知之事末後五節所以涵養本原之地即存心事也若謂存心便是力行下文有曰非存心無以致知謂非力行無以致知可乎道體至大心體亦至大尊之則能存此心之大所以能極乎此道之大恐未説到力行處竊謂存心不過存其心之本然者致知是欲推極夫事理之當然者心體本自廣大不以私意自蔽即謂之致心體本自高眀不以私欲自累即謂之極已知者温之而涵泳之味深已厚者敦之而持守之力固此皆存心之本然者也然心之廣大自具精微之理不學則於理便易有毫釐之差心之高眀自有中庸之則不學則於事易有過不及之謬故之中有無限新意不學則不能知新雖温故而不能盡精微敦厚之外有多少節文不學則不能崇禮雖敦厚亦不能以道中庸中庸是精微之極致究其極則一而已凡此皆推極夫事理之當然者也盖道體極於至大而無外非淺陋胷襟所能容所以不可不存夫心體之本然者道體入於至小而無間非粗踈學問所能悉所以不可不極夫事理之當然者要之存心不必於中分知與行若致知工夫其中却自兼知行而言或曰書以中庸名自第二章以後提起中庸者凡七皆孔子之言也中庸之道在知與行子思於此以道中庸偏為問學致知之事何也愚謂首章所言未𤼵之中即所謂徳性是也戒慎恐懼即所謂恭敬奉持之意其因孔子言中庸皆已𤼵之中也擇而行之莫先於致知此以道中庸屬問學之事何疑尊徳性以下皆有而字則重在下股謂存心不可以不致知末於敦厚崇禮不曰而曰以下以字則重在上股謂非存心無以致知也按通此説正為破雙峰分知行而𤼵極為精詳可謂度越諸編但以而字以字分配章句二句之義則未必然耳章句此二句乃通釋五句之㫖何嘗專為而字以字分哉非存心無以致知即非尊徳性無以道問學之謂存心又不可不致知即尊徳性又不可不道問學之謂下四句皆當以此意推之嘗有問中庸温故知新與論語所言如何於朱子者朱子答以中庸温故重主於尊徳性而言所謂得其本而末自順也今如通之説則温故反為輕耶况存心是本子思豈應前四句皆重下股耶假如子思前四句重下股末一句重上股則章句亦當先説存心不可不致知後説非存心無以致知今章句二句先後如此而通説如彼顯見非經註㫖又謂引孔子言中庸皆已𤼵之中恐亦未必並謂此章中庸為已𤼵之中則可謂孔子言中庸皆已𤼵則未可朱子釋篇名中字之義何嘗不兼未𤼵之中言哉子思又何嘗不取夫子所言以名篇哉讀者詳之𤼵明按章句分極高明以下為兩類毎每讀之不能無疑盖道中庸難屬致知温故知新一事耳不當分為兩事敦厚崇禮亦是一事觀以字可見尤不當分為兩事意欲云致廣大所以尊徳性也盡精微所以道問學也極高眀言道問學之事道中庸又言尊徳性之事也温故知新所以道問學也敦厚崇禮所以尊徳性也尊徳性屬力行道問學屬致知知之與行交勉並進首言尊徳性而道問學致廣大而盡精微先行而後知也繼言極高明而道中庸温故知新而敦厚崇禮先知而後行也欲盡修徳凝道之工夫知行二者不可舉一而廢一故先後交互言之𤼵眀正是蹈襲雙峰之説而小變之以為已有者也通者之言乃其對證之藥惜乎其不之取也且先知後行聖學不易之序𤼵明以為先行後知先知後行先後交互言之吾未見聖賢論為學次序有如此紊亂無定序者饒氏知此説之有所不通也故以為此皆是先行後知成德之序盖不得已之遁辭也𤼵明祖其故智而不知其意出於此又并失其遁辭之㫖則將何以為先行後知之説乎饒氏之失愚也辯之已詳知後則知此矣惟𤼵明所謂温故知新而敦厚崇禮者乃是删去二句中庸而字以字却自者而字連在二句之交以就其先知後行之説經文一字不可移易𤼵明務欲已説之可通乃妄加筆削於其間則亦何所不至哉餘於後段究之𤼵明又曰久藴此意未敢自决後閲吕芸閣記解有言曰温故知新將以進吾知也敦厚崇禮將以實吾行也則已言之矣最後則饒氏説亦以章句為疑但饒氏純以致廣大以下皆為道問學之事而温故知新敦厚崇禮仍分為四事亦未安但其分知行則不差云又引饒氏曰温故知新博之以文也新厚崇禮約之以禮也記解乃一時之言倪説乃庸人之見孰若章句之屢經改定為不可易耶引彼證此未得為當况章句以温故敦厚為存心記解亦但以知新對崇禮分知行而温故敦厚正不害其自為存心為知行之本也𤼵明若知存心力行之異味則必不為此言矣惜其不知取通之説也輯釋士𤼵謹按此一節胡先生𤼵明章句而未説到力行處固得朱子之意矣先師則自述所見而以知行交互言之於此似得子思之本意也若以章句存心為力行固不可然中庸本文五句未嘗不可分知與行也何以言之上文洋洋優優二節其總結之語曰待其人而後行子思既明提出行之一字矣遂結之曰苟不至徳至道不凝焉至此五句乃詳言修徳凝道之方夫徳也者行道而有得於心之謂也必能行道而有得於心斯可以凝聚此道於心但行而非知則為冥行知而不行則為徒知以先後言知固在先以輕重言行又為重故二者必交勉並進然後可以修此徳而凝此道耳若果未説到行處則雖知之未能行之是道與我猶二也何以為修徳凝道之實哉以此章第一節以修徳凝道之效而言未有徒知未行而有此效者也先師嘗自謂願為朱子忠臣而不為朱子佞臣即此亦可見矣觀輯釋先謂胡氏通得朱子意其師得子思本意則是以朱子意為非子思本意也末後引其師忠臣佞臣之説則是謂其師為忠臣胡氏不得辭佞臣之名矣其中間一段議論自中庸本文五句未嘗不可分知與行至未有徒知未行而能有此效之言不為不是但乃師知行之分恐亦未為得子思本意耳欲得子思本意恐須如通所謂存心不必於中分知與行若致知工夫却自兼行而言之説方為的當政恐朱子所言大綱已得所失者不過下截四者欠説出一行字耳然以析理對處事知義理對謹節文雖不説破是先知後行而知行相對之意已隠然寓於其中通之言無以加矣朱子所以不直説為行者政以問學二字可以知言不可以行言耳若𤼵明就上截五者之中説作力行此則决然不可非惟不識力行亦不識存心反自以為忠臣可乎輯釋阿其所好政恐未免為乃師之佞臣耳愚請申前管見以明之盖聖學之要有存心有致知有力行存心是涵養本原工夫所以為致知力行之本者也中庸開巻便以戒懼慎獨為言戒懼所以存天理慎獨所以遏人欲存天理固所以存心人欲不遏心可得而存乎二者皆所以為知行之本者也故其下十章遂言擇守中庸之事正致知力行之謂也然則分而言之則曰戒懼慎獨專言之則曰尊徳性而已所以章句於下四者上截既曰不以私意私欲自蔽自累又曰涵泳敦篤其所已知已能皆所以遏人欲而存乎天理也何莫非存心事乎存心乃所以為知行之本下截四者兼知行意已於前段詳之此不再述𤼵明輯釋但知力行之不可無而不知存心之尤不可無則知行且無其本矣質以首章戒懼慎獨之㫖豈為得子思之本意乎輯釋謂本文五句未嘗不可分知與行也愚亦謂下文五句未嘗無存心意也今但説作力行而冺其存心之㫖可乎朱子欠説出一行字尚不免諸家紛紛之疑今知有力行而不知有存心且不知行之不可以先於知則是舉末而遺本末知而先行其不可也必矣叢説上節皆存心之屬體認自可見但下截皆致知之屬却有兩道字與崇禮皆是行意盖窮學問之功而欲道之極中庸之理而欲道之究威儀之則而欲崇之固致知之事與盡精微皆一類也然知之明然後能行之篤又不徒知也則謂盡精微知新皆所以為行之地則與道之崇之又豈非一類耶故章句主於致知而言致知則行在其中其義精矣此説大概得之然不及通之明白但直以道為行未知果得章句道由也之㫖否已於前辯饒説處及之此不再述輯講謂中庸大抵以三達徳為體道之要始焉以入徳之序言之則曰知仁勇終焉以成徳之序言之則曰仁知勇是以以誠之一字掲於中篇以為一書之樞要而入徳成徳之界限於此焉分今以前章觀之皆先知後仁而篤之以勇入徳之序然也以後章觀之皆先仁後知而勇以終之成徳之序然也如博厚高明持載覆幬是已此章意亦猶是致廣大欲其仁如地之無不容載也極高明欲其知如天之無不照臨也故者温之厚者篤之又欲其勇如天地之悠久無疆也温故如天之循環敦厚如地之持重此所謂大徳者也盡精微者仁中之知地道廣大而精密道中庸者知中之仁天道高明而中庸知新者勇中之知天道久而常新崇禮者勇中之仁地道質而主文此所謂小徳者也講義與前共篇此不過其誤起於以存心為行遂至泛濫支離旁引曲證以張皇文飾其本不可通之説耳本原既差淫詖之辭皆在所不足辯也其以天道地道為説正是因吕氏天徳地徳之意而推廣之吕説或問譏其失之愈逺雙峰何為又述之耶先仁後知之失後段辯之輯講君子者成徳之稱學聖人之道而未至乎聖人者也成徳之事非君子莫能及尊徳性而道問學至敦厚以崇禮此皆先仁後知而勇以終之成徳之序然也此亦原於不知存心不可為行之誤故强援君子成徳之稱以合於先仁後知成徳之序耳其實先仁後知即是自誠而明之事所謂性之之徳誠者天之道是也惟堯舜性之之徳可以當之如湯武身之反之顔子博文約禮便亦只可以為自明而誠先知後仁誠之者人之道耳况君子之為成徳亦不過大而未化之事去聖神地位固自有間豈可便以此成徳之稱為先仁後知之事乎且既曰問學分明是由教而入者之事遽以為先仁後知實所未喻雙峰亦自知其有所不通也故又以學聖人之道而未至乎聖人為言學而未至者遽以自誠而明之事歸之則不勉不思從容中道不待學而已至其地者又將何以處之乎竊意為學之序皆當先知而後行其所以有先仁後知先行後知之序者則以聖人既生而知之則不復從事於致知工夫一有當為之事但見其行之而已行之而無不當乃見其知之無不明耳雙峰謂君子徳雖已成當益加學問之工以充之謂之當加學問即先致其知之謂强説以為先行後知可乎饒氏又謂章句云此章言人道也愚謂此章言君子徳雖已成而當益加學問之工以充之使小徳大徳各極其至以起下五章之意非對下文為天道人道之分也故自此以下四章皆不及誠至三十一章始以至誠為言又與至聖為對亦非為誠而𤼵此章以問學為言分明是誠之者之事只可以為人道故章句以入徳之方言之至矣若因君子是成徳之稱而説為先仁後知之事則决然不可前辯已詳此不再述惟雙峰以此為先仁後知之事故忌朱子人道之説有妨於已遂謂此章非對上章為天道人道之分又顧本章有問學二字未可遽以為誠者性之之事故又曰君子徳雖已誠而益加學問以充之曽謂自誠而明者徳無不實而明無不照乃猶有所未充不能無待於學問之功者乎至謂自此以後皆不及誠為不分天道人道之證此尤不然天道只是自然而然人道只是使然而然自然而然便是誠者之事仲尼祖述章及下二章不謂之自然而然不可也使然而然便是誠之者之事大哉聖人之道章及下二章不謂之使然而然不可也要當論其理而已何必以有誠字無誠字為泥乎善乎永嘉陳氏之言曰只合逐章體認才不費力處便是天道着力處便是人道此可以正雙峰之誤矣其詳於三十二章之末言聖希天賢希聖處辯之詩曰既明且哲以保其身𤼵明愚謂引詩所以證無道黙容子思其亦有感於所逢之時而言歟按語録明哲是曉天下事理順理而行自是災害不及其身今人以邪心讀詩謂明哲是見幾知微先占便宜如楊雄説明哲煌煌旁燭無疆遜於不虞以保天命便是占便宜説話所以被他這幾句誤然則明哲保身亦只是常法若到那舍生取義處又不如此論詳味此意正是為預破𤼵明識見而設𤼵明奈何既引語録而又自為此説耶愚竊以為引詩是通證上文居上不驕至黙足以容數句故結之曰其此之謂與今以為但證隠居黙容誤矣况烝民之詩為仲山甫作山甫乃宣王中興之佐豈但黙容者耶第二十八章輯釋引陳氏曰愚者無徳賤者無位當聴上之所為生今世而欲反古烖必及身歎時不可為自用自專皆非明哲保身之道承上章末之意而引之按如此者之此字是通指愚自用賤自專今反古三者言則烖及身是三者之通戒陳氏之言似欠明潔兼之愚自用政是有位無徳而欲作禮樂者亦以為當聴上之所為亦欠分曉但曰承上章末意而引却可備一説第二十九章章句吕氏三重之説饒氏謂以議禮制度為重猶之可也考文何重之有徴指文獻而言其重一也尊指位而言其重二也善指徳而言其重三也備是三者以王天下然後寡過夏商無徴孔子不尊時王有徴而未善自君子之道本諸身以下言必如是而後盡善竊意以此為三重似亦有理可備一説盖如吕説則寡過在人雖可宛轉説通終是費力如饒説則寡過在王天下者文勢意義頗似皆順觀經文但言其寡過矣乎並無在人之意可見但雙峰考文何重之言失之過當非天子不考文豈可謂之輕耶知天知人叢説上文四句下文兩句却只説鬼神聖人二者盖鬼神乃天地氣之靈者鬼神即該天地一句而以知天結先聖後聖一揆即後聖該三王一句而以知人結意者天地著鬼神幽幽者難知三王已然後王未然未然者難知故二句但從難知者言之爾按此章先生嘗謂不謬不悖不是知意無疑無惑正是知意故以此結之也二意皆不出叢説所言者但上文六句而皆只言四句抑有説乎盖本諸身而未徴諸庶民無以驗其徳之可以通天下之志與否也徴諸庶民而不考諸三王則霸者之民驩虞如也亦豈足為信從之正哉故必考諸三王不謬然後身所本民所徴皆合乎前聖之成法自然有建天地質鬼神俟後聖之必然者矣此所以但以四句言也以永終譽蚤有譽𤼵明謂永終譽要其終而言蚤有譽由其始而言蚤譽猶易永譽為難又引饒氏曰蚤猶遽也竊意未有不如此而蚤有譽當看未有二字正是謂必有本諸身以下六事方有永終之譽却不是未能有此六者而先有譽也故曰未有蚤即先之意對不字而言故饒氏以為猶遽也𤼵明以蚤有譽為始為易不知子思之意正是以為無蚤有譽之理奈何反以為易為始乎第三十章仲尼祖述堯舜憲章文武上律天時下襲水上章句皆兼内外該本末而言也或問子之所謂兼内外該本末而言者何也曰是不可以一事言也姑以夫子已行之迹言之則由其書之有得夏時賛周易也由其行之有不時不食也迅雷風烈必變也以至於仕止久速皆當其可也而其所以律天時之意可見矣由其書之有序禹貢述職方也由其行之有居魯而縫掖居宋而章甫也以至於用舍行藏之所遇而安也而其襲水土之意可見矣若因是而推之則古先王之所以迎日推策頒朔授時而其大至於禪授放伐各以其時者皆律天時之事也其所以體國經野安上全下而其廣至於昆蟲草木各遂其性者皆襲水土之事也使夫子而得邦家也則亦何歉於是哉或疑經文祖述憲章上律下襲四者章句既曰皆兼内外該本末而或問但言上律下襲二者不及祖述憲章之意抑有説乎盖目雖有四事不過二堯舜之道文武之法何嘗懸空無所寄寓哉不過即於上律下襲之中見之堯舜文武所以施之天下國家者何者不是上律下襲之事夫子逺宗近守亦不過在於上律下襲而已觀或問既言夫子上律下襲之實於前又述古先聖王所以上律下襲之義于後則夫子所以逺宗近守者豈在上律下襲之外哉或又疑或問所言夫子上律下襲之實不知當以何者為本為内何者為末為外耶曰事理本不相離精粗物無二致若本自本末自末内自内外自外則理為虚器事為粗迹精粗皆不相干矣而可乎姑以得夏時賛周易一端言之則以建寅之月為嵗首與爻畫象數皆其粗者所謂末與外也至於正之所以當建寅爻畫象數之所以生生不窮則有至理存焉即其精者所謂本與内也推此一端餘可見矣小徳川流大徳敦化饒氏謂小徳為體川流其用也大徳為體敦化其用也又曰勉齋以大徳為體小徳為用是要人識得大總腦不當與之較文義按勉齋雙峰二説相須方盡經註之意盖勉齋只説大徳小徳而如此分體用雙峰并説川流敦化則又如此分體用勉齋是相對説雙峰是交互説不可以執一求熟玩經註之㫖可見試以性與天道言之則性便是小徳便是天道之分便是用天道便是大徳便是性之本便是體此勉齋意也又就天道之𤼵育人性之感通處言之則天道固是大徳是性之體其𤼵育萬物於穆不已處便是敦化便是用之所在人性固是小徳是天道之用然對情而言則其寂然不動萬理全具處却又是情之體其感而遂通喜怒哀樂各有條理處乃川流之義又是其用之所在此則雙峰之説也其實子思朱子之意則包得二義讀者詳焉可也其詳已於二十六章及之此不再述叢説中庸分三大節前三節皆以孔子結之第一節自性命之源言之次以大舜顔淵子路三達徳為入進之門其後則曰吾弗為之吾弗能已是以孔子折衷之也第二節言費隠其下厯叙大舜文武周公而次以孔子論政繼羣聖之後也第三節言誠反覆於天道人道得時措之宜垂萬世之法非孔子不可也後二章至聖至誠亦就此章而言其極爾此説深有助於章句顯見饒氏以哀公問政章為不全是孔子之言且當属下節無𤼵明所傳一致之意大哉聖人之道以下六章自為一節不可分天道人道者其説不然讀者詳之自二十七章至三十二章章末章句人道天道之分饒氏皆不以為然而又自曰前三章賢希聖之事後三章聖希天之事此已於二十七章畧辯之但以賢希聖聖希天為分别却又出不得章句之意賢希聖便是未能真實無妄而欲其真實無妄所謂誠之者人之道是已聖希天便是真實無妄之事誠者天之道是已人道與賢希聖者畢竟皆是使然而然之事天道與聖希天者畢竟同為自然而然之事但天道人道是中庸本文聖希天賢希聖是他書之語以他書解中庸孰若只以中庸解中庸之為明而易見又且貫串之為愈乎饒氏只因以六章自為一節故忌朱子天道人道之分與前諸章連接易至牽動其説故引通書此語變易之耳是猶諱其名而呼其字之意也殊不思六章雖自為一意自不妨與上六章皆為𤼵明天道人道之意爾此意已詳於前更不再述第三十二章章下章句亦天道也輯釋引畨易李氏曰饒氏謂天道人道只到至誠無息章住可謂朱子忠臣矣但饒氏謂大哉聖人之道以下六章皆是説小徳大徳竊意小徳大徳見於仲尼祖述章朱子謂小徳者全體之分大徳者萬殊之本若以愚自用章為小徳三重章言大徳則未見其為全體之分萬殊之本也妄意大哉聖人之道以下皆以至道至徳言之盖中庸前但言君子之道至此始言聖人之道前但言達道達徳至此始言至道至徳至徳至聖之徳也至道至誠之道也大抵修至徳乃能凝至道尊徳性而道問學修徳凝道之大端也以下八者非至於成徳之極不止也居上不驕至黙容修徳凝道之效也此一章乃下五章之綱領二十八章言愚賤者之不能修徳凝道而所謂有徳無位不敢作禮樂與夫吾從周則皆指仲尼言也二十九章言聖人能修至徳凝至道也三十章舉仲尼以為修至徳凝至道之標的盖必至徳如夫子而後能凝至道與天地同其大也三十一章言至聖之徳以配天結三十二章言至誠之道以達天徳結之修徳凝道至此無以加矣以至聖為至徳至誠為至道至聖之徳至誠之道朱子既顯著之章句矣愚非敢為是臆説也况始則曰茍不至徳至道不凝焉終則曰茍不固聰明聖知達天徳者其孰能知之脈絡貫通尤為可攷饒氏天道人道只到無息章住之説愚已於前辯之此不再述但李氏自謂此六章皆説至道至徳者似矣而又謂前但言達徳達道然則自十二章至二十章九章何以不説為言達道達徳而以為言費隠耶恐此十二章亦只當從朱子天道人道之分未可以忠臣稱饒氏也愚於二十六章章下言之已詳請申前意以明之盖此十二章亦是自三達徳説入費隠上去皆所以明天道人道之難易淺深耳二十七章章首正是自達徳説入費隠之交接處其於此言至徳凝至道之意正如費隠章言與知與能有所不知不能之意一般彼章曰知曰能便是上節知仁勇之事此曰至徳便是已前仁知勇之徳仁知勇之徳便是前所謂至誠盡性至誠前知至誠無息之仁知勇耳觀至誠盡性章章句釋天下至誠之義曰謂聖人之徳之實天下莫能加也則至徳為即指此而言之意可見前十九章主於立本故以達徳知仁勇而行達道此十二章主於致用故以至徳仁知勇而凝至道達道至道則皆指費隠而言但有淺深耳故必有仁知勇之至徳則能凝洋洋優優之至道而欲有此至徳於已者則又當以尊徳性道問學之功自盡也故凡已有此至徳者天道也已前之盡性前知無息已後之仲尼至聖至誠三章皆是已方修此至徳者人道也已前之致曲有誠成已成物已後之存心致知不倍不驕三意皆是已豈可謂此六章無人道天道之分别乎叢説前章言表此章言裏章句則曰前章言至聖之徳徳主積於内者言之也此章言至誠之道道主行於外者言之也盖聰明睿知之資仁義禮知之徳雖見於外實溥博淵泉積之於中者之所𤼵也知化育立大本雖主於中而經綸大經其仁其天其淵者亦自外而見之也前言徳推其本而言之後言道致其用而言之盖亦互相𤼵也此於語録表裏之言章句道徳之説頗有折衷第三十三章不愧屋漏叢説人居屋漏之中自視其身尚不分明以譬君子不但於人所不知已所獨知之地而慎之於已所不知之地亦所當慎𤼵得已所不知之意分曉愚竊以為首章以隠微並言隠是幽暗之中微是細微之事唯幽暗之中有細微之事故有所謂獨此處説不愧屋漏則屋漏但是幽暗之中未有所謂細微之事故但為已所不知之地能不愧於此即戒懼不睹不聞之謂也中間四節引詩之㫖章句云云饒氏謂奏假無言之詩以慎獨之效言也不顯惟徳之詩以戒懼之效言也通謂此兩引詩奏假無言不顯惟徳承上文不動而敬不言而信兩極言其效也惟其不言亦信所以無言而人自信之有不待賞罰而化者惟其不動亦敬故篤恭不顯其敬而天下自平篤恭而天下平即首章致中和而天地位萬物育也特首章是致其中而後致其和篤恭者已致其和而益致其中也為已之功愈密則徳愈深而效愈逺者如此輯釋亦引通説按章句於此四節皆以承上文言之則似饒氏前節效驗承前節工夫後節效驗承後節工夫之説疑於兩兩隔越不見章章各自相承之意而通説似乎可取但章句於相在爾室節云則其為己之功益加密矣則是潛伏孔昭之詩為己之功猶未如此之密也於不顯篤恭節云則其徳愈深而效愈逺矣則似奏假無言之詩徳猶未如此之深效猶未如此之逺也其意若曰有前二節工夫則有後二節效驗工夫已密慎獨而加密戒懼故效驗已逺奏假靡爭而愈逺篤恭天下平惟通以為己之功加密則徳愈深而效愈逺二句為以此章對首章而𤼵故以此二節效驗皆承不動不言之意而分殊不思奏假靡爭與篤恭天下平之效分明一淺一深不動不言同為戒懼之事若如此分則不言之效淺不動之效深恐無此理况經文先不動後不言通乃倒置其序以為此二節相承之次可乎天下固無能慎獨而不能戒懼有靡爭之效而不能致天下平之理但此章自下學為已謹獨之事推而言之以馴致乎篤恭而天下平之盛則説工夫自當自踈而密説效驗自當自淺而深雖有漸次正不害其為有則俱有也然則雙峰之説似乎得章句之㫖通者分二節效驗承不言不動之意固支離而不可曉若以此章對首章為工夫疎密效驗逺近之説如所謂首章致是中而後致和篤恭是已致和而益致中之云則是天下真有兩等戒懼慎獨工夫首章末章互有先後果是二時倣工夫先後如此不同耶殊不思戒懼只是一様戒懼慎獨只是一様慎獨特君子無時不戒懼亦無時不慎獨謂先戒懼而後慎獨則戒懼之前又未嘗不慎獨慎獨之後亦未嘗不戒懼也盖動即慎獨静即戒懼動静無端故立言之序互有先後無所不可耳何嘗如通之見哉上天之載章句上天之事𤼵明云訓載為事未為的當新定邵氏曰載猶地載神氣之載言上天所載之道無聲無臭也亦有味然不如訓載為始為的當上天之始即無極而太極之初也何肇之可聞何臭之可見哉載之訓事事猶道也不過言天道之妙無聲臭之可聴聞耳事豈有所作為之謂哉惟定字以文害辭以辭害志故有未的當之疑耳如邵説則天本是道道是天之所載也不曰天專言之則道乎如𤼵明之云則天道始然而終不然也不㡬於道在太極之先之誤乎識者豈宜無見於此愚奚容贅管窺中庸終中庸一篇大㮣續添按章句自首章至二十章次序已無可議自二十章至三十二章次序則饒氏以來諸儒其説多有變亂章句之序者雖大綱不可改章句之舊若其間節目似亦有可以補章句之所未備者今存之以備參攷其猶有未備者則僭附愚見以足之云其詳已具各章此特其大畧爾有道者其幸正之首章章句曰楊氏所謂一篇之體要是也其下十章盖子思引夫子之言以終此章之義右一章是第一大節第二章章句曰此下十章皆論中庸以釋首章之義文雖不而意實相承也第三章至第十一章章句曰子思所引夫子之言以明首章之義者止此盖此篇大㫖以知仁勇三達徳為入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成徳矣餘見二十章右已前十章是第二大節大㮣𤼵明知仁勇此後九章是一節皆是𤼵明費隠盖知仁勇是徳費隠是道徳是人所能知能行者道是人所當知當行者必有能知能行之徳然後可以施於當知當行之道故既論知仁勇即以費隠繼之此二大節相承之次也第十二章章句曰子思之言盖以申明首章道不可離之意其下八章雜引孔子之言以明之第十三章至第二十章十三十四十五章皆言費之小十七十八十九章皆言費之大惟十六章在中間則兼費隠包大小而言章句曰此二十章引孔子之言以繼大舜文武周公之緒明其所傳之一致舉而措之亦猶是耳盖包費隠兼小大以終十二章之意章内語誠始詳而所謂誠者實此篇之樞紐也右已上九章是第三大節皆是𤼵明費隠直至二十章始以三達徳行五達道者為言却正是二大節相承之次或疑君子之道費而隠之道不是此五達道之道盖道雖無物不有然君子所當知當行至切至要者惟在於五達道而已觀於十二章之末既以君子之道造端乎夫婦者結之而下章遂以君子之道四為言謂費隠之道非即五達道之道可乎章末言天道人道盖為下章説誠明明誠之張本也盖自此以前皆是説用工之事用工以立其本用工則先知後行以學者之事為主中間雖有説聖人事處不過亦以為學者用工之法自此以後多是説成功之事成功而致其用成功則先行後知以聖人之事為主盖欲示學者以成功之準的也中間有説學者事處則依舊先知後行乃是授學者以至此準的之階梯也至於人道之極則亦與天道無間觀於言人道者五章章末之言可見矣其詳於後節言之饒氏分哀公問政章為二章以屬下節者非是其失已於前辯之此不再述第二十一章誠明明誠章句曰子思承上章天道人道之意而立言也自此以下十二章皆子思之言以反覆推明此章之意第二十二章至誠盡性章句曰言天道也饒氏曰以誠者之仁言愚謂此以誠者之仁𤼵明天道第二十三章其次致曲章句曰言人道也饒氏曰以誠之者之仁言愚謂此以誠之者之仁𤼵明人道第二十四章至誠前知章句曰言天道也饒氏曰以誠者之知言愚謂此以誠者之知𤼵明天道第二十五章誠者自成章句曰言人道也饒氏曰以誠之者之知言愚謂此以誠之者之知𤼵明人道第二十六章至誠無息章句曰言天道也饒氏曰以誠者之勇言愚謂此以誠者之勇𤼵明天道第二十七章大哉聖人之道章句曰言人道也愚謂此章兼費之大小而言而隠在費之中是以此𤼵明人道第二十八章愚而好自用章句曰承上章為下不倍而言亦人道也愚謂此章專言費之小者饒氏有此意而隠在費之中亦是以此𤼵明人道第二十九章三重章句曰承上章居上不驕而言亦人道也愚謂此章專言費之大者饒氏有此意而隠在費之中亦是以此𤼵明人道第三十章仲尼祖述憲章章句曰言天道也愚謂此章兼費隠大小而言盖小徳大徳隠也川流敦化則費矣小徳川流是費隠之小者大德敦化是費隠之大者是以此𤼵明天道又此章小徳川流大徳敦化是説天地分上言包人物於其中故交互分費隠詳見二十七章後二章同第三十一章至聖聰明睿知章句曰承上章而言小徳之川流亦天道也饒氏曰此章言小徳即是費愚謂言費則隠在費之中矣亦是以此𤼵明天道又此章小徳川流是專就聖人分上言故但為費第三十二章至誠經綸大經章句曰承上章而言大徳之敦化亦天道也此章言聖人天道之極致至此而無以加矣饒氏曰此章言大徳即是隠愚謂雖言隠而未始離乎費也經綸大經不可不謂之費至於立大本知化育則費之未嘗不本於隠可知盖言費則不假言隠而隠在其中上章是以言隠則不可有離乎費此章是也離乎費而言隠則將淪於空寂而非所以為隠矣實此章亦是以此𤼵明天道又此章大德敦化亦是專就聖人分上言故但為隠右以上十二章是第四大節皆反覆𤼵明天道人道之㫖却包前第二達徳第三費隠二大節之意於其中亦是自三達徳説入費隠上去其詳已言於前此不再述抑嘗通三節之意推之則前後皆是自達徳説入費隠上去但前二節十九章主於用工而言所謂知大舜仁顔淵勇子路是達徳所謂費隠是達道其相承之次是以達徳而行達道學者事也此一節十二章主於成功而言所謂仁盡性知前知勇無息是至徳所謂費隠是至道其相承之次是以至徳而凝至道聖人事也合而言之則達徳衆人之所同具至徳聖人之所獨全達道舉其通行者言至道要其極致者言具此達徳則皆能行此達道矣行達道而有得焉而後有以全此至徳而凝此至道矣誰謂聖本生知非學可至乎若又以至聖至誠兩章貫全篇之㫖言之則至聖之徳即達徳至徳之徳但諸章論達徳至徳處皆分知仁勇而各言之則知行猶二也此則㑹衆徳於一章而總言之故中庸論徳必至於此章而後為聖之至也至誠之道即達道至道之道但達道猶有待乎人之行至道猶有待乎人之凝則體用猶二也此則道之已行已凝於人者故中庸論道必至於此章而後為誠之至也徳為聖之至則知行兩盡而徳外無道矣道為誠之至則體用兼全而道外無徳矣徳外無道道外無徳此其所以相為表裏也歟此中庸一書首尾相應之大畧也其詳皆已於前篇論之更不再述饒氏以來諸儒皆分大哉聖人之道已下六章自為一節而謂此六章皆不言天道人道與章句異其失皆己於前言之亦不再述第三十三章章句四子思曰前章極致之言反求其本復自下學為已謹獨之事推而言之以馴致乎篤恭而天下平之盛又贊其妙至於無聲無臭而後已焉盖舉一篇之要而約言之其反覆丁寧示人之意至深切矣學者其可不盡心乎右卒章是第五大節四書管窺卷八
