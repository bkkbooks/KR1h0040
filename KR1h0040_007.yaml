body:
  text: 欽定四庫全書四書管窺卷七元史伯璿撰中庸第十二章輯講問章句云然其理之所以然則隱而莫之見也則似乎費外别存個隱要之鳶飛魚躍則道體昭著又豈終隱而不可見耶所以先生於鳶飛魚躍之下只云以此證用之費而體之隱在其中説得大段分曉饒氏曰章句所以然三字已是親切但於幹旋之語更少圓耳蓋章句不合謂章內專説費而不及隱所以如此下語又曰此章前面説費未見得隱及引鳶魚來證方見按或問有曰隱之為言正以非言語指陳之可及耳故獨舉費而隱常默具乎其中若於費外别有隱之可言則已不得為隱矣詳味此意則問者所謂似乎費外别有個隱之疑此人正是不識所以然三字之旨者所以然是太極之本體太極不離乎隂陽而亦不雜乎隂陽費即不離乎隂陽之太極隱即不雜乎隂陽之太極耳不雜者即不離者之所以然初非有二致也但所以然者則無聲無臭故隱而不可見爾章句以為不可見正以其無形像之可指陳雖鳶魚之飛躍亦但其飛其躍之可見其所以飛躍則唯可心悟而已又何嘗果有形像之可指陳哉然則問者之所謂豈終不可見饒氏之所謂可見果能見其形像之何如否乎蓋朱子之所謂不可見正是目無可睹之謂饒氏師弟子則直以可以意會而無可目接者為可見所主不同故如此誤耳又饒氏證用之費而體之隱在其中之説何嘗不便是朱子意問者是其師説而疑朱子蓋亦逢雙峰平日好求加於朱子之意耳雙峰却又謂章句不合説章內不及隱然則便以鳶飛魚躍為隱可乎其不顧文義專務立異亦已甚矣鳶飛魚躍發眀理無形體於有形體之物上見得無形體之理此察字實對隱字體之隱者於此物上昭著出來則隱而不可見者察而可見矣而其所以然之妙則終非見聞所及雖察也而實隱也輯釋亦引之發眀蓋𠞰饒氏之意而刪潤之以為己有以求合於章句之旨者也既辨饒則不必辨此矣但其曰察對隱字隱者於此物上昭著出來者饒氏意也其曰而其所以然之妙則終非見聞所及者章句意也其曰雖察也而實隱也者推饒説以合於章句之旨者也然察之一字朱子是指道之用言而隱在其中發眀以為專對隱言此則終不可得而強合者也讀者詳之鳶飛魚躍或問記程子之言以為子思喫緊為人處與必有事焉勿正心之意同活潑潑地或問中發眀此意已無餘藴而讀者每猶有所未達此不過皆是形容天理流行無滯礙之意而已其在鳶魚則鳶魚無知之物然飛必戾天躍必于淵是誰使之然哉道之體用流行發見自然而然有莫知所以然者又豈特鳶魚為然哉所謂天理流行無滯礙之意於此固為易見其在人心則人心不能無私天理易至間斷惟能以集義為事則天理無時不流行矣又無預期其效之心則自然無所滯礙矣天理既流行而無滯礙則與鳶飛必戾天魚躍必于淵者同一活潑潑地之意可識矣若不以集義為事則如鳶魚之不能飛躍謂之天理流行可乎若集義而預期其效則如捉鳶魚使之戾天躍淵皆不出於自然謂之無滯礙可乎天理不流行而有滯礙則不得謂之活潑潑地眀矣夫婦之愚不肖能知能行章句近自夫婦居室之間又曰可知可能者道中之一事發眀姑舉其一事言如事親事長之類竊意一事即是夫婦居室之一事章句眀指此事而言觀於或問亦以男女居室人道之常為説可見不必外引事親事長為證也或謂事親事長之極致處愚不肖固有所未盡其粗處夫婦雖愚不肖亦豈不能知之行之邪居室之正所謂茍或褻慢則天命不行者又豈愚不肖之夫婦所能盡哉其所知所能者不過男女情欲之私耳然則雖以事親事長為一事之證不必以居室為拘可也愚則以為此處言知言能皆是真能知之行之者初非泛知泛能所可當也若以泛知泛能可以當之則聖人於道之全體又豈有不能如愚不肖之泛知泛能者邪事親事長之道正是下章君子之道四中所求乎子弟以事父兄未能之事章句以為聖人所不能者而謂愚不肖泛泛之知與能足以當之乎男女搆精形交氣感雖若鄙褻不足道然真精妙合自是造化流行發育生生不窮之藴奧以愚不肖之夫婦他無所知所能而獨知此能此蓋與鳶飛魚躍同一機緘故章句或問獨以此當所知所能之一事其意精矣初未説到褻慢處也天地有憾章句如覆載生成之偏發眀天覆而生物地載而成物以天無私覆地無私載而生物成物或有偏而不均者按或問謂天能生覆而不能成載地能成載而不能生覆其説覆載生成之偏似與發眀不同讀者詳之饒氏謂費隱章前面許多説話都是説費如此則似乎人力安排越外討來底不見得是天命之性所以説君子之道費而隱畢竟有體所以用如此費饒氏唯謂中和以性情言中庸以事理言性情與事理所指各異中庸之中不兼中和之義只是時中故於此只得費辭以分疏之耳若只從朱子之義則此章前面説話皆自體上發出何至有似乎人力安排越外討來者邪又况此章以後皆隱在費之中則以前諸章何獨費中不得為有隱可直至此乃補其闕邪通者一段議論極精雖不為辨饒説而設却深可以破饒説之失今撮其大旨與此意有相關者于此其言曰中庸言道字皆自率性之道説來費即率性之道隱即天命之性才説費隱便在其中才説率性之道天命之性即在其中非有二也首章言天命之性率性之道自第二章以至第十章無非率性之道亦無非因其天命之性也詳此則朱子之意可明雙峯之誤可釋矣愚謂率性之謂道只率性一性字便是用中之體所謂隱在費之中者不然天下豈有無體之用哉率性之性非即天命之性而何但以天命之性率性之道對言之則一體一用所謂兼費隱而言者也只率性之謂道一句便見得費中有隱之意雙峯能言前靣都是説費敢言道不是率性否乎請試思之饒氏謂云云知道之用費而無所不在則吾當有以致察乎其用而不可使有一毫之不盡知道之體隱而無所不在則吾當有以致養乎其體而不可使有一息之不存不然則是道雖不可離而私欲間之吾實離乎道矣此君子所以戒懼而謹其獨也又謂章句云費隱是申道不可離之意然道不可離是無時不然此是無物不有不是以此申彼首章性道是説自家底此章費即道隱即性是萬物公共底此説前段分眀與章句無異後段又自背之合而觀之不唯可見自相矛盾抑亦可見是非得失之真至若後段所言之差則已於前屢辨之矣唯所謂自家公共之分别則異乎吾所聞也知天下無性外之物而性無不在者詎容以此為同異耶通輯釋引熊氏曰此章有大小費隱四字大處有費隱小處亦有費隱此意不分眀且似有病若曰大處小處皆是費而隱在費之中則庶乎可耳第十三章以人治人通引袁氏曰不曰我治人而曰以人治人我亦人耳人道不離吾身亦不離各人之身吾有此則人亦有此則以則取則天則自然非彼柯假此柯之比也輯釋亦引之按章句曰則所以為人之道各在當人之身初無彼此之别故君子之治人也即以其人之道還治其人之身詳味此意正如程説覺後覺後知以為及彼之覺亦非分我所有以與之彼皆自有此理我但能覺之而已之意相類袁氏既謂不曰我治人又謂我亦人耳既謂人道不離吾身又謂吾有此則句句以己對人而言且以以則取則之言繼之上則字分眀指在己者言下則字分眀指在人者言措辭不瑩反若與彼柯假此柯比者無異正與章句之意若相反然者讀者詳之改而止饒氏謂言治之不過其則也又謂且如人不孝得他改而從孝便足矣如何便去十分責他便如堯舜之孝蓋其人去道已逺了得他改却有漸進之理通謂以衆人望人不敢遽以聖人責人也輯釋亦引通説饒氏與通之意可以發眀章句以衆人望人之説乎曰不可可以發眀或問遽欲盡道以責於人吾見其失先後之序違緩急之宜之意乎曰亦不可何則蓋章句之所謂衆人非庸衆之衆雖堯舜之聖亦衆人中之人耳正如詩所謂蒸民之意改非略改而不必至於至善之謂若但略改而即止則孝不必十分孝忠不必十分忠皆可止邪殊不思雖堯舜之孝亦不逺人之道爾孝未至於堯舜便是為子之道有所未盡便是有所未盡改雖亦勝似不孝者又如何便自以為足中道而止得所以雖夫子之聖猶自謂所求乎子以事父未能也夫子豈未能略改者邪又豈可止而不止也邪雙峰每有此等議論如説止至善説格物之類是己以此見得二説不可發眀章句之意也或問所謂先切身而後不急乃行逺自邇升髙自卑之序與不可盡道以責於人者蓋謂語道之全則有萬不同其間有緩有急人倫日用之常行者其急也天地聖人之所不能盡者其緩也人之為道當先急而後緩耳以饒説較之則譬如斯道之用當有十件每件之中又有十分以十件言之則有緩有急或問之意是欲人先其十件中之當急者非謂每件之中不必盡十分也以十分言之則盡得十分方是至善方可謂之能改方可以言止饒氏之意是欲人於每件之中改得一兩分亦可止改得三五分亦可止不必到十分然後止也以漸而進固有此理但説止字未得以此見得二説亦不可以發明或問之意也讀者詳之饒氏謂施諸己而不願二句是恕之事君子之道四一段是忠之事庸德是孝忠弟信之類庸言即所責乎子臣弟友之類先言恕而後言忠語意尤有力輯釋亦引此説雙峰以勿願勿施二句為恕之事與章句微異語録辨此已詳通者兩存而不為折衷何也蓋恕由忠出忠因恕行初無二致盡己之心在內本不可見善觀者却於推己之際觀之則盡己之意可見矣且如施諸己而不願不願之心固非有不真實者是則不願者己之真心也此真心非忠之未發者乎及其推以及物亦即以此不願之真心而勿施之則發於己者豈有一毫之不盡乎此即忠之因恕見者然也以己之不願者推之而勿施於人此則恕之由忠出者也章句合忠恕而言至矣饒氏蓋未之思也饒氏又以君子之道四一段為忠之事此則别有愚見當續論之庸德之説亦然若夫以庸言為所責乎子臣弟友之類則恐未然章句謂凡己之所以責人者皆道之所當然也故反之以自責而自修焉今曰庸言即所責乎子臣弟友之言則是以己於當然之道有所未能而遂不敢盡以當然之道責之子臣弟友此正范氏以恕己之心恕人之誤曽謂聖人言之乎要之只是於當然之道有所未能則不敢易言之耳通者盡托饒説以為己意既辨饒則不必辨通矣饒氏謂此忠恕是夫子告曽子以一貫而曽子告門人以忠怒而已矣之意子思又得之曽子故於此發眀之蓋忠恕二字説得闊做得徹便是一貫通者亦為此説以為己意已於論語一貫忠恕章辨之此不再述饒氏謂章句云丘未能一者聖人所不能竊疑丘未能一孔子之謙辭也似與子思所謂聖人有所不能小異按論語志學章集注有曰聖人非心實自聖而姑為是退托也後凡言謙辭意皆倣此知此則雖謙辭亦不害其為誠心况如舜之孝猶以事親自知不足為心夫子之心即舜之心也曽謂聖人謙辭皆實無此心而虛有此言乎哉章句何可疑之有饒氏謂此段夫子責己以勉人之意前四語是責己庸德以下是勉人竊意此段皆是夫子責己自勉之辭而教人勉人之意在其中上曰四者未能責己之意也此便是若聖與仁則吾豈敢之意皆聖人不自聖之謙辭也茍未能而遂已焉則亦徒責而已故以庸德以下以見自勉之意此便如抑為之不厭之意皆聖人純亦不已之誠心也合而言之可見聖人不自滿足終日乾乾之意矣聖人尚爾况學者乎則其教人勉人之意豈必外此而他求哉君子胡不慥慥爾章句言君子之言行如此豈不慥慥乎贊美之也通謂胡不二字即盍字按盍者何不之謂何不與章句豈不之意不同何不是未能如此而責其何不如此之辭豈不是既能如此而贊其能如此豈不為美之意言行相顧蓋是己能如此而非未能如此者故章句云然通者不詳文勢但欲牽章句之意以合於饒氏勉人之説殊不知實不得饒氏之意而徒失章句之旨也全章之旨按饒氏頗疑章句張子之説分作三截不相貫串故其所自為説者多與章句不同其間顯然差失者愚己標出辨之於前矣其有與章句相似者則在所不抄其有雖非章句正意而亦近人情若可備一説者則録之於左仍採語録與之相類者與相附近以備參考其有未備者則妄以愚見足之於末以求正於知道云子曰道不逺人云云不可以為道章句至矣詩云伐柯伐柯云云改而止饒氏謂此引詩而説之以眀道之不逺於人而人不可逺人以為道者如此又謂以此引頭聚要處只是説忠恕違道不逺又謂以人治人只是借此來説不可逺人以為道而為下文張本不須别作一條説案章句以衆人望人之説則以人治人之人字是指所治之人而言如饒説則以人治人之人字是指自治者之身言蓋上節人之為道而逺人之人字亦是指自治者之身而言如此則饒説雖非章句之意恐亦可備一説又案語録推以人治人之義有曰以我自治其身亦不是將他人底道理來治我亦是將我自得底道理自治我之身而已詳此則饒説雖不同於章句要亦朱子所已論之緒餘也竊意道不逺人之人字只是以人對道而言道便是人之理人便是人之身初無以人對己之意下文人之為道而逺人兩人字皆指為道者言可見人即已爾故此節兩人字雖不必以為對己而言亦可也只因此上有君子二字則似乎此人字對君子言之者故章句順文解義以此為君子治人之事按中庸自首章至此皆言自治之事直至二十章方言知所以修身則知所以治人為天下國家矣其實上人字是人之道下人字是人之身若只以為君子自治恐亦可通君子以人治人猶曰君子以在己之道自治其身之意爾下文忠恕即是以人治人之工夫改是改其待人未能如待己者也至於待人能如待己者則不逺人之道盡矣故當止而不可過有所治也若又不止則便是為道而逺人者之所為反不可以為道矣忠恕違道不逺章句至矣饒氏謂此皆不逺人以為道之事而道之不逺於人者莫甚於此故下文即其事而詳言之竊意忠恕是盡己之心推以及人之事故己不欲而勿施於人固推己也己所欲而以施之於人亦推己也下文施諸己而不願亦勿施於人二句是不欲而勿施於人者君子之道四至先施之未能一節是推己所欲以施於人者一反一正皆所以釋此一句之義也施諸己而不願亦勿施於人章句曰此忠恕之事也以己之心度人之心未嘗不同則道之不逺於人者可見故己之所不欲則勿以施之於人亦不逺人以為道之事按此節章句兼忠恕釋之至矣饒氏以此専為恕之事者失之已於前辨之此不再述蓋此一節是不以己之所惡者施之於人聖賢論忠恕皆就拂己處説如夫子之告子貢仲弓亦此意蓋取其易見也知己所惡者勿施則己所欲者自不容於不施矣非但不施己之所惡而已也然則章句自以己之心度人之心以下似可以兼説下節之旨不但可施於此節云君子之道四云云先施之未能也章句之句讀訓釋至矣按饒氏以此通下文皆為忠之事者失之竊意此一節亦忠恕之事是推己所欲者施之於人也所求乎子所求乎臣所求乎弟所求乎朋友皆是求其待己如己之所欲也以事父以事君以事兄以先施皆是推己所欲求於子臣弟友者以及其父君兄友也四者皆曰未能可見子臣弟友之職未易盡聖人不自聖之心蓋與舜之事親自知不足者同一意爾上文己之所惡則勿以施之於人足矣此欲推己所欲以及人則孝弟忠信之道有一毫未如己之責人者皆不害其為未能此雖夫子之謙辭要亦不害其為聖人不自滿足之誠心也君子之道即上文不逺人之道爾道不外乎人倫故以四者言之推己及人即不逺人以為道之事忠恕之事無不盡則道不外是乃為能改而可止矣故張子曰以責人之心責己則盡道蓋謂是也若移章句前節自以己之心度人之心至亦不逺人以為道之事一段置於此節之下以總釋二節之旨更添而以己之所欲者施之於人一句於則勿以施之於人之下亦不逺人以為道之上仍改亦字為皆字則似極為明備蓋二節皆忠恕節目皆不逺人以為道之事也或疑上節亦勿施於人之人不止指父君兄友之四者此以己之所欲者施於人但及父君兄友而不他及得毋施之有所不周乎曰所宜施而不可緩者亦止於此而已若不先於所急而泛施之其不如墨氏之兼愛者幾希况親戚不悅不敢外交近者不親不敢求逺四者猶曰未能又安敢泛然施於所不常接之外人乎如大學潔矩所惡於上毋以使下之類亦不過無所妨害於彼使彼各得遂其所欲施於父兄之心耳非欲人人皆待之如父君兄友也故此二節雖皆忠恕之事而聖賢言之亦不無詳略於其間也殆亦以此也夫然則此四者章句但以為責己自修之事今亦指為忠恕之事抑亦有所本乎曰觀語録嘗以大學潔矩為此章之證則固亦以為忠恕之意矣况以為忠恕之事亦與章句責己自修之意無所礙庶乎亦或可通云爾庸德之行云云君子胡不慥慥爾章句至矣饒氏謂康德如孝忠悌信之類按饒氏以庸德為孝忠悌信之類者近之以庸言為責乎子臣弟友之類者未當已於前段辨之此蓋承上二節忠恕之事而言既又推而極之以至於盡道之域也庸德以忠恕之事為德也庸言以忠恕之事為言也待人有一毫不如待己者便是不忠不恕故於庸德不可不踐其實於庸言不得不擇其可行忠恕之事難故每有不足不足則不敢不自勉以盡其所難言忠恕之事易故每至有餘有餘則不敢不自反以節其所易至于言無不如其行行無不掩其言則言行於是乎相顧而忠恕之事畢矣至此則人事盡天理得由忠恕之不逺乎道者可以至于不逺人之道而與之一矣此所以以胡不慥慥乎之言而贊美之也歟或又以庸德庸言只當承上節四未能之意言庸德以四者之事為德也庸言以四者之事為言也四者猶有所未能故於德不得不踐其實言不得不擇其可耳若上節己之所惡則勿施足矣故不復申言於此也此其説德字之意正與雙峰之言有契恐亦可通區區臆説非敢自以為是姑記於此以俟有道而就正云第十四章素其位而行章句素猶見在也發眀如今人云素來之意按素來有從前之意似與見在之意不類見在乃是目今之事非從前意也今日富貴則今日行乎富貴眀日貧賤則眀曰又行乎貧賤此之謂見在觀或問善遊氏引舜飯糗被袗為素貧賤富貴之證可見若以為素來則昨日富貴今日貧賤反仍素來可乎章句唯如此説素字故以君子無入不自得屬上節為素位而行之事讀者詳之素富貴貧賤夷狄患難通引倪氏曰順居一逆居三以見人少有不經憂患者輯釋亦引之順逆之説本饒氏但曰以見人少有不經憂患者竊恐未然貧賤對富貴言雖逆順不同皆常事也患難却對康寧言夷狄却對中國言患難夷狄不唯是逆又且是事之變者並言四者而常變相半者不過以見處常處變皆無入不自得耳常變相半而順一逆三者又不過以處順易處逆難故略於順而詳於逆耳康寧與中國亦常事之順者耳奚假言哉若曰以見人少有不經憂患者則是人亦少有不在患難夷狄者邪恐無此理君子無入不自得發眀四素四行字正解首句無入不自得已涵不願乎外意惟自得於中故不願乎外竊意無入字總上文四素意而言自得字總上文四行意而言此句是包括上文四句之意只當屬之素位而行但素位而行不願乎外二句是反覆相形而言故下二節亦反覆相應而言耳然各有所屬又自不可紊也要之發眀亦只因以見在為素來故於無入之義有礙不得不如此分節耳第十六章鬼神之為得章句為德猶言性情功效饒氏謂云云要之不是如此説鬼神之為德其盛矣乎與中庸之為德其至矣乎語意略一般所謂德者指鬼神而言若只説性情功效則鬼神與德為兩物非所謂鬼神之德也按此疑一以中庸之為德為證二謂德者指鬼神而言三疑鬼神與德為兩物三者之疑朱子於或問語録中辨侯氏等説皆已言其如此不應章句忘其所辨之意而析鬼神與德為二也今性情功效之説又不免如雙峰之疑何也竊意使章句而曰德者性情功效也則性情功效正是德之訓釋誠如雙峰所疑矣今章句則曰為德猶言性情功效上兼為德二字言而不但專舉德字下以猶言二字起之而不但曰性情功效可見鬼神之外别無性情功效性情功效便是為德之意而非所以為德字之訓釋也蓋集注章句凡曰猶言猶云皆非以彼訓此之謂如自道猶云謙辭亦猶是爾然則鬼神之為德便如説鬼神之性情功效一般雙峰疑鬼神與性情功效為二恐於章句之旨有未詳也饒氏謂道是形而上者鬼神是形而下者此章即鬼神之費隱以眀道之費隱是以形而下者之體用眀形而上者之體用也子思以道體至微未易察識故以鬼神之事人所共知者曉人又謂鳶飛魚躍所以發眀本章之意指物以形此理之體也鬼神之德又所以發眀費隱之意引喻以眀此理之實也又曰誠不可掩明此理之實自然發見也按語録有曰前章論君子之道此章論鬼神之道鬼神之道便是君子之道非有二也詳此則饒氏謂以形而下之體用眀形而上之體用者非也又按語録曰此段上下章恁地説驀忽插一段鬼神在這裏也是魚躍鳶飛之意詳此則雙峰以鳶魚為指物鬼神為引喻者亦非也又按語録問體物不可遺曰只是一個隂陽有是理便有是氣有是氣便有是物無非實者詳此則饒氏形而上下之分别尤非也蓋鬼神是隂陽之靈更其體物不遺洋洋如在便是用之費處而所以體物如在者却不可見聞便是體之隱處此費隱即道之費隱其何可以形而上下分哉且如鳶魚豈不是物鳶之飛魚之躍亦只是器未可謂之道然鳶飛必戾天而不入淵魚躍必于淵而不戾天這便見此道之用自然而然處即此推之則鳶之戾天魚之躍淵既是道之費處鬼神之體物如在何獨不得為道之費處鳶魚飛躍之所以然而不可見者既是道之隱處鬼神體物如在之不可見聞者何獨不得為道之隱處讀者豈宜無見於此况雙峰既以鬼神為形而下者矣却又以誠為實理理非形而上者乎此正如侯氏分鬼神與德而言之失已經朱子所辨者雙峰前以此疑章句既不審矣而不免躬自蹈之讀者合或問紀聞而觀可也雙峰指物引喻之分别正如大學説心在是借粗以眀粗未便是心正者相似皆是穿鑿之見不可不察竊觀中庸一篇凡有引喻所在未有不眀言之者如行逺自邇升高自卑與天地之持載覆幬四時日月之錯行代眀一則曰譬如二則曰譬如豈有以形而下者喻形而上者乃不眀言其取譬之意邪不知識者以為如何饒氏謂章句以體物為費者不然體物不遺言其實有也齋眀盛服以下方是説費費是用體物不可遺正是鬼神之功用如何不是費齋眀盛服以下正是體物不可遺之驗如何彼得為費此不得為費輯講問此章鬼神本是説隱章句却引程子造化之迹而言既曰迹則不可言隱饒氏謂程子之言别有所指朱子引之於此則粗了饒氏别有所指之説蓋謂程子以易中有言鬼神處有言神處故如此分别然則所謂鬼神與易中所謂鬼神不同邪天下不知果有兩樣鬼神否只因雙峰以鬼神之德為形而下者故無以答問者之疑只得歸咎於朱子之不當引耳却不思問者所謂此章鬼神本是説隱者本非經旨蓋此章鬼神兼費隱説然則為造化之迹者便是體物如在處此固是費而所以為造化之迹者便是不見不聞處豈不是隱雙峰不知以此答之而歸咎於朱子之不當引豈不誤哉發眀引饒氏曰子思似知後世有佛老空虛之禍特特地説出個誠之不可掩蓋佛老底亦微然只是空虛無誠之不可掩一節此其所以為異端子思不過以此眀費隱無非實理之意未必逆知佛老之禍而預設此為之防也自古聖賢格言何者不切中後世之弊不必如此臆度之也章句曰此一章兼費隱包大小而言饒氏謂此章貫前後六章之旨章句謂包大小管見謂包字似不若言貫大小朱子下一包字其意甚廣蓋事事物物莫非斯道之用前後六章雖説費之小大而所該有限故此一章説費處初不分大小其言體物不可遺所該極廣凡天地間道之用處無小無大莫不包於其中固非專主前後六章而言也但前後六章費之小大亦包於其中爾若以貫字易之則狹矣發眀此章包大小者體物不可遺所該甚大以承祭祀士庶所祭亦是祭祀兹非小歟輯釋記先師曰包大小者體物而不可遺總而言之所該甚大即一物言之亦鬼神實為之體兹非小歟以承祭祀天子祭天地大也士庶所祭亦是祭祀又非小歟按發眀以體物不遺對士庶所祭為大小之分又是本章並有此二義可以言兼不可以言包恐未得章句之旨而輯釋所引師説專以體物包大小者其義甚精殆非發眀元説之比但以承祭祀以下則不必如此分可也蓋祭祀既是體物之驗但當統在體物之中不必於此又分其大小也况十二章前言大小大是全體小是一事天子祭天地亦一事之大者耳非全體之大也豈可以此為費之大者乎餘於二十章言之第十七章舜宗廟饗之發眀宗廟亦是舜子孫宗廟舜沒為神眀祀享其中所謂盛德必百世祀是也又引真氏曰舜以聖德居尊位其福祿上及宗廟下及子孫所以大孝按宗廟之説發眀與真説不同以下章宗廟饗之之下即繼以追王上祀之言觀之則真説當矣如發眀之説則夏孔甲商武乙周幽厲既沒之後何嘗不在宗廟中享祀邪亦以為大孝可乎必得其壽章句舜年百有十嵗發眀引陳氏曰得壽不但百有十嵗宗廟享子孫保亦得壽之類陳説求竒牽合非經注旨發眀以其與盛德百世祀之説相近故引之耳其實未必然也章末章句曰此由庸行之常推之以極其至見道之用廣也通謂庸行之常筆誤當作庸德之行蓋上章言庸德而此章言舜大德下章言周公文武之德皆由庸德推之以極於至也筆誤之説將有所考邪抑自意之邪朱子平日極精細不應於此有誤况後來更定不一果誤豈有不知之理縱未及改亦安得無一言及之而及門高弟亦皆不之覺何邪意者前言庸德之行緊要工夫在行字上下曰言顧行行顧言又可見行之為重故此不曰庸德而曰庸行耳常字對下句至字又有意味通只因欲德字以類相從故以朱子為筆誤耳恐未必然章下章句曰此由庸行之常推之以極其至見道之用廣也發明庸行之常孝也推之以極其至大孝也庸行之常固指孝言恐亦是以十三章庸德之行與此對説以見費之小者推之以極其至即所以為費之大也故曰見道之用廣未知然否第十八章武王纘太王王季文王之緒章句曰至于太王實始翦商節齋蔡氏曰太王雖未有翦商之志然太王始得民心王業之成實基於此蔡説與論語泰伯至德章集注相反饒氏以下蓋皆蹈襲其意以立異於朱子已於彼章辨之此不再述武王末受命章句末猶老也叢説末猶老也終也蓋自太王王季文王纍世積德纍功最後至武王始受天命如此説末字則與上下文都相貫穿訓末為老恐未安蓋武王之齡古書不一叢説固亦可通但章句所以訓末為老者蓋以下文即言周公成文武之德追王上祀見得武王老不暇及沒後周公乃成其志也武王之齡古書雖不一然以金縢考之則武王克商不多年即崩亦自可見况叢説之意已該在上節武王纘太王王季文王之緒一戎衣而有天下處此所謂武王末受命一句不是結上節意只是引起下文周公追王上祀之意而言耳然則末字從章句之訓何未安之有第十九章達孝章句言武王周公之孝乃天下之人通謂之孝猶孟子之言達尊也輯講問於舜言大孝於武王周公言達孝何也饒氏曰舜之孝是指其充極一家者言武王周公之孝是指其放乎四海者言達者是承上章三個達字而言舜孝只孝一家到武王也只做得舜之孝到周公便推得濶能推吾愛親之心而制為喪葬之禮以通乎上下使人人得致其孝故謂之達孝所謂德教加于百姓刑于四海此天子之孝也通於上章之末曰云云此章之末數達字所以有下章之首一達字叢説亦如此説達字輯釋亦引輯講及通之説或疑雙峰言大孝之旨如此與孟子集注有異蓋中庸與孟子言舜之孝所以大處不同雙峰只以中庸之意言之是矣不必疑之也但其説達字之義與章句異則可疑耳蓋此下文有夫孝也者善繼人之志善述人之事一句若是他人善繼善述無大聳動人耳目處天下人安得通稱之哉唯武王周公之善繼善述事功極盛如武王承前緒以有天下周公成文武之德以追崇其先祖又制為禮法以達之天下傳之後世此其繼述皆非常人所及所以天下後世人人皆知其繼述之為善故皆稱其孝而無異辭此其所以為達孝耳章句訓釋無以加矣唯雙峰只以承上章三達字為達故有舜却只孝一家之言然則舜之孝反不及武王周公之孝耶唯只以制禮通上下為達故又有武王也只做得舜之孝之言然則經以武王與周公並稱為達孝者非歟至曰德教加于百姓刑于四海又與制為禮法之意不同彼是功化此是立法不可無分别也若以德教加百姓刑四海之意説孟子大孝之旨則庶乎近之通與叢説皆是𠞰雙峰之意以為已有輯釋引之而自無所言蓋亦以其説為勝於章句而取之耳不知識者以為如何春秋修其祖廟發眀引朱伸曰此以下併前章論喪葬之禮皆修道之教也一篇之中無往而非修道之教獨以此當之狹矣郊社禘嘗通謂周公制為禮法未嘗不通上下之情亦未嘗不嚴上下之分祀先之禮通上下可行事上帝惟天子得行之故特以先後言之眀乎郊社之禮胡為先郊而後社郊惟天子得行之社則上下可通行也眀乎禘嘗之義胡為先禘而後嘗禘惟天子得行之嘗則上下可通行也但言周公制禮如此而不足於魯之意自見輯釋亦引此説此因河東侯氏之説而推廣之也侯説朱子不存於章句或問恐不當述之以為已説也且郊祭天社祭地天尊地卑故先郊而後社爾禘大祭嘗時祭禘大嘗小故先禘而後嘗爾此皆當然之序不得不如此者不知有何可疑今既曰胡為先郊而後社又曰胡為先禘而後嘗疑問之意若可駭異然者及至説出所見乃不過如此今亦不在多辨不知假使聖人無不足於魯之意則又當以先社後郊先嘗後禘為序邪况既曰祀先之禮通上下皆可行又曰禘惟天子得行之然則禘非祀先之禮乎此皆措辭不瑩之故亦不足深辨也通謂右自費隱章至此為第三大節輯釋以此為饒氏説亦引之於此按章句以自第十二章至第二十章九章為一節皆説費隱通乃於此分節截問政一章終十二章之意斷前後而不之屬此豈朱子意邪迹其説之所自來却是饒氏之意通既𠞰為已有又泯其所自來之迹而不之顯使讀者驟觀反若發眀朱子意者而實則不然其誣先覺誤後覺之罪又過於饒氏饒氏本以六節分全篇之旨通皆取為已説前二節與章句無甚異處故不之辨自此至第五節皆與章句不同故不得不略言之其是非得失已於篇首辨饒説處詳之此不再述第二十章故為政在人取人以身章句曰此承上文人道敏政而言也家語作為政在於得人語意尤備人謂賢臣身指君身饒氏謂為政在人此人字通上下包君臣而言取人以身之人字却指在下之人作家語者不曉此便改云為政在於得人不知上面人存政舉底人亦專指在下之人乎按上文先曰人存後曰政舉此人字自是包君臣而言無疑此則先曰為政後曰在人文勢政自不同為政必有主其為者非君而誰下文身字即是指為政者身而言耳既曰為政又曰取人蓋曰人君為政在於得賢臣而取人之則又在人君之自身也然則此人字只指賢臣而言可知况此節四句皆粘一字相連成文取人之人便是在人之人修身之身便是以身之身修道之道便是以道之道以此推之則下文身字道字皆無二義不應此二人字頓有不同也然則此人字不包君臣又可知矣且朱子取家語之語意尤備而饒氏乃謂作家語者不曉此然則非謂家語不曉乃謂朱子不曉特微其辭耳饒氏輕於非議前哲如此多見其不知量也且於得二字安知非王肅作家語時别有所據不但取之中庸而增損之耶但自家語既作之後而彼書不復存耳推此則通天下達道五以下皆為一時答問之辭亦未必皆無所據盡為肅自附會如雙峰之所疑也且王肅去夫子之世已七八百年若本無此二字而肅自增之本非一時之言而肅自合之則後世固可欺也當時之人必有非議之者而其書不得傳於後世矣何待雙峰而後能疑之耶不知識者以為如何修道以仁發明修道以仁如志道據德而依於仁輯釋亦引之竊意章句既以道為天下之逹道逹道非君臣父子之類乎如此則仁便是三逹德之一知勇皆不過欲始終成就此仁而已修道以仁即天下之逹道五所以行之者三之意引志道據德依仁為證似不相當蓋修道以仁即是有資於仁以修道之謂取人以身修身以道意皆類此若志道依仁乃是先志道而後可依仁引來證此反似以道修仁然者殊不思中庸此言乃是逆推用工之所本此所謂仁是逹德論語彼章乃是順序功效之所至彼所謂仁是成德初不可引彼以證此也覽者詳之仁者人也章句人指人身而言具此生理自然便有惻怛慈愛之意饒氏謂此人字正與鬼字相對何以言之生則為人死則為鬼仁是生底道理所以訓人輯釋亦引之以人對鬼之説然乎天下字豈皆有對而後義可明乎通者極力稱贊以為深得章句之意愚則以為章句已極分明政不必如此求竒可也叢説此章朱子以為皆孔子之言金仁山謂聖人之言簡自仁者人也皆子思之言雜引夫子之言反覆推明之按此亦因饒説而小變以為説者也饒氏則以為自天下逹道五以下方是子思之言又未知其孰為當也喙喙爭鳴將誰適從不如且以章句為正其詳於辨饒説處見之饒氏謂此章前賢截從知天斷固條暢然朱子合作一章亦有深意九經與為政相應前面説修身親親尊賢故後面九經節節發明之只是三者為綱目逹道便是修身之道逹德便是親親之仁知天之知子思只添一箇勇字要之知天以上是孔子告君之辭天下逹道五以下是子思推衍告學者之辭不若分作兩章之為是也朱子引家語為據以為皆孔子告哀公之言家語是引中庸來附會其間極可笑輯釋亦引此説至子思只添勇字過要之以下亦於章末引之按哀公所問者政也夫子答辭自知天已上不過皆言為政之本在於取人修身而已未嘗一言及所問之政也直至九經方是正答所問之政處今若分為兩章以天下逹道五以下為非夫子之言則是夫子並不答哀公所問直至子思方為補其闕耶愚於孟子離婁上篇及中庸篇首亦嘗略辨其不當合為一章之疑又於此章之末論全章之旨處詳之矣家語不足信之意亦已於前假辨之至於斷然以家語引中庸來附會則愚又有説焉兩漢去周未逺古書猶多有存者考之載籍可見如何晏時齊古二論尚存趙岐亦及見逸禮而引之以證不孝有三之義今皆不復見矣又豈可因今日之不見而盡意當時之無有也哉王肅與趙岐何晏世相先後則其纂成家語篇數不一豈得皆無所據而但事附會以成書耶且雙峰能知其此言為引中庸來附會亦能盡知其全書皆引何書以附會否但古人集書欠於剃擇雖司馬遷史記不免此病謂其間不可盡信則可謂其皆出於附會全不足信則不可朱子豈不能揆之於理但務引援而有待於雙峰之正救耶雙峰唯但信一已之耳目而一切不信古人之耳目故於趙岐所引亦謂其以意言之則其一切不信家語宜矣又况假如所言則一章之中首尾相應先後相承文意相發血脈相通縱是子思引夫子之言而發明之亦何害其為一章哉雙峰既自言之又必分之可見公論雖不可誣私意終不能克蓋以其平日立異為髙之私害之故雖始終首尾判而不續文意血脈斷而不貫亦不暇顧必分為二章以成其立異之髙也讀者但以語録論不當分之意參之則雙峰之謬妄曉然矣續改所以行之者一章句曰一則誠而已矣饒氏謂子思只説箇一乃是引而不發要人自去思量章句一者誠而已矣似乎攙先説破意便不悠長此意當於後段論豫與前定處併辨之章句以子曰二字為衍文饒氏謂天下逹道五以下皆是子思説唯三近為孔子語故特以子曰表之非衍文也輯釋亦引之此其是否不可知已於前屢辨之更不贅及饒氏以九經懷諸侯為尊賢之等與或問不同輯釋亦引饒説通亦竊饒説為己意親親是仁仁主於愛諸侯曰懷則愛之意多况諸侯亦有同姓者豈不是親親之殺然則但當以或問之説為正又九經不過是修齊治平之事親親是齊家事子庶民來百工柔逺人懷諸侯是治國平天下事自齊家推之以治國平天下則子庶民來百工柔逺人懷諸侯四者皆是自親親之殺而推之無疑若尊賢則是賴其導已以修身者故其序在修身親親之間敬大臣體羣臣則是責其輔已以治國平天下者故其序又在親親之後四者之前此敬大臣體羣臣二者所以獨為自尊賢之等而推之也由此觀之則所謂尊賢之等乃是指治人者而言親親之殺皆是指治於者而言豈可混而無别哉或問之分當矣饒氏蓋不察也三知三行章句既兼分與等而言又通三近分知仁勇饒氏門人疑章句之纒絆饒氏曰便是子思之意不應如此當看從上文來子思云知仁勇三者天下之逹德也至及其成功一也亦未見得知仁勇之分在輯釋亦引之通已略辨之矣蓋分字等字是從理氣上分别出來分是性分之分是性中所具之理有此三者之分所以見之於用則各有所屬知屬知一分行屬仁一分強於知行屬勇一分以分而言是平而分之如禮記分無求多之分相似此主理而言也等是等級之等是所稟之氣不齊故資質有髙下之等所以上等則以知為重而主知次等則以行為重而主仁下等則以強於知行為重而主勇以等而言是堅而守之如孟子凡五等四等之等此主氣而言也如此則三知屬知之分三行屬仁之分無可疑者及其知之成功之一非強於知行何以及此以此屬勇之分亦無可疑者今曰亦未見知仁勇之分在豈偶未之思耶自孔子曰生而知之者上也學而知之者次也困而學之又其次也則其等之髙下蓋已如此分别矣但夫子専以知言子思兼以行言為有詳略耳子朱子懼夫學者不知資質不同則用力之所當重者亦不同必將泛然知之行之而不能審已量力由所當重者致力以漸進則終無由以入德矣故因其等之本有髙下精别其所當重者而主之以定其髙下之等則逹德之旨無餘藴矣雖然又豈朱子以意言之哉蓋亦因中庸本有此意而言之耳前舜以好問用中而明知好問非知乎用中非行乎知行具於一章之中而専主於知非即生知安行以知為重而主知之意乎回以能擇能守而明仁能擇非知乎能守非行乎知行亦具於一章之中而専主於仁非即學知利行以行為重而主仁之意乎然則以等而言章句蓋以前章之旨釋此章之義尚何疑乎此二者皆只就三知三行而分别則然爾若又以三近而通言之則三知主知三行主行此二者依舊只是以分而言蓋三知三行不同處只在生安學利困勉六字上至於此知之行之則無不同矣所以只以知為知行為仁不復分其髙下也三近為勇之次此與及其知之成功一也之旨雖若有異而實無不同也蓋生知安行固已無不知之無不成功矣其曰知之成功之一者正以學知困知者能好學以求其知且以未能知之為耻而勇於用力則其知之亦當與生知者一利行勉行者能力行以求其功之成且知未能成功之可耻而勇於用力則其成功亦能與安行者一耳生知安行則勇之至也學利困勉便只可為勇之次如三近之云是已豈三知三行之外别有三近之謂哉何纒絆之有子思之言又何不應如此之有看從上文來又何嘗不如此哉餘於後段盡之章句以等而言發明如舜之大知以知為主知顔子之克已復禮以行為主竊意只當以中庸證中庸為易見舜好問用中而明知回能擇能守而明仁非即以等而言之者乎已於前段詳之此不再述饒氏謂生知知也學知困知近乎知也安行仁也利行勉行近乎仁也生知安行勇也困知勉行者以不及學知利行者為耻學知利行者以不及生知安行者為耻以造乎知之成功之一者近乎勇輯釋亦引之此説即章句意耳雙峰只因不詳章句通上文而言以下三句之意故疑朱子為三知三行之外别有三近之事遂疑章句之纒絆耳殊不思章句則三知為知三行為仁二句便是上文以分而言之意三近為勇之次亦只是上文所以至於知之成功而一者勇也之意但上節已知之成功乃勇之至此獨自學利以下求知之成功者説故曰勇之次耳或疑知之成功而一亦已包學利困勉而言既為勇而不言次三近正是學利困勉所以知之成功之由乃獨不得為勇而為勇之次何歟蓋三知三行不同處只在生安學利困勉六字上由此觀之則知之成功而一是就已至處言故即可以為勇好學力行知耻是就方求處言故但可為勇之次尚何疑乎饒氏不察已至與方求者不同遂以知耻以造乎知之成功之一者為近乎勇是以已至者與方求者為無别也此則自為所纒絆而不自知反以章句為纒絆可乎餘則愚前段之説詳矣叢説子曰二字非衍文上知仁勇兩節子思自言此引孔子言以定其意又謂知斯三者章句以為三近此處似指三逹德不獨指三近二者皆蹈襲饒氏之意以為説既辨饒則不必辨此矣饒説見後饒氏謂且知仁勇皆逹德也而以知為上仁為次勇為下恐皆未安此正所謂理有未明而不盡乎人言之意者也使朱子而曰安行之仁不如生知之知聖人之勇不如安行之仁就次下二等之中亦各知此分别則誠有如所疑者今章句自以生知安行者主知為上學知利行者主仁為次困知勉行者主勇為下愚故謂以等而言是主氣説雙峰但以理言故不逹耳殊不思德性本無不同因資質有異而德性所當重者有不可同耳何害其為雖未嘗不同而亦不能不異雖不能不異而實未嘗不同乎且如所疑則篇首以舜眀知回眀仁子路眀勇然則謂知仁勇皆達德也遂以舜之知回之仁子路之勇皆無高下之等可乎蓋有不待辨而自眀者力行近乎仁饒氏謂此以力行言仁前章服膺勿失又以守言仁何也曰以擇為知則當以守為仁以知為知則當以行為仁各有所當擇與守是兼理欲言之知與行是専以理言之恐誤認人欲為天理故當擇恐天理為人欲所奪故當守故曰兼理欲言窮理無一毫之遺方是能知循理無一毫之欠方是能行故曰專以理言其實能擇方能知能守方能行非有二也續添饒氏謂知斯三者是總上面三達德正是分别或生而知之以下等語章句以子曰為衍文遂以三近為勇之次輯釋亦引之以下文知所以修身之言推之則知所謂斯三者為指三近而言無疑生知安行是性之之事蓋身不待修而德無不全者也修身便從學利以下説起了非三近而何况雙峰既謂子曰非衍文而又謂斯三者是總上面三達德文勢亦不順章句何可疑之有叢説宗饒而不信章句過矣叢説在前饒氏謂章句吕云所入之塗雖異所至之域則同愚謂入異至同如康節因學數而知道昌黎因學文而有見於道之類是也若三知三行之所以異特以資質有高下而用力有難易爾其學固同一聖人之道也何謂所入之異邪此亦朱子所謂理有未眀而不盡乎人言之意者也蓋吕説所謂異者非自南而入自北而入之有異特曰自近而入自逺而入之有異耳蓋生知安行則即此而在無所謂入無所謂至矣學知利行者則未能即此而在必得其塗而入然後可由之以至其域爾較之生知安行即此而在者其所入之塗固有逺近之異矣困知勉行者又必由困勉而後可比於學利又自學利而後可以上同於生安方其自困勉始進之時其所入之塗固與學利者有逺近之異矣及其可比於學利猶與生安者有間不謂之異可乎道譬如王者之都生安則居於王都者也學利則自近郊進入於王都困勉則自遐方進入於王都者也吕氏之意以此觀之雙峰可無疑矣集成蔡節齋曰三知主知三行主仁三近主勇云云安行者仁之仁利行者知之仁云云按仁之仁上字當作知知之仁此知字當作仁諸編皆誤讀者詳之九經尊賢親親章句然必親師友然後修身之道進故尊賢次之道之所進莫先於家故親親次之發眀道之所進進字欠妥只當説推行之意輯釋亦引之按進字即是應上文則修身之道進之進字而言乃進道進德之進亦未見所謂欠妥處若但改為推行之意政恐妥有餘而味不足耳凡事饒氏謂章句云凡事指達道達德九經之屬愚謂凡事疑即下文言行事道是也又謂云云只言凡事豫則立而每事皆欲其前定明萬事莫不有要也輯釋亦引此説按章句於下文言行事道處云此承上文言凡事皆先立乎誠則饒氏愚謂之疑可釋矣至以凡事為每事萬事是又以章句指達道達德九經為不然也此則語録中已辨之愚奚庸贅况之屬二字於每事萬事之意已無不該尚何疑乎章句正要見言行事道大綱不出達道達德九經之外則先後血脈貫通而雙峯反以為病亦異乎朱子之見矣饒氏謂豫與前定朱子都把做先立乎誠説得太迫上面達道達德九經皆曰行之者一皆引而不發不説破是誠到前定處何嘗便以豫與前定為誠只如在下位不獲乎上民不可得而治獲上便是前定如信友順親誠身明善皆是前定末梢雖説個誠身又兼明善言之輯釋亦引之按章句曰此承上文言凡事皆欲先立乎誠如下文所推是也知所推二字之旨則雙峯所疑可氷釋矣又况子思所謂一所謂豫所謂前定雖引而不發然必有所指章句之作正欲指示學者不謂之誠則將謂之何哉若章句亦但引而不發學者毋乃不得其門而入歟况學者因章句以誠言之便知子思何不言誠而言一言豫言前定則其引而不發之意可想而見如何要章句亦引而不發得兼之獲上信友順親皆未是根本所在直推至於誠身然後為至耳明善亦所以求誠其身而已順親信友獲上皆誠身之效耳誠身之外又豈他有順親信友獲上之根本哉誠身非豫與前定而何章句所謂凡事先立乎誠如下文所推者蓋謂是也觀於孟子居下位章集注遊氏之言曰欲誠其意先致其知不明乎善不誠乎身矣學至於誠身則安往而不致其極哉以內則順乎親以外則信乎友以上則可以得君以下則可以得民矣詳此可見根本只在誠身處之實矣雙峯尚何疑乎然雙峯異日亦云言而非誠則誕妄也云云道而非誠則無所根本考易窮文先以莫不先立乎誠一句發之語意與章句無異何其與此自相矛盾也合而觀之其説不攻自破矣饒氏謂章句云此章引孔子之言以繼大舜文武周公之緒明其所傳之一致云云愚謂子思引孔子之言明費隱之意者至第十九章而極至此則語意更端恐不當遂謂其有發明傳授一致之意也輯釋亦引之此一則欲成就其六節之分二則欲成就其天下達道五以下非孔子言之論耳要之一篇之中雖引夫子之言不一至此一章論修已治人之道極為詳備又承上三章方論舜文武周公之事而發是固不無發明所傳一致之意蓋與堯曰篇以子張問政之言繼堯舜禹湯武之次離婁下篇以孔子修春秋繼舜禹湯文武周公之事盡心下篇以孔子繼堯舜湯文之統者同一意爾今曰此則語意更端然則彼皆非歟讀者宜必有見於此許氏叢説第三十章所論甚當可考有弗學學之弗能弗措也云云通謂有弗學學之之字當句絶蓋以上文博學之五之字下文人一能之四之字例當句讀絶也况五之字句絶尤為有力按章句釋此節之意曰君子之學不為則已為則必要其成然則不為則已一句説有弗學意為字説學之意則必要其成五字説弗能弗措也之意推此以例其餘則似當於學問思辨行上五字句絶五之字著讀五也字句絶如斯而已通以五字為句不曉其説章句此章引孔子之言以繼大舜文武周公之緒發明按堯曰章歷敘堯舜禹湯武王之事而以孔子答子張問政繼之子思此章政此意也發明既知如此而於饒氏六節之分以此章語意更端不當遂謂其有發明傳授一致之意五達道以下不是孔子之言諸説又皆引置編中可謂主見不定採擇不精也已發明按饒氏説與章句不同者亦宜知今載於下輯釋亦載饒説及發明此語發明既自以勒為一家之言則當存其説之善者其似是而非之説則當辭而闢之以曉後學若以其説為優於章句則亦當明其如何是優之實乃可存爾苟得其實何畏於朱子何私於饒氏存之乃公心耳今皆不然而但兼存異論以眩學者依違兩可無所折衷豈不有愧於發明名書之義乎愚故謂其信朱子不如信饒氏其於饒説每口非而心是之者此也如此等之存正是私於饒氏又畏朱子而不敢明言之者也至若所存饒説之是非得失愚已歷歷辨之此不再述通謂章句云第十六章兼費隱包大小而言此章包費隱兼小大何也曰十六章則兼費隱而言不言小大而包小大於其中此章則兼小大而言不言費隱而包費隱在其中輯釋亦引之按此説似乎得之但語為不詳猶未知其細辨兼包之義則又如何耳至曰此章不言費隱則似乎有礙此章不言隱耳未嘗不言費也愚則以為兼則二義並列一章之中而不可紊包則一章總該二者之義而不可分蓋兼有限包無窮兼是本章所自有包非本章所有亦不但中庸一書所有凡是天地間道理此章無所不包雖中庸中所言不過亦是天地間道理亦在其中耳且以兼之一字言之則各章但言費而隱在其中不可以兼費隱言也各章言小則不言大前三章言大則不言小後三章亦不可以兼小大言也惟十六章言鬼神之事以不見不聞與體物如在二者並列於一章之中則不見不聞正是隱體物如在正是費故謂此章兼費隱也二十章以文武之政治天下國家之九經與修身事親知人三知三行三近擇善固執等事並列於一章之中則政與九經正是大修身事親等事正是小故謂此章兼小大也此二者皆本章自有其義則所指固有限矣若以包之一字言之則十六章只是體物之一言可以包大小二十章只誠之一字可以包費隱蓋十六章説鬼神之費處不外乎體物之一言而體物之一言則於費之大小可以總該之矣陳定宇所謂體物不遺總而言之所該甚大即一物言之亦鬼神為之體兹非小歟陳説見第十六章末其言可謂至明白矣非體物一言可以包大小之謂乎二十章答問政之言雖非一事然皆不外乎誠之一言觀於達道達德九經皆言所以行之者一與章末語誠始詳之意可見則誠之一言於道之體隱用費可以總該之矣參以或問論誠為此篇之樞紐處有曰費而隱者實理之用廣而體微也此言可謂簡而明矣非誠之一字可以包費隱之謂乎此二者皆是包涵天地間道理非一章一書所自有者則其所包無窮可知矣蓋費隱大小是天地間道之體用特聖賢於中庸言之耳豈中庸所得專哉然則雖本章所兼有者不過亦是天地間之道理在無所不包之中况其所謂包者又豈可但就一章一書求之而不知其為包涵天地間無窮之理乎叢説兼者並舉之辭包者涵容之謂蓋十二章之後至十九章各舉費之小大而隱在其中十六章獨言鬼神直以隱者言之然所謂不見不聞是其隱者體物如在則亦費矣故曰兼費隱體物不可遺是鬼神之大者下獨指祭祀而言是鬼神之小者故曰包大小是於費隱之中包小大也二十章達道達德九經凡事前皆一一言之是其小者後專言誠是其大者故曰兼小大前所指羣目亦費矣而隱固在其中至於誠一節全以理言豈非隱者然所謂聖人之天道學者之人道又豈駕空言理而道事耶故曰包費隱是於大小之中包費隱也諸章費隱之中有小大故兩費隱字皆在上上十六章鬼神先言大後言小故曰大小二十章先言衆目而後言誠故曰小大按兼包費隱大小之説人人不同愚既因四書通之説詳言於前矣然未敢自謂必得朱子之旨故備載許氏此説以俟觀者擇焉但許氏此説亦有可疑處請略辨之夫既曰兼並舉包涵容則兼包固有異矣及至釋包字之義又皆即是並舉之意不見所謂涵容之説何也其以體物為大祭祀為小即十六章發明之意愚己於彼辨之矣且叢説既以體物祭祀分大小則大小皆只是費矣而又曰於費隱之中包大小豈不見不聞之隱亦有所包之大小耶二十章達道達德為小可也九經是為天下國家之事亦謂之小可乎若欲分此章孰大孰小之義當以前三章後三章例之與前三章同者小也三知三行三近之屬是也九經則非此比矣與後三章同者大也捨九經將何以當之而以此為小耶以誠為大似矣然則小處不可以誠言耶且既以誠為大又以誠為隱則大是費之大乃以隱當之可乎意者誠之一字自可以該貫大小費隱之義而不可偏主也叢説亦自覺其有此病故又以天道人道又豈駕空言理而遺事之言救之殆孟子所謂遁辭者乎凡此皆叢説所可疑處識者此必有以辨之至於大小小大之序不同則章清所先生以為鬼神章是就造化上言故先言大問政章是就人事上言故先言小姑記於此云全章之旨饒氏謂中庸自天下達道五以下恐只是子思之言子思常來只為學者説所以説居下位起若孔子告哀公則未必説居下位及取友等事雙峯以説居下位為疑愚於孟子離婁上篇略辨之矣謂天下達道五以下為子思之言愚亦於前屢辨之矣今請通論二十章全章之旨以明之按哀公問政問政者問治人之事也夫子答之自人存政舉至於不可不知天下凡五節皆所以明治人之本在於修身也下文自天下達道五至三近三節蓋詳言修身之道修身之道盡則治人之本立矣知斯三者一節是結上起下之過接處下文九經四節却正是詳言治人之事即哀公所問之政也凡此以上皆為人君言之耳然治人之事非人君一已所可自為也必在於取得其人而共治焉可也凡事豫則立一節又是結上起下之過接處下文在下位一節是説人臣欲輔上以治人者其本亦在於修身而已明善誠身則身修而有可以獲上之實矣下之所以獲上者在是則君之所以取人者亦在是然則此一節正是終章首為政在人取人以身之意至此始露出誠身一誠字則知上文數節所謂一所謂豫所謂前定皆是指此而言耳如此則為人君為人臣凡有為政治人之任者皆當以修身為本而修身皆當以誠為要也故下節遂言誠與誠之者以見誠有二者之分誠者則無工夫誠之者則有工夫章末三節正是誠之者之工夫凡欲修身以為治人之本者皆當如此用力是固通君臣上下而言也欲知雙峯所言之得失者盍以是推之四書管窺卷七
