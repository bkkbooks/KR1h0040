body:
  text: 欽定四庫全書四書管窺卷一元史伯璿撰大學章句序曰蓋自天降生民則既莫不與之以仁義禮智之性矣通謂朱子四書釋仁義禮智兼體用獨智字未有明釋愚嘗欲竊取朱子之義以補之曰智者心之神明所以妙衆理而宰萬物者也沈氏曰智者涵天理動静之機具人事是非之鑑輯釋亦引此説通補智字之訓如此蓋本朱子大學或問論知字之義而言也然智是體知是用智是知之理知是智之事知之扵智猶愛之於仁也今以論知字之言為智字之訓則似乎詳於用而略於體者恐有未安但以朱子釋仁義禮之義者較之可見况其語句又非訓釋字義之體沈氏之説亦然若以為論智字之用則可若以為訓智字之義則似未當又按饒雙峰嘗補智字之訓曰智者知之理心之别程勿齋字訓於智亦曰别具之理為心之覺無己則於二説擇取其一乎但朱子唯訓仁字為心之徳愛之理於義於禮已不如此下語矣假如朱子自訓智字又未知果如雙峰勿齋之語句否當兼存之以候知道者之折衷焉愚見冩在外編人生八嵗皆入小學而教之以灑掃應對進退之節禮樂射御書數之文通引齊氏謂上三者言節下三者言文文者名物之謂非其事也通自謂洒掃應對以節言者小學不惟當習其事事之中有品節存焉是小學當行之事也禮樂射御書數以文言者小學未能習其事姑習其文義而已是小學當知之事也輯釋亦引齊氏説以文為名物文義之文主知而言豈非以博文學文之文亦皆主知而言耶竊恐未然蓋此以文對節而言便是天理節文之節文分而言之亦對舉以互見耳非謂言節者不可言文言文者不可言節也朱子曰小學者學其事大學者學其小學之事之所以又曰古文如禮樂射御書數大綱都從小學中學了大來都不費力詳此則謂以文言者未能習其事姑習其文義是小學當知之事者未必然也饒氏亦曰内則十年學書計即六書九數也成童學射御即五射五御也十年學㓜儀禮之小者也十三以上學樂誦詩舞勺舞象即六樂也詳此則齊氏非其事也與通未能習其事之説其不然猶為易見若更以數之一端明之則六年嘗教之數矣非使之習其名物文義而何至十年又使之學計計非使之以數而計其多少乎此即習九數之事可知讀者其試思之饒氏輯講論大學綱領其不同於章句者有三今舉而辯之如左一謂至善是事物當然之則非指明徳新民造極之地而言也按此與章句事理當然之極盡夫天理之極之説不同蓋饒氏之意亦以為至善之至是無過不及之意若以為至極之義則過乎中而不可以為訓矣故如此説殊不思章句曰當然之極又曰天理之極當然對不當然而言天理對人欲而言極則盡乎十分之謂當然便是恰好之意即中之所在即無過不及之謂也天理豈外是哉當然而未至於極便是有不當然者雜於其中天理而未盡其極便是有人欲雜於其中當然善也九分當然有一分不當然善未得為至也天理善也九分天理有一分人欲亦善而未至也須是當然則十分當然天理則純是天理方可為善之至至九分有一分未盡便是於天理當然處有所未至便是不及乎中直至十分全盡方是恰好處方是無過不及之中以此推之則章句有何可疑若如饒氏説則當然不必十分當然天理不必十分天理只五六分當然天理便是至善所在如此則如堯之仁舜之孝孔子之學皆不免有過於中反不得為至善耶讀者疑必有見於此二謂格物只要窮究那日用事物當然之則以知吾所當止之地非是欲人窮極事物之理以至於無所不知也此説不為無理但自以為與章句不同則實無不同者此蓋因誤看了第五章補傳必使學者即凡天下之物一句所致當於彼章辯之三謂誠意是正心修身之要不是正心脩身之外别有一件事誠實也此當於第八章辯之饒氏又謂魯自少讀朱子大學之書於前三者反之於身自覺未有親切要約受用處近讀先生與勉齋書謂大學一書㸔者多無入處似此規模太廣令人心量包羅不得然後知先生晚嵗亦不能不自有疑焉大學一書學者所以學至於聖人之法程也自三代以前能盡是道而造其域者可數也孔孟既沒因其書而得其傳者惟周程張朱數君子而已是知雖曰人皆可以為堯舜然氣質不齊用力不易所以得造其域者亦鮮至於教人之法則不容自貶以御學者之不能也蓋其法不如是不可以由之以造聖人之極至耳然則朱子與其徒之書非歟曰此書固宜有之然其本意得非正以教人之法既不容自貶而又不得中行之士而與之故𤼵此歎亦猶聖人衰世之意邪况亦但謂大學一書規模太廣亦未嘗有自病章句之意則其為無可奈何之辭明矣觀於孟子大匠不為拙工改廢繩墨等言可見不然誠意一章朱子易簀之際猶不廢改豈有果知章句有太廣之病乃徒形之嘅歎而不之改邪且雙峰自謂反身未有親切受用處亦既一切變易章句之㫖而自為之説固宜自得親切受用處矣愚不知其由此進徳到得何等地位可以任道學之傳否其亦大言以欺世而已非實然也饒氏謂明明徳章句説是明之於既昏之後某以經傳文意詳之似只説因其本明而明之徳本自明故曰明徳若不因其既昏又何待明之之功而後明哉雙峰以為只因其本明而明之則是未嘗有所昏也未嘗有所昏則是生而知安而行唯堯舜性之之徳可以當之此則不待明之而自無不明者也雖湯武反之之事亦是未免先有所昏但湯武善反之以復其本然者爾若以本體之明有未嘗息者為本明則未嘗息者與本自明者固自大有間哉譬之於火不假吹噓之力自然光燄燭天煙不得鬱物莫之蔽者本明者也撲滅之餘僅有一燼之微存於死灰之中不可得而盡熄吹嘘之則仍復熾盛者未嘗息者也讀者欲分章句饒氏之得失當以是推之饒氏又曰章句以慎獨為慎之於念慮萌動之始某則謂念慮自始至終皆在所謹此當於中庸説慎獨處辯之此不暇及又按語錄有曰這獨也不是恁獨時如與衆人對坐自心中一念或正或不正此亦是獨處推此可見章句本意非饒氏所識饒氏自謂已説却不出章句之意此當在第六章饒氏自述其所見與章句異處而先言之故實於此經止至善章句止者必止於是而不遷之意叢説至善只是義理極處所中必止於是是不可不及不遷是不可過此亦祖述雙峰之意以為説者也但雙峰説至字之意明與章句不同又何必强推章句之説以求合雙峰之意乎竊意必至於是是不可不及似矣不遷是不可過則恐未然何則至善是極好處至是無以復加之意患其不及不患其過如山之絶頂一般未至絶頂固是不及至絶頂而遷從他處去亦只是下山了但可言不及不可言過又如月之圎缺一般唯望夕十分滿輪方是至善之意未望明未滿魄固是不及之意過望而虧又豈可以言過乎若以至善言之則孝是善孝如大舜方是至善若以刲股之類為孝此則大舜所必不為者且不得為善之至矣况可謂之過乎如此則遷只當作移動之意説不遷如説不退轉相似語録有曰既至其地則不當遷動而之他又曰到此不能守亦不可謂止其意蓋可見矣通謂必至於是知至至之之事不遷知終終之之事輯釋亦引此説按文言知至至之程傳以為致知也知終終之程傳以為力行也或問於朱子曰至之是已至其處否曰未在是知得到至處方有箇向空處正要行進去知終終之是已至其處了終之而不去詳此則章句必至於是之至是已至其處之謂不但如知至至之之為向望要進之意也况必至於是之至以知言之則智及之之謂以行言之則造其域之謂是固兼知行而言不如知至至之專指知而言之比其曰不遷以知言之則知之弗去是也以行言之則仁能守之之謂是亦兼知行而言亦非如知終終之專主行而言之比也今引文言為證則似乎必至於是是知止於此不遷是行止於此恐於文言大學之㫖兩不相當而皆失之讀者其參攷焉可也若以必至於是為知至知終不遷為至之終之則庶乎可耳饒氏謂至善只是事物當然之則非指造極之地而言也又曰止者毋過毋不及之謂此即叢説所祖述者通謂章句此極字本傳中君子無所不用其極或問曰是其所以得之於天而見於日用之間者固已莫不各有本然一定之則然則所謂事理當然之極者事理當然之則也下文曰有以盡夫天理之極者盡夫天理之則也曷嘗以造極之地為言哉此已於前辨之矣又按語録有曰至善只是十分盡善處猶今人言極好又曰善者固是好然方是好未是極好處必到極處便是道理十分盡頭無一毫不盡故曰至善以此觀之則至善之至朱子何嘗以為不指造極之地而言哉造極之地方是天理十分盡處天理盡處便是當然之則何過之有其曰本然一定之則亦以理出於天而非人力所能加損又十分盡頭而無一毫人欲之私而已若不出於天則非本然之謂若有一毫未盡則非一定之謂矣然則造極之言正朱子之本意通者何必為朱子諱哉若必以造極為諱則為善亦以十分盡頭為諱耶或問章句之意似毋容以異觀雙峰不知己意與章句之意只一般乃是已非而章句通者又不知或問之意與章句只一般乃援或問之言以諱章句極字非造極之謂讀者但以或問語錄玩之則章句之意自明本無可議亦不必諱也經眀徳至善章句具衆理應萬事事理當然之極通異端言理不言事大學言理必及於事故章句釋明徳至善云然異端以理為障又何嘗言理要之異端只認得箇虚靈不昧厎於具衆理應萬事者皆不知也固是無用又何嘗成體定静安慮得饒氏謂定静在事未至之前安慮在事已至之後安慮在事已至之後此句恐未當竊意安與定静皆在未有事之前慮是處事謂是事方来之時可也後字似未甚切當今輯釋引饒氏此説果云定靜安在事未至之前慮是事方来之際與輯講不同想亦覺其未當而改之耳知止静安慮通引方氏曰異端亦説得能定靜安了只是處置事物不下便是不能慮慮只是能處置事大學定靜安是活厎定靜安根源從知止上来如孟子知言然後自然不動心之意所以事至而能慮異端定靜安是死厎定靜安但㝠然無覺而已如此則異端非獨不能慮雖硬把捉得定静安亦不可謂之能也疑似之間是非之辯不可不察通曰定而能靜則事未来而此心寂然不動者不失安而能慮則事方来而此心之感而遂通者不差輯釋亦引此説易二語以一靜一動對言此是以知行之效騐對言能靜雖亦是未應事之前然上承志有定向説下来則不可謂之寂然不動矣若寂然不動又豈可以志言哉志則心有所之矣謂之寂然不動可乎然則此定靜字只是理明之後外物私意皆不足以摇奪之而心自不妄動耳非對感通言之靜也叢説定靜安以知言慮得以行言定靜安是未有事之前慮是方應事之時得是事既應之後慮雖屬處事而未可便以慮為行力行正在慮得之間蓋此五者是説功效次第則能慮不是行之功效分曉只當與定靜安皆為知之功效方是或問篇首之言明明徳以新民為對則固專以自明為言矣後段於平天下者復以明明徳言之則似新民之事亦在其中何其言之不一而辯之不明邪曰篇首三言者大學之綱領也而以其賔主對待先後次第言之則明明徳者又三言之綱領也至此後段然後極其體用之全而一言以舉之以見天下雖大而吾心之體無不該事物雖多而吾心之用無不貫蓋必析之有以極其精而不亂然後合之有以盡其大而無餘此又立言之序也饒氏輯講問此段最為可疑如言似新民之事亦在其中却言自明已徳於天下却不是使天下之人皆明其明徳也又如言極其體用之全則似指明明徳為體新民為用此又似有礙至如天下雖大而吾心之體無不該事物雖多而吾心之用無不貫其言又似乎明已徳於天下與前章句或問意相反不知何謂嘗看舊本或問前段明明徳於天下處云自明其明徳而推以及於天下今此段似與相著或恐是朱先生改正之時偶遺忘及此亦未可知或問之意是合在人在己之明徳以為一而言其體用耳蓋明明徳於天下固是治天下者使天下之人皆有以明其明徳然天下舉其全若國若家若身心以上皆已該於其中總言明明徳於天下則自治國齊家以至於致知格物皆在其中矣非只平天下於外而小之為國家内之為身心究其極之為意為知為物皆不用其力也蓋舉大則小無不該然欲致力於其大則當於其中先致力於其小以為之本耳故言明明徳於天下則固為新民之極功然明明徳之事亦未嘗不該於其中使天下之人皆有以明其明徳四海九州之人固天下之人一國一家之人與使者之自身亦莫非天下之人也已欲明其明徳固當格物以致其知誠意正心以修其身欲家國天下之人各明其明徳亦不過使之皆如此而已曰極體用之全而一言以舉之者體即明在已之明徳用即使人各明其明徳也一言而脩已治人之事無不在非極其體用之全而何哉曰天下雖大吾心之體無不該者自有以明其明徳而新民之體已立天下雖大體亦何所不該乎曰事物雖多吾心之用無不貫者使人各明其明徳而吾明明徳之用乃行事物雖多用亦何所不貫乎如此則以明明徳為體新民為用豈不是經註或問本意而雙峰過疑之耶雙峰蓋以經註所言專為平天下之事自治國以上皆未之及故如此見可謂誤矣但以為明己之明徳於天下則本非朱子之意乃雙峰因誤致誤耳餘見後段𤼵明輯釋引盧氏觧或問見前段之言曰言明明徳與新民對則大學之體用猶二也言明明徳於天下則大學之體用非二矣吾心之體即明徳之虚而具衆理者也吾心之用即明徳之靈而應萬事者也能折之極其精而不亂則知吾心之用無不貫矣能合之盡其大而無餘則知吾心之體無不該矣不祈而遽欲合之則有虚空恍惚之病徒析之而不能合之則有支離破碎之病此二句其意無窮真西山嘗誦而繼之曰小徳川流大徳敦化又繼之曰吾道一以貫之其旨深矣竊意體即明徳用即新民極體用之全而一言以舉之者即明明徳於天下一句而脩已治人之事無不該於其中也觀於或問前段之言曰所謂明明徳於天下者自明其明徳而推以新民使天下之人皆有以明其明徳也之言可見天下雖大吾心之體無不該者自明其明徳所以立新民之體體固無不該也事物雖多而吾心之用無不貫者推以新民使人各明其明徳所以達明明徳之用用固無不貫也析之極其精而不亂者篇首明明徳以新民為對分體用而言則明明徳固專以自明為言也合之有以盡其大而無餘後段於平天下復以明明徳言之合體用而言該自新新民於一句之内也此二句正是答或者所問前後不同之意處熟讀可見或疑如此説體用似於心之體心之用六字意有未瑩如何曰天下事物未有不統攝於一心者是故以明明徳為體非心則徳不能以自明體不能以自立心之體所以該天下之大者蓋如此以新民為用非心則民不能以自新用不能以自行心之用所以貫事物之多者蓋如此盧氏所觧則專以明明徳為自明之事而分其體用故但知虚具衆理者之為體而不知不明乎徳則無以全此體但知靈應萬事者之為用而不知不新乎民則無所措其用蓋亦未達經注此句該盡人已之意而但以明明徳於天下為明已之明徳於天下者不唯不足以别白此段問答之曲折又恐正墮前段雙峰似乎明已徳於天下之疑讀者其試思之章句或問所以釋明明徳於天下者詳略不同如何曰章句所以訓釋經文之義或問所以敷暢章句之旨豈有二哉夫章句明明徳於天下之訓釋可謂至矣但恐讀者不察易於使字上致疑往往謂平天下是治人之事今曰使天下之人皆有以明其明徳似乎治人者使所治之人如此則此句不可以該自明之意故或問於章句此句之上再加自明其明徳而推以新民一句以見自明新民皆所謂使天下之人有以明其明徳也然後經文明明徳於天下之一言可以為極體用之全而舉之耳蓋此使字只是活字只當輕看不必以在己使人為拘蘓秦曰使我有負郭田二頃蕭道成曰使我治天下十年大學傳之十章章句曰使彼我之間各得分願此三使字亦何嘗以在已使人為拘哉看得使字之義活則章句或問之旨曉然矣𤼵明本當云古之欲平天下者今乃以明明徳於天下代之者以明徳人已所同得明明徳於吾身體也明明徳於天下者新天下之民使皆明其明徳也用也一言而該大學之體用者在此𤼵明此説雖似得之但先言明明徳於吾身而後言明明徳於天下則似乎明明徳於吾身一句是觧篇首在明明徳之義明明徳於天下以下三句是觧後段此句之義如此則後段此句只是新民之事只是用與或問極體用之全一言以舉之之意不相似觀於或問先提起所謂明明徳於天下者一句然後從而釋之曰自明其明徳而推以新民使天下之人皆有以明其明徳也立言之序如此則自明新民皆該在此句之中異乎𤼵明之意矣叢説明明徳於天下此徳字已含明字意在内明徳二字已該明明徳三字義了上一明字是新民新字之意明明徳猶曰明明明徳相似與在明明徳不同故章句曰使天下之人皆有以明其明徳使字便是上明字意此亦不達或問之意而以明明徳於天下為專指新民而言不知其該體用故耳其所謂猶曰明明明徳相似與使字便是上明字意之言皆不得經注之㫖而肆為臆説者也讀者知或問極其體用之全而一言以舉之之㫖則叢説之誤不待辨而明矣已上四條饒氏則專以明明徳於天下為新民之事而反非或問之可疑盧氏則專以為明己之明徳於天下而失或問之旨𤼵明叢説則皆柤饒説指此句為新民之事又為章句或問所礙而説得如比朦朧信乎説書之難也又未知愚意能合經註或問之㫖否也姑錄於此以俟知道而就正焉致知在格物通曰章句釋明明徳兼事與理釋至善釋格物亦曰事理窮致事物之理心外無理理外無事即事以窮理明明徳第一工夫也故不曰欲致其知先格其物而曰致知在格物此一在字又與章首三在字相應大學綱領所在莫先於在明明徳而明明徳工夫所在又莫先於在格物陳公潜先生云致知在格物何嘗是明明徳工夫所在後面一在字與三綱領三个在字各有所指何嘗相應而通不顧組文摘撮附㑹惑人甚矣愚謂經言大學之道在於三綱領耳何嘗謂三者是綱領所在哉致知在格物亦曰推極吾之知識在窮致事物之理耳所以不曰欲曰先者盖格物之外别無致知工夫致知工夫即在於格物之内程子所謂物我一理纔明彼即曉此合内外之道者是已朱子所謂明明徳工夫莫先於在格物哉讀者其試思之意誠而后心正章句意既實則心可得而正矣通意既實則心之用可得而正正心該體用動静觀於或問鑑空衡平之體鑑空衡平之用之言可見通乃於此添一用字其意蓋謂心之體無不正所謂正心者正其心之用爾其實非經㫖也當於第七章辯之傳之首章饒氏謂此章姑以釋明明徳之義未有下工夫處此蓋欲歸重於止至善章而言也但明明徳工夫全在格物致知脩身五條目上明明徳是五條目之綱領五條目之外别無明明徳工夫故此章但釋明明徳之義如此而下工夫處却詳具於五條目之傳非有他也傳之二章盤銘日新𤼵明愚案日新之藴自仲虺𤼵之湯采之為此銘輯釋亦引此說湯銘盤虺作誥其先後似難臆度是故君子無所不用其極章句自新新民皆欲止於至善也饒氏謂極與至善二義不同此極字是以窮盡無去處為極云云若至善之至則是以無過不及為至非窮極之義也又謂止於至善是逐事逐物各要止於至善無所不用其極是無一事一物不止於至善止於至善是逐一事説是下手處無所不用其極是該全體説是成就處按經中章句云至善謂事理當然之極與此傳文用其極二極字皆只是隨事指其十分盡善處為極皆非指衆事之窮盡處為極也自在止於至善處言之則凡事皆有善處善皆以十分盡處為至十分盡處非極而何又自用其極觀之則此極字之義亦不過如此而已初未見其指窮盡無去處而言也必連上文無所不三字説下來方見得窮盡無去處之意耳極便是至善用其極便只是止於至善故曰未見窮盡處直至曰無所不用其極方是自新民皆止於至善故曰必連上文無所不三字説下來方是得窮盡無去處之意也雙峰因誤看了此極字之義遂謂經中章句極字之義亦如此也可謂因誤致誤朱子嘗曰理有未明而不盡乎人言之意真雙峰之謂矣饒氏又曰此章姑以釋新民之義亦未有下工夫處此與論首章之意同推彼可以明此矣傳之三章穆穆文王云云饒氏謂但曰止於仁止於孝而不曰止於至仁至孝以此見至善只是事物上一个無過不及厎道理非窮髙極厚之謂仁敬孝慈信便是為君臣子父與人交者之至善若更曰至仁至孝則又似乎言止於至至善然者豈不重復矣乎若曰仁非至仁孝非至孝則仁孝不必十分仁孝已是至善若十分仁孝則又過於中而反不得為至善耶如此則雙峰不唯不識至字之義亦未識中字之義也蓋十分盡善方可謂至方是無過不及所在若善未至於十分便是不及乎中又何可以言至乎雙峰每慮其過則仁孝皆不敢做到十分盡處便自以為至便自以為中天下還有此理否殊不思但言止於仁孝何嘗不要人十分仁孝觀其引文王為法可見文王仁孝豈有不十分全盡者耶只因雙峰平日以聖賢自居顧經註之旨已皆有所未至慮世人以此覘其虛實故毎將經旨説降一等求以自便故不得不誣朱子以欺世耳噫瑟僩章句瑟嚴密之貌僩武毅之貌𤼵明嚴密在心武毅見於色按傳釋瑟僩為恂慄章句又觧恂慄為戰懼下文又以恂慄為徳為裏則所謂武毅者似未可指為見於色也語錄云僩武毅貌能剛强卓立不如此怠惰闒颯詳此似亦當以在心言者未知然否親賢樂利饒氏謂親賢樂利於此見君子小人分量不同所得各有淺深所謂新民之止於至善者非是要使人人為聖為賢只如農安畆工安肆商安塗賈安市亦是新民之止於至善處如此則比屋可封之俗人人有士君子之行皆無實之空言後世如文景太宗之粗可少康者皆足以為新民極功而可與唐虞三代比隆矣况安畆安塗與為聖為賢並行不背可也若但安畆安塗而不孝不悌悖理傷教不知可以為新民之止於至善否唐虞三代之民而有是哉愚謂雙峰每將經旨說降一等亦此類也識者宜必有見於此饒氏謂明徳新民兩章釋得甚略又但言明新而不言所以明新之方此章所釋節目既詳工夫又備可見篇首三句重在此一句上輯釋諸篇皆引之篇首三向重在此一句上是固不為無理但言上二章工夫皆在此一章則非也盖前兩章不言所以明新之方者明新之方自具於後六章釋條目工夫處非有他也若至善章所以詳於前二章而必貫明徳新民二事言者蓋至善不是懸空物事不過只是明明徳新民所當止之地耳故此章必貫明明徳新明言之明徳新民工夫既具於後六章之傳則前二章不容不簡至善雖便是明明徳新民之所當止然其意則只寓於條目工夫中更無他處可以再詳其義故此章自不容不詳言至善之義以示人初非以前二章未言明新之方故如此詳言以補之也蓋綱領雖三事不過二非明徳新民之外他有止至善之事也故釋明徳新民則止至善之意寓如曰無所不用其極是也釋止至善則明徳新民之義存如引淇澳烈文之詩是也然亦不過皆言其概而已若謂明新之方盡具於是則切磋琢磨猶可指為明之之工夫親賢樂利何以見得新之之工夫耶章内五節次序通𤼵明輯釋引盧氏曰云云第三節言聖人之止皆至善以得所止言云云按此節章句其末曰則於天下之事皆有以知其所止而無疑矣則朱子正以此節為知所止之事蓋章句是就學者分上言盧氏是就文王分上言所以不同要之文王之所已行正是學者之所當知然則但當以章句為是傳之四章釋本末或問然則其不論夫終始何也曰古人釋經取其大畧未必如是之屑屑也目此章之下有闕文焉又安知其非本有而并失之也耶愚聞之章清所先生曰大學諸傳釋工夫而不釋效騐觀於知止能得與物格至天下平無傳可見蓋效騐只在工夫之中也知止為始能得為終終始正是以效騐言所以無傳固非屑屑不及釋亦非本有而并失之傳之五章饒氏謂朱子補傳似乎説得太汗漫學者未免望洋而驚如既謂即凡天下之物則其為物不勝其多又謂因見其已知之理而益窮之以求至乎其極不知又何處是極表裏精粗全體大用亦是自立此八字經傳中元無此意按即凡天下之物非謂把天下之物一齊格了亦曰就凡衆物之中隨其所用而逐件格之耳求至乎極亦非謂求至乎凡物衆多之極亦只是求至此一物義理之盡處耳此方説就一物上如此格也夫方就一物上格而曰即凡天下之物者蓋凡物莫非天下之物皆學者所當格者然不可限定説先格某一物次格某一物則拘矣或難或易或緩或急各隨人淺深就所遇者則格之即字凡字是朱子用意淺深處曰即則只就一物曰凡則不拘何物即凡天下之物圓活而無所拘之辭非親用功窮格者不能如此下語也然則自此以上且是説就一物上格明矣直至下文用力之久一旦豁然貫通衆物之表裏精粗無不到處方是合衆物之全而言以文勢詳之可見雙峰不詳下文有衆物二字遽以前節極字為事物當然之極真所謂理有未明不盡乎人言之意者也此其説極字之誤正與前説至善處極字之誤同知彼則知此矣表裏精粗全體大用八字固是朱子之所自立然豈不切於格物致知之義耶朱子本不效傳體行文其所補之文便只如章句一般又何必以經傳所無而疵之乎至於汗漫望洋之疑則大學之道是教人學至乎聖人之方法格物致知一章正所謂始條理之事始全則終亦全始偏則終亦偏觀於孟子論始終條理處可見道有定體教有成法卑不可抗髙不可貶奈何患學者之不能而欲自貶以狥之乎况望洋之疑只因雙峰誤看極字之所致他人看得極字之義分曉又安有望洋之驚哉語錄問先生所補致知章何不效其文體曰亦嘗效而為之竟不能成竊意效傳體行文特文公餘事決無效不能成之理此特姑為謙辭以答學者之問耳正意恐不止此也蓋若效其文體則必援引經傳文意簡古學者未必自能通曉須又為之註觧以曉之如此則自為自註豈得不為好事者之所譏誚故不求其文之類但取其義之明所補傳文便只如章句一般庶乎人之易曉耳不知識者以為然否饒氏曰愚謂大學之要只在止於至善上格物是隨事隨物毎毎要窮究到至善處致知是要推致其知識使之知此至善不必别為之説朱子之意何嘗以格致不是要知此至善但理是事物之實理至善又是狀此實理之體段説至善不如説理之實耳只因饒氏看得至善之至字有礙又疑補傳之太汗漫故如此見耳要之以致知為知至善朱子與雙峰無異觀於章句物格知至則知所止矣之言可見但雙峰以至善之至專為無過不及之意而非極至之義與朱子不同故於此亦不合耳汗漫之疑殆亦起此讀者其試思之饒氏謂或問云聖人説教使人黙識此心之靈而存之於端莊靜一之中以為窮理之本謂聖人設教使之如此求之經傳却無證據看或問所引只以中庸尊徳性而道問學為證然徳性是説心之理靈是説心之知覺有些不同况道問學是兼知行言此却是専指致知而言似亦未甚親切竊意古者八嵗入小學使之收其放心養其徳性以為大學之基本此豈非聖人設教使之如此似不必他求經傳以為證據也按或問前段有曰聖人於其始教為之小學而使之習其誠敬則所以收其放心養其徳性者已無所不用其至矣及其進乎大學則又使之即夫事物之中因其所知之理推而究之以各到乎其極則吾之知識亦得以周徧精切而無不盡也又按語錄問格物補亡處不入敬意何也曰敬已就小學處説了此處只據本章直説不入雜在這裏壓重了不浄潔詳此二説則朱子所據之意可見靈字只説知覺之疑後第七章心不在焉處與孟子牛山之木章詳之道問學兼知行之説當於中庸辯之此不及贅補亡通人心之靈莫不有知此良知之知得於天性理有未明知有未盡此致知之知得於學力知只一般得於學力者即所以復其得於天性者耳分良知與致知而言然則得於天性之外又他有得於學力之知果由外鑠我耶或問取程子格物致知之説十二條朱子取其意以為補傳通謂補傳自所謂致知在格物者至故其知有不盡也是取程子第一條意程子曰致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端或讀書講明道義或論古今人物而别其是非或應事接物而處其當否皆窮理也是以大學始教是取程子前二條意程子曰學莫先於致知又曰誠敬固不可不勉然天下之理不先知之亦未能有勉而行之者也自必使學者至以求至乎其極是取程子第五程子曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各隨人淺深譬如千蹊萬逕皆可以適國但得一道而入則可以類推而通其餘矣蓋萬物各具一理而萬理同出一原此所以可推而無不通也第六程子曰物必有理皆所當窮若天地之所以髙深鬼神之所以幽顯是也若曰天吾知其髙而巳矣地吾知其深而已矣則是巳然之辭又何理之可窮哉第七程子曰如欲為孝則當知其所以為孝之道如何而為奉養之宜如何而為温凊之節莫不窮究然後能之非獨守夫孝之一字而可得也第八條意程子曰物我一理纔明彼即曉此合内外之道也語其大天地之所以髙厚語其小至一物之所以然皆學者所宜致思也或曰先求之四端可乎曰求之性情固切終身然一草一木亦皆有理不可不察至於用力之久而一旦豁然貫通焉是取程子第二程子曰今日格一物明日又格一物積習既多然後脱然有貫通處爾第三程子曰一身之中以至萬物之理理㑹得多自當脱然有箇覺處第四條之意程子曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但積累多後自然脱然有悟處自衆物之表裏精粗至此謂知之至也是取程子第九程子曰致知之要當知至善之所在如父止於慈子止於孝之𩔖若不務此而徒欲泛然以觀萬物之理則吾恐其如大軍之逰騎出逺而而無所歸也第十條之意也程子曰格物莫若察之於身其得之尤切愚按通謂補傳自起首至故其知有不盡也是取程子第一條意是以大學始教是取程子第二條意自必使學者至求至乎其極是取程子第六第七條意者皆是矣謂必使學者至求至乎其極是取程子第五條八條之意至於用力之久而一旦豁然貫通是取程子第二第三第四條之意者皆得之而未盡謂末後四句是取程子第九第十之之意則全失之何則補傳凡三節第一節自起首至窮其理也是説致知在乎格物下文至故其知有不盡也是説物未格則知不盡第二節自是以大學始教至求至乎其極是就逐物上説格物致知工夫第三節是承上節就衆物上説物格致知效騐程子十二條前二條與第一第六第七條皆説工夫如通言可也第八條是説衆物上用工夫不可不周通但以為全是補傳第二節所取則有所未盡第九第十條是説衆物上用工夫又不可泛然無序正是説工夫處通乃以為是補傳第三節後四句所取則此四句正是説效騐處而以為有取於彼是不察工夫之效騐之有辯也愚則以為此三條八九十補傳中凡説工夫處如前二節與第三節用力之久一句皆在所取耳第二第三第四第五此四條是合工夫效驗言者其實是補傳全章之所通取初不分節以配之也通以為第五條是補傳第二節所取殊不思可推而無不通一句何嘗不就衆物上説貫通之理耶通又以為第二第三第四條是補傳第三節起頭二句所取殊不思今日格一物明日格一物與自一身以至萬物之理及非謂必盡窮天下之理又非謂止窮得一理便到等語又何嘗不是説就一物上窮格以至於積累之多正是通謂格致工夫之始終處而通皆指為二句所取可乎况補傳第三節末後四句正是承豁然貫通之意而言格致之效驗處如此則第二至第五條所謂貫通處覺處悟處與無不通之言是補傳第三節六句之所通取通乃獨以起頭二句當前三條之意後四句既曰不取此意則只得以第九第十條當之而不思二者有工夫效驗之不同可謂誤矣或問取此十條自有次第第一條説格致用功之法最為詳備是就逐一物上説故居首第二第三第四第五條皆通説工夫效驗之始終是就逐物上説至衆物上故次之第六第七條皆説就逐一物上當窮到極至處是申第一條之意故又次之第八條説衆物格之不可不周第九第十條皆説衆物之中格之又當有先後緩急之序三條皆是申第二至第五條之意故以是終焉大抵説工夫處多説效驗處少有只説工夫而不説效驗處無只説效驗而不説工夫處通不察其次序之精宻如此乃雜然取以配之於説工夫處亦取五條意於説效驗處亦取五條意宜乎其致誤也讀者詳之矩堂董氏槐以經文自知止而後有定至則近道矣九句合傳之四章及五章結句共為一章是釋格物致知之傳朱子不當更作補亡按經文自明明徳以下三句是一節説工夫自知止而后有定以下五句是一節説效驗自物有本末以下四句是一節總結前二節之意此皆是以大學綱領言之者自古之欲明明徳於天下至致知在格物一節是逆推工夫之所始自物格至天下平一節是順序效驗之所極末後二節是結前兩節之意前節正説結工夫後節反説結效驗此皆是以大學條目言之者其前後次序秩然不可紊亂如此今若掇此九句以為格知之傳則綱領但説工夫不説效驗又無結意與後段説條目處不同矣况諸傳之體説工夫處多説效騐處少有只説工夫而不説效驗者無只説效驗而不説工夫者盖以無工夫則無效驗效驗不在工夫外也况格物為大學始教之事而不詳言其工夫可乎今以經文九句推之則定静安慮得五字不可謂之工夫明矣知止之知亦已知所止而非用工夫求知所止之謂物有本末事有終始亦但言事物大概如此知所先後則近道矣亦不過欲知本末終始所當先後之序庶乎可至於道不逺而已亦不見格之致之所用之工夫當何如也更以第四章傳文推之亦不過但言聽訟無訟之輕重欲人知明徳之為本而已初未見欲知明明徳新民之理則當如何下工夫也遽以為物格遽以為知之至可乎董氏但見經傳二處有此幾箇知字便欲牽合以為格物致知之傳而不知致之格之之工夫不止如此也觀於中庸以學問思辨為擇善之事而皆屬乎知説知如彼其詳則格致之傳必如補亡之言而後盡董氏蓋不足以知此也傳之六章故君子必慎其獨也章句然其實與不實蓋有他人所不及知而已獨知之者故必謹之於此以審其幾焉饒氏謂謹獨只是審其善惡之幾而去取之如此則不自欺而自慊矣章句謹獨是審其實與不實之幾詳章句之意此是指獨字而言幾是指好善惡惡之意而言審是審其幾之實與不實審其幾之實與不實即是審其好善惡惡之意能如好好色惡惡臭之實與否也雙峰以為章句是審其實與不實之幾似未得章句之旨章句特欲審其幾之實與不實爾至其自謂只是審其善惡之幾而不及好之惡之之意又似與獨字之意無相闗者不知如何饒氏謂誠意正心修身不是三事且如顔子問仁而夫子告以非禮勿視聽言動𦂳要只在四箇勿字上仁屬心視聽言動屬身勿與不勿屬意若能勿時則身之視聽言動便合禮而此心之仁即存以此見三事只是一串引四勿為證是矣但經言意誠而后心正心正而后身修雙峰謂若能勿時則身之視聽言動便合禮而此心之仁即存則又似乎意誠而后身修身修而后心正者恐不可得而强合要之牽合附㑹之言自不能無罅隙亦不足深辯也輯講問傳之諸章釋八條目處毎章皆連兩事言獨此章單舉誠其意是如何饒氏曰致知屬知誠意屬行知行畢竟是兩件事當各用其力所以誠意不連致知説誠意不特為正心之要自修身至平天下皆以此為要若只連正心説則其意局狹無以見其功用之廣通引金氏曰大學諸章之傳首辭結語皆以序言自正心以上獨不以序言蓋心身家國天下各是一節之事而致知誠意二者同為心上之事心統知意者也若亦以序言則是一心之中文自截作三節而心上工夫却自分成三次豈理也耶然皆以序言於經經傳固互相𤼵也通曰大學條目有八僅作六傳格物致知兩者實是一事故統作一傳自正心以下五者工夫次第相接故統作四傳惟誠意獨作一傳然章句謂誠意者自修之首亦已兼正心修身而言矣章末曰潤身曰心廣提出身與心二字意亦可見輯釋亦引饒氏與通之説詳此三説皆不過因誠意自為一章與前後五章皆兼二事釋者義例不同故如此見耳饒氏知行當各用其力之言似矣竊意知行當各用其力孰與脩已治人之當各用其力耶今傳之八章釋脩身齊家且以脩己治人之事合而言之然則以致知合誠意為一章又何為不可哉饒氏此言恐未必然也若誠意不獨為正心之要者恐亦未必然當於後章辯之金氏知意皆統於心心上工夫不可截作三次之言亦是自立此説以經文論條目之工夫效驗處皆相因為序之意推之何嘗無三節工夫耶且果如饒氏金氏之説則經文之次序皆不若傳文之當耶金氏亦既自知之矣通者援章句自脩之首四字以合於饒氏誠意不特為正心之要之説亦似矣殊不思饒氏何嘗以朱子之説為是耶觀其謂首字不若要字之言可見章末潤身心廣之證亦本饒氏皆未得為的論也獨通者格物致知兩者實是一事故統作一傳之言近之惜其不能推此以究其義也愚嘗以為傳自五章釋八條目八條目之中格物致知只是一事故經不曰欲致其知者先格物而曰致知在格物便見此二條目與正心修身修身齊家齊家治國治國平天下二事相因者不同格物即所以致知所謂纔明彼即曉此此合内外之道是已然則第五章釋格物致知與第六章釋誠意皆是一章釋一事所以然者以二事用功之不易也章句曰第五章乃明善之要第六章乃誠身之本詳此則二章皆是一章釋一事之意可見語錄以第五章為夢覺闗第六章為人鬼闗又為善惡闗詳此則此二事用功皆不易之意又可見矣自正心以至於平天下皆一章兼二事釋者以物既格知既至意既誠之後循序漸進用功為易耳語錄以為過此兩闗夢覺人鬼上面工夫一節易如一節了詳此則自正心以至於平天下用功為易者信矣然則六章之傳釋條目者前二章皆一章専釋一事以其難也後四章皆一章兼釋二事以其易也下過如此而已不知識者以為然否章句誠其意者自修之首也饒氏謂首字不若要字言修身正心其要只在誠意意既誠則心自正身自修又謂誠意正心脩身不是三事云云三事只是一串又謂誠意之外别無正心修身工夫首字不若要字之説正如中庸鬼神章包字不若貫字之説要字貫字自是雙峰意如何亦欲朱子從之雙峰意既誠則心自正身自修與誠意正心脩身不是三事三事只是一串及誠意外别無正心脩身工夫之説辯則辯矣新則新矣其如經文欲脩其身者先正其心欲正其心者先誠其意與意誠而后心正心正而后身脩這數句何經文明有三節工夫而雙峰强説誠意外别無正心脩身工夫經文明説而后心正而后身脩雙峰强説意既誠則心自正身自脩然則經何以不曰意誠而后心正身脩欲脩身正心者先誠其意耶經文分明分别作三事如此而雙峰强以為不是三事只是一串何耶朱子嘗言序之不可亂功之不可闕如雙峰説則序皆可亂功皆可闕矣雙峰勇於背朱子而不思經文之序本不可亂經文之功本不可闕非朱子創為之説也以經證傳以傳釋經則雙峰之謬誤不難見矣小人閒居為不善通謂傳末長國家而務財用之小人即此閒居為不善之小人也輯釋亦引此説小人固無二小人但此二章所言一為自脩者之戒一為用人者之戒以為彼小人即此小人則非傳者之意也傳之七章心有所忿懥恐懼好樂憂患則不得其正章句蓋是四者皆心之用而人所不能無者然一有之而不能察則欲動情勝而其用之所行或不能不失其正矣饒氏謂忿者怒之暴懥者怒之留恐懼好樂憂患與忿懥為類蓋亦指其情之偏重者而言也問章句謂是四者皆心之用而人所不能無如何饒氏曰忿懥是不好底因此一件則知下面三件皆指不好底説按章句云忿懥怒也夫怒所當怒亦未可便謂之不好唯雙峰以怒之暴怒之留釋之然後二字乃不好耳愚嘗徧考字書並無以暴留之意釋忿懥之義者然則雙峰暴字留字之意得非本語錄忿又重於怒與忿懥是怒之甚者二句而言乎然暴留二字與甚重二字之義不同重與甚是因事有可怒之甚者怒之不得不重未害其為心之用也若暴則必至於虐物留則滯而不化皆過其則而不中其節非所宜有也雙峰若别無所據但因語錄而推之如此則不若但依章句平説為怒之得也蓋是四者皆心之用今因説忿懥一事作不好而并與恐懼好樂憂患三者皆以為不好厎而又不能明言三者所以不好如忿懥二字之故則何以使讀者之無疑哉豈若朱子只輕説忿懥則四者皆不能無但不可有之於心之為得乎况傳文不但曰有忿懥等而必曰有所以有所二字觀之則章句之㫖似無可疑又按金氏祖饒氏意併以恐懼好樂憂患三者皆連二字言之為不好之證通亦從而和之然則中庸恐懼不聞孟子生於憂患亦連二字言之則何以分别其好不好耶語錄大學七章看有所二字有所憂患憂患是合當有若因此一事而在胷中便是有有所忿懥因人之有罪而撻之纔撻了其心便平是不有若此心常又不平便是有恐懼好樂亦然按七章四言有所八章五言之其所所之一字皆是指物之辭蓋人之一心未有事之前事已過之後皆當湛然虚明則不滯於一隅不偏於一事所以事至物來隨感而應無有不得其正者矣今乃於未有事之前或事既過之後其實未有事之前又是前一件事既過之後非有二也而有所忿懥等焉則是滯於一隅偏於一事當虚不虚當無而有而心之本體自有所慮矣宜乎及有當應之事以此先有所主之心應之鮮有不失其正者也故語錄云有所字正指所憂患之事所忿懥之物而言以其滯而不化不當有而有故皆以有所言之耳心不在焉視而不見聽而不聞食而不知其味章句心有不存則無以檢其身是以君子必察乎此而敬以直之然後此心常存而身無不脩也饒氏謂此以心不在明心不正之害心不在未便是心不正視不見聽不聞食不知味未便是身不修傳者欲借粗以明精心不在則無知覺以為一身之主宰而視不見聽不聞食不知味矣况心不正則無義理以為一身之主宰亦何以視所當視聽所當聽食所當食而無不脩乎輯釋諸編皆引此説按語錄問心不在只是説知覺之心却不及義理之心曰纔知覺義理便在此纔昏便不見了此言可謂至矣讀者更以孟子告子上篇牛山之木章語錄及中庸章句序之意參之愚已於孟子備述之則朱子之意顯然可見矣况在之為正訓雖殊而歸則一朱子於孟子求放心處以昏昩放逸為言昏昩是知覺上説放逸是就義理上説昏昩則失其知覺而無以為燭理之本放逸則徇物於外而不能為應事之主必兼此四字而後可以盡心不在之義而心不正者亦不外是矣饒氏以釋氏常惺惺為心在而不正之證則是但以昏昩為不在而不知放逸之乃所以為不在也泛而觀之昏昩放逸雖若二事合而言之則未嘗不相闗也何則知覺雖不昏昩然苟為不在理義之中則一有可徇之欲必將徇之以放逸於外而嚮所謂知覺之不昏昩者亦不過但能不昩於所徇之欲而於其他當應之事反昏昩而不知矣謂之在可乎蓋嘗合朱饒之説而觀之則知雙峰但以知覺不昩為在却以義理無失為正如此則正與在為二而正又在乎在之外雖不正亦可以為在矣殊不思義理有失便是徇物放逸於外又可以為在乎朱子則以知覺既不昏昩又能居中後物嘗在義理之中而不徇物以放逸於外者為在如此則在外無正不正不足以言在矣姑以世人之心言之彼其喻於利者雖刀錐之末亦皆毫分縷析無有或遺如此者不可謂其知覺之不在也然心不能以役物反為物所役不免逐物於外謂之在可乎雙峰惑於知覺不昩之似乎在而許之乃不察其不免逐物於外之實不可以言在也遂疑在與正之有二毋乃未好樂憂患焉則如鑑未照而先已不空衡未稱而先己不平矣豈非體有所累而失其正乎所以至有當應之事以此先有所主之心以應之或當怒者倍怒當喜者不喜或當恐者倍恐當好者不好喜怒憂恐不重即輕如鑑先不空以照則妍醜不得而明衡先不平以稱則輕重不得而定豈非用有所偏而失其正乎由此觀之則有所忿懥四者是心之體失其正處四言則不得其正是心之用失其正處通不如此看而交互差失惑人甚矣讀者詳之叢説前言心不正是心雖在此所應事上而情之用不當或以怒而應當喜者或以樂而應當哀者後言心不在所應事上謂身心全不相闗通引方氏曰上一節説有心者之病此一節説無心者之病上一節説心不可以有所主此一節説心不可無所主不可有者私主也不可無者存主也心在則羣妄自然退聽心若不存一身便無所主宰然則中虚而有主宰者正心之藥方也按二説極當深可以破饒氏之謬故錄之以備參攷饒氏謂七章章句章句註文似可省按饒氏自謂正心修身二章工夫皆在誠意章故如此説然經言欲正其心者先誠其意意誠而后心正故與章句之意無異章句自援經文以貫傳義甚為的當饒氏奈何欲教玉人雕琢玉而省此不可省乎傳之八章饒氏謂此皆是説尋常人有此病痛似不必將傲慢做合當有厎因敖惰而廢親愛等四者與説忿懥不好之意同知彼則知此矣但雙峰此段議論極詳大抵皆是諸子之所已破讀者攷之或問語錄足矣正不在於後學之有辯也章句之猶於也饒氏謂之者心之所之也是向之意本不可訓於但於於字相近故曰猶於也雙峰惟如此説之字故以五者皆不可有竊意若改而辟焉之而字為則字乃可如此説耳饒氏謂七章言心有所忿􅓰等則不得其正而不言所以正之之道八章言人之其所親愛等則流於辟而不言所以脩之之方夫有是病必有是藥今詳此二章詳於論證而畧於處方蓋心與身一物也而心為之主意與心一事也而意為之機故傳釋誠意一章首之以毋自欺申之以謹獨以明用功之要莫切於此故終之曰徳潤身心廣體胖故君子必誠其意所以著意誠則心正身脩之要也雖然不特正心脩身為然由是而齊家治國平天下無往而不自慎獨出也故齊家治國章曰心誠求之平天下章曰必忠信以得之曰誠求曰忠信皆誠意慎獨之意也輯釋亦引此意有心術之病有事為之失心術之病惡也先儒所謂縱有善亦是黒地上一㸃白是也事為之失過也先儒所謂縱未有善亦是白地上一㸃黒是也然則意不誠則好善不如好好色惡惡不如惡惡臭甚則至如小人陰惡陽善者之所為此蓋心術中之病非過也惡也惡則治之也難故必毋自欺必慎其獨而後意可得而誠不然則陷於小人之域矣然意既誠矣固無為惡之事然於善之中未可保其無所偏無所辟也此所以雖曰實好善實惡惡至於心之應事猶或至於有所忿􅓰等而不得其正者亦有心雖已正至於身之接物猶或至於之其所親愛等而辟焉者然雖未免有所偏辟亦不過於善之中有偏辟耳無所謂惡也然不謂之過則不可過則改之而已所以知其偏則使之不至於偏知其辟則不可使之辟足矣無所偏辟則善之至矣又何方之可處哉蓋大學之教必須逐節用工夫隨地致力不可謂意既誠則心自正身自脩誠意之外他無正心脩身工夫而混然不為之界限也若果如所説則大學只列六條目足矣又何必虚設正心脩身二條目於其間而實無所用之功哉心廣體胖自是形容徳潤身之氣象蓋意誠則真惡惡實有善而可以言徳矣亦所以明誠意為自修之首之意非謂工夫止於如此也但誠意正心脩身三者折而言之則自當有序合而驗之却不可以為截然不相入故日用之間念慮之萌動處便須審其實與不實此便屬之誠意心之與事應處便須審其正與不正此便屬之正心身之與物接處便須審其辟與不辟此便屬之脩身其工夫並行而不可偏廢有似於無二致耳實則界限不相侵越而不可亂也何可因其似於無二致者遂謂慎獨一言足以盡三者之工夫而紊其不相侵越之界限哉况如其言以為自正心至平天下皆無往不出於慎獨則謂正心以下論證而不處方可也自齊家以下諸傳又何為既論證而兼處方也哉借曰誠求忠信即慎獨之意則正心脩身兩章獨不可一言及之如此乎此愚所以不能無疑於雙峰之説也雙峰之説四書通𤼵明皆引援而祖述之故辯之不得不致其詳云傳之九章如保赤子語錄孝弟鮮能守而不失惟保赤子無有失者故特即人所易曉者以示訓與孟子孺子入井之意同叢説前言孝弟慈而此獨就慈上言者蓋治國是上之撫下故專就愛民處言按叢説雖於章句之旨有所未盡於語録之論㣲有不合然亦似乎有理姑備一説竊意事親孝故忠可移於君若自為君者則誰為忠乎事兄弟故順可移於長若自為長者則誰為順乎故孝弟則專為為臣與在下位者言之唯慈使衆可以通為君臣言之故專以此示訓耳未知然否一家仁讓一人貪戾饒氏謂仁讓是本上文孝弟而言仁屬孝讓屬弟貪戾是本上文慈字而言貪戾者慈之反也孝弟是專主事親事長而言仁讓則通主待人接物而言若以為仁屬孝讓屬弟則一家之人父兄亦自在其中為父者誰為孝為兄者誰為弟乎貪戾二字恐便是仁讓之反貪則不讓戾則不仁貪戻亦通主待人接物而言非如慈之專主慈㓜言也以為慈之反恐亦未必然近見盧氏亦有貪則不讓利則不仁之説乃知固有先得我心之同然者非私言也有諸己而后求諸人無諸己而后非諸人通引王氏曰張子所謂以責人之心責己則盡道是也此意雖相似而所主則不同大學主治人者言張子主自治者言不可不辯也傳之十章上恤孤而民不倍章句倍與背同案章句不釋不倍之義説者皆以為下民不倍在上者慈㓜之心而已雖亦可通竊疑孝便是老老意弟便是長長意不倍作下民不倍上心説却與恤孤之意不類文須轉摺方通不知如何愚嘗聞之先師冰壺鄭先生曰坊記有利祿先死者而後生者則民不偕與以此坊民民猶偕死而號無告之言鄭氏注云死者見偝其家之老弱號呼稱寃無所告而韻書背偝倍皆同音義則不倍正是恤孤之意豈章句以其易曉故不釋之耶抑但如説者所云耶姑記所聞以俟知者絜矩通謂夫子十五志學即此所謂大學之道志學以下分知行到末節方言不踰矩是生知安行之極致格物以下亦分知行到末章方言絜矩是致知力行之極功乍看論語矩字似説得精絜矩矩字似説得粗要之只是一箇矩字但不踰矩矩字是體絜矩之矩是用輯釋亦引此説竊意論語矩字是就徳上言是義此矩字是就政上言是怒義與恕要之皆是用恕乃所以為義也今以彼為體此為用似有可疑况彼章知行之分與此處分知行者不同彼處知行當於此知行上横貫過夫子十五志學是知之始此便是於八條目一一攻究了不是只從事於格物致知二者而已也立與不惑以下皆然若以為只是一箇矩則夫子未七十時若為政於天下猶未有絜矩之體耶觀二矩字一言不踰一言絜便見聖人學者之分若以彼為此體此為彼用恐皆鬭凑不著又以不踰矩為生知安行之極致既曰志學則下生知字不得觀集注於耳順處只説知之之至而不説生而知之可見絜矩通䂓矩皆法度之器也此獨曰矩者規圓矩方圓者動而方者止不踰矩即是明明徳之止於至善絜矩即是新民之止於至善輯釋亦引此説陳公潜先生謂通謂矩方而止以强附於止至善之止尤為無理矩取方義不取止義也所惡於下云云章句則身之所處云云而無不方矣饒氏謂方字恐未安絜矩之喻取其平非取其方也方字於矩字之義為切方則天下自平恐亦無所謂不安也好惡通好惡二字已見誠意脩身二章特誠意是好惡其在己者脩身章推之以好惡其在人者此章又推之以好惡天下之人者也云云輯釋亦引之好惡雖只一般然三章所言各有所指傳者初無相承之意通者强合之以為説不過只是蹈襲雙峰誠意為下五者之要之言爾此皆所謂詖辭也自特誠意是好惡其在己者以下則皆所謂遁辭也雖若可通實非傳意亦不足深辯也見賢不能舉云云饒氏謂過之罪小命之罪大如漢元帝知蕭望之之賢而不能用知𢎞恭石顯之姦而不能去是也舉賢退不善二事常相因能用賢必能去不善不能去不善必不能用賢書曰用賢勿貳去邪勿疑可見二事不可分輕重若以元帝事證則其不能用望之却由其不能去恭顯况望之之死又出於恭顯之讒豈可以過之罪為小於命哉忠信以得之饒氏謂忠信即是慎獨以此觀之可見誠意不特為正心脩身之要而又為治國平天下之要輯釋亦引此説謂意既誠後下五者工夫自然易則可謂五者工夫皆不出於誠意則不可且如忠信固不可不慎獨能慎獨固能忠信但遂以忠信為慎獨則慎獨恐該忠信不盡當更詳之君子有大道章句道謂居其位而脩己治人之術也饒氏謂大道乃絜矩之道章句兼體用説饒氏只就用上言以上文先慎乎徳之意推之則章句之説有據孟獻子通發明輯釋皆引盧氏曰獻子嘗師子思能知義利之分故能知絜矩之道獻子在前子思在後以為獻子嘗師子思不知何據豈傳寫之誤耶必自小人矣金氏曰彼為善之上下必有缺文當作彼為不善之小人與下文雖有善者亦相對通曰誠意章曰小人閒居為不善故此章曰彼為不善之小人前後正相對陳公潜先生曰小人雖一般但誠意章為不能慎獨言之以為學者之戒此章為理財言之以為用人之戒初未嘗有意於相應也且朱子謂疑有缺文誤字正不必添一不字以强合於為不善之語也愚謂如金氏之言始備一説猶未甚害通但不當蹈襲而質言之以牽合乎誠意章小人閒居為不善之意爾此亦本雙峰誠意為下五章之要之説而言也全章之旨𤼵明南山有臺詩好惡此言絜矩以用人之事節南山詩言不絜矩而所用非人又於或問申其説曰好惡宜專就用人説按好惡所該甚廣用人亦其一事耳章句但言以民心為己心固不直指所好惡者為何事或問則以好其所好而與之聚惡其所惡而不以之施而究其義蓋本孟子所欲與聚所惡勿施之意為説可謂至明白矣𤼵明必以用人實之疑非傳文本意竊詳此章除首二節𤼵出絜矩之名義外其下三引詩姑以明能絜矩與不能者之得失以起下文財用用人二者能絜矩與不能者之意末又以理財不當用小人者而總結之下文既皆以二事分合言之不應南山有臺等三詩獨偏舉用人一事以𤼵之也蓋用賢固是民之所好上不外本内末使民有以為仰事俯育之資亦豈不是民之所好用小人固是民之所惡苛征重斂使民無以為仰事俯育之資亦豈不是民之所惡然則正不當專指南山有臺節南山之好惡為用人而言也讀者但當熟玩章句或問語錄之意則𤼵明之説未為的當可知矣章末章句讀者不可以其近而忽之也通曰纔有忽心便是不敬朱子曰敬者聖學之所以成始而成終者也欲學大學者可須臾毫釐之不敬哉陳公潜先生曰按章句所謂忽恐學者以其書為淺近而忽易讀過不加深體力行之功耳而通釋為敬引聖學成始成終之語聖學之敬不但主於讀大學一書而已也四書管窺卷一
