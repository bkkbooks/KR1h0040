body:
  text: 欽定四庫全書四書管窺卷四元史伯璿撰孟子梁惠王上首章仁義集註仁者心之德愛之理𤼵明或疑朱子仁字之訓孟註先言心之德語註先言愛之理何也諸葛泰之曰語之為仁猶曰行仁以仁之用言故先言愛之理孟子此章以仁之體言故先言心之德考證此章從全體上説故首曰心之德論語是從孝悌上説故首曰愛之理輯釋亦引諸葛氏説二説微異當以考證為優萬乘千乘百乘集註乘車數也萬乘之國者天子畿内地方千里出車萬乘千乘之家者天子之公卿采地方百里出車千乘也千乘之國諸侯之國百乘之家諸侯之大夫也纂疏趙氏謂古者方里為井四井為邑四邑為丘四丘為甸甸六十四井五百十二家通出兵車一乘天子畿内方千里提封百萬井除山川溝壑城池邑居園囿街路之屬定出賦六十四萬井兵車萬乘故稱萬乘之國天子之公卿采地不過方百里出賦六萬四千井兵車千乘故稱千乘之家諸侯大國不過百里出賦六萬四千井兵車千乘故稱千乘之國諸侯大夫采地其大者亦出賦六千四百井兵車百乘故稱百乘之家按論語道千乘之國章輔氏引古註馬氏之説曰司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成一甸之地方八里旁加一里為成故成方十里成出革車一乘然則千乘之賦其地千成司馬法又有成十為終終十為同同十為封之言此説畧之其實千成即一封之地也居地方三百一十六里有畸此即一封之地惟公侯之封乃能容之包氏曰千乘之國百里之國也古者井田方里為井井十為乗百里之國適千乘也馬依周禮包依王制朱子或問謂二説疑馬氏可據且謂其與孟子王制不同疑孟子未嘗盡見班爵分土之籍特以傳聞言之故不能無少誤王制非三代之書亦不足據今按孟子集註自千乗以下似皆與包氏合者葢孟子荅北宫錡之言如此也集註但以孟子解孟子故不得不如此趙氏亦只因集註而發明之本無可疑但其計井出車又是馬氏之説故其説施於萬乗之國則可通施於千乗百乗則有所不通矣葢計井出車如趙氏所推則一成之地定出賦六十四井兵車一乗惟方千里之國則方百里者百方十里者萬方出得兵車萬乗方百里之國則惟有方十里者百定出賦只有六千四百井耳如趙説僅可為諸侯大夫之采地而已趙氏乃為百里出賦六萬四千井兵車千乗可謂誤矣不思六萬四千井乃是千成之地所出也愚嘗謂包氏馬氏二説雖不同然施於孟子則皆有所不通包説於百里之國雖可通於千里之國則有碍馬説於千里之國雖可通於百里之國則有碍何則包以十井為乗百里之國居地萬井故出車千乗然千里之國則方百里者百居地百萬井當出車十萬乗今却千里止出萬乗是包説施於千里之國則出乗過多而不可通也馬以六十四井為甸旁加一里為成成方十里出車一乗千里之國則如前所推方十里者萬故出車萬乗然百里之國則止有方十里者百不過出得百乗今百里却當出車千乗是馬説施於百里之國則出乗過少難通也畢竟孟子百里出千乗之説不合於周禮正是朱子所謂不能無少誤處集註但以孟子之言解孟子更不泥於計車出乗之詳故亦不至於抵牾趙氏不思百里出千乗之説為包氏之言却又以馬氏之説計井出車此所以不覺其誤今通證中所引司馬法之説甚明顯見趙氏之誤其里數同異之説更於告子下篇魯使慎子為將軍章詳之移民移粟章五畝百畝考證古者六尺為步步百為畝然尺有數等周尺以人中指中節為寸人有上中下不同則以中人為度一尺約當今浙尺八寸則百畝無多當别自有地尺若衣服針灸則以人尺為度爾竊嘗有疑於古今尺度長短之不同先儒之説有周尺又有古尺有浙尺又有今尺大抵莫短於古尺莫長於今尺而周尺浙尺則又每加長焉此外又有不同之尺不可盡數但今所見者官尺民尺耳不知此二尺較之先儒所論又當屬何尺也先儒謂古尺當今尺五寸五分竊嘗以是推之今尺或官尺周尺或民尺耳葢今之民尺亦可當官尺六寸許考之經史所言似皆與民尺合者論語言六尺之孤家語言七尺之軀葢人以七尺為中則六尺乃是幼弱可知孟子言五尺之童又言文王十尺湯九尺漢史言項羽八尺二寸韓信八尺三寸皆是以長短之相懸者言然亦不過如此而已若以為如今官尺則湯文安得有許長五尺六尺不得為童幼矣若以古尺當今民尺五寸五分則湯文羽信反短於今之中人童幼又過於短矣古今器物有變不可為據惟人身長短宜不相遠以此考之則周尺宜與今之民尺不多爭但雜書或有存古時尺樣者又皆只有民尺五六寸許不知如何考證疑地尺當長恐亦以雜書尺樣意之也若以古尺與今民尺不多爭者言之則似不必如此疑矣今田以二百四十步為畝猶不滿民尺之數則百步之畝亦豈别有地尺哉其以中人中指中節為寸却正與今民尺寸合亦可見周尺之與民尺不甚相遠矣寡人願安承教章作俑𤼵明作俑者殺人徇葬之漸孔子惡之者以此輯釋亦引此説竊詳經註之意皆只以為俑太似人而葬之為不仁而可惡葢以似人而葬之猶且見惡者以甚使生民飢死者之尤可惡乎若以為殺人之漸而惡之則孟子之言為無味矣檀弓曰不殆乎用人乎哉亦以其太似人而用之以殉故云爾非以其為殉之漸而惡之也見梁襄王章定於一叢説一謂統天下為一家正如秦漢之制非謂如三代之王天下而封建也此孟子見天下之勢而知其必至如此云云至秦漢孟子之言即驗考證亦如此説按栁宗元封建論亦如此見胡氏非之朱子採其言於綱目未嘗不以封建為聖人制治之要道也孟子之見宜亦不當出此竊以孟子告公孫丑慎子之言推之亦略可見其曰夏后殷周之盛地未有過千里者而齊有其地矣地不改闢矣推此則謂其知統天下為一家如秦漢之制者殆不其然其曰周公之封於魯儉於百里今魯方百里者五子以為有王者作則魯在所損乎在所益乎推此則謂其知統天下為一家非如三代之封建者恐亦未必然也況井田封建二法相因當時井田之法亦已漸壞孟子豈不能知其有開阡陌之勢然而孟子之論王政未嘗不以經界為急而不聽其自壞以此推之使孟子得行其志又安得聽封建之自壞而因陋就簡僅為秦漢之自私而不復三代之公道哉然而孟子毎言井田而未嘗一言及封建者此恐别有所見當於離婁上篇首章辨饒氏説處及之外此則先儒之論已詳學者考焉可也齊宣問桓文章方千里者九𤼵明千里者九齊楚燕秦趙魏韓宋中山之九國也輯釋亦引此説千里者九意者只大槩説𤼵明以九國為證恐未必然七國大小已自不等宋中山又安得有方千里耶若以九州為證謂齊只有青州之地則庶乎近之要亦不必如此説可也葢亦反其本矣考證王氏曰前本字指本心後本字指王天下之本按集註於前反本下曰反本説見下文遂於下文註曰𤼵政施仁所以王天下之本也又於後反本下註曰使民有常産又𤼵政施仁之本也説見下文可謂至明白矣而考證乃於兩本字如此説葢不以集註為然也按孟子欲齊王反其本心自篇首舉胡齕言以下至君子遠庖厨處反覆詳盡無餘藴矣故其下遂以親親仁民之事告之欲其即此心而推之又反覆詰其所以不能言之故而請王度之也前是體察後是推廣所以𤼵明本心者已盡此自因上文以若所為求若所欲必不可得説下來遂以反本開導其行仁政故下文遂言𤼵政施仁之效以實之集註之言斷斷然不可易矣章末𤼵明引張氏曰孟子如對鴻麋之問及對好樂好色好貨皆徐徐引之當道至於利國之問則應之以何必曰利桓文之問則對以無道無𫝊論管晏則曰管仲曾西之所不為言交兵不利則曰號則不可又何嚴也葢前數章者一病為一事耳至於霸者功利之説則大體一差無往非病故闢之不可不嚴輯釋亦引此説此説固為有理竊意前數者齊梁之君已自知其事之未善故孟子不必更闢其事之不善但徐引之當道足矣後數者則齊梁之君及公孫丑宋牼輩皆不知其事之不善或反以為當然而責之孟子故孟子不得不正誼明道以闢其失梁惠王下首章樂樂集註下字音洛考證俗讀皆然但以語意則上字當音洛葢娱好之也猶云獨娱聽樂音與人娛聽樂音孰為歡樂下二句同如集註音則三樂字義與意皆同下一樂字又承上二樂字言之如考證音則三樂字有二意雖亦可通不如且依集註之順交鄰國章集註字之事之考證小事大大字小左傳凡兩出孟子竝作事而集註解事小為字者本古語也然仁人之心既忘己之强大人之弱小雖曰字之其交際往來與事大亦無異故俱作事雖若事之然與小事大之事不無分别則其實不過字之而已雪宫章孟子對曰有𤼵明輔氏欲讀有字為一句南軒讀有人不得則非其上矣為一句竊意當以輔説為正孟子中以有字自為句者有數處晏子考證此章純用晏子言後篇公孫丑竝言管晏而下止言管仲不言晏子葢孟子未嘗不重晏子也叢説後篇丑問管晏孟子獨鄙管仲者晏子之才能功烈皆非仲比管仲輔桓為五霸首尤天下所共宗仰故孟子惟斥管仲按二説不同當以叢説為正竊意孟子亦未嘗有意於輕管仲也觀其意曰論天降大任於是人而以管仲與大舜傅説竝稱則固未嘗輕管仲不如晏子也人徒見孔子之於管仲既稱其仁又大其功而孟子則卑其功烈以為曾西之所不為遂以為孟子之論毎毎不同於孔子也殊不思孔子稱之是為由賜但知其有不死之罪而不數其匡合之功故言其有功無罪者以釋二子之疑耳孟子鄙之是因公孫丑但知大其功而不復知有聖賢之道反欲孟子效之故卑鄙其功烈以破丑之惑使知有王道之大耳聖賢氣象固有不同夫子亦未嘗不小管仲之器也及或人意其儉與知禮則夫子斥其奢僣之失曾不少恕又豈夫子先後所言自相戾哉亦不過因或人由賜所見不同而告之亦不同耳意者孔氏之門若有欲學為管仲之事者夫子亦未必無以曉之況若望夫子自為管仲之事則夫子宜必有以斥其失矣不獨孟子為然也葢孔子之時人心之義理猶明或人雖不能知仲之失由賜之徒則知之矣孟子之時功利之溺人也深門人如丑者猶不知之他人尚何望乎不然孟子豈但知仲之過而不知仲之功哉毁明堂章耕者九一集註九一者井田之制也云云是九分而税其一也饒氏謂耕者九一是以民之所得者言謂九百畝中得百畝非説賦税若説賦税則是什一下文世祿亦是指士之所得言九一是助法十一是貢法今集註釋九一為井田之制則是助而非貢明矣雙峰只因與世祿對言遂以九一為民之所得殊不知孟子亦只以井田形體之大槩而言則中百畝為公田者恰是九分中之一分若夫以二十畝為廬舍者則未暇細論之耳且果如雙峰所言則請野九一而助國中十一使自賦又當如何分别耶澤梁無禁集註澤謂瀦水梁謂魚梁與民同利不設禁也輔氏謂澤梁不禁至周禮則山澤皆有厲禁亦禁其暴殄天物者而使取之以時而已𤼵明引陳潜室曰關市不征澤梁無禁乃王道之始成周關門市㕓皆有限守山林川澤悉有厲禁乃王道之成按四書通於上篇移民移粟章辯陳氏之失曰殊不思集註於此政以厲禁為王道之始葢所謂山林川澤與民共之即是澤梁無禁無禁者愛民之仁也雖無禁而有厲禁又王者愛物之仁也周官三虞掌山林之政令物為厲而為之守禁註毎物有藩界也以是觀之澤梁無禁者不禁民之取而有厲禁者禁民不以時取也竊詳陳氏之説通所以辨之者甚當而𤼵明不免取之於此則通與𤼵明之優劣葢有不待辨而決者若輔氏以澤梁無禁之禁與民皆有厲禁之禁混而言之亦欠分明愚則以為無禁而有厲禁王道之始固如此王道之成亦未嘗不如此諸儒强欲以此分王道之始王道之成此所以不得其説也讀者詳之語錄孟子荅梁惠王問利直掃之此處又如此開導之何也葢此處亦分義利人自不察耳𤼵明對利國之問甚嚴而此諸章甚婉者法語之言不嫌其嚴巽與之言不嫌其婉前篇卒章之末張氏嘗辨及此愚亦附以臆度之見矣請申其説葢惠王於見賢之初𤼵何以利吾國之問是以利國之事責之孟子而不自知徇利之為非也故孟子不得不直掃之宣王於言論之際自以好貨為疾而無隱於孟子則非梁王不知徇利為非者之比矣故孟子不可不有以開導之也梁王知有利而不知有義宣王非不知義之為是利之為非者特私欲之蔽未能自充耳餘則語錄精矣𤼵明以法言巽言為分别葢本論語集註之意而言也論語法言巽言之義難分别故集註以孟子所言證之至矣為𤼵明者正當於此分别孟子何故以法言對利國之問却以巽言對齊王諸章之言以曉學者可也今乃但援法言巽言為説則何以異於無星之秤無寸之尺乎所謂故國章集成輔氏謂先儒皆以如不得已一句連下文説言不得已則將使卑踰尊疎踰戚故不可不慎雖若可通云云且下文但言因國人之言自察其賢否而用舍之亦未嘗言其不得已之意故集註直以如不得已一句連上文説云云故於下段結之云所謂進賢如不得已者如此通謂輔説甚善但曰下文言用舍處未嘗言其不得已之意則與集註下段結句又自相反耳按先儒以如不得已連下文則如為設或之義與如或知爾之如同而不得已為真有所不得已集註以如不得已連上文則如為如似之義與如切如磋之如同而不得已非真有所不得已也輔氏謂下文未嘗言其不得已之意但言不得已而不言如葢謂其無真不得已之意可見先儒之説不然耳集註下段所謂進賢如不得已者如此之言言不得已而又言如葢謂其謹之之至如此爾非謂其真有所不得已也通者謂其相反是不詳如字之義不同與有如字無如字之意亦不相似也為巨室章通與𤼵明引饒氏之説曰前譬是説任賢不如任匠後譬是説愛國不如愛玉輯釋亦引之前是以大木譬賢人所學者大以匠人斵而小之譬王之欲賢者捨所學而從我以此觀之前譬乃是用賢不如用木耳葢孟子既曰以為能勝其任又曰以為不能勝其任不是説求得大木為工師能勝其任斵而小之為匠人不能勝其任正是言木大則可以勝大屋之任猶賢人所學者大則可以勝治國之大任斵而小之則不可以勝大屋之任猶賢人捨其所學則不可以勝國家之大任也雙峰正是以勝任不勝任屬之匠者所以致誤殊不知孟子只是以匠譬王工師得大木是譬王之求得賢人也匠人斵而小之是譬王不能用賢人之道也後譬則自如雙峰之説伐燕章考證王氏曰取之勿取正論也言武王文王則贅矣孟子之言句句是實事武王文王之證自是以聖人為凖則以示齊王在於繹其微意之所在不以辭害意可也奈何以察識之不易而遂以為贅乎鄒與魯閧章集註范氏曰云云是以民親愛其上有危難則赴救之如子弟之衞父兄手足之捍頭目也穆公不能反己猶欲歸罪於民豈不誤哉通謂穆公歸罪於民是責子弟之不能衞父兄手足之不能捍頭目也殊不知父兄之愛子弟頭目之顧手足者其常也子弟之衞手足之捍則於其時之變者見之穆公不能責己之失其常者而責民之不能應其變者有是理哉穆公之歸罪於民是責民今日之待己不如子弟之衞父兄手足之捍頭目然也穆公之不能反己是不思己前日之待民未嘗如父兄之愛子弟頭目之顧手足然也通之意亦如此而措辭未瑩乃若父兄子弟手足頭目自相責然者讀者不以辭害意可也不然天下豈有不衞父兄之子弟不捍頭目之手足耶公孫丑上首章曾西或人問荅集註引楊氏之説考證楊氏説未盡此章之意夫曾西言子路則曰吾先子之所畏至論管仲則曰得君如彼其専行政如彼其久功烈如彼其卑此正以作用優劣言也以作用之優劣言則管仲之功業遠不可望子路何者仲之所以霸不過富國强兵而已夫治千乗之國夫子之許子路與子路之自許無異也且千乗之國又攝乎大國之間師旅饑饉貧弱垂亡子路起而為之比及三年而能使之有勇則其於富强乎何有且知方也則加於富强一等矣使子路得乗千里之全齊其視管仲真不足道矣大抵聖賢作用自是殊絶世衰道微聖賢不用世人但見霸者小小功業即以為大至論孔門諸子則或但以為循良自守而已真世道之不幸也孟子荅任人禮與食色輕重之分集註以為聖賢於此錯綜斟酌毫髪不差愚於曾西之言楊氏之説亦云嘗謂聖賢之道猶金也霸者之功猶鐵也以大分言之則金鐵之不同貴賤不在言矣然二者之中又各有輕重多寡之差不可不錯綜斟酌以平其價也葢聖賢之道盡其全體大用如孔顏孟氏者是乃所謂兼金而萬鎰者也子路之學固亦金矣然强其所不知為知則知有未至也行詐欺天則意有未誠也以正名為迂則於平治之道猶有所未盡也然則其金之分固未可以萬鎰許之也觀夫子於顏子則於治天下之道告之於仲弓則以南面許之於由求則不過許以可使治賦為宰而已其分量固有不同如此柰何纔及聖門學者不問高下例以伊周事業期之與所以期孔顏者皆無異哉霸者之功誠鐵矣楚莊宋襄之輔功無足紀為鐵固亦不多管仲九合一匡之功則其為鐵既多且重價亦不貲未易以一鎰二鎰之金凖其直也子路於其所為固有不屑然管仲才智所就則亦恐非子路所及曾西卑其功烈亦是卑其霸功而非王道云爾若如考證之論則曾西既自羞比管仲遂謂匡合之功西所易能可乎西亦不過自以仲尼之徒故羞比霸者之輔初亦不以作用優劣較也合而言之則曾西畏子路而羞管仲者就金鐵大分而别其貴賤也楊氏言子路於管仲之功有所不逮者因其金少鐵多而錯綜斟酌以平其價也夫子之許子路與子路之所自許是量其所堪之才也考證所謂子路乗千里之齊則視管仲為不足道是論其所乗之勢也夫不論其在己之才而論其所乗之勢則夫子用人為不能盡子路之才而聖賢事業不由於己而由於外矣愚則以為以學言則子路非管仲所可同日語以才言則管仲之功子路固有所不逮葢路之學出於正道仲之才優於霸術故也或者猶疑孟子言文王由方百里起是以難孟子因齊有其地則王猶反手謂聖賢皆無所賴於所乗之勢不可也是不然自聖賢力量有餘者而言則所乗之勢有小大固不能無難易之異若力量未至乃但欲大其所乗之勢以幸其功之速成政恐用過其才勢大反為所累如黄霸長於治郡及為相功名反損者矣昔高祖韓信論用兵信以高祖不過將得十萬信則多多益辦自常情不知兵者之見未必不以為信善用兵則雖兵少亦可制勝方見不可及處高祖用兵不如信非得兵多則不可以成功殊不知信善用兵則兵少兵多皆可以成功但得兵多則制勝為尤易亦猶聖賢力量有餘又得所乗勢大則功成為愈易耳高祖用兵不及信則用過十萬節制無方兵多適為所累又豈能成功亦猶學者力量未至但欲大其所乗之勢則不勝任而敗事矣何成功之望哉不知識者以為然否考證於論語四子侍坐章亦如此見愚亦於彼辯之矣參看可也武王周公繼之然後大行集註文王三分天下才有其二武王克商乃有天下周公相成王制禮作樂然後教化大行輯講本文無教化字恐只當接上文德字説蓋文王之時三分有二尚有一分未被其德所以猶云未洽於天下至武王有天下之後周公制禮作樂而殷頑亦率德改行然後無一人不歸是德之中是謂大行德與教化初非判然不相關者德之推則為教化教化之流行即德之流行也若但説德而不説教化則德之所以行者人孰曉其故哉聖賢亦何嘗塊然聽德之自行全不以教化為務耶且雙峰既曰周公制禮作樂禮樂非教化而何又曰殷頑亦率德改行率德改行非教化之行亦何能得其如是哉然則集註固無可疑者矣饒氏又曰文王何可當也一節當分作兩小節看由湯至於武丁以下言武丁所以中興之易紂之去武丁以下言文王所以崛起之難分兩小節亦似是而實不然竊意但通作一節看皆只説文王興起之難自順孟子之意本只謂商家代有賢聖之君已自難變了後來又加之武丁中興故其德澤愈未易衰況紂去之未久故雖暴虐亦未遽至於亡所以文王興起之難耳更以上下文勢參之尤為可見上言天下歸殷久矣下言紂之去武丁未久也正是言其盛久而衰未久上曰久則難變下曰久而後失亦是言其盛久故未易衰衰未久故久而後失皆是反覆𤼵明始焉文王何可當也一句之意以歸重於文王猶方百里起是以難也之意而已分為二節似乎隔斷了文勢不如統看之為順也地不改辟矣民不改聚矣叢説有兩意一説齊地廣民衆地不必更改已自辟民不必更改已自聚矣讀就改字略歇一説地不必再加廣辟民不必再加集聚五字一串讀竊意如前説則二改字甚無意謂當以後説為正夫子加齊卿相章我四十不動心集註四十强仕君子道明德立之時孔子四十而不惑亦不動心之謂通謂孔子四十而不惑在三十而立之後德立而道明誠而明者也孟子所以不動心者先知言而後養氣道明而後德立明而誠者也輯釋亦引此説按語錄黄榦問不動心恐是三十而立未到不惑處曰這便是不惑知言處可見然則不惑不動心理只一般不可因孔孟聖賢之分不同而求其異也葢孔子雖是自誠而明之聖然志學一章自是為學進德之序可言明誠不可以言誠明矣先儒以志學為知之始立為行之始不惑知命耳順為知之至不踰矩為行之至自始至終皆先知而後行何嘗不是自明而誠之事通者只因集註有德立二字使以而立之立牽合互説以為誠明明誠之分殊不思自孔子分上言固當自誠而明自志學與立對言則未可便謂之自誠而明也況以立對不惑而言乃反以行之始對知之明為誠明之序顯見牽合今亦不必細辨但以中庸本文推之於誠則明矣註曰誠則無不明矣非誠而後至於明也又安有十年之漸哉無嚴諸侯𤼵明引饒氏曰惡聲必反不専謂諸侯於褐寛博萬乗皆然輯釋亦引此説按上文不受挫與視刺皆以萬乗褐夫對言意本不在褐夫上但以其輕視萬乗無異褐夫見其勇爾下文無嚴諸侯惡聲當反只為諸侯設葢以諸侯人所共嚴憚者而必反其惡聲則已見其無嚴諸侯之實而褐夫不足道矣諸侯萬乗恐亦非有二義戰國七雄皆諸侯而萬乗者也知言語録向來以告子不得於言謂是自己之言非他人之言此即不得於言註意然與知言之義不同此是告子聞他人之言不得其理又如讀古人之言有不得其言之義皆以為無害於事則不動是矣通謂此猶朱子未定之説也使以此説為定則又失之矣若曰人之言則惟於古人之言有所未達不可舍置而守諸心若今人言之不達於理者不少雖舍置之可也按覺軒蔡氏曰不得於言集註與語録不同豈後語未及改定耶覺軒及門之士猶不敢質言語録之未定況朱子所謂未定之説又正是集註之意則非言此之時集註猶未定也若以集註不從為未定之證恐未的當且如前篇荅滕文公請擇於斯二者之註以權對義而言後語録謂當改義為經後篇道性善註以門人撮其大㫖與序説自著之言不同而皆終於不易凡此之類皆以集註不從為定可乎愚竊以為凡語録之或有異於集註則語録未定集註已定自無可疑若語録提起集註之意以為未當然後説出不同之意者則多是集註已定而猶欠一改者耳若謂不可决然知其孰先孰後則亦當兩存之可也通又以為若今人言之不達於理者不少雖舍置之可也為非人言之證則非也孟子知言正是於人言之是非得失無不究極如因言之詖淫邪遁而知其心之蔽陷離窮却正是於人言之不達於理者而知之何嘗以其言不達於理而不究極其所以非與失哉輯釋於此段語録及通皆不引之者葢以通言為定而遂去之也敢問何謂浩然之氣集註孟子先言知言而丑先問養氣者承上文方論志氣而言也語録向來只謂他承上文方論志氣而言今看來不然乃是公孫丑㑹問處留得知言在後面問者葢知言是後面合尖上事如大學説正心修身只合殺在致知在格物一句葢是用工夫起頭處通曰此段語録亦與集註不同然不比前説知言處人已懸隔也故存之葢謂公孫丑承上文言志氣故且問養氣而後及知言便如大學首章先言正心誠意而後及致知在格物也輯釋亦引此段語録朱子以向來之説今看不然則是集註與語録各主一意從集註則語録為未定從語録則集註為當改無兩從皆可之理通者以其不與集註懸隔而存之則兼備一説可也今乃含糊其説兩可其論既主此而又欲兼從彼政恐未必朱子之本意也考證孟子先言知言而丑乃先問養氣雖因論氣而遽及亦是丑之學未能知所先後也叢説謂集註考證不同竊意孟子亦有此文法滕文公下篇孟子先言出疆必載質後言三月無君則弔周霄乃先問無君後言載質正與此同按考證正與前段語録之意相反恐當以語録為正葢孟子自著此書使果如考證未能知所先後之疑則丑雖失問孟子作書之時豈不能少易其序以開來學乃因其誤而不變耶如此則語録以大學為證無可疑矣又其不然則但以集註為正而以叢説所引斷之可也必有事焉而勿正心勿忘勿助長也集註此言養氣者必以集義為事而勿預期其效其或未充則但當勿忘其所有事而不可作為以助其長乃集義養氣之節度也輯講必有事焉而勿忘勿助長是集義工夫正而助長是要義襲而取集義義襲兩句乃是一段骨子以集義為無益而忘之者不耘苖者也以義襲為心預期其效而助長揠苖者也又謂是集義所生者故當以直養非義襲而取之也故當無害惟其是集義所生者故當心勿忘惟其非義襲而取之故當勿助長考證必有事焉而勿正是集義正而助長是義襲集義義襲是養氣一節大指通𤼵明輯釋皆全引饒氏説通自説見後段按前節是集義所生處集註之末云然則義豈在外哉告子不知此理乃曰仁内義外而不復以義為事則必不能集義以生浩然之氣矣此節集註末云如告子不能集義而欲强制其心則必不能免於正助之病其於所謂浩然者葢不惟不善養而又反害之矣此二條皆以告子為證告子以義為外固不復以集義為事矣則其正而助長又安肯以義襲而取之哉然則以義襲為正助與朱子之意不合一也語録曰助長者無不畏之心而强為不畏之形又曰氣未至於浩然便作起令張主謂已剛毅無所屈撓便要𤼵揮去做事便是助長此二條説助長皆只是氣未浩然便强悍做作自以為浩然了正與後節集註論告子㝠然無覺悍然不顧者相似雖非集義自然生氣之比亦非靠義襲而取於外之謂不過但就氣上做出浩然之形狀而已然則以義襲為正助與朱子之意不合二也前節集註釋義襲之指曰非由只行一事偶合於義便可掩襲於外而得之也此節語録論正助之病曰勿正與勿助長是論氣之本體上添一件事不得此二條説義襲助長意自不同義襲猶是知有資於義者但工夫不如集義之有素故生之無術而不知非襲之可取耳若助長則更無資於義但就氣之本體上强欲增益之而已然則以義襲為正助與朱子之意不合三也愚往年亦嘗有取於雙峰之說後乃疑其不然而無所取正於是徧求語録或問及朱門高弟之所議論皆無與之同者然後反覆朱子之意乃能知其果不相關如此通與𤼵明輯釋盡取其説固為無見考證則勦其説以為己意尤無見而可鄙者也然則集義義襲與正助之形可以異日請即以孟子耘苖揠苖之説喻之葢苖猶氣也耘猶義也譬之有苖於此時時耘之人力無有不至至於日至之時不期苗之長而自長者集義所生之意也未嘗耘之任其自生自長至於久而不長乃一加耘之之工便以為可使苖之長者義襲而取之意也二者雖有常暫之不同然皆有賴於耘有資於義也若助長則更不復有資於義但正之不得便就氣上做出浩然之形狀而已如苖已不復有賴於耘若要其長則但揠之使似乎長而已也以是推之則義襲助長之本不相關者庶乎不難辨矣集成輔氏曰云云又無所作為如正忘助長以為之害考證氣本大而剛順而行以養之勿令有所屈曲愧怍以害之通謂云云正忘助三字相因皆是為害助之害愈甚大抵必有事是集義是以直養正忘助是義襲是害輯釋亦引通説按輔氏以作為為忘以忘為害考證以屈曲愧怍為害通以忘為害以正忘助為義襲皆非經㫖葢屈曲是不直愧怍是非義以為忘則可以為害則不可輔氏所謂作為却是害而又不可言忘通以忘為害亦猶考證與輔氏之病皆不可不察輔氏是偶欠思耳考證與通則皆因蹈襲雙峰義襲為助長之意遂併以忘為義襲與害則又病中之病也何則忘只是忘其所有事是以為無益而舍之者此則全然無所事事了豈義襲之謂況孟子自謂助長以為非徒無益而又害之分明謂忘但無益未至於害助長則又有所害矣今併以忘為害可乎詖淫邪遁通謂集註釋我知言曰識其是非得失之所以然葢上文汎指天下之言故兼是非得失知之此則似指告子之言故専於失者而知之也集成蔡氏謂知言則善惡邪正皆當知之此獨知其失者何也葢孟子時楊墨之言盈天下正人心闢邪説莫此為急故也輯釋亦引此二説按語録論此有曰天下之理不過是與非而已既知得箇非便知箇是矣詳味此言則通與蔡説皆未必然且如聖賢論恕每從反處説論四端亦皆就心所咈處説皆此意耳亦皆意其何所為而言之可乎況平正通達之言出於本心之義理義理則其致一也故易見詖淫邪遁之言由於心之有所蔽心之蔽固非一端氣禀物欲學術習俗皆所蔽之由也欲因其言之病而知其心之失豈不難哉然則既能知其非之難知者又豈有不能知其是而易知者乎通者但因集註末引告子為證故如此意之耳殊不知集註但推告子自不免於如此者以見其不能知言之意耳何嘗謂孟子所言専指之哉蔡説雖若可通然不若語録所改之廣恐亦非孟子本意當更詳之通與蔡説所指不同而輯釋皆引之不知當以何者為定耶通謂此章前則深斥告子闢異端也後則推尊孔子承聖道也直指告子為異端充類至義之盡也但此章本因論不動心而及告子至章末又因公孫丑再問而及孔子皆是議論節次所及如此若以為闢異端承聖賢之證恐求之太深非孟子意乎汙不至阿其所好集註汙下也假使汙下必不阿其所好而空譽之輯講汙字屬上句屬下句皆無意義恐決字之誤考證以文勢言汙字當是決字之誤孟子既曰智足以知聖人又曰汙不至阿其所好詞氣之間揚而若抑抑而復揚皆所以極明其言之可信葢世間自有明足以知人而不能無所阿私者則其言猶未可信也故必如集註假使汙下之說然後下句足以備上句未盡之意意味深長雙峰反以為無意義何耶若以為決文意固直政恐智者之未可必其無私也考證又勦之以為己説陋矣饒氏謂宰我謂觀夫子賢於堯舜不知他所觀在何處不可曉看來程子不甚取宰我之言所以將事功來説集註引此説似是朱子微意詳孟子首以智足以知聖人汙不至阿其所好之言稱賛三子以𤼵其端然後引其言如此使宰我之言未盡善則孟子為失言矣程朱亦但釋其賢於堯舜者之所在不知雙峰如何見得不取與微意之端的況朱子中庸序又自用其語意乎雙峰此疑恐未必然出類拔萃叢説類指衆人萃亦指衆人類衆聖人也拔萃孔子也按上二類也之類謂麒麟與走獸同為毛蟲之類鳳凰泰山河海亦然猶聖人與人同為人之類也出類拔萃謂麒麟鳳凰泰山河海聖人獨於同類之中出類拔萃也自生民以來未有盛於孔子是又言自古以來未有出類拔萃如孔子之尤盛者也叢説所言不曉所謂尊賢使能章叢説㕓無夫里之布之㕓民居也周禮所謂上地夫一㕓百畝五畝之宅是也載師宅不毛者有里布宅即五畝之宅布即泉也宅不種桑麻者罰之以一里二十五家之泉疏云二十五家之布税也又曰民無職事者出夫家之征註云夫税家税也夫税者百畝之税家税使出士徒車輦給徭役按載師之法是宅不毛無職事兩事之罰今孟子乃曰無夫里之布則是居㕓者使出二十五家之泉而又出百畝之税也集註言一家力役之征是因所引夫家之文而併釋之恐於夫里之布無所當愚詳天下之民願為之氓是境内田間之民皆使之出是兩等之賦只是一家田税之外多出里布耳與上文市㕓之㕓不相關葢上既曰市㕓而不征是居市者已征之孟子固以為過矣而又出此兩等不亦太繁重乎而集註上㕓字既釋為市宅於下㕓字乃曰市宅之民已賦其㕓又合出此夫里之布二㕓字合而為一是不敢必知其果如此也按此與集註微異姑備一説以俟知者人皆有不忍人之心章怵惕惻隱集註惻傷之切隱痛之深考證因上文怵惕惻隱以為訓怵惕是驚動則惻隱作痛傷若以下文四端例之皆是兩面獨惻隱是傷痛一面但稍有淺深耳按仁貫四性則惻隱貫四端但曰傷痛不見貫四端意四端皆從動處發惻隱之心兼怵惕言則怵惕為驚動但舉惻隱言則惻為動隱為痛惻者感於外而動於中隱者痛於中而𤼵於外惻則専言之仁之端隱則偏言之仁之端也按惻隱二字欲貫四端得考證如此𤼵明儘佳但朱子嘗言四端八箇字每字是一意然則集註訓惻為傷訓隱為痛不應只説得一面而已意者傷有傷於人痛有痛於己意思觀禮記知死者傷之傷分明有哀悼其人之意若痛則因傷後而隱痛於心無可疑者當更思之集註愚按四端之信猶五行之土無定位無成名無専氣饒氏曰謂之有亦得謂之無亦得以四方言之土固無定位以五方言之則中央屬土故河圖以五居中為土亦有定位也云云不可専執一説通謂饒氏之説云云愚見朱子之説是就五方看方看得試以河圖看之五土居中似有定位然三八木位乎東不可以西一六水位乎北不可以南如中間五㸃則自具五方而於東西南北無所不該似有定位也輯釋亦引通説按通之辯饒説如此亦不可謂之無見矣竊意五方之説猶有可疑葢中可指外為方外不可指中為方故方之為義可以四言不可以五言也夫方之形體必方正而後可分如方田方千里方百里皆是從四外而度之地方則徑一圍四亦是此意若以五分之則參差不正而不可以言方矣或疑此所謂方乃方向之方方千里之類似是端方方正之方混而無别奈何是不然所謂方千里者豈端正千里之謂正以方向言之方必有四隨其所向各一千里合而度之則其形體自端正耳是故自中央而視四外則東一方也西又一方也南一方也北又一方也方向既定界而别之非東即西非南即北雖中央為四方之交亦皆惟其方之所近而各有所屬無不東不西之處也自四外而視中央則東之所極即屬於西南之所極即屬於北中特因四方交㑹之所極而得名固亦不能自有所分而與四方竝立為一方也然則中央之五亦但只在四方之中位乎東西南北之交而初無一定之位也又何可以五方言哉彼其以三方五方八方十方為説者則其方但為方所之方而非方向之方也未知然否伯夷非君不事章輯講才偏便非聖人中正之道其流必皆有弊故君子不由按集註亦有既有所偏則不能無弊之言不知與雙峰其流必皆有弊之意同歟曰不同集註之所謂弊弊在二子之身雙峰之所謂流弊弊在學二子而不成者然則孰為正曰當以集註之説為正曰何以知其然耶曰以朱子平日議論而知之也朱子之言有曰夷惠隘不恭不必言效而不至者其弊乃如此只二子所為已有弊矣非集註之所謂弊弊在二子之身乎又曰諸先生恐傷觸二子所以説流弊今以聖人觀二子則二子多有欠缺處才有欠缺處便有弊所以孟子直説他隘與不恭不曾説末流如此也非雙峰之所謂流弊弊在學二子而未至者乎合而觀之則集註之説為正可見矣惜乎通者獨取饒説而於語録此等議論皆莫之取使讀者無所取正也公孫丑下首章環而攻之而不勝夫環而攻之必有得天時者矣集註言四面攻圍曠日持久必有值天時之善者按俞夀翁周官復古有曰周禮有兩環人亦離而二之者也司馬之環人掌致師釋者曰環猶卻也司寇之環人掌送迎邦國之通賓客釋者曰環猶圍也環一也而彼此異議何也在司馬者有師旅之事則附以卻之名在司寇者有令環之之語則因之以圍之之説皆惑也按春官簭人九曰巫環巫簭音也以簭環知吉凶也孟子曰環而攻之而不勝夫環而攻之必有得天時者矣環居九筮之一葢筮之名也故曰辯九簭之名釋九簭者曰簭環簭致師也此葢本司馬之環人而言不然也環自筮名之一耳故孟子曰環而攻之必有得天時者矣今釋孟子者未得其説則曰圍而攻之夫圍而攻之遽曰得天時絶無意義葢環者筮而用之軍師之名也環而攻之者筮而行也攻之則筮吉故曰必有得天時者矣故環人掌致師致師者賈勇而致敵非得吉卜不可也曰察軍慝環四方之故釋者曰卻其以事謀來侵伐者若如註釋即環四方之故一句絶不可解葢筮其故云爾至於司寇之環人曰云云舍則授館令聚􅝵有任器則令環之古者邦國之賓客葢有叵測者楚人之衷甲荀息之假道若此類非細故也使不占其吉凶而為之備則非古人備不虞之意故聚􅝵令環皆以警備之也然則其於司馬環人之職非有異矣葢司馬之環人至降圍邑而止未成章也以司寇之環人足之章始成若以環為郤曰郤四方之故可乎以環為圍曰賓客有任器則令圍之可乎賓客未有他也而遽圍之亦非待賓之禮矣夀翁此言非為孟子環字設也但以環為筮似於文義為順不知識者以為然否夀翁名庭椿朱子同時人朱子嘗復其書深稱其復古編之考索已當故録於此云餽金章考證按前篇註二十兩為鎰則一鎰已是一斤四兩但古今稱輕重不同且以漢稱較之漢一斤當今四兩三錢重强叢說禮註及趙岐皆曰鎰二十兩國語二十四兩為鎰字書曰鎰溢同數登於十則滿又益倍之為溢則二十兩為有義按如考證説則是古今兩有輕重一斤雖皆十六兩然亦因兩而有輕重矣又先儒皆因國語而疑集註今得叢説如此考究則集註可無疑矣孟子之平陸章考證集註士戰士去之殺之也此依古註按持㦸止是階前庭下執㦸之人庶人在官者去之止是廢棄之按集註所以釋士為戰士者以有失伍字在下文耳伍須作行列説方順不知庭下執㦸之人亦可言伍否既是戰士失伍則去之是殺之無疑若庭下執㦸之人亦可言伍則去之如考證之説可也當更詳之謂蚔鼃曰章集註孟子居賓師之位未嘗受祿故其進退之際寛裕如此輯講或疑孔子不脱冕而行與孟子之説不同饒氏曰正是一般葢孔子有去志久矣但去得不恁地逼迫後來膰肉不至方不脱冕而行於衞亦然輯釋諸編皆引之孔子於魯為司寇攝相事却正是有官守者與孟子位賓師不受祿者不同孔子久有去志猶待膰肉不至而後行者非進退有餘裕也葢仕於父母之邦若以受女樂而去則是顯其君相之惡無忠厚之意矣故膰肉不至則得以微罪行矣引以證孟子之事恐未的當若衞事則庶乎近之自齊葬魯章得之為有財考證當於為字作讀謂禮制所得為也集註為作而恐不必改夫禮制所得為者如棺槨衣衾之美也所不得為者如棺槨重數之類此不可踰越而為之者也按集註改為作而亦在疑似之間考證之説未為全背但之為二字終覺牽强除非挑轉作為之乃可耳不知如何沈同私問章集註楊氏曰燕固可伐矣故孟子曰可使齊王能誅其君弔其民何不可之有乃殺其父兄虜其子弟而後燕人畔之乃以是歸咎孟子之言則誤矣饒氏曰惟天吏可以伐有罪之國諸侯如何擅相征伐沈同但知其人之可伐而不知己之不可伐人通謂燕雖有可伐之罪齊則非伐罪之君集註之説活饒氏與通之説則死而不活使齊王能誅其君弔其民有以慰燕民之望而服諸侯之心如此則即天吏之所為耳故曰何不可之有今曰諸侯如何擅相征伐曰齊非伐罪之君則湯武何嘗不是諸侯孟子又何嘗不以湯武之事望齊王顧齊王所為如何耳豈可以無道必之哉語録或問之意皆與集註相𤼵不可不察燕人畔章周公使管叔監殷管叔以殷畔輯講看來當成王疑周公之時雖二公在成王之側也不敢措一辭止候機㑹之來直因天大雨雷電以風後方引成王去啟金縢之書二公候機會引王啟金縢之説甚不正大當考之書去齊宿於晝章輯釋士毅按孟子之於齊齊王既不能如繆公之待子思固無以安孟子矣次焉而齊之羣臣又無賢者為之維持調䕶孟子亦豈能安其身哉云云孟子既言繆公待子思之事又言泄栁申詳自處之事姑以二事竝言以見賢者去就之義有此二等之不同耳至於所以自處則惟在於子思一事若泄栁申詳則因帶言之非欲以其事自處也觀其言曰繆公無人乎子思之側則不能安子思然則繆公以待泄栁申詳者待子思不能安子思矣孟子平日自知之明自任之重為何如齊王若以繆公待泄栁申詳者待之其不能安孟子明矣況其下文有子為長者慮而不及子思之言可證乎輯釋次焉以下議論恐未為知孟子者當刪充虞路問章叢説孟子曰待文王而後興者几民也若夫豪傑之士雖無文王猶興孟子則不待文王而興者也王者興而有名世者是猶有待於文王者也孟子雖無王者興茍有尊德樂道者則孟子亦能興之也按彼章集註以興為感動奮𤼵之意則興如詩可以興之興乃是興起為善之心也叢説如此説則興如其言足以興之興乃是興起在位也況王者興必有名世孟子時無王者興故孟子不得名世當今之世舍我其誰其意葢曰當今之世但未有王者興耳如有王者興則名世之任舍我其誰當之叢説云茍有尊德樂道者則孟子必能興之竊意尊德樂道非王者不能惟孟子時無王者興故無能尊德樂道者耳論語有美玉章饒氏亦如此説愚嘗辨之可與此參看仕而不受禄章𤼵明曰不受卿祿此孟子最高處其超然不屈進退餘裕本全在此一受其祿則為祿所縻是為祿而仕耳云云吾意戰國之世高節如許惟孟子一人而已庶㡬焉者其魯仲連乎中庸以爵祿可辭與中庸不可能為二事孟子不受齊祿是權其不當受而不受是義是中庸若但欲以此為高使齊王不得縻之而不受則是計較自私而不足以語孟子矣以是而稱魯連可也魯連却止是爵祿可辭而未必合乎中庸者孟子所為豈魯連所可同日語哉滕文公上首章道性善言必稱堯舜集註性者人所禀於天以生之理也渾然至善未嘗有惡人與堯舜初無少異但衆人汩於私欲而失之堯舜則無私欲之蔽而能充其性爾通謂人不能皆堯舜者氣質之拘物欲之蔽也集註言物欲不言氣質葢以孟子不曾説到氣質之性故但據孟子意言之輯釋亦引通説物欲氣質不同似矣但集註言私欲而不言物欲柰何意者私欲物欲又自不同不可不察葢私即𤼵於形氣之私欲即感物而動之欲私之源從氣上來欲之流從物上去此二字雖不指氣與物説而氣與物所以拘蔽乎我者此其機也集註一字不可輕改如此通者只因改私為物便一向牽合孟子不説氣質上去可謂因誤致誤良可為讀書不仔細者之戒夫道一而已矣集註時人不知性之本善而以聖賢為不可企及云云故但告之如此以明古今聖愚本同一性前言已盡無復有他説也通謂按饒氏謂道一而已矣與性一而已矣不同性以所禀言道以所由言集註此處説得性字稍重愚見集註豈不能曰同一道而必曰同一性者葢推本而言欲自上文説來性外無道同此性即同此道又何疑也乎按通所以辯饒氏之説是矣但饒氏自上節説性善堯舜處已與集註不同此節又是承上節所説之意而言耳其於上節則曰孟子之意不在性善只在稱堯舜欲世子凡事學堯舜又恐其以堯舜為難及所以先道个性善惟其上節如此説故於此節則曰世子再見孟子已信孟子性善之説了但疑堯舜非人所及孟子説道一而已矣是就堯舜上説不是就性上説云云如通所述竊意性善是古今智愚之所同然者堯舜之所以為堯舜者以其能盡此性而已後人之所以皆可為堯舜者以其同具此性而已同具此性而不能皆堯舜者以其不知性之本善遂謂聖人不可㡬及是以終不能自拔耳故孟子每毎𤼵明性之本善者以示人七篇之中歴歴可考不獨告世子為然第以道學不明人皆不知性之本善觀於當時告子公都子所問難及後來荀揚之論可見故孟子必稱堯舜以實之耳集註謂其知仁義不假外求此説道性善一句聖人可學而至此説稱堯舜一句可謂道理事實兩無所遺不知雙峰何為疑之耶況謂意不在性善只在堯舜則是泛泛言性之善而不力乃遽以堯舜之事責望於人安得不啟人之疑若謂恐人以堯舜為難及所以道箇性善然則何不先使之學堯舜然後𤼵明性善者以曉之乎今經文先説性善乃及堯舜而雙峰乃如此説孰若集註順文解義之為勝乎如此則集註此節之説自無可疑通者之辨無以加矣饒氏又謂當以孟子所舉成覸顏子公明儀之説推之可知其意愚亦謂當以孟子所舉此三事推之可見集註之意已無可議葢道一而已矣便是上節道性善之意所舉三事便是上節稱堯舜以實之之意耳尚何疑乎公明儀考證儀與孟子年輩相及觀於孟子言羿有罪而儀以為宜若無罪是相應荅之辭可見齊疏之服考證按禮為父斬衰為母齊衰至若疏衰則又次於此今滕定公薨文公當為斬衰而云齊衰似可疑豈古者天子諸侯斬衰之布止用疏布為之歟又按魯穆公卒使人問於曾子對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達此數句與此正同葢古語傳誦之訛孟子引之爾當作齊斬之服恐孟子非不能察古語之訛而引之者此處但當闕疑若信己之耳目而反疑聖賢之不察則近於僣誕矣問為國章輯講語錄中説孟子誤引詩來證周家用助法按語録但冇云云這是不曾識周禮只用詩意帶將去之言未見有如饒氏所舉者朱子之意只把徹做法了孟子之意不然徹則無分公私但周人是因助之田而行徹之法然周雖用徹法有用助處畢竟優於鄉遂饒氏之意豈不曰徹不過因貢助之法而用之於鄉遂都鄙而已徹固自無法也然夏之貢商之助以五十七十畝為限未嘗有百畝之制也貢助固是夏商之法貢助皆以百畝為限非周之徹法乎夏用貢而不用助商用助而不用貢竝用貢助而變易其制又非周之徹法乎至曰但周人是因助之田而行徹之法則非也七十百畝之法既異則井之大小廣狹固不同矣又如何因其田而行徹法之得此又不通之論也或問三代授田之多少不同何也朱子曰張子嘗言之矣陳氏徐氏亦有説焉然皆若有可疑者云云陳氏曰夏時洪水方平可耕之地少至商而寖廣周而大備也徐氏曰古者民約故田少而用足後世彌文而用廣故授田之際隨時而加焉饒氏謂夏尚忠所以民只用得五十畝周家禮文煩用度廣須是百畝田不過是出粟米粟米不過以供日食夏時雖地少民約而尚忠如何使民食只半於後世後世雖地廣彌文而用度多又如何民頓能倍食於古畢竟如諸家之説非古者民傷於飢則後世之民失於飽矣朱子以為皆若有可疑固謂田間疆理都合更改恐無此理恐愚見亦是可疑之一端忠與文約與廣可以論其他財用非所以言粟米也意者田制既亡則易代更張難定語錄之疑信矣朱子謂孟子只是傳聞如此恐難盡信然則讀者政不必求其説之必通也饒氏謂云云鄉遂用貢法都鄙用助法三代所都之地不同則鄉遂都鄙亦恐卒難做過至於溝洫塗畛亦非一朝一夕所能成此説自與朱子合但語焉不詳乃若三代皆通行貢助二法於都鄙鄉遂者豈記録之失其意耶當更詳之章末集註引吕氏所論子張子之意𤼵明曰未易言也廢之數千載而欲復之於一旦難哉難哉張子之意吕氏言之朱子引之固非無用之虛言也而𤼵明不以為然何也愚則以為復數千載已廢之法惟張朱得時行道乃可耳固非望如𤼵明者之能行也𤼵明柰何以已之不能度張朱之言為虚言乎晨門謂孔子為知其不可而為之𤼵明於張朱之學亦然許行章集註史遷所謂農家者流也考證太史公六家指要無農家至班固藝文志分九流始有農家者流此集注未及改理或有之聞君行聖人之政叢説許行言仁政是孟子所言井地之法陳相言聖人之政是許行言神農之法許行來文公不斥絶之而與之處故陳相謂已行其法按許行始至自謂孟子井田之法為仁政則雖有陰欲沮壞之意固未敢公然言於文公之前也近悦遠來理宜納受文公亦豈得不與之處而斥之乎曰與之處不過如其所言使得受一㕓而為氓耳非文公身自與之遊處也叢説遂以與之處為行其言過矣觀陳相見孟子言滕君厲民自養未得為賢可見文公未嘗用許行之言而沮井田之法矣況陳相先見文公便言聞君行聖人之政則聖人之政便是指井田之法無疑後見許行乃大悦而學之則相未見行之前固不當稱許行之言為聖人之政也意者許行陰欲沮壞孟子之法而未敢𤼵且令陳相以己意宣於孟子之前以諷之若孟子論屈則彼必肆行無忌憚矣觀孟子終篇只破行相竝不畧見滕君為其惑之意則可見矣滕文公下首章通引屯六二女子貞不字與蒙六三勿用取女證不枉己之意且曰六二稱女子六三稱女不稱子一字去取之間嚴矣哉通引此二爻為證似矣但以稱子不稱子為分别則程朱未嘗有此意假如所言則咸之取女吉家人之利女貞漸之女歸吉皆不稱子豈亦以其不能自重而去之耶景春曰章丈夫之冠考證冠恐當作娶字與下嫁字對按儀禮士昏禮父醮子而命之曰往迎爾相若冠則賓醮而命之字父不親命也按孟子父命下無辭冠是成人之道命冠雖出於賓而擇賓實由於父輕改經文以就己説則亦何所不至哉上篇欲改齊疏為齊斬亦此意宋小國也章今將行仁政輯講滕方行王政齊楚便去迫他然孟子但告之曰君如彼何哉强為善而已矣宋則未行王政故言不行王政云爾茍行王政四海之内皆舉首而望之欲以為君滕則已行故孟子勉之為善然孟子尤拳拳於齊畢竟齊有其土又有其民雙峰此言不為無理但語焉不詳使孟子齊楚雖大何畏焉與君如彼何哉二語若相反者至曰滕則已行故但告以君如彼何哉云云宋則未行故言不行王政云爾云云則似已行者則不敢過許之未行者則大言以許之者如此則孟子之意不幾於誣乎葢宋雖小國然猶地方數百里與齊楚魏為敵國與滕之將五十里間於齊楚者事勢不同滕則削弱已甚故雖已行王政亦不可以王業期之則但勉之為善而已宋雖未行王政然或茍能行之則可變弱為强因此而為政於天下可也至若尤拳拳於齊者一則以其國之大二則因齊王之有意於孟子而又可以為善於宋則僅如此言者一則以其國之小而反以攻伐為王政二則宋實未嘗用孟子孟子特自與其徒議論之耳況與戴盈之戴不勝之流言之亦未嘗以宋為不可為特較之於齊則勢有小大故為之有難易耳未可遽與滕例論也有攸不為臣集註謂助紂為惡而不為周臣者𤼵明採張氏曰文武於商為西伯有攸不為臣不臣於商以紂之命征之也有攸不為臣如張説固亦可通但此句之下即與東征取殘之意相接正是伐紂之事則張説又不可通宜集註不從之也況惟臣附周與君子小人以類相迎之意又皆與上句照應然則集註何可疑之有𤼵明何必引張以眩學者戴盈之章𤼵明請輕之如減日攘為月攘不知其非義不智也知其非義而不速改不勇也不智之罪小不勇之罪大輯釋亦引之按請輕之請損之皆便是已知而不速改者耳無不知與知之分𤼵明不智之説無著落處不可曉好辯章禹掘地集註掘去壅塞考證然亦有掘平地處如兖州平土當河轉之衝故釃為漯水疏為九河震澤三江亦然其餘亦多是開鑿崕㟁壅塞爾竊意漯水九河震澤三江亦須元有故道禹但因而疏浚之耳未必皆是禹就平地所掘成也縱有援據恐亦不可盡信以理推之可也知我罪我集註胡氏曰云云罪孔子者以謂無其位而托二百四十二年南面之權使亂臣賊子禁其欲不得肆則戚矣𤼵明罪孔子者只當至權字而止而加一也字使亂至戚矣十五字合刪此乃春秋之功以之言罪侵過分劑矣輯釋亦引此説罪孔子者即是亂賊既戚而以無位托權為孔子之罪耳若刪此十五字則罪孔子者使誰當之集註於知孔子者之下云為天下後世慮至深遠也於罪孔子者之下如此説便見天下後世同以孔子為功亂臣賊子獨以孔子為罪知孔子者公論也罪孔子者私言也集註一字不可輕改乃欲刪其十五字𤼵明僣誕之罪大矣輯釋阿其所好而引之不足責也四書管窺卷四
