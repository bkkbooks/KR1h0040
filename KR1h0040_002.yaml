body:
  text: 欽定四庫全書四書管窺卷二元史伯璿撰論語學而首章不愠集注愠含怒意考證何氏謂含怒固下得輕然終有怒字在惟訓悶字為是如南風詩南風之薰兮可以解吾民之愠兮暑氣何可怒但令人悶耳薰風能解人之愠悶也程子不見是而無悶正此意按以悶訓愠雖與集注微異然集注兼存程子之説而語録亦有心不甘便是愠愠不是大段忿怒之言則何説亦未必不合朱子之意也集注愚謂及人而樂者順而易不知而不愠者逆而難集成輔氏謂順謂理之順逆謂理之逆處其順者易故樂猶可及處其逆者難故不見是而無悶非成德之士不能及竊意朋來與人不知二節皆承上節學習而説之意而言順是説而朋來其事順逆是説而人不知其事逆處順自然可樂故易處逆易至於愠今乃不至於愠此其所以為難樂是説之後善足以及人乃樂本不為易但對不愠言之則為易於彼耳集注程子曰樂由説而後得非樂不足以語君子叢説以文勢言之學習與朋來不愠是一截説樂君子是一截然君子是成德之名德之成非獨不愠所能致若但不愠即為成德則孤陋寡聞而人無可知異端邪説而人不見是我乃悍然不顧囂囂自得其罪不亦大乎故文公曰惟成德者能之又曰德之所以成亦曰學之正習之熟説之深而不已焉耳而程子亦曰云云須有上節工夫方可成德發明此以三節下三句發明餘意也説固淺樂固深然必由成己之説方可進於及人之樂而非造於樂之地步又不足以言成德君子也輯釋亦引發明之説發明不如叢説之明備説淺樂深之分别亦恐似是而非觀朱子以説之深為德之所以成程子以樂由説而後得之言則説可以淺言乎哉學至於説則成己之事至矣朋來而樂人不知而不愠皆説之餘事耳且如所言則不知而不愠者雖説而未可以為樂也又可以為淺乎發明所云觀者不以辭害意可也孝弟為仁章通謂一也字兩者字皆句絶蓋下文者字即上文人字通如此句取其中間兩句皆以而字介於其間句法齊整耳但舊點於兩而字上句絶兩者字下加讀則而是承上起下而反之之辭意味深長句法亦未嘗不齊整也然則但以舊點為正可也考證此章分二節前節以質言後節以學言中二句泛言承上生下以凡人資質言則孝弟者無犯上作亂之事以學者務本言則孝弟者為行仁之本親親仁民愛物皆由此出而仁不可勝用矣何止不犯上作亂而已哉集注雖無此意然此説亦自無背於集注故存之曽子三省章集注傳謂受之於師考證程伯子作傳之於人按為人交友俱為及人之事則此傳字當從程子説傳業與人而不習於己寧不誤人故必省而習之朱子謂此曽子晚年之説昔者孔子沒曽子年最少若晚年則非有師傳常業矣集注傳字之訓雖似乎倒然不為不通若習字則集注為順而考證反為倒矣晚年非有師傳常業之説恐不如此蓋曽子服膺師訓終身惟恐失墜不習之省豈但師存之時為然但以三者皆為及人之事或可備一説耳輯釋引通曰曽子早悟一貫之旨晚加三省之工云云或以為一唯在三省後非矣又引其師之説曰吾道一貫章及孟子時雨化之章朱子訓釋非不明白云云參二章以觀三省章正是隨事精察力行處其悟一貫之旨而一唯正是人力已盡而時雨化之之時如何反以一唯為初年事三省為晚年事乎按語録有曰三省是曽子晚年進德工夫蓋亦微有這些子渣滓去未盡耳在學者則當隨事省察非但此三者而已詳此則通説未為無據輯釋引其師説而不引此段語録蓋亦阿其所好非至公之心也曽子初年隨事精察而力行之及其將有所得乃能唯一貫之旨然終未至於化則不能無少渣滓故晚年猶有三者之當省初年隨事精察晚年唯三事尚有當省處陳氏又何必泥乎通説未見其不可也陳氏疑之過矣道千乘之國章通引齊氏曰敬事而信以身先之此道之説也古人未施敬而民敬未施信而民信以其平日所行有以表率於事之先也不傷財不害民以釋節與愛蓋欲道之以儉與慈也齊氏之意似乎欲以道為引導之意者豈因下篇道之以政之道而言之歟然彼曰道之則道可為引導此曰道千乘之國以為引導千乘之國可乎集注二章道字訓釋不同不可牽合以眩學者入孝出弟章集注圈外引程子尹氏洪氏之説又以愚謂終之發明引饒氏謂尹氏説得文字輕洪氏説得文字差重朱子發明文字甚重三説互相發明竊意四條程子説得文字最輕尹洪愚謂三説皆為補程説而設尹説平正的當不為輕文洪説文字差重愚謂文字甚重是己愚謂之説非為尹説而發為足程子之意而發也溫良恭儉讓章集注張氏曰蓋見聖人之儀刑而樂告之者秉彛好德之良心也而私欲害之是以終不能用耳通引馮氏謂是時政在大夫陪臣盤踞日久豈容夫子之進也時君知愛其德而不得用事世亦可知矣馮氏此説以時世言之似乎可通而實非所以言聖人也蓋良心私欲勢不兩立茍時君能擴充其良心而不為私欲所害則聖人設施期月而可大夫陪臣且俯首聽命之不暇又孰能不容夫子之進哉唯時君不能自勝其私欲之害故終於不用夫子而無以去其大夫陪臣之盤踞耳如馮氏之言則似時君欲用而夫子不能進者張氏之意似不如此發明引饒氏曰溫良而又恭儉恭儉而又讓與溫而厲威而不猛相似皆中和氣象按四書通曰溫而厲威而不猛恭而安此夫子中和氣象也子貢言溫而不言厲言恭而不言安言良儉讓則見不猛而不見所謂威皆未足以盡盛德之形容饒氏謂此即聖人中和氣象又謂集注過化存神未易窺測之語與謝氏三亦字皆微寓抑揚之意饒氏二説自相反不可不辨今觀發明取饒氏説而不取胡氏此辨蓋發明於胡氏每有忌克之意故其説雖善亦多不取於饒氏每有尊信之心故其言雖失亦不忍去愚故備録於此以俟觀者自去取焉耳輯釋則取通説可謂能不阿其所好矣父在觀志章或問集注尹氏遊氏之説如何饒氏曰似太費辭雙峯本謂此章不改是不改父善且引孟莊子不改父臣父政為證故如此説竊意此上文有父沒觀行一語若其行惡又安能無改於父之善若其行善又何患其改父之善政謂父沒其行雖善又必三年無改於父之未善乃見其不忍之心耳餘則通者之辨已詳讀者考焉可也發明載南軒張氏説云云曰父之道則固非悖理亂常之事輯釋亦引之集注在所當改可以未改之言可謂善於斟酌矣又按語録道猶事也言道者尊父之辭蓋為防如南軒所見者而發南軒是主不改父善之意與集注背發明存之而不與折衷惑人甚矣禮之用章考證樂記天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉此章所謂禮蓋髙下散殊之分也其所謂和則合同交通之意也先王制禮其尊卑貴賤上下之體截然甚嚴然其用則常有交通和同之意行其間或但知和洽之意而略上下名分尊卑降殺男女內外之節此所以流而生禍而亦不可行也集注但見行禮不拘迫之意不推先王制禮之意然於其首取程子禮勝樂勝之説末有嚴泰和節之説則該之矣按語録直卿言禮之用和為貴今觀內則一篇則子事父母之禮亦嚴矣然下氣怡色則和可知矣觀玉藻鄉黨所載則臣事君之禮亦嚴矣然二爵而言言三爵而油油君在而與與和可知矣先生曰如此則和與禮成二物須見得禮便是和方可如入公門鞠躬如不容可謂至嚴矣然而自其心肯為之無厭倦之意乃所謂和也至嚴之中便是至和之處不可分作兩截去看詳味此意則考證之言朱子宜不以為然矣况考證又引宗廟之禮有旅酬逮下等數事為證正直卿所問之意不知如何姑録於此以俟明者之折衷焉無求安飽章敏於事通引馮氏曰事所從事謂學也或問學以窮理為先此章論好學何以但言敏事慎言饒氏曰敏事之事非特指行事而言凡學問思辨窮理之事皆事也馮氏正是祖述饒説而不如饒説之活如饒説則雖以事為學而未嘗不可兼行事之事也如馮説則但可為學而不可為行事之事矣殊不思尹氏以敏事慎言為力行却正是指事為行事况語録一則曰行二則曰行何嘗以為非行事之事耶又如首章集注説先覺之所為通者力以所為為所學而非事為之為引證雖詳終是説死殺了朱子之意亦何嘗令學者只效先覺之所學而不效先覺之事為哉語録就有道而正其言行之是非發明愚謂不止正言行之是非凡所志所學所知所行皆當就有道以正其是非就此章言不求安飽是篤志無可正者所當就正者唯言行耳所學所知所行何莫非言行中事故語録云然發明尚何疑乎無諂無驕章發明朱子所謂切己之實病似仍指驕諂讀者詳之詳集注語録之意正要見切磋琢磨在貧富之外切己實病乃指不切不琢而言雖驕諂意亦在其中然不可謂專指此而言也若以為專指此言則説告往知來不去而失朱子已言未言之旨矣為政篇題下通引馮氏謂前篇論學學然後從政故為政次焉馮氏每如此論篇次恐未必然朱子嘗曰篇名取篇首兩字初無意義然則記者又安得擲無意義之篇名以為相承之次乎後此皆然不復再論也首章為政以德通本集注德之為言得也得於心而不失也通按祝氏以刋於興國者為定本如為政以德舊本作行道而有得於身祝本作有得於心後本作得於心而不失祝未之見也門人胡泳嘗侍坐文公手執扇一柄曰便如此扇既得之而復失之如無此扇一般所以解德字用不失字發明本集注德之為言得也行道而有得於心也發明按祝本如此他本作得於心而不失也或人指通膠於胡泳所記執扇之説故力主他本愚謂此説縱使有之亦必非末後定本必行道而有得於心方可謂之德今曰得於心而不失得於心者何物乎方得於心何必遽慮其失之乎不比據於德注云據者執守之意得之於心而守之不失又云據德則道得於心而不失此兩不失字乃自據字上説下來况上文先云德則行道而有得於心者也其證尤明白輯釋亦引發明之説按二説當以發明為是其曰得於心者何物乎此説極是大學釋明德必曰所得乎天云云便見所得之實處今但曰得於心而不言所得之實可乎况不失二字為入德進德者言之則有味為政以德無為而天下歸之正是舜無為而治之事此盛德自然之應不失不足以言之矣北辰或問經星隨天左旋日月五緯右轉此本厯家之説而言也詩傳之説亦如此後來朱子本橫渠説以為經緯皆左轉者見書傳中當以彼為正或問蓋未定之書也但近世許益之著辨有疑於皆左之説其意蓋以右轉者為是似亦有理讀者考焉可也詩三百章一言以蔽之集注蔽猶蓋也通引馮氏曰蔽斷也如官占惟先蔽志之蔽輯釋亦引之蔽字之訓合而觀之似乎蓋不如斷之易曉然思無邪三字若出於夫子之所自言則謂夫子言此三字以斷三百篇之義可也今此三字乃是詩中全句然則謂此一句詩可斷三百篇之義不若謂此一句詩可蓋三百篇之義為長也蓋自有包涵之意一句可以包涵一經之義此其所以為知要也集注可輕改哉集注惡者可以懲創人之逸志考證謂王文憲有詩辨其意以為秦火之後諸經多有亡失詩何以皆無恙禮記左傳荀子所引之詩多有善者如素絢唐棣孔門嘗舉而皆不見於詩鄭聲之淫夫子嘗欲放之而今鄭詩具在漢劉歆謂詩出非一人諸儒各以所能記會合以足三百篇之數以此觀之其間淫詩固夫子之所去而諸儒例以為古詩也不然溱洧桑中諸詩幾於勸矣何懲創之有此朱子所不敢道而考證昌然言之其必有以自信矣非後學所敢知也但如所言三百篇初焉皆是正詩則大序所謂變風雅者亦但為刺諷之詩而言而所謂思無邪者亦但為作詩者之思無邪不必如朱子所謂其用歸於使人得其情性之正者矣不知可為不易之論否但鄙意竊以為桑間溱洧所可得而勸者不知善惡是非之人也今有人焉稍知是非廉耻者一只聞淫媟醜穢之言猶且為之汗背騂顔之不暇况肯受其勸而為其事乎古人之所以教固不專在於詩有小學以養其德性於前又有大學以明夫義理於後則其於善惡是非之辨昭然在目所謂好善如好好色惡惡如惡惡臭者自不容己矣期其見夫桑間溱洧之詩抑將為其所勸乎抑將重以為戒乎自後世小學大學之教不明人不知是非妍醜之正然後疑其勸耳盍亦反其本矣餘於子罕篇自衛反魯章究之思無邪集注程子曰思無邪誠也通謂每讀集注至此不能無疑程子曰思無邪誠也此是聖人之事夫子言詩之用不應遽以聖人望人集注引此蓋謂所思自然無邪誠也聖人事也讀詩而可使之思無邪誠之也學者事也集注引此即繼以學者必務知要可見按朱子曰行無邪未是誠思無邪乃可為誠云云何嘗分别誠與誠之者如通之見哉要之夫子言此正是示人以學詩之準的學詩者求至此準的則自當用工如集注所謂感發懲創之意直俟至此準的方是學詩之成功若未至此準的則是用工之未至也夫子雖不應遽以聖人望人又豈終不以聖人望人初學詩者固未可遽責其誠已學而成功者又豈終於不能誠耶集注又曰其用歸於使人得其情性之正而已曰得曰歸蓋皆指學詩之效而言豈有學詩之效尚不得為誠者耶道之以政章集注云云此其相為終始雖不可以偏廢發明政刑為始德禮為終按集注既以德為本則政刑為末可知發明亦既自言之矣今乃如此分配始終之義則是以末為始以本為終也然乎其實只是自始至終四者皆不可偏廢故曰相為耳志學章發明聖人所志之學大學也大學之道知行為要此章分知之始知之至行之始行之至語録中一條盡之矣聖人自志學至從心不踰矩始終一心學也心之所之謂之志念念在此大本立矣心之所願謂之欲從容中道大用行焉饒氏又以矩字貫一章之旨發明亦採其説輯釋備引諸説按語録雖如此分知行然又曰志學亦是要行而以知為重立是本於知而以行為重詳其語脈正如中庸生知安行主知學知利行主仁者相似初不截然分知與行為説也蓋大學知行與此章知行微有不同此知行自於大學知行中橫貫過大學知行是用工條目此知行是進德次第不然十五志學知之始只做得格致工夫誠正以下工夫直待十五年後方做豈理也哉發明混而言之讀者不以辭害意可也善乎許氏叢説之言曰此六節皆知行兼進不可分作兩説所以朱子於志學下便釋曰學即大學之道又念念在此為之不厭正兼知行言之詳此則發明之言未為盡善可見矣其以志學為大本立不踰矩為大用行似亦可疑聖人之道一以貫之本立用行猶目視而耳聽也豈有大本立於五六十年之前大用乃行於五六十年之後耶饒氏擲一矩字立説亦是宋末舉子時文擲字立説之體説經不必爾也孟懿子問孝章集注無違謂不背於理通引齊氏謂何忌孟僖子之子僖子將卒使事夫子而學禮焉使懿子不違其親之命而意以夫子所教生事而死葬祭之則僖子之心慰矣通自謂無違二字含蓄不露未便謂無違於禮亦未便謂無違乎親之令姑以發懿子之問爾而懿子不能問於是以無違乎禮者言之輯釋亦引齊氏説無違二字縱含蓄不露然所含蓄者畢竟是無違乎理若無違乎親之令則非所含蓄矣齊説本非集注之旨通亦何必與之回護豈有聖人之言始則含蓄二意終則發出一意耶謂聖人之言含蓄二意與謂儀封人木鐸之喻兼二義者相似此殆世俗所謂隻關二意之類以言餂人之姦曽謂聖賢言之乎况三家強僭所以命其子者多矣烏在其能不違乎理也僖子學禮之命固若有證但片言之間懿子何以知其為無違是命也哉若夫子使之從親之令幾何不啓其陷親於惡邪然則齊氏之説刪之可也闢之可也存而不辨惑人甚矣孟武伯問孝章考證力主後説以為切於武伯之身按語録及諸家皆以前説為勝况前説已包後説之意矣又何嘗不切於武伯之身哉以備一説可也考證以為切於前説則過矣疾通引馮氏曰説文疾加曰病夫子告之以疾而不及病其訓嚴矣通引父母之於子無疾則憂其有以致疾疾則憂其成病分疾與病而言似矣然則集注唯恐其有疾病之言非歟曰以疾對病而言則不可不分輕重專言疾則不必泥也若但言疾亦以為輕於病則伯牛有疾夫子與之訣先儒以為癩豈有癩疾垂死猶未得為重耶曾子有疾啓手足以示門弟子出將死之言以告孟孫猶可以為輕於病耶要之此處唯主於欲人子以父母之心為心疾病輕重未暇分也溫故知新章通引范氏曰溫故者月無忘其所能知新者日知其所亡輯釋亦引之以溫故為月無忘所能猶可以知新為日知所亡未可蓋此所謂新便是故中所出彼所謂所亡未便是出於所能之中且如六經初間未曽讀是所亡今日讀得詩明日讀得書又明日讀得易此日知所亡之意也日日讀得所未讀至於一月之久皆不遺忘此無忘所能之意也知新又是此後事既無忘所能又於其中每有所新得此則知新之意若推而言之謂此所新得久亦不忘為月無忘之意雖亦可通然非子夏之本意也要之夫子之意是新不外乎故子夏之意是故不外乎新觀其立言互有先後可見矣君子不器章通曰集注釋君子不特曰成德而且曰成德之士是當自其學問推之心之虛有以具衆理是其體無不具也心之靈足以應萬事是其用無不周也為士者格物致知有以充此心之體誠正修齊治平有以擴此心之用所以不器輯釋亦引而改之却無病按語録云此章是才德出衆之君子德體也才用也詳此則集注體無不具之體正指成德而言德之所以成亦曰知行兩盡而後至耳通但以格物致知為體之所以充然則物格知至而未能意誠至身修者謂之成德可乎今觀輯釋為之修改置之編中則其元文之不能無病可知矣先行其言章通謂言之必行行在言後入德之事也言其所行行在言前成德之事也如此則入德者皆不可先行之乎經文初無分入德成德之意似不必如此説通蓋因饒氏有成德之人凡其所言皆是言其平日所實踐之事非虛言也之意而如此分别之也饒氏未嘗以入德對言未害也通則併失饒氏之意矣攻乎異端章饒氏謂異端不可便謂之邪道如楊氏為我近於義墨氏兼愛近於仁其初也各是一面道理後來為楊墨之學者只管於為我兼愛上求工故其害遂至無君無父佛學亦然感興詩云西方論緣業云云亦此意也楊墨實為我兼愛而迹則近乎仁義先儒又謂其疑於仁疑於義曰近曰疑蓋皆謂其非仁義而似仁義故惑人為甚也彌近理大亂真之嘆意亦如此若謂其可為一面道理則是以偽為真而可乎天下之道失正則入邪無非邪非正之理異端一偏之説既曰與聖人大中至正之道不同而又以為未可便謂之邪則將謂之何哉况孟子論楊墨為我兼愛之害即以無父無君之罪坐之論為我兼愛之迹即以一毛不拔摩頂放踵者直歸之楊子墨子何嘗以為為其學者之流弊哉先儒有説隘與不恭為夷惠清和之流弊者朱子尚且不以為然况於異端又何必與之回護乎雙峰只因集注有治木石金玉之工曰攻之説遂就工字上立論其意蓋謂楊墨本只偏於為我兼愛後來為其學者更就為我兼愛上用工故其弊至於無君父耳專以工為工巧之工故其説如此殊不知集注專治欲精之言只是精於其道便有此害非謂精之而更加工巧方有此害佛氏之學背棄君父淪滅綱常立教之初便有此害感興詩特言初焉其説尚淺未足以惑賢智至流傳既久而後其説乃髙妙非可謂始未害而終乃害也發明以孔子時之異端為鄉原孔子問禮於老聃則老聃在孔子時未可以異端目之今之老子書先儒謂後人托為之蒙莊出而宗老氏自此以後老氏之為異端始不可辭矣輯釋亦引其説鄉原孟子謂其似是而非則其於聖人之道特陽順而隂背之非如異端之敢自異於聖人之道也其自以為是特不自知其非真有而自以為亦是聖人之道耳亦非自是而非毁聖人之道也不可入堯舜之道乃是孟子指其無實處以示人亦非鄉原之所肯自言者發明引孟子此言為證故如此辨恐其未足以當異端之名也至於老聃墨翟楊朱皆與孔子同時雖曰洙泗之教方明而未得肆然羸豕孚蹢躅其勢固已不可遏矣聖人之明知微知彰豈不有以早見而豫言之乎然則異端為指此輩無疑矣真氏亦既言之發明亦既引之何必於此又以歸之鄉原耶若夫老聃在孔子時未可以異端目之之言亦恐未然觀於序説問禮老聃之下語録有曰老子曽為柱下史故知禮節文所以孔子問之聃雖知禮然其意以為不必盡行行之反為多事故欲絶滅之詳此則聃雖知禮而不害為異端者可見發明何必曲為出脫也哉知之為知之章集注如此則雖或不能盡知而無自欺之蔽亦不害其為知矣通謂毋自欺是誠意工夫此致知之事也而亦曰毋自欺者固是知至而後意可得而誠然致知亦自不可不誠意故程子曰格物窮理但立誠意以格之無是有無之無毋是禁止之毋二字義本不同毋自欺是誠意工夫今集注曰無自欺之蔽言無而不言毋也通者只因誤以無為毋遂引誠意工夫與程子語來説今觀集注曰無自欺之蔽有蔽則害於知無蔽則不害其為知此理甚明又何必以誠意為證哉子張學干祿章集注多聞見者學之博闕疑殆者擇之精慎言行者守之約饒氏謂朱子三句第一句無可疑但下句精約兩字似乎太重蓋聖門之學有二有自聞見而入者有自致知而入者子張氣質浮露不能深潛察理故夫子且令於聞見上選擇而持守之闕疑殆者未能窮究其是非且與闕之其餘亦未必一一至當故見之言行者僅能寡其尤悔而已未能保其盡善全美也精約惟從事於格物以至於知至意誠者乃能及此非聞見之學所能與也謂聖門之學有二自致知而入者吾於大學見之矣自聞見而入者亦有所據否乎古者八歲入小學十五入大學其所以教之之法具在自聞見而入之學不知又施之於何地受之於何時竊意聞見致知不是二事且如聞時人之言見時人之行固聞見也或因師友講明或因誦詩讀書而多識前言往行亦豈不是聞見朱子語録有此議論此豈所以為學之博也然則所謂致知者即此在矣致知固不局於聞見天下又豈有遺聞棄見而可以致其知者乎况非致知則理不明如何知得疑殆當闕且言行所關甚重茍能謹之豈擇不精守不約者之所易及寡字之云猶鮮矣仁之鮮聖人辭不迫切非謂尚有少尤悔也如夫子自謂學易可無大過初豈尚有小過哉亦慎重而不敢易言之爾更以程子修天爵之説參之可見朱子精約二字不為太重不如此如何修得天爵修天爵即明明德之謂致知非明明德之條目乎觀於孟子道則髙矣美矣章經注之旨則聖門之學又豈有二乎哉吾不知雙峰此言果何所據也祿在其中矣叢説經中言在其中謂如此必如此順辭也圈外注言在其中謂如此却不如此反辭也蓋謹言行必得祿故曰祿在其中耕本欲得飽而值雨旱之災則飢矣故曰餒在其中若謹言行而命不偶則亦老死而已須應接如此亦不得祿一句者此與後篇夫子所言正文句意不同此是借來反用按集注不求而自至之辭恐便是程子惟理可為者為之而己之意程子引夫子耕也餒在其中之言非以安或人之心正以或人不當以不得祿為慮故如此曉之耳君子正其誼不謀其利明其道不計其功言行自當謹祿之得不得不當計謹言行本不為求祿而祿在其中耕本不求餒而餒在其中耕也謹言行也皆理可為者則為之耳若必以可得祿而謹言行則亦必以可得餒而耕耶世固無此理也程子蓋正以耕也餒在其中深明謹言行祿在其中皆為不求而自至初非有為而為之意耳叢説謂其為借來反用恐未必如此舉直錯枉章集注謝氏曰云云是以君子大居敬而貴窮理也通謂譬之於鏡非明不能照物妍醜故以窮理為貴然先有一物在中則又不能照故以居敬為大考證何氏曰居敬則無私心而枉直無所蔽窮理則有真見而枉直不難知按語録云若不居敬如何窮理如何識得人為舉錯之本詳此則不過以窮理為知人之本又以居敬為窮理之本如程子所謂存養須用敬進學則在致知之意耳通與考證之説固善但恐非上蔡本意耳子奚不為政章集注推廣此心以為一家之政發明孝友兄弟行於家者施於有政行於國者居家理故治可移於官書之本意不過如此朱子特發出推廣以為家政之意輯釋亦引之按語録云緣下文有是亦為政故知不是國政書之本意故如彼孔子引書之意則如此豈朱子強發之哉觀孟子引擇不處仁以證擇術而自不妨為一意則知夫子引書之意矣集注要之至理亦不外是發明於其下引張氏曰孝友篤於家則施於有政亦是心而已矣雖不為政而為政之道固在是矣或人勉夫子以為政之事夫子告以為政之道也通與輯釋皆引之按南軒説却是書之本意所謂道者為政於國之道也集注所謂至理便依舊指夫子引書之意而言推孝友以為一家之政是即理之至也引彼證此似不相背蓋發明主意如張氏意故耳人而無信章通引齊氏謂立則見忠信之在前行則見忠信之在輗軏此蓋櫽括夫子答子張之語以為説也集義楊氏亦嘗引彼釋此而不變其文未害也今則改輿為行改衡為輗軏以求合於夫子之言然夫子以信猶輗軏而齊氏則以忠信為在輗軏其意又不相當也八佾篇題下集注通前篇末二章皆論禮樂之事通引馮氏謂前篇論政政莫先於禮樂故通前篇末二章皆記禮樂之事馮説得失與前篇題下説同但曰前篇論政似乎一篇皆記論政之言亦猶此篇皆論禮樂之事者而實則不然蓋造語之欠瑩也况前篇末二章已論禮樂此篇特承前篇末之意耳非承為政篇題意也若論前篇篇末二章論禮樂者是承論政之意則彼在篇首此在篇末中間隔二十張皆論他事謂之相承可乎顯見附會讀者詳之雍徹章集注成王之賜伯禽之受皆非也通以為成王以秬鬯命周公平王錫晉文侯秬鬯書皆有之豈有以禮樂祭周公而不書於書者以書之載不載為有無之證恐未為得之魯之受封書且不載况賜禮樂乎宣王中興賜豫多矣謂書不之載而不之信可乎又安知非本有其書而亡之耶林放問禮章通引馮氏曰以喪之易戚明禮之奢儉也聖人之言借一明一大抵如此按語録禮不過吉凶二者上句泛以吉禮言下句專以凶禮言詳此則二句是平言以盡吉凶之禮耳以為借一明一求奇穿鑿非經本旨夷狄有君章集注引程子尹氏之説發明謂程説責在下之無君正説也尹説責在上之不君推説也通與輯釋皆引之按語録黃義剛問程子似專責在下者尹氏似專責在上者如何朱子曰只是一意皆是説上下僭亂不能盡君臣之道如無君也詳此則發明之言正是問者之意朱子不以為然者而發明又主之何耶或問禘章集注非仁孝誠敬之至不足以與此云云蓋知禘之説則理無不明誠無不格而治天下不難矣輯講某嘗疑集注云云固是推崇得禘之説好然中庸却説明乎郊社之禮禘嘗之義治國其如示諸掌郊社禘固是祭之大者嘗却是祭之小者知郊社禘之説固能使治國如示諸掌知嘗之説亦能使治國如示諸掌乎如此則集注專一推崇禘祭之説似未盡合聖人之意某嘗謂中庸之説詳論語之説略不若只以中庸解論語則辭不費而義明饒氏此疑似矣然使中庸而曰郊社之禮禘嘗之義茍明其一治國其如示諸掌乎則集注專一推崇禘祭之説誠為過當而此疑為是今中庸以明乎四者而兼言以結之然則合四者皆明而後明於治國也必矣何嘗專舉嘗之一祭而謂國可治哉如此則中庸自合大小欲人之皆明此則因或人所問而得言其大記有詳略而理無餘欠非論語唯知禘而不知郊社嘗之禮義也集注因此明彼深得舉大該小之體雙峰此疑殆亦理有未明而不盡乎人言之意者歟考證王氏謂論語約而難知中庸詳而易見不若以中庸解論語辭不費而義明金氏按中庸是泛説論語是答或人之問亦恐各是一出王説正是竊饒氏之意者此不再辨金説理或然也祭如在章叢説在當為存在之在有事死如事生之意按語録引中庸洋洋如在為證則不必作存在説可也且下句祭神如神在之在亦作存在可乎亦作事死如事生之意又可乎如此則但當以語録為正王孫賈章集注引謝氏之説考證王氏云上蔡之説疑有病聖人據理而言豈問其知不知禍不禍哉若畏禍而為兩可之辭所以為心術之害者大矣非所以言聖人况此答拒之者至矣初非遜辭謝氏所謂遜非以阿意諂曲為遜特據理答之初不與辨而不當媚之意自見又全若不領會其諷己者使彼亦不得以怒己耳何兩可之有其曰據理而言則是矣謂不問其禍不禍則未也觀於危行言遜之訓與異日答陽貨之言則聖人亦未嘗以遜言為非蓋可見矣要之他人據理而言則多不足於遜聖人據理而言猶不失為遜所以不可及耳若夫王氏所謂兩可之辭為心術之害大者却是至論胡雲峰唯不知此故於無違之告木鐸之喻皆以為含二意也但上蔡所言則不可以此議之耳周監二代章尹氏曰三代之禮至周大備夫子美其文而從之語録問夫子損益四代之制以告顔子而又曰吾從周其説自相抵牾然以中庸吾從周之意觀之則夫子之從周特以當時所用不得不從耳若答為邦之問乃其素志也先生曰得之集疏蔡氏云夫子蓋歎其文之盛非美之也夫子周人也在禮則當從周如其自用必損其文矣觀其從先進之意文質彬彬之語答為邦之問可見集注既謂美其文而從之則語録乃朱子未定之説也蔡氏又是集其所聞於師友者為疏其曰歎而非美者殆亦祖述語録之意歟其曰觀其從先進之意文質彬彬之語答為邦之問可見者則恐未然蓋所謂後進之君子與文勝質之史二者皆指周末繁文之弊而言非指文武周公盛時之文而言明矣先進則正指文武周公盛時言之者也蓋文武周公之文既曰視二代而損益之矣則其文之郁郁者初豈有勝質之弊與後進之不自知其過於文者哉特以時異事殊文武周公之文至夫子之時如欲用之則又當損之益之與時宜之耳既曰有所損益則夏商之禮其可行於今者亦豈得不兼取之哉此所以因顔子為邦之問又歷舉四代以告之也至於中庸從周之言則有上文今用之之語自不害其為居下不倍之義與論語美其文而從之者自不相妨蓋非一日之言上下文勢既異則旨意自别文雖偶同不可引之以相證也又按或問有曰設使夫子得位而有作焉竊意其從二代之禮者固不能多於從周也觀此則從周從先進之言與舉四代告顔子之意皆不至於相戾矣通曰曰從周又曰從先進何歟從周者非從周之末從周之初也從先進者周之末而有文質得宜者猶不能不失乎周之初者也以先進後進皆為周末但取其文質得宜亦自不妨蓋既曰先進則不拘於一時凡前乎後進者皆可以稱之獨謂先進為周末而有文質得宜者猶不能不失乎周初之言為可疑耳蓋既曰文質得宜又何失周初之有失周之初則文質必不得其宜矣假如所言則失周初者文質得宜然則周之初文質反不得其宜耶豈通此段猶不能之不字恐傳寫誤添此一字耶當更詳之告朔餼羊章通引鄭氏曰子貢之意謂四時各有祭廟之禮請朔于廟告焉可也餼羊不必用也夫子之意若曰夫禮有其舉之莫敢廢也告朔用羊其來已久魯之不稟命於天王非一事也去一餼羊於禮無損然彼固謂先王之禮皆可以隨時而廢之不已遂至正朔之不稟非小故也是所愛者一羊而於禮無所愛也識慮之逺近於此分矣鄭氏此説自當時尚視朔者觀之則可通然魯當時則不視朔矣集注之旨甚明通正不當存此異説以眩學者事君盡禮章通引齊氏謂孔子與弟子學禮於大樹下而宋人伐其樹其亦以為諂歟伐樹不知其故不可臆其為此而引之以為證也關雎樂不淫章輯講謂關雎之詩一章是稱美后妃之德可以為文王之配第二章是推原始焉文王未得后妃之時求之如此其切也第三章是言今日文王始得后妃喜之如此其至也哀不傷樂不淫皆指作詩者而言蓋此詩是宫中之人所作其憂其樂皆作詩者之自憂樂考於朱氏詩傳可見雙峰皆以為文王之憂樂則其與懷婚姻者又何異哉既非詩之本旨尤非所以言聖人也哀公問社章集成集疏蔡覺軒謂哀公之問宰我蓋謀討三桓之廋辭按或問嘗有以此為蘇氏説而質之朱子者朱子曰昔嘗有以是問於尹子者尹子艴然不答既而曰説經而欲新奇則亦何所不至此言可畏也哉詳此則朱子不取其説可知不知覺軒又何為以此為説乎發明引張氏説以使民戰栗為哀公之言成事不説三句為夫子責宰我不正救之語發明自謂作責宰豫失言説則成事遂事二句全無著落從南軒説則三句皆有情否則付之闕疑可也輯釋備引二説按三句辭氣嚴正恐是責宰豫之言成事遂事既往只是言已出之意不説不諫不咎皆只言責之無及於事之意夫子嘗以於豫與何誅而責宰豫矣辭氣略與此同皆是以不責責之者語録謂此三句蓋駟不及舌言豈可以輕發哉詳此則成事遂事二句固不為無著落矣如南軒説則須添幾字讀方透恐未必然集注古者立社各以土所宜木為主通引馮氏謂王者立社取木之至堅且久者柏堅於松栗堅於柏周人存商之亳社而屋之魯哀四年亳社災當是木燼於火而公欲求木以植之故有問也通謂春秋書郊者九書社者一識變也哀公豈非以亳社災而問歟明乎郊社之義治國如示諸掌惜乎哀公之不能明此而宰我又不能為公明之集注既主土所宜木之説馮氏又以取木之堅且久者為説政恐所宜者未必堅久堅久者或非所宜然則但當以集注為據且馮氏謂柏堅於松栗堅於柏似矣然木之至久者莫若松而柏次之未聞栗能久於松柏也如此則堅者未必久久者不必堅馮説於此蓋自有所不通矣毫社災而欲植之木此其是否不可知郊社之書與義亦不過牽合而附會之耳殊無意味無足辨者管仲器小章通引或問舊説謂嫁曰歸三歸云者管仲一娶三姓而備九女如諸侯之制也發明亦採馮氏娶三姓備九女之説考證又引漢書三歸顔師古謂娶三姓女蓋諸侯三姓九女此則三女而已特奢耳未為僭也按或問或舉此舊説以問朱子朱子曰若此則為僭上失禮與塞門反坫同科矣今夫子但以為不儉則亦但為極臺觀之侈而未至於僭也朱子所以答或人者如此蓋不以舊説為當也今通者唯引此問辭而不引此答辭反若舊説為朱子所取然者豈亦採擇之未審歟此正如灑掃應對章趙氏不詳集注有非為二字便謂末即是本云云者相類胡氏標出趙氏之誤為二通凡例而不免躬自蹈之信觀書之難而著述之尤不易也發明每不滿於胡氏而亦效其尤無足道者考證援漢書三歸為證又以顔氏之言明其為三女而非九女似矣但漢書曰三歸顔氏曰三姓女亦不甚明白三女九女之數要亦未可質也竊意夫子以此為非儉集注以此為言其侈或問以為亦但為極臺觀之侈經旨不過如此而已不知諸儒皆汲汲援此不可證信之言以為説者何故儀封人章集注前主得位設教之説後備周流行教之説引纂疏輔氏謂注中本説意實而味長後説意切而味短通謂木鐸如明堂位所謂振于朝夫子得位之象也如遒人所謂徇于路夫子失位周流四方之象也儀封人但言木鐸政自兼兩意所以集注亦兼兩説輔氏之論非矣木鐸之喻若如通者兼兩意之説則封人之所譬極巧恐未必然况得位設教聖人之本心周流行教聖人之不得已觀於不仕無義之言與皇皇無君之意可見封人既非沮溺荷蓧之倫則其所喻宜有以得聖賢之本心矣且上文有何患於喪與天下無道久矣之言若兼後説則是終不免於喪也夫子而終於喪則雖周流四方以行其教亦空言無施而已何以救天下之無道乎然則集注存兩説何也曰前説固無以易而舊説亦或可通故兼存耳然主前則不兼後主後則不兼前決無一言自含兩意之理輔氏之言深有契於朱子前一説勝之旨然通者又是述饒氏之意以為説饒説今輯釋引之讀者考焉可也里仁里仁為美章通謂能擇乎是便是是非之本心擇乎是而不居焉則又失其本心矣况智者知而弗去今知其為里之仁而復去之亦不得謂之智矣經注擇字皆只泛言擇里而已未説到能擇乎是之意通者欲配從知而弗去上説故於擇字之旨深了一分恐非經注之旨更詳之富與貴章集疏蔡氏謂不以其富貴之道得之如干求請託巧於趨附之類按或問君子而有非道以得富貴者何也朱子曰是亦一時不期而得之非語其平日之素行也如孔子主我衛卿可得之類耳然則蔡氏干請求托巧於趨附之類非所以言君子誠如或人之所疑矣但衛卿可得不以道而得貴者耳不以道而得富如齊王授孟子室養弟子以萬鍾之類是也富貴貧賤不以道得之通引齊氏曰富貴貧賤孔子非對言也人欲去貧賤則必思欲處富貴而不處於仁也夫子分明以富貴貧賤對言觀其皆曰不以其道得之可見富貴不以道得之是已有偶然可得之富貴但不以道得之故不處耳貧賤不以道得之是方在貧賤未見有富貴可得但不可厭貧賤而不安耳如齊氏之説則是皆主貧賤者言之然則經文何以不先言貧賤後言富貴耶齊説求奇非經注旨不可信也我未見好仁章通引馮氏曰好仁惡不仁利行之事用力於仁勉行之事聖門如冉有自謂力不足而自畫則勉行者亦寡矣通自謂好仁惡不仁利仁者也有能一日用其力志於仁者也利仁者我未之見志於仁者我亦未之見此固聖人所深歎也發明引輔氏曰此章三言未見初言成德者之未見次言用力者之未見末言用力而力不足者之未見按經言我未見力不足者則此所謂未見是用力未見其力有不足者耳三説皆即以為未見用力於仁者似隔一重叢説謂前後兩未見皆言無此人中未見謂無是事此節未見其人之意却在有能乎三字上詳此可見三説之未盡人之過也章發明引饒氏曰尹氏見上句各於其黨兼君子小人而言故下句亦作仁不仁説要之上句雖兼兩邊觀過知仁恐只説這一邊好底云云通引輔氏曰此章但謂仁者之過若不仁之過又何觀焉又引蔡氏曰經但曰觀過而觀人自觀自無不備但曰斯知仁而仁不仁皆在其中通則自謂人之過兼君子小人而言觀過獨指君子而言輯釋亦引饒蔡與通之説蔡氏自觀之説非經本旨朱子已於或問語録中破之矣無足論者但蔡氏斯知仁而仁不仁皆在其中之説正與輔説相反通者既兼存之而不與折衷至其所自為説則又專主輔説蓋通是述雙峰之意雙峰本不以集注尹説為然通雖祖其意而又為集注所礙不敢明言尹説之非故蒙朧如此爾按諸家所以如此立論者蓋因視其所以章集注分視觀察之義而創為此説也然此章只有一個觀字如諸家之説則須章首元更有一觀字或視字方可通耳殊不思上曰人過各於其黨方是説過有君子小人之類不可混然不為分别下曰觀過方是觀其所過何事乃可分别其類類分而後仁不仁乃可知耳如此則厚薄愛忍必觀而後知非既知其孰為厚愛孰為薄忍而復觀也更以集注愚按以下意參之尤信通與發明所引諸説適所以亂集注而眩後學其亦不善於通不善於發明也矣朝聞道章集注與圈外程子之説諸編之説皆只發明得集注之意竊意集注是以朝聞道為夕死可也之事實程子是以夕死可也為朝聞道之應效如集注説則可也二字是主朝聞道而言無復遺恨之意也如程子説則可也二字是主夕死而言然其原却自聞道上來雖死亦可之意也蓋道是事物當然之理人所不可不聞者也苟未聞之則生既不順死亦何安如是而終身焉豈得無遺憾哉今既得聞則可以無愧於為人矣死期雖近亦可無遺憾矣此集注之意也事物莫不各有當然之理雖死亦道中之一事耳未得聞道則無以知事理之當然行險僥幸無所不至死雖人所不免亦將貪戀顧惜而不安於死矣故既得聞道則事皆合乎當然之理不假求矣雖死期近在今夕亦道之當然爾當死而死又何不可之有此程子之意也集注之意正意也程子之意餘意也集注固可以該程子之説矣亦豈有二意哉一貫忠恕章集注曽子於其用處蓋已隨事精察而力行之但未知其體之一耳輯講曰此説有些個病曾子既是於事上精察力行也須於心上操存涵養精察力行便是萬上工夫操存涵養便是一上工夫若只精察力行而不操存涵養却是無忠之恕萬外無一一上如何著得工夫操存涵養精察力行雖有在心在事之分其實皆只是萬上工夫但集注專言精察力行而不言操存涵養者以精察力行四字於事之用為切耳非謂曽子於操存涵養之工有所闕也集注所謂於其用處云者猶言下學人事之意云爾下學人事則自然上達天理人事即用天理即體體固不離乎用特以曾子未能自悟故必待夫子告之而後唯耳非曾子精察力行之時有用而無體也然則操存涵養精察力行何者不是下學之事今遽以精察力行屬之萬以操存涵養屬之一固是有此意若便以二者為一以貫之之事則未可也蓋方下學之時萬自是萬謂萬中各有此一之理則可謂一理已貫乎萬事則未可也輯講問集注於用處精察力行似兼知行而言於體上只説知而不及行恐亦是未備處否饒氏曰體用皆須知行且如物格知至是知此一意誠心正是體此一若能知而不能體則一依舊不是我底如何能貫又曰精察只説得當然處不曽説得所以然處力行只説得踐行處不曽説得存養處體用之分無窮若以修己對治人而言則修己是體治人是用若以一理對萬事而言則理是體事是用若又合而言之則修己治人皆是下學之事又皆只是用而所謂體者不過即為是事之理而已雙峰唯便以修己之體為一理之體故疑集注未知其體之一為只説知而不及行殊不思集注於其用處之用何嘗專指齊家治國平天下而言雖格致誠正之事皆用也曽子於其用處精察而力行之精察便是格物致知之事力行便是誠意以至於平天下之事雖皆是於用處用工然天下無理外之事亦無事外之理於用處精察力行則體固在其中矣但理微而用著故曽子雖於用處著工而猶未知其體之一不能無待於夫子之告耳一唯之後乃悟嚮之所以精察而力行者皆此一理之所貫也此一知字只是悟意初非對行言者以為只説知而不及行誤矣此章體用正與費隱體用相似皆非就人已上分者雙峰唯混而言之此其所以不得經注之旨也其以當然對所以然説所以然正是理之一處朱子安得言於曽子未唯之前乎以踐行對存養處説則愚前段之辨悉矣輯講謂程子遺書於聖人教人各因其才一條引忠恕違道不逺而其下繼之曰此下學上達之義與堯舜之道孝弟而已矣同觀其語意正是以中庸之忠恕釋論語之忠恕言下學忠恕可以上達一貫亦猶孝弟可以盡性至命也集注以其與此與違道不逺異者動以天爾之意不同故刪去與堯舜之道孝弟而已矣之意同一句却恐非程子本意蓋程子兩説自是兩意而互相發明若以此忠恕為夫子之道則與中庸之意誠異若以此忠恕為學者下學上達之事則與中庸之意正同集注主一而廢一所以於曽子用工處又别説從一路去以老先生之髙明精密而於前人語意尤看得未盡如此按朱子嘗曰忠恕二字是那一貫底注腳今若要做那忠恕去湊成聖人忠恕做那忠恕去湊成一貫皆不是又曰一貫譬是天然底花為是天然底難説故把忠恕來説恰如把做底花形容那天然底花又曰曽子説忠恕當時門弟子想亦未曉得惟孔子與曽子曉得自後千餘載更無一人曉得惟二程説得如此分明其門人更不曉得惟侯氏謝氏曉得今詳此三條前二條則明一貫忠恕之同異後一條則言忠恕一貫之難曉然朱子既如此説而雙峰猶議其未盡前人語意又不知朱子與饒氏果孰為能曉者竊以前二段觀之則雙峰於朱子體用知行之分猶有所未曉况望其能曉一貫忠恕之義乎若其引遺書所謂堯舜之道孝弟而已之意同而朱子刪之者豈朱子之意則以為忠恕却有聖人學者之分孝弟則雖聖人亦無以異於學者若引彼證此則聖人之忠恕亦無以異於學者之忠恕矣而可乎謂中庸之忠恕為下學上達之事則可謂論語忠恕為下學上達之事則不可何則論語忠恕自曽子所見言之則忠便是一恕便是貫朱子忠恕是一貫注腳之言意蓋如此若曰下學此忠恕而上達一貫是即下學一貫而上達一貫也蓋此忠恕已是上達之事即一貫之異名耳朱子做那忠恕去湊成聖人忠恕與一貫皆不是之言蓋謂此也夫子告曽子以一貫曽子告門人以忠恕今朱子乃謂當時門人想亦未曉得者豈謂門人未曉學者之忠恕哉特謂其未曉聖人之忠恕耳觀集注曽子有見於此與欲人易曉之言此曉字與語録曉字淺深又自不同則知曽子所見者見其真門人所曉者曉其似真似二字本胡氏通中之言集注正欲發明曽子所見之真者以示人故力以忠恕為聖人之忠恕耳至於門人之所曉者不過盡己推己之事忠恕之正名正位即中庸所謂違道不逺者是已特一貫忠恕之似者本非曽子所見聖人之忠恕又何必於此言之乎若以為論語之忠恕即中庸違道不逺之忠恕則又只説得門人所曉之似者曽子所見之真何由而明哉然則遺書之言非歟曰觀程子引大本達道天道人道之言皆不用中庸本文之旨則此言又何可以辭害意乎况朱子於程子之言有足其所未備者有缺其所未安者大抵務欲不失聖經之旨而已固未嘗泥也雙峰謂其於前人語意猶看得未盡為髙明精密之纍者愚謂其只欲學者尊己不肯為朱子下此之謂也其實集注欲發明曽子所見以示人則遺書此語豈容於不刪哉叢説謂程子天道人道大本達道之言大抵因曽子借忠恕形容一貫恐學者疑之所以多是借説以明義理固可借用非獨忠恕也此雖未必是程子立言本意然以注證經均之為借此意自發得好事父母幾諫章發明引張氏説以幾諫為諫於未著又引饒氏説以不違為且順父母意思不可與之違逆發明自謂南軒雙峰不妨自為一説按二説皆語録之所不取發明又引之何耶大凡説經貴得其旨得其旨則一説足矣兼存異説祗惑人耳若以為有補於世教而取之則當自為書不必附在聖經之後也古者言之不出章通引齊氏曰出於口易有餘行於身易不足忠則盡已而不患於不及信則以實而不患於太深觀齊氏意似以忠主行而信主言者恐非經本旨此章元無説忠信意公冶長賜也何如章通謂讀集注者每以子貢未至於不器便是未至於子賤殊不知子賤之君子亦未便是不器之君子特子賤能有所取以成德可充之以至於不器子貢雖有用之成材有所局而未至於不器也輯釋亦引之觀集注上文有子貢見夫子以君子許子賤之辭則所謂子貢雖未至於不器者正對上文以君子許子賤者言之安得以子賤為非不器之君子乎觀或問有較其輕重誠與稱子賤者有差等之言則所謂子貢雖未至於不器者正是未至於子賤也况通者又自謂子賤能有所取以成德成德則體無不具用無不周而所以為不器者不外是矣又何待於充之而後至哉參以上章集注下斯斯此德與何所取以成此德之言可見子賤之君子即為成德之君子尚何疑乎雍仁不佞章通謂集注全體不息如真蔡之説則仁之體本自渾全如陳饒之説則以人全體之愚玩朱子之意仁道至大是説仁全體而不息者是説仁者之人故著一者字云云輯釋引其師説曰通主仁者之人之説自是程子曰公而以人體之則為仁此本仁之説也曽子曰士不可不𢎞毅仁以為己任𢎞也死而後已毅也仁者本心之全德必欲身體而力行之全體此仁即𢎞也一息尚存此志不容少懈此不息即毅也云云發明云云若以全體為仁之全體則仁道至大一句已該之如何接得非全體而不息者不足以當之當之是此人能當此至大之仁道也按諸家説全體不息之旨多不同通與發明輯釋深有折衷故録于此以便遺忘子使漆雕開仕章集注斯指此理而言饒氏曰斯字恐指仕言就仕上説較分曉聖人使開仕必其材可以仕矣若謂斯指仕言開於仕未能信是材未可以仕也材未可仕而使之仕是聖人知人不明賊夫人之子也尚何以此責子路為哉然則固當以集注為正通引陳氏曰云云其所見處已自髙於世俗諸儒但其下工夫不到頭故止於見大意爾曽點亦然輯釋亦引陳説按集注謝氏云他日成就其可量乎語録既云開有向進之意又云開之進則未已然則陳氏謂其工夫不到頭此言何所據耶程子已見大意之言但據開與夫子答問之時言之耳固非以此為開終身之斷也若以此言曽點則有他書可據謝氏既言開之學無可考而陳氏乃以之與點並言不亦誣乎通盡略語録此等議論至其所以自為説者亦蹈襲陳氏之意誤人甚矣子謂子貢與回孰愈章子曰弗如也吾與女弗如也集注與許也夫子以其自知之明而又不難於自屈故既然之又重許之此其所以終聞性與天道不特聞一知二而已也俗説吾與女弗如也皆以為夫子亦以子貢為弗如顔子而已今觀集注故既然之一句是説上面弗如也一句又重許之一句是説吾與女弗如也一句若如俗説則又只説得然之之意而不見所謂許之之意蓋許是許其將來有進非許其聞一知二而已也其曰弗如也猶曰女誠弗如顔回也其曰吾與女弗如也者猶曰吾許女之有進以女能自知其不如顔回而又不難於自屈也如此方説得集注然字許字意出而下文終聞性與天道不特聞一知二之言方見得是許之之意宰豫晝寢章集注晝寢謂當晝而寐通引馮氏謂或云寢內寢也又引齊氏謂晝不居內觀朽木糞牆之喻正是言其志氣昏惰則寢之為寐無疑若晝居於內則是徇欲失禮夫子責之又當不止此矣馮齊求奇之謬通者援引之失皆不足道也居蔡章山節藻棁考證按禮記管仲山節藻棁君子以為濫以此例之則山節藻棁似指宫廟之僭侈與居蔡各是一事同歸不知爾當考按語録大夫不藏龜禮家乃因此立説未可盡信古説為僭若是僭不止是不知便是不仁了詳此則以山節藻棁為宫廟僭侈又似乎不仁以居蔡為各是一事亦無以見其不知矣語録又謂三不知皆是瀆鬼神之事况春秋傳只説三不知若如考證之言則不知之目不止於三矣豈夫子於彼有所遺耶唯以為山節藻棁為藏龜之室乃見其諂瀆鬼神處與答樊遲問知敬鬼神而逺之之言有契可以為不知之實耳考證何必求異於集注乎令尹子文章集注當理而無私心則仁矣纂疏胡氏曰夫全體者無虧欠也不息者無間斷也若外無虧欠間斷而忠之私意猶在亦不得謂之仁必見於事者當理發於心者無私然後可以為仁既曰全體又安有內外之異如胡説則全體不息四字只是當理二字之意恐未必然勉齋黃氏嘗謂全體二字已足以該當理無私心五字之義矣以此推之可見纂疏陳氏謂仁道至大非可指一事言若三仁夷齊是於大變中做事見其當理而無私心若子張之問子文但以一事之小者而欲信其大者則不可也其仁不仁在乎心之公私理之當否非關事小而不可謂之仁也朱子嘗言若一事上能盡仁便是他全體是仁了若全體有虧這一事上不能盡仁推此可見季文子三思章集注是以君子務窮理而貴果斷不徒多思之為尚纂疏趙氏謂窮理是思時事發明窮理明也明於方思之初按饒氏云窮理是思以前事此説至矣蓋窮理之思與臨事之思不同趙氏謂窮理是思時事則混而無别矣發明明於方思之初方初二字亦與趙説不甚相逺皆不得雙峰前字之旨者也寧武子知愚章集注程子曰亦有不當愚者比干是也朱子曰比干於義却不當愚只得如此處考證歷舉衛侯失道武子欠正救之功不為無失諫之過者以見不當愚之意按比干武子均為貴戚之卿而比干不當愚者語録辨此極詳然皆引而不發若如考證所説則是集注引程子此條微有不滿武子之意今詳程子之説上句以亦有字者字發其端下句以是也字決其辭則是比干較之寧子自是不當愚者武子較之比干自是當愚者未嘗稱比干以見武子之不當愚也况語録並無不滿武子之意考證毋乃不得程子之意乎唯四書通以為衛成之患在外欲免之非沈晦不可紂之惡在己不諫而諉於沈晦不可也其言似為切當四書發明亦不取之故録于此以俟觀者擇焉今觀輯釋引通説置編中可謂乃師之忠臣也巧言令色足恭章饒氏謂微生髙是無心失禮之過左丘明所恥是有心悖理之惡微生髙曲意徇物掠美市恩不可謂之無心失理既害於直則不得謂之過矣特與左丘明所恥者惡有淺深耳見過內自訟章通謂訟者欲勝人內自訟則能勝己集注只以自咎釋自訟之義而通乃以勝為説侵過一重恐非經注之旨更詳之四書管窺卷二
