body:
  text: 欽定四庫全書四書管窺卷五元史伯璿撰孟子離婁上首章先王之道仁政饒氏仁政第一是封建云云或問孟子不十分説封建何耶曰當時大併小強併弱封建雖壞其迹尚存兼之封建王者之事孟子當時只為諸侯言之所以不及此封建井田至戰國時其制同於廢壞謂封建其迹尚存故不言非也曰封建王者事為諸侯言所以不及此為近之但欠發明耳蓋井田封建均之為王者事但井田雖一國亦可行封建非兼制天下不可舉孟子惟以井田學校告時君者是先其所可行者也若封建則必矣天下定于一之後乃可得而班爵分土耳若目下併與井田一齊告之則九服之內方為七雄所分據王政始行孰肯斂手聽一國宰制分割齊梁雖地大民衆亦不過僅足為郊畿而已國內亦無可以分封也既未可行而先告之則時君將併與井田學校之可行者皆一切視為迂濶而莫之肯信矣豈告人之序哉規矩方圓之至章名之曰幽厲雖孝子慈孫百世不能改也集注幽暗厲虐皆惡諡也茍得其實則雖孝子慈孫愛其祖考之甚者亦不得廢公義而改之也饒氏謂改是要改其惡古人諡法最公後世亡國之君亦得美諡改如何是改其惡經之上文有名之曰三字則下文不能改正是不能改其惡名耳况集注所謂不得廢公義而改之者正謂惡諡既得其實即是公義所在公義則不可廢故孝子慈孫愛祖考之情不得遂是以不能改也饒氏要改其惡四字正是不以集注之説為是觀其下文古人諡法最公以下三句其意蓋謂古人諡法最公則諡不可改所以子孫愛其祖考欲追改其惡則無及其集成與通引其説皆作改其惡惟發明引饒説以為改其惡諡豈亦知其不通故如此改之耶蓋發明於凡例中嘗以纂節潤色三陳胡輔之説自任則此處諡字是其所增無疑兼之又於皆得美諡之下亦添公義廢矣四字與諸本不同又可見矣輯釋依發明所改而引之要之皆非輯講之舊矣不可不改三代之得天下章不保四體饒氏謂四海依舊在云云四體依舊在只是我不得有其身非無了此物他依舊在只是不是我箇了四體依舊在只是我不得有其身此句不可曉縱在亦不過一枯骸耳非如四海宗廟社稷之真依舊在而但為他人所有之比也為政不難章集注得罪謂身不正而取怨怒也饒氏謂云云孔子墮三都便得罪於三家了云云豈可只要不得罪於巨室孟子之言亦是一説耳罪是惡逆悖理之名不是咈人私意之謂若巨室強僣而我治之却是巨室得罪於我至於我治之不得其宜與當治而不治此則我之罪也豈可謂才治之便是得罪於彼耶雙峰謂孟子之言亦是一説耳愚謂孟子此説之外他無所謂得罪之説若以治之為得罪則非所謂罪矣通謂三代以前上有德教下無巨室此曰得罪於巨室者為戰國時言也輯釋亦引此説集注以巨室為世臣大家三代以前何嘗無世臣大家也耶小德役大德章斯二者天也集注天者理勢之當然也饒氏謂集注將理勢二字來説小德大德小賢大賢以理言小大強弱以勢言輯釋亦引之按語録問天下無道小役大弱役強亦曰天何也朱子曰到那時不得不然亦是理當如此然則小德大德小賢大賢固以理言有是理則有是勢小大強弱固以勢言有是勢必有是理蓋若専言勢則不得謂之天矣輔氏謂有道則以德為大小無道則以力為強弱二者皆理勢之當然也斯言盡之矣齊景公曰發明採汪氏齊景畏天者也畏天者保其國輯釋亦引之按畏天者須如太王句踐方可以當之觀於彼章或問云云然必自強於政治期於有以自立如獯鬻與吳之方強太王句踐外卑躬以事之內則治其國家和其人民終焉或興王業或刷其恥此智之明也使惟敵人之畏而終不能自強是無恥而茍安也又何取於智哉詳此則景公之巽言橫涕正是或問所謂不能自強無恥茍安者爾畏天者制節謹度不敢縱逸使景公能盡此八字則命自我作雖復桓公九合一匡之業可也何慊於己何畏於吳而出涕女之耶然則景公非畏天者特畏吳者耳汪氏以畏天許之過矣居下位不獲上章饒氏謂中庸自天下之達道五以下恐只是子思之言子思向來只為學者説所以説居下位起若孔子告哀公則未必説居下位及取友等事通與輯釋亦引此説朱子以家語為證且有見於此章終十二章之意彼豈不知家語之不足言而引之耶又豈自無所見而但據家語以為説乎雙峰力詆家語之不足信遂分天下之達道五以下自為一章且謂哀公問政章至至誠無息章皆論誠殊不思既以不可不知天以上自為一章則知天以上何嘗指出誠之一字直至達道達德九經處方再言所以行之者一猶是引而不發直至章末方露出一誠字今曰自哀公問政章以後皆言誠則其説自有所不通矣通者於中庸取其六節之分既不審矣而又取此説於此可謂誤矣其曰告君未必説居下位及取友等事似矣但章首言為政在人取人以身為人君者若不知士之實行如此則珉中玉表阿順逢迎者皆得以售其姦矣何由得人以為政乎然則此雖學者之事為人上而以取人為職者亦所當知也雖夫子告哀公而及此亦何不可之有集注此章見思誠為修身之本而明善又為思誠之本饒氏謂集注明善又為思誠之本似明善之外又有個思誠恐非本文之意蓋明善便是思誠通謂余觀集注無可疑者所謂思誠為修身之本是修身以知行為先明善又為思誠之本是知行之中又當以知為先也輯釋亦引此説中庸以誠之者對誠者言孟子以思誠者對誠者言思誠與誠之者立言既異則誠之者固兼知行而言遂以思誠與之同義恐不得孟子本意愚往年因雙峰此説亦以己意辨之後來四書通板行正與契合甚以自信近因溫理四書再考集注語録之意乃疑前辨之未當豈雙峰所疑却是孟子朱子本意耶謹按語録有曰明善自是明善思誠自是思誠明善是格物致知思誠是毋自欺謹獨明善固所以思誠而思誠上面更有工夫在此言正是答學者思誠莫須明善否之問似與集注語脈相類又按論語九思章集注引謝氏之言曰未至於從容中道無時而不自省察也雖有不存焉者寡矣此之謂思誠此意又與語録思誠是毋自欺謹獨之言相合豈朱子直以思誠為省察之事故如此説耶通所謂知行之中又當以知為先者似矣所謂修身以知行為先者則未順蓋修身即事行之事先則對後而言曰修身以知行為先則修身又在知行之後是知行之後更有修身之工夫耶殊不可曉當更詳之集注遊氏之説發明四者孟子言本有次序今總説其效見則皆見不假言次序此章之末至誠而不動者未之有也至誠即誠身到極處動即順親信友得君得民是也可不必言次也發明此説是矣但孟子是逆推其序遊氏亦暗順言其序孟子自末而本遊氏自本而末於總説之中有循序者寓亦所當知也求為季氏宰章連諸侯集注連結諸侯如蘇秦張儀之類考證按戰國遊士合從連衡司馬公曰合從者六國之利也孟子嘗言交鄰國之道則合從未必不然但連衡事秦不可為國故孟子定連諸侯者之罪集注併及蘇秦爾豈以蘇秦初亦説秦惠王以連諸侯之䇿不用而後説六國以從所以舉儀秦並言歟竊以連合本是虛字從衡乃是實事孟子言連諸侯則連猶合也未必以連為連衡合從雖是六國之利然未必合乎孟子交鄰國之道果如所言則連衡亦是以小事大孟子又何為不取之乎孟子平日絶口不言利觀其闢宋牼以利説罷兵之言可見從人所以説六國者何往非利謂孟子猶有取焉吾不信也若孟子交鄰國之道則無往而非仁義矣從人軌轍亦在連諸侯之列服刑尚何疑乎事孰為大章叢説事親守身雖對説而守身又為事親之本下文曾子只是事親之凖則意謂事親固當如此然有曾子之守身則可爾通此章上並言事親守身下只言養親守身亦是養志之大者發明此章前以守身為事親之本所以論其理及後實之以事則惟舉曾子之事親而守身不及焉然觀曾子養志如此惟恐一毫咈親之志欲人子不失其身尤父志之大者其能謹守此身以承親志不言可知矣南軒謂曾子能盡守身事親之道故舉其養志之事者最為得其旨輯釋亦引發明之説竊意此章專為事親而言上節雖以事親守身對言正意只在不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也四句上是上節言事親者當以守身為本也下節引曾子養親一事是言事親者當以養志為要也故又結之曰事親若曾子者可也但言事親不言守身可見此章専為事親而言矣叢説發明皆言守身為事親之本似得其旨惜乎又於下節曾子養志處皆欲説作守身之意則非本章之旨矣發明與通推言守身亦是養志之大叢説又説事親固當如此然有曾子之守身則可爾者不為不新但恐皆非孟子之意政不必如此推也通又謂此章首以事親與守身對説末獨舉曾子之事親而言者前已言曾子之守故也不知所謂前已言曾子之守此守字何所指也若以上節守身之守即為曾子之守則上節不過是泛言事親當以守身為本下節却引曾子事以證事親之意耳然曾子事親之事亦非一端酒肉養志特舉其一節以示人初非謂此章専為曾子而發曾子只有此事可舉也若以前篇曾子守約為曾子之守此則不可強合要亦不足深論也曾子養志集注曾子則能承順父母之志而不忍傷之也饒氏謂曾晳不私其口體之奉常有及物之心冠童舞詠有老安少懷氣象曾晳有這意曾子便能承順他輯釋亦引饒説雙峰此論固新恐亦求之太深竊意孟子此言不過如橫渠所謂若親之故舊所喜當極力招致賓客之奉當極力營辦務以悅親為事者政不必求曾晳之志何如也樂正子從子敖章饒氏曰樂正是樂官之長子孫遂以為姓如司馬亦是因官以為姓樂正司馬皆是以官為氏者非姓也姓與氏不同樂正子見孟子云云集注王歡孟子所不與言者則其人可知矣樂正子乃從之行其失身之罪大矣又不早見長者則其罪又有甚焉故孟子姑以此責之通謂自常情觀之失身之罪大於不早見長者集注以為不早見長者之罪又甚於失身辭嚴義正凡從學者當知之觀集注於失身則曰其罪大矣於不早見長者則曰又不早見長者則其罪又有甚焉者兩言又之一字其意蓋曰失身之罪既大而又不早見長者故其罪既大而又有甚焉者耳非謂不早見長者之罪又甚於失身之罪也故其下文姑以此責之之言繼之姑之一字可見集注之意況於下章又曰此乃正其罪而切責之此所謂姑彼所謂正輕重之意見矣通又曰凡從學者當知之則其所主狹陋而非談經之體矣子之從於子敖章饒氏謂樂正子依王歡來欲省飯食之費爾樂正子將作無緊要事看了殊不知才一失身便是失其親將來王歡或引薦之則那時去就愈難區處孟子所以切責之通謂論語因不失其親亦可宗也樂正子才從子敖來便是所依者失其所可親矣他日如何宗而主之此是樂正子不能謹之於始而慮其所終處孟子安得不正其罪而切責之饒説發明輯釋皆引之樂正子只從子敖便是失身於小人便是有罪故孟子深責之至於不可宗又是將來事若孟子只慮其將來如此而責之則是目下失身之罪反為緩矣雙峰推而言之猶未甚害通又蹈襲而力主之則似乎目下失身之罪又未足為大者豈孟子之意哉通每因他人之説又為敷演一畨以為己説殊無意味而反失其旨皆此類也不孝有三章集注趙氏曰於禮有不孝者三事云云饒氏謂趙氏以意度説自好所以朱子不破其説通與輯釋皆引饒説按輔氏云此必見於古傳記趙氏時其書尚存故引之今則不復存矣此説得之况趙氏明説於禮有此三事必有所據雙峰乃謂其意度説何耶惟雙峰専以意度古人故於史記家語等書朱子所引用者一切皆以意度而不之信噫古書尚不足信雙峰又足信乎通既引輔説又引饒説可謂主見不定發明則専取輔説善矣輯釋乃從通而不從發明何耶仁之實事親章集注有子以孝悌為為仁之本其意亦猶此語録問有子以孝悌為行仁之本孟子以事親從兄為仁義之實何也蓋孔門論仁舉體以該用即所謂専言之者也孟子言仁必以義配所謂偏言之者也集疏蔡説與語録同清所張先生嘗謂余曰朱子於論語嘗以孝悌為仁之本作偏言之仁説矣今又以彼為専言之仁朱子又以彼章對下章鮮矣仁為偏言専言之分則其為偏言無疑矣豈此處所言猶是未定之説耶意者彼章専以愛言以其理之一也此章分愛敬言以其分之殊也今觀發明叢説亦如此分别讀者考焉可也仁義之實集注仁主於愛愛莫大於愛親義主於敬敬莫先於從兄饒氏謂仁義有以性言者有以德言者有以道言者此章嘗作道説集注仁主於愛義主於敬八字恐非本文之意若曰仁之道主於愛義之道主於敬可也按雙峰分别性德道所言不同且謂此章當作道説是矣但曰仁主於愛義主於敬八字非本文意則未必然也蓋性也德也道也雖有三者之分然性故性也德即全得此性者也道即循此性而行者也捨性固無以為道又將何以為德故四書之言仁義雖或以德與道言然未有不本於性者也然則解釋其義若不從性上説來則道與德皆無其本矣而可乎如此章言仁義之實曰仁曰義何嘗不自性上説來至曰仁之實事親義之實從兄然後乃見性之發於用者此則所謂道也朱子曰仁主於愛義主於敬却正是本文之意若必欲釋為仁義之道則本文何不曰仁道之實義道之實耶以此見得方説仁義未見得是德是道直至説之實事親從兄是也方見得是説仁義之道若於方説仁義二字便以道字攙説之則下文之實事親從兄是也二句便説不去了便如天命之謂性性固専指理言然朱子釋天命則未嘗不兼理氣言之若攙先於天命處専主理説則便有所偏矣善讀者以類而推則朱饒之是非不難辨矣離婁下首章得志行乎中國若合符節集注得志行乎中國謂舜為天子文王為方伯得行其道於天下也若合符節言其同也饒氏謂舜是東夷之人文王是西夷之人皆得志於中國便如符節兩處來相合一般集注解得志做得行其道説得道字太早得志是得遂其志留得箇揆字在後面説揆正是説道纂疏輔氏曰孟子末嘗説著道字然曰行乎中國行便是道曰其揆一揆亦是道按孟子上言舜文地之相去既遠世之相後又久可謂大段不同然得志行乎中國却恰好相似故以若合符節一句譬其得志行乎中國之同處饒氏必言其東西相合於中國似乎符節兩處來相合然者則粗淺而無味矣其曰皆得志於中國又曰集注解得志做得行其道又曰得志是得遂其志皆掉了行字説故病集注道字説得太早殊不思集注是提得志行乎中國一句起釋雙峰乃謂集注釋得志做得行其道可謂不盡乎人言之意矣況集注若不説行其道則行乎中國是行箇甚麼豈雙峰之意但以自東西來中國行為得志耶此尤粗淺而無味者也輔氏之説甚善非雙峰所及揆字之義後段詳之其揆一也饒氏謂其字指舜文而言揆便是符這一箇揆是天與之此揆不是人做得集注言度之而道無不同又隔一皮了不曾解得其字揆度也與權度一般但揆義較重度有二音集注此二度字恐當從入聲今人言自揆言揆諸心恐亦如此如雙峰説則度字似當從去音者未知孰是至曰揆便是符是天與不是人做此則非愚所及皆闕之以俟知者君視臣如手足章集注潘興嗣曰孟子告齊王之言猶孔子對定公之意也而其言有迹不若孔子之渾然也蓋聖賢之别如此通謂集注釋對定公之語一謂二者各當自盡其道一謂君不患臣不忠而患無禮臣不患君無禮而患不忠一謂君使臣以禮則臣事君以忠夫子之言含此三意不露孟子則獨得其末意爾發明意亦與通相似輯釋引之按聖賢之别先儒言之詳矣通以孟子獨得夫子所言末意者固是愚竊以為定公宣王為君之事勢亦有不同使孔子而告宣王雖不至如孟子之有迹然亦未必無以警之孟子而告定公縱不能如夫子之渾然亦未必無以喻之蓋定公魯之人君而不専問使臣之道乃兼以臣事君者為問意者定公之時三桓擅命其所以事乎已者不忠甚矣定公此問其意固宜有在觀於論語集疏王氏之言可以意會故夫子但告以各盡其道而已豈不以擅命之臣既未可以力服又莫可以義責則惟有盡其在我者以先之則庶乎其可耳宣王則制命在己與定公命在強臣者之事勢不同矣孟子不待其問而自以此告之是必宣王遇臣禮薄有如集注所云者觀其以為舊君有服而難孟子則其平日但知責臣忠己者又可見故孟子深言報施之道以救其失而警其心非泛然告時君之比也安得盡同於夫子告定公之言乎讀者詳焉可也君仁莫不仁章通謂集注引張氏説蓋謂上篇為正君而言故曰仁曰義又曰正此章為君而言故但曰仁義而正在其中竊意上章若只又曰君正莫不正亦與此章無異何處見得臣正君意惟上章前有格君心之非之言後有一正君而國定之語方見主於臣當正君之意爾此章但言仁義而正在其中固是但謂直戒人君故不言正則未必然也君子深造章通謂深造之以道是工夫居安至逢原是自得後功效大要在勿忘勿助集注謂有所持循與潛心積慮是勿忘以俟夫默識心通與優柔厭飫是勿助按勿忘是不可忘其所有事勿助是不可有所作為以助氣之長今集注欲其有所持循句上有君子務於深造而必以道者兩句正是為欲進而不以道則無所持循者發若忘則併欲進之意亦忘之矣潛心積慮優柔厭飫八字是對下文急迫求之而言乃是欲進而不以道亦忘之謂也俟夫默識心通與優柔厭飫亦是論工夫當循循有序無凌節躐等之意與勿助亦不相似助則更不説工夫了通惟便以正助為義襲故如此見此意已於前章辨之此不再述博學詳説章輔氏曰博學詳説則是深造之意也反説約則是自得之意也但上章以行言此章以知言知與行互相發也叢説謂上章主於行而知在其中孟子意主於行者為尤重也程子則専主於知故在圈外按上章以道之道集注以為進為之法語録又曰道是造道之方法如博學審問慎思明辨篤行之次序即是造道之方法然則上章固兼知行而言此章則承其意専以知言之以見知之亦當如此爾輔説此章以知言是矣謂上章以行言則亦未盡當以叢説之言為斷禹惡旨酒章文王視民如傷望道而未之見集注民已安矣而視之猶若有傷道已至矣而望之猶若未見饒氏謂平日視民便如我著刀傷相似望道或以為望治雙峰如傷之説雖若深切但於文王民已治矣之意説不去此意正如傷居爾體痛在朕躬之言相類若説民有未安視之如我著刀傷却有意思民已安矣我何故自若刀傷如爾體無傷則朕躬何故自痛雙峰本要説得深切而反無意味不若集注之自然也以望道為望治語録或問辨之詳矣當考君子之澤章豫私淑諸人也集注私猶竊也淑善也云云故我得聞孔子之道於人而私竊以善其身發明私竊以善其身解諸人字不順不若云私竊其善於人文意方順按集注得聞孔子之道於人而私竊以善其身二句通解私淑諸人四字之意是先解諸人字却解私淑字取其易曉爾況曰以善其身方見所以用其善處發明謂其解諸人字不順豈不思其上有聞孔子之道於人一句耶抑病其解得句法顛倒耶但發明所謂私竊其善於人而不見所以用其善處信乎造語之難如此天下言性章集注曰程子曰此章専為智而發輯講這一章本是説性不是説智若把做智説則首尾不類初説性中間又説智後又説故若曰説智則中間足矣又何必兼首尾説發明每讀此章不能無疑於程氏之説得饒氏此説以讀此章意豁然矣此章専言性極是輯釋備載饒説而不引發明此語但自謂今按饒説與朱子之意稍異亦宜知之按此章専為智發而先説性者蓋性是統體智是一端先説故者以利為本以見發見自然者為性之正智亦性之一端而以鑿見惡鑿正與利相反豈性之正也哉若大智則自無穿鑿而皆出於自然矣故下文又以坐致為説以深明自然之是穿鑿之非程子之言無以加矣蓋本欲言穿鑿之非大智患人不以為然故先説性之自然發見者以明其理之所同乃言智之有獨如此者不得為自然之勢末又推極其不必穿鑿自可以得其理者以曉之雙峰謂若説智則中間足矣殊不思前既不明其理之所同末又不推其效之所極則小智之人何以自知穿鑿為非理之正但因其故而求之可以得其理哉雙峰能以性言程朱豈不能言其為説性耶是固未易以淺近知也發明信雙峰深於信朱子其言正不足為輕重也輯釋不引發明之説固不為無見矣然猶不忍棄雙峰之説以為亦宜知之則雖有見而不甚明存之祇以惑人而已何補於經注之旨哉君子所以異於人章以仁存心以禮存心集注以仁禮存心言以是存於心而不忘也饒氏謂孟子只言以仁存心以禮存心集注乃云以是存於心添箇於字便與本文不同孟子之意是把仁禮來存我箇心我之所主在於仁禮上我箇心安頓在仁上即是居天下之廣居我箇心安頓在禮上即是立天下之正位按語録辨此已詳如雙峰説則兩以字兩存字皆下得不順必須變其語句方得蓋仁禮是性心是性之郛郭心能盡性性不知檢心仁禮如何存得我箇心雙峰此説不可曉其以居廣居立正位為説亦説以字不順謂之附會可也發明引饒氏之説曰以是存於心添於字便可見孟子意是只把仁義來存於我心此心常在仁禮上無頃刻或離君子異於人以其能以仁禮存於心他人便不能以仁禮存於心我之心安頓在仁上即是居天下之廣居安頓在禮上即是立天下之正位輯釋所引與發明同按饒氏又曰以仁存心以禮存心是此心常在仁禮上無頃刻之或離君子之所以異於人者以其存心耳他人便不能以仁禮存心饒氏此一段説與前段説本皆是破集注不合添箇於字之意非有所發明於集注也發明乃合其二段而一之又刪潤之以求合於集注之旨似矣但曰此心常在仁禮上與居廣居立正位之證則又只是把心存在仁禮上與集注正背不可強合譬之二人在此心不相得乃強使之面目相向若相得者不知其情意氣色終不可掩竟何益哉觀發明眷眷於雙峰如此於不可通者猶委曲與之周旋何哉愚謂其信朱子不如信饒氏於此可見四書中若此類者不一不可不考又何難焉集注言不足與之校也問難字不訓校字集注如何做校字解饒氏曰患字接箇難字説下文君子不患正是接於禽獸又何難焉如疑難之難亦是與人比校是非之意此承上文此亦妄人而已矣如此則與禽獸奚擇哉二句説下來則是以其橫逆非人所為故不足與之校耳校字雖非難之正訓然難亦校之意也蓋不校則患無由生故自無一朝之患不然則妄人所為如禽獸傷人害物無所忌憚若但以為不足患而不見不校之意則是己非彼或以為不足患而與之校則小人之鋒亦甚可畏政恐一朝之患有所不免矣古之人如東漢黨錮諸賢與閹寺小人同世至與之校而流毒無窮皆起於禽獸其人而以為不足患之所見爾然則集注之意深矣張氏亦作患解發明輯釋引之通謂君子待人者恕責己者嚴恕則不校彼之為妄人嚴則惟恐己之為常人恕則推己之名以妄人與禽獸何異而不與校豈推己之謂乎通每如此説恕大抵只是寬意耳王使人瞷夫子章發明孟子本意因有以異於人乎之問而對之云我何以異於人哉雖堯舜亦與人同耳集注曰聖人亦人耳豈有異於人哉乃是謂堯舜豈異於人與孟子元文何以異於人哉所指不同矣孟子以與人同耳四字明其何以異於人哉之意故集注就以豈有異於人哉釋與人同耳之意但言堯舜而不説孟子者見得堯舜尚與人同孟子無異於人不假言矣蓋同即無異無異乃所以為同何所指不同之有齊人有一妻一妾章集注章首當有孟子曰字考證王氏曰此與上儲子章合是一章蓋因儲子有瞷夫子之問遂發瞷良人一段言求富貴利達者則詐偽欺人如墦間者君子言行如一何必竊視也恐正是一章非闕文也蓋孟子别無瞷字獨此處連有之王氏不過因二章皆有瞷字故推出此意耳但二章事與意皆不相著恐強合終是費力若以瞷之一字論之則瞷夫子是王欲竊視孟子之高處觀果有異於人乎一句可見瞷良人是妻欲竊視其夫之短處觀未嘗有顯者來一句可見此其不可強合一也以全章論之則前章之意已足後章初無發明堯舜與人同之意此其不可強合二也以孟子一書通例觀之則一章首尾未嘗有不相照應者如答父不得而子之問末則曰是之謂父不得而子也答割烹之問末則曰吾聞其以堯舜之道要湯未聞以割烹如此之類不一此章之末以求富貴利達為言與上章即無相關處其不可強合三也況齊王但欲竊視孟子有過人處否初未嘗疑孟子有求富貴利達之意而遽答之如此豈非逆詐億不信非聖賢之氣象也耶豈可因一瞷字偶同而強説以合之哉萬章上首章不若是恝至於我何哉考證恝無情之貌我竭力耕田云云於我何哉此四句即是恝也蓋長息之意正謂舜往于田竭力以供子職足矣而號泣于旻天于父母此意則吾不知蓋謂何必如此號泣也孟子推公明高答之之意則謂孝子之心不如此恝然曰我但竭力耕田供為子職而已矣至若父母之不我愛於我何如哉蓋自謂無罪而不復憂也此所謂恝他若孝子之心則不若是故下文推舜之為心云云此所以號泣怨慕也此段集注恐於辭意有所未察試以此思之非惟而已矣何哉文意不礙而前後章旨照應明白以小辨小人之詩章所謂親之過大而不怨是愈疏也愈疏亦不孝也之意觀之則考證釋恝字之意不為無徵姑備一説以俟知者娶妻如之何章饒氏謂完廩捐階之事儻無則不告而娶亦焉知其非無當時孟子但是不辨下章咸丘蒙之問孟子責之蓋下章是舜身上事此章説象與瞽瞍身上事容或有之是以不辨然堯不告舜必告之云云又況蒸蒸又不格姦是瞽瞍已底豫了瞽瞍見子如此富貴烏得不喜云云謂不告而娶之事為無固有補於世教但孟子又嘗自言舜不告而娶為無後也雙峰以為不辨猶可使果無其事孟子豈肯自然之乎饒氏此段議論大抵皆是朱子或問之所記闢讀者考焉可也愚奚庸贅捐階集注捐去也階梯也引史記為證考證捐階與出字相對如捐館之捐謂下皆去也完廩已下去浚井已出去而瞽瞍焚之掩之蓋舜隨即捐出不使父母有殺子之惡也史記不得其意集注引之為證似未當史記因先秦古書而成其言必有所本恐未可以為全不足信也考證自備一説足矣豈可遂廢史記之傳信哉考證帝之妻舜則克諧蒸乂之後二象曰云云皆戰國時俗流傳之訛孟子不區區辨其事之有無也後篇答桃應之問亦然發明意亦如此輯釋引之按桃應分明是設辭此章所言有無未可必疑事毋質集注豈不能如此辨耶考證發明必欲言無此事是求多於集注也考證又於子産事下極論其無此事皆不足為高亦無足辨者語云盛德之士章是之謂父不得而子也集注孟子引此而言瞽瞍不能以不善及其子而反見化於其子則是所謂父不得而子者而非如咸丘蒙之説也通謂如咸丘蒙之説則所謂父不得而子者以位言者殊不知古語云盛德之士本自専以德言祇載齊栗此事舜之盛德處瞽瞍允若則反見化於其子盛德之中而不得以不善及其子也輯釋亦引通説竊意咸丘蒙所問自盛德之士至岌岌乎皆是古語故既述其語又自白不識此語誠然乎哉孟子答以此非君子之言齊東野人之語此言字語字皆是應咸丘蒙語云此語二語字而言也是之謂父不得而子一句孟子特借其言而反釋之猶夫子之求之與伊尹以堯舜之道要湯之意云爾初豈以其言本如是哉集注則是所謂父不得而子者是之一字亦但指孟子所言之旨如此耳如通説則似惟前三句是古語自舜南面以下又是咸丘蒙自釋古語之辭未知然否姑存之以俟知者萬章下首章夷惠言風伊尹不言風語録或者以伊尹得行其道夷惠不得施其志故有此論似不必然亦偶然耳發明以為不可謂之偶然力主得行其道不得施其志之説又引論語集注聞其風則來范公嚴光祠堂記先生之風為證且謂孔子如太極元氣之造風不足以言之故道不得行亦不言風司馬遷講業齊魯觀夫子之遺風特於齊魯觀之所指有限故亦以風言輯釋亦引其説愚謂但當以語録為正若謂道行則不言風然則書言時乃風詩載十五國風風之所被亦皆不得行其道者邪集注聞其風則來此正為答問政而言乃強説以為遠人未被其澤即是道不行於當時之證此其附會尤為無理且集注朱子所著語録朱子所言朱子豈不能自引之而煩發明為之引耶太史公范文正之言皆是文人一時之筆何嘗有意如此分别引以為證皆未的當而所論夫子之事救首救尾尤為牽強皆無足辨者聖之清和任時叢説此章聖字言夷惠伊尹處是以地言與大而化之之聖不同只是清和任到處故謂之聖孔子則是大而化之之聖以孟子平日議論推之何嘗以三子為非大而化之之聖如答公孫丑則以伯夷伊尹孔子為皆古聖人也論夷惠為百世師則以聖人發之凡此何以見其與大而化之之聖不同處更以此章集注推之張子曰勉而清者非聖人之清勉而和者非聖人之和所謂聖者不思不勉而至焉者也竊謂化即不思不勉而已不思不勉不謂之化不可也非不思不勉不足以言化非化不足以言聖三子之於孔子雖有偏全之不同然謂之聖則皆不可謂之非大而化之之聖矣班爵祿章集注此章之説與周禮王制不同考證按孟子與王制無大異但周禮所言五等封疆大相懸絶意者王制孟子皆以田言周禮則以地言且如乃命魯公俾侯于東錫之山川土田附庸則是田方百里而山川附庸則方五百里也云云恐不可如此臆度畢竟孟子言於諸侯毁籍之後王制成於漢儒之手皆不能無差訛處出車計乘皆以田計田方百里千乘之車從何而出周禮亦是未成之書又出於河間女子之口先儒於其所言互有疑信況周禮諸公之地封疆方五百里魯實侯爵奈何引以為證要不如闕疑之為愈也敢問友章集注此言朋友人倫之一所以輔仁故以天子友匹夫而不為詘以匹夫友天子而不為僣通謂中庸五達道於君臣父子夫婦長幼不言交獨曰朋友之交集注云天子友匹夫不為詘匹夫友天子不為僣此易所謂上下交而其志同也即中庸所謂朋友之交也通既引中庸君臣不言交朋友言交為證又引易上下交之説以證朋友之交殊不思易中所謂上下正是君臣不可牽一交字以合於朋友交之説也交際何心章殷受夏至為烈十四字集注謂語意不倫李氏以為此必有斷簡或闕文者近之而愚意其直為衍字耳然不可考姑闕之可也或問引趙氏等三説欲擇從其一朱子又以為如趙説則辭受二字與上下文亦不相似考證據其亡父桐陽散翁之説以趙説亦自可通云云趙説既為或問集注之所不取桐陽散翁乃以為亦自可通何哉夫解經但求可通不顧牽強朱子豈不能之而有待於散翁耶考證正不當阿其所好存此鑿説以眩學者集注此章文義多不可曉不必強為之説考證此章初問交際辭受孟子亦告以受而萬章因以受禦為喻因告以辭萬章因受禦之非而譏君子受諸侯之餽孟子又辨受禦之説因以獵較為喻萬章遂問獵較之非而孟子又明簿正祭器之禮因及孔子之仕有三其間問答一節生一節所難看按集注所謂不可曉是殷受夏至為烈十四字與獵較簿正祭器之類與考證所謂難看不同告子上首章集注告子言人性本無仁義必待矯揉而後成如荀子性惡之説也輯講告子謂人性不可以為仁義矯揉之則可以為仁義猶把栁本不可以為杯棬然不知性者人所稟之天理這天理即是仁義是順此性做去便是自然不是矯揉譬如把栁之可為杯棬者畢竟是木之曲直順把栁之性以為杯棬何嘗害於把栁自孟子觀之則是順把栁之性以為杯棬自告子觀之則是戕賊把栁之性以為杯棬按雙峰此説自起首至便是自然不是矯揉一段皆是自譬猶把栁以後皆失之其以曲直為順把栁之性為杯棬者是本顏師古説竊恐未然洪範未曰曲直蔡傳曰曲而又直也朱子曰謂生而有曲有直蓋謂木之生也枝幹自然有曲有直何嘗以為可以斬伐矯揉為曲直哉斬伐矯揉則把栁不得遂其生矣故曰戕賊雙峰謂順把栁之性以為杯棬何嘗害於把栁此只是解曲直之義不同所致斬伐矯揉謂之無害於把栁可乎至謂自孟子觀之自告子觀之之意尤為可疑孟子子能順把栁之性與將戕賊把栁二句乃是反詰告子正是明其不能順把栁之性必將戕賊之而後可初豈謂孟子能順其性而告子不能耶至下文如將戕賊把栁而為杯棬方是説出告子本意蓋告子才以把栁杯棬為喻便差失了雙峰謂孟子之見如此殆不其然考證黃文肅謂告子諸問孟子但折之無言而欠於斷語金氏就其把栁而斷之曰把栁柔韌有可為杯棬之性故揉之可為杯棬人心本善有為仁義之性故可充之為仁義不必深闢其矯揉之失蓋人為氣稟所拘者謂不資矯揉不可也考證是竊饒氏意而脫胎換骨以為己説者也愚己辨饒説則不必辨此矣但孟子只説本然之性未説到氣質上矯揉二字如何著得金氏乃欲代大匠斫不亦異乎性猶湍水章集注告子因前説而小變之近於揚子善惡混之説輯講湍水杞栁只一般告子之意謂善惡皆性之固有隨人所習而生如把栁本來不是杯棬矯揉而後為杯棬如水本無分於東西決之而後有東西如集注之説則把栁湍水之喻不無異矣而雙峰以為只一般竊意告子前章以性對仁義而言則曰為此章以性對善不善而言則曰無分仁義是善則人性未為仁義之前未是善之意可知以人性為仁義猶曰以本來未善物事為善物事相似故集注以為如性惡之説善不善雖人性皆可為然方其未為善不善之性前却是箇儱侗無分别物事既未有所謂善亦未有所謂不善善與不善直待既有所作為之後乃分耳故集注以為近於善惡混之説告子以杯棬比仁義以東西比善不善則仁義只是善可見雙峰不提起仁義善不善之言但以杯棬東西對言其一般可謂不盡乎人言之意矣且雙峰謂善惡皆性之固有則告子前章若曰善為性所固有則又何必以為仁義言哉為之一字可見告子以性之本不是善矣告子後章若曰善惡皆為性所固有則又何為以無分於善不善言之無分二字可見告子以性之本無善不善矣雙峰此説却正得揚子善惡混之正意而於集注前章如性惡之言此章近於二字之旨皆有所未合蓋有意於立異非誤也讀者詳之性無善無不善章惻隱之心云云集注前篇言是四者為仁義禮智之端而此不言端者彼欲其擴充之此直因用以著其本體故言有不同耳通曰云云前以辭讓為禮之端辭讓皆以發於外者言此曰恭敬則兼以外與內而言故不必言端輯釋亦引通説如通説則仁義智三者皆以禮故不得言端耶假如所言則孟子何為不但言辭讓耶殊不思端只是性之發於情者辭讓恭敬均之為情耳何獨辭讓可以言端而恭敬不可以言端哉然則此章不言端者不過如集注之説而已但通者分外與內為説豈非因集注前章猶有物在中而端緒見於外與此章恭者敬之發於外敬者恭之主於中之言而推之歟殊不思前章如有物在中之中是指性之本體不可見者言端緒見於外之外是指情之發動有可見者言此章發於外之外主於中之中皆是指情之發動處説但以見於容存於心為外與內之分耳對性而言則皆用也讀者宜自考焉恭敬之心考證前篇云辭讓不若此篇云恭敬之備且如見一人來便肅然恭敬及其交際然後辭讓之端發又恭之一字已該辭讓二字竊意前章欲其擴充故言辭讓辭讓較之恭敬為向外也此章主於體認故言恭敬恭敬較之辭讓為近裏也向外則於擴充為較易近裏則於體認為較切不然孟子豈不能兩章皆以恭敬言之而容其一備一不備耶牛山之木章操則存舍則亡出入無時莫知其鄉集注孟子引之以明心之神明不測得失之易而保守之難不可頃刻失其養輯講孟子説存乎人者豈無仁義之心哉則後面所引心之出入亦只指仁義之心而言集注云神明不測似又専説向知覺上去恐非孟子之意蓋心者性與知覺之合按朱子中庸序曰心之虛靈知覺一而已矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同云云詳味此意則仁義之心固未嘗無知覺也蓋心只是共此一箇知覺但知覺原於性命之正知覺從義理上來者即為道心即為仁義之心耳知覺生於形氣之私知覺從物欲上去者即為人心即為私心耳非知覺専主於形氣而無預於仁義也雙峰每以仁義之心對知覺之心而言如曰心者性與知覺之合固是但其承上意來則似以仁義之心為性為道心知覺之心自為知覺為人心者殊不思知覺豈人心之所得専哉若曰知覺果人心之所得専則仁義之心反頑然無所知覺耶若曰人心又自人心雙峰不以知覺之心當之則是人心道心之外又有一箇知覺之心反成三心耶恐皆未安竊意心只有一箇心捨知覺無以當之這知覺亦不可岐而二之只因放去收回便有人心道心之辨及至道心為主而人心聽命則又只是元初一箇知覺故朱子才説心之神明便欲人之不可失其養得其養則便是道心為主了又何可疑若如雙峰説知覺自為知覺之心此則決然可疑者也況此章有存亡出入四字若謂孟子非指知覺只指仁義而言則方其亡而出時便是此心逐物去了曾謂仁義亦有逐物者乎以此見朱子神明不測四字與仁義之心既無所背於存亡出入之旨又無不通雙峰不必致疑可也載觀語録有曰孔子正是直指心之體用而言其周流變化神明不測之妙心一也操而存則義理明而謂之道心舍而亡則物欲肆而謂之人心亡不是無只是走作逐物去了自人心而收回便是道心自道心而放出便是人心云云讀者玩此而有得焉則雙峰所疑不待辨而自明矣愚大學正心章所辨與此相發知道者宜必有以正之魚我所欲章章末集注此章言羞惡之心人所固有或能決生死於危迫之際而不免計豐約於宴安之時是以君子不可頃刻而不省察於斯焉發明此章前一截反覆發明舍生取義是説人當託孤寄命之大節時事中間食羮不受是説一飲食之小節時事然其能決一死以全義則無分於大小也不食非禮之食蓋是指此以證人皆有羞惡之心以實上文人能舍生取義之意集注謂或能決死生於危迫之際亦併前一截舍生取義處論之古之君子當舍生取義時非徒慷慨殺身實能從容就義如張巡顏真卿之徒所謂危迫乃事勢之危迫非謂舍生就義者之倉皇失措也不受非禮之食而死如齊餓者不受嗟來之食之類古來真有此等人然謂其能決死生於危迫之際而又謂有不免計豐約於宴安之時者蓋危迫之際物欲不萌義理之心感發有不可遏故往往能決死生若宴安之時物欲易行私意何極義理之心多至迷溺故或不免至於計較豐約亦勢使然也云云輯釋亦引此説竊意集注章旨此意言羞惡之心人所固有二句是包括章首至賢者能弗喪耳五節之意蓋此五節只是反覆發明人皆有羞惡之心之意熟讀可見或能決生死於危迫之際一句是説一簞食至乞人弗屑也一節之意而不免計豐約於宴安之時一句是説萬鍾則不辨禮義而受之一節之意蓋孟子正是以二節相對言之觀下文鄉為今為之言可見蓋鄉為今為一節正是以二事相形比較使人即此思之以毋失其本心而已章旨所謂是以君子不可頃刻而不省察於斯焉一句正是指後一節之意而言發明惟泛看了此章言羞惡之心人所固有二句不知其為包括五節之意遂欲但以能決生死於危迫之際不免計豐約於宴安之時二句該盡一章之旨故謂朱子能決生死於危迫之際亦併前截舍生取義處論之可謂誤矣既看朱子意不出於是反隱然有不滿朱子決生死於危迫之言不可以言前截舍生取義之意如曰古君子當舍生取義時非徒慷慨殺身實能從容就義數語可見其微意矣却又不敢明破朱子遂謂所謂危迫乃事勢之危迫非謂舍生取義者之倉皇失措也又引齊餓者不受嗟來之食等事以證不受呼蹴而食者為亦能舍生取義非倉皇失措之意詳其用意皆是又欲為朱子出脫危迫二字而發殊不思果如所言則然能決生死於危迫之際而不免計豐約於宴安之時上曰然能下曰而不免正是共指此一人而言與經文鄉為今為之言正相應然則張巡顏真卿於危迫之際雖能決生死如此設或至宴安之時亦不免於計豐約耶朱子之意其不出此也必矣發明只因看不親切便欲立論遂致泛濫支離因誤致誤良可為觀書鹵莽便務著述者之戒因書以自警云仁人心義人路章學問之道無他求其放心而已矣集注云云蓋能如是則志氣清明義理昭著而可以上達不然則昏昧放逸雖日從事於學亦終不能有所發明矣輯講孟子上面説仁人心也是把這心做義理之心若把求放心做收攝精神不令昏昧放逸則又只説從知覺上去恐與上面仁人心也不相接了發明既引饒説又自為説以繼之大概不出此意輯釋亦引輯講發明之説但皆與饒説元文少異蓋皆是刪潤之以求合於集注也雙峰此説蓋為破集注志氣清明與昏昧放逸數語而發但謂又只説從知覺上去之疑又與前牛山之木章所論無異且如放心是馳鶩以徇欲於外之謂若不説知覺但説義理則天下豈有謂之義理而亦徇欲放逸於外者耶以此見得雖説從知覺上去却於義理放逸之意兩無所妨其詳已於前章見之此不再述按此章四段所謂心字初焉仁人心之心固不待論第二節放其心不知求之心是承人心得失而言亦皆指仁而言無疑第三節有放心不知求集注謂上並言仁義而此下專論求放心者能求放心則不違乎仁而義在其中矣何嘗以心為不指仁而言耶既曰此下専論求放心則包第三第四節二心字而言可知雙峰又何疑乎讀者詳玩語録及愚前章所引朱子之言知知覺非人心之所得専則此章集注之旨較然矣發明不能辨其謬妄反又刪潤其説以附於編使若與集注相發然者而實則不然其誤後學甚矣輯釋尚何尤乎鈞是人也章集注引范氏心針曰云云一心之微衆欲攻之云云君子存誠克念克敬云云通謂此言道心本乎義理之正然發於義理者甚微而役於形氣者甚衆又曰君子存誠即是誠者天之道不待思而得者克念克敬念即是思是思誠者人之道思則得之不思則不得也乾九三言誠坤六二言敬云云輯釋亦引通説而刪潤之以一心之微為道心惟微之意以存誠與念敬為天道人道乾道坤道之分恐皆求之太深竊意一心之微與上文是身之微皆不過言人身在天地間此心又在人身之中皆極為微細耳君子存誠克念克敬亦不過言存誠故克念克敬克念克敬即存誠之事耳非存誠自存誠念敬自念敬也通説未知果得范氏意否姑記乎此以俟明者之折衷焉今觀輯釋引之而去其道心與天道人道之分亦可見此天之所以與我者集注此三者皆天之所以與我者而心為大饒氏謂不須合三者説只説天把這心與我教我去思便能御衆體此即立其大者按孟子上文並言耳目與心之官是兼小體大體立論至此總以此天之所以與我一句結之則此句是合三者説可知惟此句是合三者説故下文又以先立乎其大者則其小者弗能奪二句承之上下文既皆兼論三者不應中間一句獨舉一而遺二也雙峰豈未之思耶饒氏又謂集注不曾把思做立其大者却謂有以立之則事無不思如此則又先要做立底工夫又做敬上去了然此章在思而不在敬針中敬字是范氏意非孟子意雙峰惟以此天之所以與我一句不須合三者説故如此見爾殊不思集注之意不過以為不從耳目而從心便是立其大者立其大者便是事無不思孟子之意雖在思不在敬然能思則敬在其中集注亦只順孟子之意釋之耳蓋非敬則不能思孟子雖不説學者則不可不知也范氏之意又豈有悖於孟子之意者哉愚按雙峰之説止於此篇觀其於四書中所見不同於朱子者十居其九豈朱子十無一得雙峰十無一失如是其懸絶耶不過雙峰平日務欲自立門户不肯為朱子下故其門人承其風旨往往皆逢其師之私心以求集注之瑕疵以啓雙峰之立異雙峰亦是騎虎之勢不肯默然自謂無説所以雖無可説處亦千方百計尋一異説以高於朱子其意亦未必自謂可以取信於來世不過但得門人一時尊己過於朱子足矣但其門人率皆無見不能辨别惟有翕然尊信輯而録之以傳於後遂為聖經賢傳無窮之窒礙誠可痛也愚每於其似是而非之所在雖不能洞見而盡識然亦有灼然知其不然者未嘗不為朱子憤悒而不能自已也是以不顧僣妄而時與之辨白知我罪我未暇顧也惟同志其裁正之仁勝不仁章與於不仁終亦必亡集注與猶助也終亦併與其所為而亡之發明採張氏曰云云是則同於不仁之甚者其淪胥以亡也必矣按張氏釋與字亡字之義與集注異集注與猶助也之説與大舜與人為善之與相類甚有意味若訓以為同則為仁雖不力又安得便同於不仁而又甚耶亡字之義猶未説不仁者亡而反説為仁不力者亡恐亦不是滅亡之亡宜集注但以為亡其所為也發明兼存而不之辨何哉告子下首章以禮食考證如典禮所載進食之禮與飲食之制其變則如不食嗟來之食者曾子曰其嗟也可去其謝也可食以禮食只當以進食之禮飲食之制為證若嗟來之食不謝則終無可食之理寧死而已不可以小害大賤害貴也觀於上篇鄉為身死而不受之意可見矣章末集注此章言義理事物其輕重固有大分然於其中又各自有輕重之别聖賢於此錯綜斟酌毫髮不差固不肯枉尺而直尋亦未嘗膠柱而調瑟所以斷之一視於理而已通謂錯綜者分經緯不差毫髮故不肯枉尺而直尋斟酌者量淺深不差毫髮故未嘗膠柱而調瑟分錯綜與斟酌而釋之如此然乎竊意集注之意只是錯綜而斟酌之耳未知然否請因此段集注而釋之以明其義其曰義理事物其輕重固有大分者蓋義理指禮而言事物指食色而言以義理對事物言之則義理重而事物輕此其大分然也曰然於其中又各有輕重之别者謂二者之中重者之為義理又自有輕有重如禮食親迎其輕也紾臂踰墻其重也輕者之為事物亦自有輕有重如尋常食色不關利害不待論者其輕也飢而死不得妻其重也曰錯綜斟酌毫髮不差者謂以其輕重大分之中各有輕重者交互總挈以斟酌裁度而從其宜不使有毫髮之差也如既以禮之輕者對食色之重者言又以食色之重者對禮之重者言此錯綜之意也以禮輕者對食色重者言則禮有時而不可拘以食色重者對禮重者言則禮無時而不當守此則錯綜而斟酌之之意如此則自無毫髮之差矣曰固不肯枉尺而直尋亦未嘗膠柱而調瑟者所以明其不差毫髮之實也不然如任人但知食色有重於禮者遂謂禮皆可輕而昧於輕重之大分則其失必至於枉尺而直尋如屋廬子但知食色之為輕禮之為重而不免為各有輕重者之所紊則又無以處之此其失必至於膠柱而調瑟二者皆不能錯綜斟酌之過也聖賢豈為之哉然雖如此又豈率意妄作之謂所以斷之亦惟一視夫理之當然者而已管見如此未知視通為孰是也先名實者為人章君子之所為衆人固不識也集注云云其見幾明決而用意忠厚固非衆人所能識矣通謂明智也決勇也忠厚仁也夫子一舉而三德存焉豈衆人所能識也非見幾明決之難識乃見幾明決而用意忠厚之難識也後世如穆生以醴酒不設而去亦可謂見幾明決也矣然而豈難知哉夫子以女樂而有去志此見幾之明且決也若於此時而遽去則雖衆人亦豈不識惟夫子不欲顯其君相之惡又不欲無罪而苟去故不于女樂去猶俟膰肉不至而後行此其用意之忠厚也惟如此是以為女樂去之迹終於不露而見幾之明且決者人亦終莫能識至於以為為肉以為為無禮者并與用意之忠且厚者亦莫之識矣所謂衆人不識者如此而已通謂一舉而三德存故衆人不識集注正意似不在此魯欲使慎子為將軍章周公之封於魯為方百里也今魯方百里者五語録論王制與孟子同而周禮諸公之地方五百里侯四百里伯三百里子二百里鄭氏以王制為夏商之制云云朱子曰鄭氏只文字上説得好看然甚不曉事情云云愚竊謂萬乘千乘之國分明是一箇萬乘之國當十箇千乘之國孟子首章集注亦有每十分而取其一之言到孟子説班爵祿處却説方千里方百里漢儒以開方法計之則方千里有方百里者百誠若可疑竊意孟子平日説話不甚著相只舉大綱以見意爾初未説到開方法上曰千曰百不過亦是十分取一之意而已如此則所謂方百里者五亦只是五倍初封之時半於千里之國而已觀春秋之魯其地豈不半於千里之國想孟子當初亦只以方千里之國為方百里之國十箇初不計開方法之何如也朱子嘗謂其疏通簡易自成一家即此意耳兼古人説地之里數恐亦自有不拘開方法者如蘇秦説楚地方六千里又説魏地方千里若以開方法計之則方六千里中間當有方千里者三十六楚在荆揚之間魏與之為敵國安得有許多地又如何當得三十六箇魏若以意逆之則楚地不過方千里者六當得六箇魏而已秦不拘開方法言之而似過於多孟子不拘開方法言之而似過於小其意却正相類學者亦不以開方法為拘而説之則庶乎可通矣愚也未敢自信姑記於此以俟明者之裁正焉今之事君者曰章約與國戰必克考證從橫攻戰之臣考證前以連諸侯為専指連衡之人不言合從者今又兼從衡之臣為約與國之訓可見自相抵牾君子不亮惡乎執章通謂此若與君子貞而不諒意不同須看孟子一執字貞者正而固也固字已有諒之意已包執持之意合孔孟之言觀之不貞不諒不可執也諒而可執可知其貞矣竊意諒對貞而言則為信之小者雖信亦未必正故曰貞而不諒専言亮則但為信而已不信則無所執故曰不諒惡乎執亦猶泰之一字大學以之與驕並言則其泰為侈肆論語以之與驕對言則其泰又為安舒所對不同則不害其為字雖同而義之善惡自不同也況諒字在論語三言之貞而不諒匹夫匹婦之為諒此二者固皆未得為善友諒之諒則已善矣孟子之言又何為而不可哉舜發畎畝章動心忍性通謂孟子嘗曰不動心曰養性此曰動心忍性何也曰彼言不動心是處富貴而富貴不能動其心譬之水動心是浚得源活水滚滚出來不動心是水之流不為泥沙所溷不為波濤所汩云云輯釋亦引此説此段説不動心處似未當朱子嘗曰公孫丑非謂孟子以卿相富貴動其心謂霸王事大恐孟子擔不過有所疑懼而動其心也集注意亦如此蓋謂不以富貴動心不惟説低了孟子亦與後面知言養氣之意不相當今曰富貴不能動其心不為泥沙所溷不為波流所汩正與朱子意背愚請從而改之曰不動心是道明德立則自然當大任而無所疑懼譬之水不動心如水之積也極厚故其負大舟也不患於無力盡心上首章語録問盡心只是知得盡未説行否曰初間亦只謂知得盡如大學誠意一般蓋所謂盡心者言心之所存更無一毫不盡好善便如好好色惡惡便如惡惡臭如所謂盡心力而為之語録又有一條如此説盡字集疏亦以盡心為誠意按集注及其餘語録皆以盡心屬知惟此段語録如此説盡字殆朱子未定之説歟集疏又是祖述此説想亦未為的當但曰初間亦謂知得盡則初間之説又正是集注之意豈朱子晚年所見如此集注未及改耶疑不敢質姑志之於此云恥之於人大章不恥不若人何若人有集注但無恥一事不如人則事事不如人矣或曰不恥其不如人則何能有如人之事於義亦通輔氏謂前説指機變之人而言後説則泛言人不可以無恥之意前説痛切後説較緩發明舉輔説而斷之曰前説以不恥為無恥不如後説之明順不費辭輯釋亦引發明之説詳輔説不惟有契於本章集注其義亦通之微旨又且無悖於朱子二説兼存則前一説勝之凡例且訓不為無之費辭孰若上下文意不相承之費説發明過矣霸者之民章集注首節引耕田鑿井帝力何有於我如天之自然乃王者之政以釋皥皥之義後節引舜耕歷山田者遜畔陶河濱器不苦窳以證過化之義發明皆以為此帝者之事集注借之以證王者之政二帝三王所以治天下者初無二道何莫非王政耶觀孟子離婁首章以堯舜之道與仁政對言又以仁心仁聞與先王之道對言可見帝王之無二道發明帝事王政之分别異乎吾所聞矣宜輯釋不引之也所過者化所存者神發明所存主者謂其體也所過者化以其所存者神猶忠為體恕為用也而此二者又以存神為之主焉輯釋亦引此説按孟子先言過化後言存神集注以身所經歷處即人無不化釋過化之義而以舜事為證以心所存主處便神妙不測釋存神之義而以孔子事為證經注皆不見二者相為體用之意蓋過化屬身是無心於使人化而物自從之化者存神屬心是心有所存主矣但其應甚速乃見其神耳今曰所過者化以其所存者神則是過化又以存神為體則便有所存主只當屬之心不可以言過化矣以此見得過化自是過化存神自是存神分明二事不可以忠恕相為體用者比也果如發明之分體用則只是存神一事過化不成過化矣或疑如此則舜能過化而不能存神孔子能存神而不能過化耶非是之謂也聖人固非能此而不能彼但舜此事却只可以證過化孔子此事却只可以證存神集注亦只以二聖人偶有此事引為此二句之證非謂二聖人平生只有此二事也尚何疑乎若就二聖人而推之則舜之從欲以治四方風動又是存神之意夫子之至是邦必聞其政又是過化之意觸類而長可也明道謂存神在己過化及物朱子於或問謂其曰在己者蓋以化者無意而及物此則誠於此而動於彼但其感應之速有不知其所以然者是則所謂神耳詳此則二者不無有意無意之辨矣發明引明道或問此説於編而自為説乃如此殆亦未之思耶良知良能章發明輯釋皆引張氏曰上言良知良能下獨曰知者蓋以知常在先故也無不知愛親敬兄固是良知無不愛親敬兄即是良能蓋因孩提之童無有不能愛其親敬其兄者乃見其知耳非先知而後乃能也故集注統而言之有事君人者章發明引張氏曰能全天生此民之理謂之天民以其在下而未達故謂之民大人即天民之得時得位者也若伊尹在莘野則為天民出佐商則為大人也天民大人皆以德言而不無高下集注語録辨之詳矣如張説則是二者只以位而分德固無優劣也殊不思容悅安社稷二者何嘗以位分哉發明悉去語録獨采張説而不與别白誤人甚矣宜輯釋不引之於編也至於發明後段所自為説者又不免分其優劣可謂主見不定自相抵牾其亦不善於發明也夫發明云云容悅以富貴纍其心者也安社稷為悅則以功名為重矣若天民者以道德為重然猶未能無意於功名也若大人者則純以道德為重功名不足以動其心矣輯釋亦引此説此是因靳氏士有三品之説而敷演以配之也其言容悅者是矣言安社稷者則近似而有所未盡蓋志富貴是為利志功名是為名程子所謂為名為利雖清濁不同然利心則一也蓋以有為而為便是私意故耳以安社稷為悅者為所當為初無所為所以集注斷以為忠若欲以安社稷為功而得名則是有為而為不足以為忠矣疑似之間毫釐之辨不可不察况以未能無意於功名與功名不足動其心強配天民大人則其不合明甚曽謂伊吕亦為立功得名之故而出哉靳氏士有三品孟子臣有四等發明強析三品以配四等空自費力無補經注之旨也廣土衆民章中天下而立定四海之民君子樂之通謂前言君子三樂所樂在所性之中君子所樂之所樂在所性之外何也曰中天下而立逹而在上者之事君子之所性固不以逹而在上有所加也故君子雖樂乎此而其所得乎天者不在此也或曰集注前謂斯道傳之者衆而天下後世將無不被其澤此謂其道大行無一夫不被其澤皆曰道澤而此所性不存何也曰斯道傳之者衆萬世之澤也其道大行一時之澤也况其道大行必中天下而立者能之是道有待於位而後行不如是則不能行此君子雖樂乎此而其樂自是性外之樂若夫盡得一世明睿之才而以所樂乎己者教而育之以己之天覺彼之天聖人之心深樂乎此而其樂即是性中之樂且孟子於三樂則曰王天下不與於中天下而立則曰所性不存分而言之固自大有間哉輯釋亦引此説通此一段議論反覆二三百字首尾只用意分别樂在性中樂在性外而卒不見要領至末乃曰孟子於三樂則曰王天下不與存於中天下而立則曰所性不存分而言之固自大有間哉觀此數語則知其不過以三樂而王天下不與存至中天下而立正是王天下者之事而君子却又樂之被其纒擾分撥不開故費許多辭説耳殊不知三樂而王天下不與者不以位為樂也至於中天下而立定四海之民則樂者自是樂無一夫不被其澤耳亦非以位為樂也非以位為樂則與王天下不與存之意又何異乎蓋非以得中天下而立為可樂是以得定四海之民為可樂耳然欲定四海之民非中天下而立則無以致之故孟子不得不如此説也若但曰中天下而立君子樂之而不及定四海之民之意則是全以位為樂正與王天下不與存之意相悖失孟子之意矣通所謂中天下而立逹而在上者之事君子雖樂乎此數語並不及定四海之民之意正坐此病所以不得其旨殊不思此所謂樂却全在定四海之民一句上觀集注其道大行無一夫不被其澤之言可見此樂與前所謂得英才教育之樂皆是及物之樂特因窮逹而所及有異非此淺而彼深也若如通説以萬世一時為淺深則孔孟之汲汲皇皇去齊去魯適齊適梁固未嘗不欲其道之大行也胡為先一時之澤性外之樂而後萬世之澤性內之樂如此哉以此觀之通又何必強援前章三樂入此章所性之中耶所性固不以窮逹而加損三樂又何加於所性之全體乎柳下惠不以三公易其介章集注此章言栁下惠和而不流與孔子論夷齊不念舊惡意正相類皆聖賢微顯闡幽之意也通謂人皆知夷齊之清而不知夷齊之清而有量人皆知栁下惠之和而不知其和而不流孔孟之言皆闡幽意微顯是帶過説夷齊之清下惠之和人皆知之此便是顯處二章皆不及之非微顯而何夷齊之不念舊惡下惠之不易其介人皆莫知此便是幽處此二章特表而出之非闡幽而何通謂微顯是帶過説豈其然乎今觀發眀所言與愚意正合顯見通之未當輯釋乃兼存二説而不與折衷何耶輯釋引發眀謂微顯闡幽四字出杜預春秋傳序云云按易下繫有微顯闡幽四字杜氏特引而用之爾仲子不義章不義與之齊國而不受考證孟子本意當以仲子不義為句與下文舍簞食豆羮之義相反對謂仲子不義設若與之齊國而不受人皆信之然此特義之小者與舍簞食豆羮之義何異惟君臣上下此乃義之大者而彼皆無之此不義之大者也以其小義而信其大義奚可哉此斷其為不義之辭也竊意若不以不義字連下文為句何以見得不受齊國為義之小者苟齊國義所當受而不受雖義之小者亦不可得而稱矣惟於所與不義而不受乃見其義耳但以亡親戚君臣上下為不義之大則此不過舍簞食豆羮之小義耳然則點句但當以集注為正食而弗愛章恭敬而無實君子不可虛拘集注此言當時諸侯之待賢者特以幣帛為恭敬而無其實也發明引張氏説恭敬存於中而儀物實於外所以為內外之宜文質之中也恭敬雖存而無以實之於外君子亦惡夫虛拘也昧乎此不陷於獸畜則失於虛拘君子不然也發明按朱子以兩恭敬字作兩意説張氏於兩恭敬字只作一意説輯釋亦併引二説發明隱然有主張説之意竊詳集注之意君子為賢者張氏之意以君子為待賢者之人蓋張説是以恭敬幣帛皆不可無若以君子為賢者則又嫌於賢者不宜以幣帛為輕重故只得如此説耳況當時諸侯之交賢者必無無幣帛之理觀於季任儲子一則曰以幣交二則曰以幣交之事可見集注此意正合夫子禮云禮云玉帛云乎哉與孟子引書以答屋廬子之意而虛拘二字張説似亦不如集注之順當更詳之形色天性章集成陳潛室曰孟子形色為性是引形氣入道理中來告子食色為性是逐道理出形氣外去霄壤之分通發明輯釋皆引之形色是吾身所有如貌言視聽之類此便是物則之物有物必有則則便是天性食色是外誘之私如飲食男女之類此便是物欲之物我但甘之悅之而已甘之悅之只是欲遽以此為性則人將認人欲為天理人心愈危而道心愈微矣要之告子所言便如孟子以耳目口鼻四肢之欲為性者相似皆是氣稟之性但孟子曰性也有命焉君子不謂性則是斷制人心而不敢過之意況下文又自以仁義禮智天道言本然之性乎告子但以此為性知有氣而不知有理必將謂欲是吾性所有若必求得之而不知檢制則人欲肆天理滅其害有不勝言者矣所以孟子力辨之道則高矣美矣章章末集注此章言道有定體教有成法卑不可抗高不可貶語不能顯默不能藏發明道有定體謂中道而立教有成法謂繩墨彀率卑不可抗高不可貶申言道之有定體也雖語有不能顯者謂引而不發雖默有不能藏者謂躍如通道有定體故卑不可抗高不可貶是之謂中道而立教有成法故語不能顯默不能藏而在乎學人之能者從之意者道有定體卑不可抗高不可貶三句是正公孫丑所言之失教有成法語不能顯默不能藏是明孟子繩墨彀率不可改變之旨與君子引而不發以下四句之意輔氏嘗曰惟其道有定體故教有成法愚亦曰惟其卑不可抗高不可貶故語不能顯默不能藏蓋知道之有定體則知卑之不可抗高之不可貶矣知教之有成法則知語之不能顯默之不能藏矣但孟子只言教有成法之意而道之有定體者自在其中只言語不能顯默不能藏之意而卑不可抗高不可貶者自在其中何則蓋公孫丑疑道之高美不可及欲孟子自貶以示之是不知道體之有定卑者不可抗而高高者不可貶而卑也故集注以孟子之意言此三句以正其所言之失卑高便指道體而言所以不可抗貶者正以其體之有定也孟子繩墨彀率之譬是指教者之法以示之匠羿所以不為拙工拙射改繩墨變彀率者正以教有成法不可得而改變也教法之所以有成不可改變如此者豈非以道體之有定故歟下文引不發中道立語不能顯之謂也躍如而能者從默不能藏之意也語默是指所施之教而言觀其不能有所顯藏如此則教其可不有成法也哉然則語默之所不能顯藏者何物也不過曰斯道不可抗貶之定體耳愚因發明以中道而立為道有定體故述所見於此云通者雖庶幾焉但集注云此章言則是此六句該盡此一章之旨也而通只以末後二句當之然則集注何以不曰此二句言云云耶竊嘗謂集注凡於包括章旨處未有不順文解義該貫無餘者而發明於此章及魚我所欲章皆不得其旨他編亦有如此者讀者考焉可也盡心下首章不仁哉梁惠王也通謂七篇之書始則勉梁惠王以仁義終則言梁惠王之不仁孟子其有意哉軻書本七篇每篇分為上下自趙氏始耳若不分則此章在盡心諸章之中而已通以為終言梁惠之不仁抑孟子意乎盡信書章流杵集注杵舂杵也或作鹵楯也考證金氏按鹵乃溫鹵之鹵謂血流地生鹵爾果如所言則孟子何為不信之耶有人曰我善為陳章王曰無畏云云集注書泰誓文與此小異孟子之意當云云云四書通本無當字謂孟子之意下諸本皆有當字剩宜去之按孟子所引與泰誓本文小異故集注曰孟子之意當云蓋謂泰誓本文自如彼若順孟子所引文意解之則當如此爾通以為剩而宜去抑朱子意乎殺人親章考證散翁曰詳此章文意似於兩人字讀謂殺人父兄之人是亦殺其父兄亦字如猶字於本文為通古人於父兄之讎無不報復者觀於不共戴天不反兵之禮可見況已殺人之父兄則人亦將殺己之父兄亦勢所必至者集注之言盡矣不知有何不通而散翁欲如此通之耶且如所説則於章首吾今然後知章末然則非自殺之也一間耳之言又如何通之耶不仁而得國章輔氏謂不仁而得天下如曹操司馬氏及五代之君皆是也發明亦以秦隋五代為不仁而得天下者得天下當以綱目有正統處為是曹魏五代要亦不過得國之大者耳民為貴章集注天子至尊貴也而得其心不過為諸侯耳是民為貴也發明得乎諸侯為大夫集注不及之者以上句包之君總天子諸侯而言天子至尊貴也且不重於民諸侯不假言矣稽大不理於口章憂心悄悄愠於羣小集注詩邶風柏舟篇本言衛之仁人見怒於羣小孟子以為孔子之事可以當之按今詩傳朱子以柏舟為婦人不得於夫而作羣小衆妾也此則本小序以為仁人見怒之詩豈集注乃詩傳未定之説歟性也有命命也有性章語録前節性字指氣質而言命字合理與氣而言云云後節命字専指氣而言性字専指理而言云云考證有命焉之命是氣之理命也之命是理之氣何謂氣之理是就氣上説而理在其中為之品節限制何謂理之氣是就理上説而氣却於其中有清濁厚薄之不同叢説意亦猶此此不過因語録之意而少變其語句以為説要之反不若語録之易曉也但曰命也之命是理之氣則與語録之意微異要之此節性即是指理言則命字専指氣無疑考證強欲牽帶下面性字之理上來説此命字故曰理之氣只要與前節氣之理作對其實此命字本無兼理之意只以語録為斷可也曾晳嗜羊棗章讀者多疑此章前只言羊棗而公孫丑仍以膾炙為言不知膾炙與曾晳有何相干蓋公孫丑以為膾炙美於羊棗曾晳宜亦嗜之是膾炙羊棗二者皆為曾晳所嗜今曾子乃食此而不食彼故疑而問也由堯舜至於湯章見知聞知或問禹臯之徒本皆名世之士伊尹太公又湯文之師非必見其君而後知之湯文孔子又生知之聖亦非必聞前聖之道而後得之也此其曰見而知之聞而知之者蓋以同時言之則臣當以君為主以異世言之則後聖當以前聖為師學者不以辭害意可也然而無有乎爾則亦無有乎爾集注林氏曰云云然而已無有見而知之者矣則五百餘歲之後又豈復有聞而知之者乎考證此章大意謂自古五百餘歲而聖人出在當時必有見而知之者在後世則有聞而知之者今去聖人之世未逺去聖人之居又甚近而曾思輩又皆亡已無有如是見知者則亦恐遂無復有如是聞知者矣按考證之意是以曾思為見而知者但其已死則不復有耳愚竊以為不然堯舜湯文之時見而知者又何嘗百年不死耶正恐曾思之徒未可以當見知者耳盍以或問之意而推之乎見知者既非必見其君而後知聞知者亦非必聞前聖之道而後得曾思之徒正是見夫子而後知之者耳愚故謂其未可以當見知之列也孟子之意正不以親相授受者為見知若必待親相授受而後有見而知者則五百餘載之後又何所授受而有聞知者乎禹臯之於堯舜伊吕之於湯文雖則同世然非有資於君而知其道也不過偶然契合而知之耳若武王周公之聖而不與見知之列者亦以其與文王事同一家未免有親相授受之迹故耳然則曾思之於夫子事同一門實出於親相授受者宜亦不得為見而知之者也如此則夫子在時既無偶然契合如臯禹伊吕之於堯舜湯文者矣五百餘歲之後又安有偶然契合如湯之於堯舜夫子之於文王者乎孟子所謂然而無有乎爾則亦無有乎爾者此也孟子與集注之意皆以為當時無見知者其意未嘗以曾思諸人為見知者考證毋乃不得經注之意乎先儒亦有以見知為易於聞知之説蓋亦考證之見也知此則知道矣陸象山有言東海有聖人出焉此心同也此理同也西海北海南海有聖人出焉此心同也此理同也此可以為同時同地者之一證矣又言千古之前有聖人出焉此心同也此理同也千古之後有聖人出焉此心同也此理同也此可為異世異地者之一證矣象山此言雖别有所指然孟子所謂見聞而知之者亦以其心同理同而契合耳初非有賴於親相授受而後謂之見而知也然則中庸序所謂見而知之者惟顏氏曾氏之徒得其傳者非歟曰朱子不過以顏曾得夫子之傳故引以明子思繼道統之意耳初不與聞知者對舉自無所妨又何泥乎四書管窺卷五
