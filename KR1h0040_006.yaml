body:
  text: 欽定四庫全書四書管窺卷六元史伯璿撰中庸章句序其曰天命之性則道心之謂也發明上文云道心原於性命之正可見天命之謂性率性謂道即是道心之謂其曰喜怒哀樂亦人心之謂輯釋亦引之而去其末後二句專以喜怒哀樂為人心竊恐未然愚意喜怒哀樂原于性命之正者道心也發于形氣之私者人心也若只以喜怒哀樂為人心則道心又於何處見得饒氏有曰喜怒哀樂之發患其過不患其不及蓋正指此為人心而言也發明之說殆亦有所本矣饒說於後辨之中庸一書章句以首章為一節次十章說中庸次九章說費隱又次十二章說天道人道末章明首章之意饒氏輯講變其節次分為六大節首章說中和自君子中庸以下十章說中庸費隱以下八章說費隱哀公問政以下八章說誠大哉聖人之道以下六章說小德大德末章復釋首章之意輯釋因通與發明備引其六節之分于各節之下通則勦為己意按章句凡三十三章饒氏析哀公問政章自天下之達道五以下又為一章凡三十四章其間多有與章句背處今標出辨其得失如左一以哀公問政以下至純亦不已作八章是一節曰此是第四節說誠案此處章句只七章以哀公問政章終十二章之意自誠明以下至至誠經綸章皆說天道人道饒氏則分哀公問政章為二章屬下節故曰八章其得失已於孟子離婁上篇居下位不獲于上章辨之此不再述今亦於二十章以後屢辨之二謂程子曰始言一理中散為萬事末復合為一理且是大綱說要之中間却是兩次開闔自中和而費隱是放開說自費隱而誠是收斂說自誠而至道至德又是放開自至道至德而無聲無臭又是斂之以至於極始言一理指天命之性言也中散萬事指中庸費隱天道人道之類而言也末復合為一理指無聲無臭之天言也誠是天道誠之者是人道恐亦不過只是以聖人學者之事對言程子以為中散為萬事事便與始之所言末之所合專指理言者不同以為誠是一次闔抑子思程子之意乎三謂次章以下十章是專說道與教道以中庸為至而氣質有過不及其教在擇守矯三者至此始言氣與教在矯與章句異當於各章辨之四以費隱以下八章為一節以哀公問政章屬下節此與朱子以哀公問政章為終十二章之意者不同如朱子說則論費隱者九章有起有結如雙峰說則似乎缺結果費隱之義者未知如何五以大哉聖人之道以下六章為一節是說至道至德與朱子不同朱子以自誠明以下十二章皆論天道人道己為至當雙峰只因欲分前五章為屬仁智勇至此議論己盡故只得分為一節别起議論觀其於三十二章變天道人道之分為賢希聖聖希天之事則可見章句之本無可議矣當於彼章辨之但自此以後天道人道之分以三章相間與前一章間一章者次序微異則雖均之為論天道人道不妨自有假落雙峰此分視前後分節不同處猶為彼善於此未知然否當於第二十六章章末詳之六言此一節說至道至德其教在道問學此是反身而誠以後事此與朱子以尊德性道問學為存心致知之說不同其誤是於以存心為力行之見而反身而誠以後事之說又與朱子入德之方者亦不同其誤起於以此篇自誠者天之道以後皆以先仁後知為序之見皆當於彼章辨之七謂中庸是傳道之書如首章一則曰君子二則曰君子蓋戒懼慎獨亦成德之事非初學所易到按大學言慎獨亦一則曰君子三則曰君子豈亦非初學所易到耶雙峰於論語灑掃應對章論程子只在謹獨之言亦以為灑掃應對者未能慎獨誤正如此已於彼章辨之且如此處所說則初學之士不睹不聞之時亦不能戒懼己所獨知之處又不能謹慎政恐不戒不慎習與性成自幼至長終無以為進德之基矣又何由造於成德之域哉少成若天性古人之教禁於未發之謂豫殆不如此况卒章自下學為己謹獨之事推之以馴致乎不顯篤恭之妙不知為己謹獨而後德可成乎抑將德之已成而後能慎獨戒懼乎學者豈宜無見於此饒氏輯講改章句為釋義案釋義與章句全背今標出其所以改之義辨之凡云其意蓋曰者以下皆是饒氏自言其與章句同異處如此也第一章天命之謂性章句云云健順五常之德釋義去之其意蓋曰章句雖云人物同得其理以為健順五常之德而下又却有氣禀㦯異之語以救之今以本章方言性而未及氣質欲除下文氣質之語則此語不容獨留雙峰力謂首章未論氣質似矣但若不因氣質有異則只率性而已又何事於教乎教豈非為不能自盡其性者設耶同具此性而有能有不能焉者謂不由於氣質之異不可也况既曰性則必具健順五常方可謂之物物各具一太極然而人物有不同者非性之有異氣質之不能不異爾若曰本章方言性未及氣質則是性之在人在物者自有不同故唯人則各具一太極物則不能然耶非愚所能及也道章句日用事物之間釋義除去事物二字按雙峰又自謂二字除亦可不除亦可如此則不除不失為明備除之不免於遺闕孰若不除之愈也修道章句修品節之也聖人因人物所當行者而品節之以為法於天下則謂之教釋義改云修裁制之也聖人因人所當行者而裁制之以為品節使人由之以入道則謂之教其意蓋曰其人有一假子本來渾全須是裁之以為衣而後人可服聖人因人所當行者而裁制之以為品節則人由之以入道是猶人不識路寫箇路程與他使他依這路程行去輯釋亦引釋義之說大扺輯釋所引則通與發明皆引之矣此因不說氣質有礙故不得不除去物字而如此改耳改品節為裁制則是道之當行者全出於人為豈率性之謂哉况既曰各有當行之路是就散殊處說了而又曰本來渾全須是裁制則又是就渾淪上說矣混淪上可以言性不可以言道豈若只說品節之為順乎曰品節之以為法則是道已本來當如此行聖人但因而品節之以為天下後世法曰法則於教字有照應曰裁制之以為品節則是道本來不如此皆因聖人品而節之方始可行非出於人為而何品節字亦與教字不甚相著章句曰品節之以為法釋義曰裁制之以為品節以二句相比並優劣自見况既未說氣質則道本自有而人自由之如目視耳聽手持足行之順可也何故有不識而待教者耶路程之喻恐未切當修道之謂教章句亦兼人物言釋義除去物字其意蓋謂以下文觀之則教之為人而設可知性原於天道本於性教因乎道此三句總包括造化聖人分上所成就所施為者而言下文方說由教而入者之事却只就人說豈可因由教而入者之只是人遂併指聖人之教亦專為人而不及物乎設便教果不及于物則獸蹄鳥跡交於中國聖人亦任其自然不必驅放之矣周公之驅虎豹犀象與古聖人之穿牛鼻駱馬首草木零落然後入山林昆蟲未蟄不以火田之類皆聖人出分而為之耶况至誠盡性又必兼人物之性子思既自言于後章章句教必兼物宜矣尚何疑乎教章句若禮樂刑政之屬是也釋義改為五典三物小學大學之法其意蓋謂刑政屬政而非教禮樂二字屬教而包括不盡此只因看得教字偏了看得禮樂字狹了故如此見爾看得教字偏了故以政為非教上文修道之教不兼物說其病根在此看得禮樂字狹了故以為該教不盡而舉五典三物小學大學以該之爾其實政教二字分言之則政是政教是教而不可偏主專言教則政亦教耳不然中庸但言修道之教而不及政豈子思之言猶有所未備耶二十章答問政之言又在修道之外耶孟子論王政即言庠序之教又是専言政則教亦政者聖賢之言何嘗如雙峰之固哉况禮樂二字若以六藝之禮樂言之所該固有所未盡若専言禮樂二字則五典三物何莫非禮樂中所該耶周因殷殷因夏之禮三綱五常文質三統與凡制度文為皆是然則只禮之一字固已無不該矣况又兼之以樂何該不盡之有四書通辨此極詳讀者考焉可也每節所辨皆以饒說居前他編居後者蓋以他編多有祖饒說而言者故也率性之謂道章句日用事物之間莫不各有當行之路發明此路字恐當改作理字輯釋亦引其說此曰當行之路後道不可離處曰當行之理曰路曰理一字之變恐有深意未可以淺近之見輕改易也當於道不可離處辨饒氏說併及之但文勢亦自不可改易蓋上文釋命字首曰命猶令也則卒以猶命令也應之故此處釋道字首曰道猶路也則卒以當行之路是則所謂道也應之改之則不相應矣况當行已合理意豈有非理而可以為當行者哉然則正不當改也教章句若禮樂刑政之屬是也發明愚謂禮樂正是中和之教輯釋亦引此說章首性道教三字兼人物說至戒懼慎獨致中和處方專為學者設今以禮樂為中和之教則攙出下文之意而教不可以兼物矣蓋禮樂雖可以包中和而中和却該教字不盡故也發明採饒氏說中庸要處不專在首章又採三山陳氏說此章蓋中庸之綱領此三句又一章之綱領也案陳說是已饒說正與相反蓋為病章句一篇之體要之言而發乃變亂章句之萌也發明兼採而不折其衷何耶章句結性道教之義二本不同發明力主祝氏所傳本以為朱子晚年所改定視舊本淺深踈密大有間矣諸編多存舊本唯輯釋從發明主祝本案發明所放當矣但言其淺深踈密有間而不言其所以有間者為何如愚請明其引而不發之意以俟知者蓋舊本人之所以為人以下三句每句自為一義而未見貫通之妙直至無一不本於天而備於我其義方始貫耳下文自學者知之以後不過只是稱贊子思勉勵學者之言而不復再有所發明於經旨矣祝本自人知己之有性以下六句句句義理貫通已含舊本所謂無一不本於天之意况下文所引董子道之大原出於天之言又有包括無餘之妙殆非舊本所可及也合而較之淺深疏密之間豈難知哉不知識者以為然否率性章句率循也通謂章句本古注率循也論語足蹜蹜如有循循謂足不離地此訓循謂道不離性離性即非道也道不離性之言似切而實踈蓋足不離地則足為一物地為一物不離則以二物相依而不使離耳本非一物之謂也若道之與性則非道是一物性是一物二物相依而不離也持性之流行即為道率之為循特曰順其自然流行之勢而非人為之使然耳以足不離地為喻似非所以言性道反若率字出于人為適足以滋人之惑愚故謂其言似切而實踈也天命之謂性章句舊本結句曰人之所以為人通謂性道教章句兼人物而言末則不曰性之所以為性乃曰人之所以為人殊有深意蓋天具於人人即天也如之何可自棄其天而失其所以為人哉又引王氏曰章句以人字換性字極有力章句以人換性而不言其故是固引而不發通與王氏又但言其殊有意極有力而不言其所以換之故豈亦引而不發耶竊意章句上文所以訓釋性道教之文義者詳盡無餘藴矣至此欲說歸學者身上來故以人字易性字此人字正與下文學者字相照性雖人物所同具道雖人物所共由教雖聖人通為人物而設然能自致於學以求盡其性者唯人耳若不以人易性則性既為人物之同同具而下文乃曰無一不本於天而備於我此所謂我將指人而言耶將指物而言耶抑通指人物而言耶又曰學者知之所謂學者即上文所謂我所謂人耳若不以人易性則似乎學者亦兼人物而言矣愚故曰欲說歸學者身上來故以人易性也然此特舊本耳今觀定本人知己之有性以下六句特以人字冠於其首尤可見章句自此以下専為人設之意矣不知識者以為然否又人也所以為人不如人知己之有性造語瑩潔而易曉尤可見舊本定本淺深疏密之間矣道也者不可須臾離也章句道者日用事物當行之理釋義改云道者率性之謂其意蓋曰一則欲人見與上文道字無二義一則日用事物當行之理只說得用而於道體該不得今只說率性之謂則體用皆在其中愚意率性之謂却只說得用而該不得體性固是體既曰率性則只是道之用蓋性既理也方其未發唯有此理渾然在中而已未可以率言也至於己發然後循其性之自然莫不各有當行之路乃可以率言爾謂率性可以兼體用不知經文率性之謂道亦可以兼體用言否必有能辨之者愚奚容贅但朱子於上節曰當行之路此曰當行之理改路為理恐正是周意深處蓋道之本體方其渾然在中之時但有此理而已未可以路言也路則已發而各有所適可以言用而不可以言體理則根於性而散於事無間乎已發未發可以兼該乎體用矣或曰既疑當行則只可以用言者愚謂當行固是用當行之理則不偏於用也理即性之所具當行之理獨非此性之理乎亦猶言愛之理愛固是情是用其理非性非體乎即此推之則當行固是用當行之理非其用之本體而何哉發明欲改前節章句路字為理字豈亦未知朱子之微意耶章句無物不有無時不然釋義改為隨其動靜莫不有道只是無時不然句意其意蓋謂不可須臾離只是無時不然底意思則費隱鳶飛魚躍方是無物不有意思章句此一句是攙先說了此條通者之辨已詳但章句之所謂物是該君臣父子耳目四肢與凡飛潜動植之類而言考於或問可見雙峰則但以飛潜動植為物而不思人倫身心之無非物而又至為切要也愚竊以為唯其無物不有所以無時不然若但說無時不然則道却是個懸空常如此無著落物事須臾二字不在如此泥而後可通也饒氏謂不睹不聞與獨睹獨聞皆是指裏面底說若以為睹聞於外則與自家何干涉此蓋只指意之萌為睹言之發為聞此二句亦雙峰自說故如此說耳竊意此須兼內外說方備且如非禮勿視勿聽亦何嘗不是睹聞於外者蓋或只是自動於中或因接於外而中乃動皆睹聞也其泛然過乎耳目而中不為動者固與己不相干若按於耳目而後中乃動者又豈可謂其在外與己不相干乎以此觀之睹聞専指內說又孰若兼內外之為備乎或疑睹聞說裏於獨字尤切若外面則人所同睹同聞可以言獨為此說者是求之太深知大庭廣衆之有獨而不知暗室屋漏之乃所以為獨也若暗室屋漏之中耳目有所應接亦以為人皆睹聞可乎况雖在衆中雖同過乎耳目而我心獨為之動亦不外其為接於外而獨睹獨聞也或又疑睹聞與視聽不同今以非禮勿視聽為證恐未為切當愚謂泛然過乎耳目與己不相干如前所辨者固不必論視之以目聽之以耳者亦不可但謂之睹聞其有接乎耳目而方起欲視欲聽之心者耶此欲之之心便是睹聞之干於己又未可便屬之視聽者奈何遽以此欲視聽之心即為己視聽之事而反以為不可但謂之睹聞乎如勿視勿聽亦是耳目方接而禁止使不視聽之耳若已視聽而後禁止又何及哉饒氏謂恐懼較之戒慎尤重意雖己萌猶未見于事尚可著救言一出口則駟不及舌矣故尤當加畏睹聞須就耳目上說而皆根於意方偹今但以睹屬之意而聞與意不相干則偏矣經言戒慎不睹恐懼不聞初不見輕重之異雙峰一以配之意與言便就中分其輕重要之若就耳目上說上說又何嘗有輕重更以四勿之旨參之則重莫重於目之所接而謂睹輕於聞可乎此皆以専以睹聞為在內者之所致耳章句曰是以君子之心常存敬畏雖不見聞亦不敢忽釋義改為是以君子之心常存敬畏雖當事物既往思慮未萌目無所睹耳無所聞暫焉之頃亦不敢忘其意蓋謂事物既往是指前面底說事物未往是指後面底說不睹不聞正在此二者之間看上文道不可須臾離則此不睹不聞在事物既往之後看下文喜怒哀樂未發則此不暏不聞在思慮未萌之前緊要又在暫焉之頃四字於此見須臾之意又章句忽字不若忘字道不可須臾離只是常不可離須臾正是常之反不可須臾離則無時可離之意見矣經文正意不可須臾離雖就道體上說以見無物不有無時不然之意然觸類而長則動靜皆不可須臾離者亦自可見靜時固不可須臾離故君子必當戒懼動時亦不可須臾離故君子尤當慎獨觀章句所以釋二節之旨者可見雙峰强說不睹不聞為須臾故以不睹不聞為前事既往之後後事未至之前仍以暫焉之頃牽合上文須臾之旨但上文道不可須臾離只是言其無時可離而已何以因此見不睹不聞在事物既往之後下文喜怒哀樂未發既隔慎獨一節又如何因此見不睹不聞在思慮未萌之前雙峰謂著此二句方說得上下文意貫串愚謂其上句不可貫串上文固不待論若欲以下句貫串下文未發之意則除非删了經文慎獨一節方可說合又聖賢論道有但言其體而用無不該者有但言其用而體無不存者有以體用對待言之而各極其旨趣者必各隨其所指釋之意乃可得如此二節正是以體用對待言之者體則但言其本然者如此初不計其時之多少久近何如也唯雙峰先立靜時少動時多一見主之遂謂靜時只有暫焉之頃殊不思此一節方就道之本體上論則道之本體㫮性之德而具於心可以言常而不以言暫豈可意其靜時之少遂以暫焉為訓乎靜縱可以暫言體亦可以暫言耶况天下之大古今之久人類之多中間豈無無事而靜得久者豈可例以暫焉之靜律之哉聖賢立教畢竟以為人心有動不能無靜靜即道之本體體上工夫自合如此周匝則下工夫者暫靜亦得久靜亦得皆只如此戒懼可也又何拘乎其曰忽字不如忘字者竊意忽字正與戒懼意相反忘字縱好亦與戒懼不甚相應謂忽不若忘豈雙峰自忘戒懼之不可忽耶要之以忘易忽亦起於暫焉一說而已戒慎恐懼叢說故凡所主之思慮及接物時皆在戒懼限界裏如此看然後與不可須臾離一句意脉相接續此蓋惑於雙峰謂章句以戒懼為動靜故如此說愚但辨饒說此不贅及通謂不睹不聞四字正是釋須臾二字輯釋亦引之此分明勦饒說為己有愚已辨饒則不必辨此矣道也者章句道者云云所以不可須臾離也發明章句曰日用事物當行之理言道之用皆心之德而具於心言道之體無物不有言大橫說無時不然言久直說竊謂日用事物當行之理釋道字之義已盡蓋兼體用而言此意已詳於前皆性之德而具於心又専言道之體如此無物不有無時不然又専言道之用如此所以再言一體一用如此者正要說入不可須臾離上去耳發明體用之分不可曉莫見乎隱云云慎其獨也釋義改章句曰隱暗之地雖人所不睹微密之事雖人所不聞然其幾既動則必將呈露於外而不可掩昭晰於中而不可欺是道固不可須史離而其形見顯明尤莫有甚於此者其意蓋謂莫見乎隱莫顯乎微程子皆主理言吕遊楊皆主心言章句跡雖未形幾則已動程子意也人雖不知己獨知之吕遊楊說也雖兼二說仍把莫見乎隱莫顯乎微作一袞說要之莫見乎隱主理言莫顯乎微主心言見不可作著見乃形見之見此理雖隱將必形見於外一念方萌便是昭晰於于中按章句以二句作一袞說最精蓋跡未形幾已動人不知己獨知隱暗之處細微之事皆如此若隱暗之處専主理言而心無預焉則何以己獨知之細微之事専主心言而理無所預則何嘗己獨知之而終不呈露於外耶以此見得章句作一袞說之最精也且釋義亦不過皆即章句或問之意而櫽括變置之耳初無甚異而自說以為與章句異非愚所能曉也况雙峰前既以意萌為睹言出為聞此又以有此理主睹萌一念主聞亦無定說形之與著亦不多爭但以致曲章形著明之序推之則形淺而著深今既以顯為明則見不但形見而為著見又可知矣讀者詳之竊詳章句幽暗之中細微之事語意似但指幽暗中之細微事為獨者下文但言天下之事此事字正與細微之事事字相應可見獨字所指不在事外蓋幽暗之中若無細微之事亦無所謂獨細微之事若不在幽暗之中亦不可謂獨必幽暗之中有細微之事細微之事在幽暗之中方可以言獨耳觀於卒章以不愧屋漏為戒懼之事可見蓋屋漏正是幽隱之中特未有所謂細微之事故不可謂獨而能不愧於此則但為戒懼不睹不聞之事而已如潜雖伏矣之詩所謂潜伏却正是言細微之事潜伏於幽隱之中此正所謂獨也此雖不明言其為隱微而隱微之意固己寓於潜伏之中矣故以此為慎獨之事也以此觀之首章似是以幽隱之中有細微之事為獨卒章似是以細微之事在幽隱之中為獨者潜伏便是在之意但言在不見其為隱微故言潜伏耳管見如此未知合朱子意否亦未敢自以為是姑俟知道而就正云饒氏謂章句以慎獨専為謹於方萌之時則某動察之工有所不周魯則以為謹獨工夫濶獨不但是念慮初萌時雖應事接物顯顯處亦自有個獨案雙峰亦自謂其幾既動一念方萌其實與章句之意無異而又病章句有所不周何耶隱暗之處細微之事章句以為幾已動已獨知者所以言其莫見莫顯也以為跡未形人不知者以其猶隱獨微也必慎其獨章句以為遏人欲於將萌者人人心易危一念不謹則私欲乘之而起也雖若皆就方動處說然方動則於隱微為宜若其動既久則跡必形而人皆見何隱微之有又何可以獨言哉蓋意動於中而跡形於外意是事之微跡是事之著已自內知而人自外知以中對外而言則中為幾意而外為跡事以意幾對事跡而言則意常先而事常後是以人應事之時念慮無時不萌而其萌必在所為之先所以自始至終跡形皆在幾動之後己知皆在人知之先也且如作此一字必須先起意而後下筆意亦不是一時起筆亦不是一時下必旋起意旋下筆而後字乃可成然意方起筆未下之時便是隱微所在意方起故幾己動而已獨知之筆未下故跡未形而人皆未知之於此時而謹之則筆正而字正矣其間自一㸃一畫以至於成字自一字二字以至於成行成幅以至於連篇纍牘莫非旋旋起意旋旋下筆之所為固非但凡初焉一時起意至下筆之後意皆不復起也以此推之則雖只以幾動為獨又何害其為貫事之始終無時不有方動之幾無時不在所當謹乎朱子說謹獨工夫又何嘗减於雙峰之濶雖應事接物顯顯處亦何害其為自有個獨謂章句於慎獨工夫有所不周殆未必然也况章句所謂遏人欲於將萌者不過以為念慮已動則人欲於此時而將萌不可不先有以遏之耳初非即以欲萌為幾動也蓋幾自是當動欲自是不當萌唯雙峰誤認章句欲萌即為幾動之意故病其工夫之不周耳殊不思幾固無時不動然不可便以此為欲萌也但若欲遏人欲茍不於其將萌之時用工待其既萌而遏又何及哉或者猶疑人之意是作事之始便起今以為念慮無時不萌則是一事之中有萬動也其意蓋謂唯動之初是幾已動已獨知既動則跡形而人皆知矣何嘗不承始焉所動之意乎愚謂此誤認立志為起意也蓋人之應事志雖一時立定意則隨時旋起幾動之幾指意而非指志也可不辨哉饒氏謂上節章句云君子之心常存敬畏雖不見聞亦不敢忽觀常字亦字則戒懼不睹不聞為該動靜此節章句云君子既當戒懼而於此猶加謹焉觀既當尤加之意則謹獨為動之初然竊以上下文意求之所謂不睹不聞者即下文喜怒哀樂之時之時而獨則已發之時也戒懼不睹不聞是靜時工夫謹獨是動時工夫竊嘗反覆章句之意乃知雙峰分動與靜之說却是朱子本旨謂上節該動靜此節為動之初是章句意者却是錯看了章句常字亦字與既常尤加之意之意而致誤耳愚又因此厯考或問語録之說見朱子於戒懼一節只說個理未嘗一言及事直至慎獨處方說著事蓋前節是就體上用工未說到應事處故但言理以該之耳論道之本體則無物不有無時不然聖賢於此固不能必其何時有事之可應何時無事之可應但常存此戒慎恐懼之心而已雖其時未有可應之事目無所睹耳無所聞亦自不敢有一毫一息之忽則為有以存夫天理之本然者矣章句曰常曰亦之意只如此看則不必以為該動靜而後可以為常也只就體上說又豈可意其不能無動而不得謂之常哉後節是用處工夫用則已動而各當乎一事既有當應之事便與常時不同又當加一分謹慎不可謂體上已常戒懼動時只如此應將去便了才如此見便是不能慎獨無以遏人欲於將萌矣蓋無事時既常戒懼則有事時自合加謹非謂動之初加謹動之極不加謹也雙峰疑章句只加謹於動之初則動察工夫有所不周其誤蓋本於此前假辨之辨之知彼則知此矣然則章句既常尤加四字之意又豈但可施于動之初而不足以貫動之始終乎以此觀之則應事方是動體上工夫未說到應事處未可以動言也又何必以該動靜為存天理乎朱子之意其不出此也必矣盍亦以二節章句言之推之乎上節曰無物不有無時不然下節曰幽暗之中細微之事便見體則兼該乎衆理用則各當乎一事戒懼所以存天理只是言其靜而無一息之不存耳若以為兼動言之則道既無物不有亦將雜然而應之耶若果如此豈主一無適之謂哉慎獨所以遏人欲所謂隱微却只是一事欲應其事而無失又豈可但於動之初加謹乎蓋靜則兼存衆理以立其體動則隨事致察以達其用二節章句之言以此推之其意自見雙峰奈何以章句之意為己意而以該動靜動之初之說誣朱子誤後學哉饒氏合喜怒哀樂未發與致中和二節為一節其意蓋謂自喜怒哀樂之未發謂之中至萬物育焉蓋因上文靜存動察之功而推其體立用行之效也今以上四句自為一節以為道不可離之意疑非本旨此章前後五節皆是以本然之道理與當然之工夫相間而言而二者之間又各以一體一用對待言之極為詳整第一節是總言以起之性是體道是用天理之本然者也教即修道以復其性之謂人事之當然者也第二節第三節是由教而入以存天理遏人欲之事此是就體用上做工夫處第四節是以性情之德對言此又是申言本然之道理處以見道之體用自然而然故見道之本不可離者如此雙峰以為疑非本旨何耶第五節是就性情之德上做工夫處又推其效驗而極言之此又是申言當然工夫與學問之極工也若合而一之則但詳於本然道理與效驗之極致而並無一言申說做工夫處又豈為得其本旨也哉雙峰只因欲與其首章未說氣質與致是坐致之致意不相反故如此立異耳殆未必然饒氏謂魯嘗謂衆人有性而無中人以為怪衆心之心紛紛擾擾無須刻寧息何由有中人心合有動靜亦猶人心必有此性一般若以衆人之心紛紛擾擾為無中則衆人汨於氣習而性鑿者亦豈可遂謂無其性也耶况天下之大古今之久人類之多其間豈無不紛擾而有寧息者耶何可據一己之見而盡誣天下為無人哉衆人有性而無中子思所不敢言程朱所未嘗道而雙峰昌然言之亦安得怪人之以為怪也哉要之此亦起於以不睹不聞為暫焉之須所見爾饒氏謂中節之節有限止之義喜怒哀樂之未發其過不患其不及故以節言之輯釋亦引此說此恐亦言之太快謂之中節便如中的一般過者固不可中不及者尤未易中喜怒哀樂出於人欲者固易至於過而難得不及出於天理者雖亦有過而反易至於不及何則且如有一善人在此能喜之者能有幾人能十分喜者又有幾人見惡而怒聞道而樂何莫不難至於過易至於不及耶又如三年之喪聖人為之中制以節其哀戚之心使賢者俯就而不敢過不肖者企及而不敢不及也然而世之俯就者不一二企而及者常千百亦有併不能企及者焉烏在其為喜怒哀樂不患其不及耶饒氏謂情無乖戾謂之和今章句曰應物之處無少差謬則是事之無過不及而得中之謂似亦非所以言和和是情之發致和則自情而達之所應之事矣不然又何以見推而極之之實乎蓋情不徒發必有所應之事章句此二句是釋致和之義觀自字以至於字之意可見致字之意只因雙峰說致字之義不同故如此見爾餘於後二假究之章句以致中和之致為推而極之釋義改為如可坐而致之致謂功深力到而自有以使之然也其意蓋謂這個著力不得人但當於不睹不聞處戒懼於獨處加謹到得工夫純熟則自然中自然和此已略於前假辨其合二節為一節處及之詳此二節前是說本然之理如何更不說工夫而但極言其效驗耶且坐致之致是我無所為但坐而致彼之來此處自自學者做到聖人地位不知亦可以自無所為但坐而致彼聖人之位之自來否若曰中和是人心本然純粹之德則生來便自如此又何待於戒懼慎獨純熟而後然耶又豈必坐致而後至耶若曰戒懼慎獨是工夫致是著力不得坐而致之之處如此則須今日做戒懼慎獨工夫明日則只坐而致之著力不得耶將一邉做工夫一邉著力耶若做工夫時便是坐致時則著力不得又當屬之何時况既無不做工夫時又安有時節可得而坐致耶皆所未喻且中庸不獨此處言致字如致曲致廣大之致皆是推極之義何獨致中和之致不得為推極耶非愚所敢知也致中和章句致推而極之也云云自戒懼而約之以至於至靜之中無所偏倚而其守不失則極其中而天地位矣自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育矣纂疏趙氏曰約是收斂近裏之意精是别得不雜之意此二字尤朱子喫緊示人處發明收斂近裏貴乎約審察幾微近乎精二字下得猶不茍纂疏發明所以稱贊約精二字之首如此未知其於此假章句之㫖果無疑否但近見學者初述雙峰該動靜之說以為自戒懼而約之以至於至靜之中至靜之中即不睹不聞之處其意蓋曰自兼動靜而收斂之以至於不睹不聞至靜之中也夫中是未發靜時之事和是巳發動時之事必於靜時做靜上工夫則該動靜不可以致中動時做動上工夫則動之初不足以致和此理明甚朱子豈有不曉雙峰理有未明而不盡乎人言之意故乃創為此說該動靜動之初以該朱子誤後學亂道甚矣尚可述之以釋章句之旨乎竊詳此假章句之㫖戒懼二字不止是舉戒慎恐懼四字意言是舉戒慎乎其所不睹恐懼乎其所不聞二全句對慎獨言之之耳兩自字兩以至於字是推而極之之意所謂致也大凡靜是自外靜至內必耳目無所睹聞於外矣然後此心亦寂然不動於內內即所謂至靜之中也動是自內動出外必一念萌動於內矣然後與事物應接於外外即所謂應接於也約是自外收斂入內之謂精是自內審察出外之謂自戒懼而約之以至於至靜之中蓋曰自不睹不聞於外而戒懼之又收斂入內至於此心寂然不動之中無所不用其戒懼則致中之工至矣自謹獨而精之以至於應物之處蓋曰自一念萌動於內而慎之又審察出外至於所應接之事物無所不用其慎則致和之工至矣無少偏倚無少差謬是一時極其中和之意是自外至內自內至外無不全盡之謂先儒以為橫致一致是也其守不失無適不然是無時不極其中之意是從今至後從此至他未嘗間斷之謂先儒以為直致一致是也語録有曰戒懼是由外言之以盡乎內謹獨是由內言之以盡乎外愚蓋即此以推章句之旨耳非盡出於臆見也不知識者以為然否饒氏謂致中和而能使天地位萬物育者是有此理也譬如一日克己復禮天下歸仁使其如湯文之有七十里者里則其朝諸侯有天下也必矣顔子居陋巷何緣使天下歸之然同門之人心悅誠服萬世之下皆崇仰之非天下歸仁而何輯釋亦引此說中和位育或問眀以事言而謂彼以理言者言之不備有以啓後學之疑不若直以事言而理在其中之為盡耳故陳氏亦曰此乃有位者之事功非泛就君子說詳此則饒氏是有此理之言正或問之所謂未備者讀者考焉可也又按歸仁之歸集注云猶與也天下之人皆與其仁只是天下皆以仁稱之今雙峰以為歸往之歸誤矣先改章句取楊氏之說以首章為一篇之體要故於下十章云釋首章之義於費隱章云申明首章道不可離之意饒氏皆不用其說其意蓋謂首章言中和下十章自言中庸首章言戒懼慎獨下十章自言擇守矯皆非釋首章之義首章言道不可須臾離對莫見乎隱莫顯乎微而言既不専重在道不可離一句况費隱章自承上十章中庸等語而發亦非専申首章之意首章言中和後十章自言中庸首章言戒慎獨後十十章自言擇守矯以此為後十章非釋首章之證竊恐未當此只因以首章未說氣質故如此見爾其詳於第二章章下辨變和言庸處及之姑舉一端于此以見其概夫戒懼慎獨是存養省察之事擇中庸守中庸即致知力行之工非存心無以致知非省察無以力行程子曰涵養須用敬進學則在致知謂首章言戒懼後十章自言擇中庸非擇首章之意者未察程子之旨者也大學第六章為誠身之本工夫全在慎獨後十章言慎獨後十章自言守中庸非釋首章之意者不詳大學之言者也則其說之非自明矣至謂首章重不専在道不可離一句以其對隱微二句而言者尤為未當雙峰亦嘗自言性道教三字道字重所以下文便說道也者則非不知道之為重者特以說須臾二字為不睹不聞所以看得不可離之意狹了故如此見爾其實道不可離之道雖便是上文率性之道然上文對性而言則道只是用此處専提道之一字起說則道字自兼體用了故以上文言之則天命之性即此道之體率性之道即此道之用以下文言之則大本之中即此道之體達道之和即此道之用也就此二節言之則戒懼所以存養此道之體慎獨所以省察此道之用也唯道之體用無不該貫如此此其所以不可須臾離也天下初無二道後章君子之道費而隱何嘗不便是首章不可離之道費者用之廣隱者體之微此所謂體又何嘗不便是首章天命之性大本之中與夫戒懼致中所存之體此所謂用又何嘗不便是首章率性之道達道之和與夫慎獨致和所推之用乎至於近自夫婦居室之間逺而至于聖人天地之所不能盡無往而非斯道之用而其所以然者亦無往而非斯道之體然則道之不離者於此尤為易見朱子之言豈不深切著眀眀雙峰只因謂首章未說氣質而後章有愚不肖聖人之不同難以遷就故如此離析之耳至曰道不可離自對莫見莫顯而言不専重在道不可離一句則此二節雖相對而言然道不可離一句又是大總腦處唯其道不可須臾離故靜時不可無存養之工動時尤不可無省察之工也朱子皆以不可須臾之其旨深矣此二節文理正如艮其背不獲其身行其庭不見其人處相似皆是以四句分作兩截則兩截自相對總說則以起首一句為總腦者知彼則知此矣然則謂道不可離對莫見莫顯二句言重不在此一句者不詳文勢者也謂費隱章不申明道不可離意者不察道無二道者也姑俟知者為折衷焉饒氏改章句釋中和之義曰喜與怒對哀與樂對四者各偏于一其未發也則性體渾然四無偏倚故謂之中發皆中節情之得其正者也一無乖戾故謂之和其意蓋謂四件如東西南北相似方其未發只在中間故謂之中及其既發必件件中節方可謂之和下個四字見得於四者無所繫著下個一字又見得皆字分曉此雖與章句無大背馳然不若章句之渾融而無不包也何則人之性則只有仁義禮智四者人之情却不止於此四者子思亦舉其概以示人爾自喜怒哀樂之外若愛若惡若畏若懼若怨若驚若憂患若好樂皆人之情也若曰但於喜怒哀樂四無偏倚必拘餘者或有偏倚奈何但於喜怒哀樂一無乖戾而於餘者或有乖戾奈何經文章句但舉其概言之則餘皆可通雙峰必限之於於喜怒哀樂四無偏倚必拘之以於喜怒哀樂四者之中一無乖戾雖若親切不可移易而不知以類而推則不可通其餘矣不知識者以為然否饒氏謂章句吾心正而天地之心亦正吾氣順而天地之氣亦順是以中屬心和屬氣然中性也和情也性情皆統於心恐不可以中為心而和不可以為心且曰天地之心待人而正亦似未安蓋中和皆屬心位育皆屬氣朱子從天地萬物本吾一體上說來則曰心曰氣而一體無不舉矣朱子不以心正氣順為中和特曰能致中則在我之心正能致和則在我之氣順心正則天君安泰即一身之天地位也氣順則百體悅豫即一身之萬物育也在我者如此則在外者亦如此感應之理自然而然可見一體之實况不曰萬物氣順而曰天地氣順可見不以氣順為和而和則氣順之意氣順便是萬物育了曰天地氣順則和是天地分上事氣順是萬物分上事矣推此則不以心正為中而中則心正之意可見况以一體之意觀之則人便是天地之心吾心正則天地之心亦正矣天地之心吾之心耳豈謂吾心之外天地别有可正之心哉若曰天地之心待人而正是二心也二心非一體之意一體則不當有二心矣雙峰此疑不得朱子之意也但其曰中和皆屬心位育皆屬氣雖非章句本旨亦可備一說姑存之以俟知者輯講問章句云極其中而天地位極其和而萬物育似太分裂饒氏曰是如此疑其分裂朱子於或問中辨之已詳愚奚贅贅但雙峰釋義亦以天地萬物分而屬於中和今又費辭自辨而獨疑章句之分裂何哉抑又因此可見朱子不以戒懼為該動靜慎獨為動之初之意何則觀朱子於此且曰特據其效而推本其所以然則各有所從來而不可紊耳况於戒懼慎獨一體一用又為致中致和用工之要中為未發方靜之時豈有兼動靜乃可以致中之理和為己發動時之事又豈有只慎於動之初而可以致和之理效驗不可不推本其所從來而不可紊工夫獨可不分别其所從始而使之紊乎以此見得朱子只以一動一靜對說戒懼慎獨决無該動靜與動之初之意讀者詳之章句修道之教亦在其中輯釋從發明引陳氏曰致中即天命之性致和即率性之道及天地位萬物育則修道之教亦在其中竊謂中和主性道而言曰致則教在其中位育其極功耳陳氏以致中致和屬之性道故只得以位育屬教殊不思性道何嘗有致字意來讀者詳之中和位育或問此萬化之本原一心之妙用聖神之能事學問之極功發明聖神能事究極之惟大聖人能與於此學問極功降聖人一等而論之由教而入者果能盡致中和工夫夫則其學問之極功亦可庶幾乎此亦可以為賢人矣孟子論聖神必本於善性魯謂學問極功之外他有所謂聖神之能事聖人能事猶非學問極功所可當乎發明蓋祖述饒氏生知安行之聖與大而化之之聖不同之言以為說而不思子思朱子之意不如此也此一節承戒懼慎獨而推極之章句曰此學問之極功聖神之能事初非有待於外而修道之教亦在其中矣章句所言即或問之意曽謂學問極功與聖神能事有二致乎第二章君子中庸章句曰中庸者不偏不倚無過不及而平常之理也饒氏去其不偏不倚四字其意蓋謂以下文擇守中庸等語觀之恐不是說未發底子思首章中和特推其所由來耳按朱子嘗曰中庸之中本是說無過不及之中大旨在時中上若推其本則自喜怒哀樂未發之中而為時中之中未發之中是體時中之中是用中字兼中和而詳詳味此言則朱子兼不偏不倚釋中字之意可見殊不思擇守中庸固皆就用上說然若不從體上說來則天下豈有無體之用哉至謂中和特推其所自來耳然則性情果皆無預於事理耶豈子思虛設天命之性大本之中與夫戒懼致中之工夫於前至於行事之際則皆不原於道體無賴於存養之功即又豈但空論性情之德存省之功于始至於擇守中庸之時亦皆無所資於彼但就事理上擇而守之耶况後章論費隱論尊德性道問學皆合體用言之豈亦子思之誤耶耶雙峰於一貫忠恕章則尤朱子缺說曽子有一上工夫於灑掃應對章則病子夏泥事而不說理無以貫通之於此却又謂未發底無預於擇守意正相反皆是但知求朱子之疵而不自覺其彼此之皆病也多見其不知量耳姑述其概於此其詳於此章之末變論和言庸處及十二章論前面許多說話都是說費處辨之君子之中庸也君子而時中輯講問章句云君子知其在我故能戒慎不睹恐懼不聞而無時不中竊意時中之中指已發者言戒懼不睹不聞只於未發上說得饒氏曰章句戒慎恐懼是兼動靜說然施於此章畢竟多了不睹聞聞四字且無時不中亦非文意不若只言隨處中要之章句自君子知其在我以下與本文意不同章句前釋中庸之中無不偏不倚說故此處亦從戒懼不睹不聞處說起雙峰前既去其不偏不倚四字則于此亦不之從是矣又何必以戒懼無動靜為朱子以自明耶無時不中之言不若隨時處中似矣但朱子釋上文君子時中正意己曰又能隨時以處中也饒氏既不述其上文正意又略其中無定體隨時而在是乃平常之理三句但自君子知其在我以下說起而謂自是一說可謂以文害辭以辭害意理有未明而不盡乎人言之意矣發明亦謂君子知其在我以下為又推其本而以知為重云云蓋亦本饒說而云輯釋亦引其無時不中亦非文意不若只言隨時處中之言蓋亦因不通看章句全文而唯就此三句求其意之過也讀者詳之饒氏隨時處中又曰故能戒慎不睹恐懼不聞而無時不中叢說謂章句上既曰隨時處中是就應事處言其下却曰戒慎恐懼而無時不中則是以存心言也時中正是慎獨致和之事而章句之言如此其偶然有脫略歟下面肆欲妄行却正就發處言此是勦雙峰之意而小變之以求章句之疵者也愚己辨饒則不必辨此矣但章句前釋中庸之義既曰不偏不倚無過不及而平常之理矣章末又曰中庸之中兼中和之義矣中間不如此言則是戒懼皆無用之虛言而應事皆不以之為本矣無時不中自應上文中無定體隨時而在言之正是應事之時其所以必先言戒懼者以見非存心無以為應事之本也奈何以此為存心而非應事乎要之叢說只因誤認章句無時不中之中為在中之中故如此見爾讀者詳焉可也章句曰變和言庸者游氏曰以情性言之則曰中和以德行言之則曰中庸是也然中庸之中實兼中和之義輯講中和以性情言人心本然純粹之德也中庸以事理言天下當然之則不可過亦不可不及也也二者雖同此中理而所指各異故致中和者則欲其戒懼慎獨以涵養乎性情踐中庸者則欲其擇善固執以求合乎事理二者內外交養之道也輯釋亦引此說中和與中庸存省與擇守雙峰謂其所指各異愚已嘗辨之矣今請因其性情與事理所指各異之說而申言之庶乎可見如朱子之說則內外有交養之益如雙峰之言則判內外離心跡不得為文養矣蓋以性對理而言則性具於心而理散于事若有內外之分也然性即理也天下萬事萬物莫不有此理而此性足以該之故曰天下無性外之物而性無不在此性之所以無內外也性無內外故未發之前誠有存養之工則天理之本然者無所虧喪所以達之於用無適而非天理之流行也以情對事而言則情發於心而事至乎外若有內外之分也然情未嘗無所感而徒發必因有當應之事而後喜怒哀樂之情隨所感而應之事非死灰其心者所可應必因喜怒哀樂之情發皆中節而後事始各得其宜故已發之後誠有省察之工則情無不中其節而事亦無不當于理者矣由是觀之擇中庸而無存養之工則察理必不能精而無以為力行之本守中庸而無省察之工則人欲必不可遏而所知為徒知矣謂存省與擇守所指不同可乎朱子以中庸之中兼中和之義則存省皆所以為擇守之本擇守皆有以致存省之實此內外所以有交養之益也雙峰既謂性情與事理所指各異又折存省與擇守之二而二之則存省時未暇擇守擇守時妨於存省正如前論坐致與戒懼慎獨時有相妨者相似此則不唯內自內外自外而且至於內外之交相為病矣尚安得其相養乎抑愚又嘗反覆雙峰之說而知其所以致此差失之故有二謂首章未及氣質下章乃言氣質者其一也說中和以為四無偏倚一無乖戾者其二也未及氣質之說愚已辨之詳矣四無偏倚一無乖戾之說愚亦嘗辨其略矣今請耳申二者未盡之藴以眀之蓋子思之意所重在乎未發已發中節不中節而不在於喜怒哀樂之四者雙峰則限之以但以喜怒哀樂四無偏倚拘之以但於喜怒哀樂一無乖戾是所重不在於未發已發中節不中節而但在於喜怒哀樂之四者也殊不思人之情豈止於此四者子思特舉此四者以為之凡例耳唯饒氏只以四者發皆中節為和故謂性之所具情之所發皆無預於擇守之工遂以性情與事理判而為二而如此差失也且人性之目有仁義理智四者之别姑以智仁兩端言之智之發為是非之心仁之發為惻隱之心是非惻隱之心非情乎非此心之用乎二者之心不能察識擴充以盡其量又可得為中節之和乎於此可見情之發於性者不止於喜怒哀樂之四者矣及其逹之事理之間則智主於知所以擇中庸者實本於是仁主於行所以守中庸者實本於是謂性與事理所指各異可乎謂存養之工與擇守之事所指各異又可乎况擇中庸者在於窮理以致其知苟不橫充其是非之心以分别乎事物之理則善惡邪正莫得而辨則理必不明雖欲擇乎中庸不可得而擇也守中庸者在於固執而力行茍不能擴充其惻隱之心以全其本心之德則心不能以無私事不能以當理雖欲守乎中庸不可得而守也謂情與事理所指各異可乎謂省察之工與擇守之事所指各異又可乎大抵析而言之則存養所以為致知之本致知即擇中庸之事省察所以為力行之助力行即守中庸之工此意已於首章章下辨楊氏說處詳之此不再述合而言之則未發之性皆所以為擇守之本故不可無存養之工已發之情皆所以為擇守之用故不可無省察之力此意即上文所辨者朱子謂下章皆釋首章之意殆謂是夫雙峰限於四者之情而不知子思所重在於未發已發中節不中節而不在於喜怒哀樂之四者其差失安得不如是哉若夫聖人設教政為氣質不齊者設若曰首章未說氣質則性道人人之所同具但只循其性之自然則日用事物各有當行之路矣又何以修道立教為哉戒慎所以存天理若未說氣質則性即理也本然全具不待存之而自不立可也又何待戒懼而後存耶慎獨所以遏人欲若方說性而未及氣質則性命純乎義理之正何故有私欲當遏私欲若不從形氣上發則無所自來矣若曰人性上自有私欲當遏則是不知人性之無不善也知性無不善而猶以人欲為遏則是防之過也唯以氣質為說則自然㫖意貫穿無許多窒礙矣更以發皆中節之意推之尤見其說之不通夫饒氏既曰中和言之心本然純粹之德矣則子思言喜怒哀樂未發謂之中何不但曰既發謂之和而必更以而皆中節四字為言耶曰皆中節則見其亦有不能中節者矣中節謂之和不中節則乖戾而不和者不假言矣既以中和為人心本然純粹之德則宜有中節而無不中節者矣今乃有不能皆中節者焉謂不由乎氣質之不齊則吾不信也假如其說則除非删去經文而皆中節四字乃可通耳饒氏性如此說故於第十一章之末詳辨首章與後章所指各異之意其間有曰性者渾然太極之全體無所偏駁故其未發也則為中已發也則為和果刪經文而皆中節四字為說蓋欲成就其未說氣質之說則不得不然也但不知情之發還亦有不中節也否又不知中節不節節皆可以為和乎子思之意政恐未必如此也雙峰又謂首章是聖賢不犯手底工夫但降聖人一等便有氣質之纍只恁地平做不得所以下文又有擇守強矯之說信斯言也則唯堯舜性之之事方無氣質之纍乃可從事於首章工夫此外自湯武反之之事便不免有氣質之纍則於首章工夫亦無預焉是則首章工夫子思專為生和安行者設學者由教而入者全不可企而及耶然則存養省察之工降聖人一等皆無預耶不知有是理否雙峰識見如此安得不與章句枘鑿姑述其同異于此以俟明者為折𠂻云輯釋士毅按惟君子能因性情之自然而致中和是以能全德行之當然而踐中庸究其用工惟在乎主敬而已戒慎恐懼敬也擇善固執非主敬者能之乎若小人則全無主敬之功宜其無忌憚而反中庸也饒氏以中和中庸二者分析而論故今又以二者融貫而論之云倪氏此等折𠂻含龍罩之說也蓋以其於朱子饒氏之說互有疑信故不敢决斷取舍之耳饒氏病根全在首章未說氣質後章方說氣質及性情事理所指各異存省擇守用工不同幾句上倪氏並無一言斷置其是非則其於朱饒之孰是孰非未能了然於心之間間明矣吁陳定宇胡雲峰猶不免爾倪氏又何責焉第三章饒氏謂中庸其至矣乎是說道民鮮能是以氣質言非以世教言謂民能此中庸之道從古少矣論語是說德子思是隱括來說道故去了之為德字添一能字此已於論語雍也篇之為德也章辨之此不再述中庸其至矣乎章句過中則失中不及則未至惟中庸之德為至發明此處釋中字只以無過不及之中言庸字以訓在前不再出論語集注亦只言無過不及二處俱不言不偏不倚此是暗主饒說而引證以顯章句之不然也饒說辨之已詳知彼則知此矣庸訓在前不再出是己愚亦曰中字之訓在前本亦不再出但以欲顯至字之義故不得不如此說耳非再釋中而不及庸也論語本不言未發之中故但以無過不及釋之不可引彼以證此也第四章鮮能知味也叢說道不行知之過與不及道不明行之過與不及是固然矣然下乃結之曰人莫不飲食也鮮能知味也又是總於知蓋二者皆缺真知耳若真知理之極致則賢者固無過知者亦必篤於行不徒知之而已也發明云云然為學之序知必在先比結語所以取譬於飲食知味蓋以知味喻知道能真知之則必求以行而後道之中庶幾其能明之且能行之輯釋引晏氏曰云云鮮能知味以喻不能知道道既不明安能行乎末專言知味以見明道為先惟不明故不行也諸說皆不為無理不知果得子思意否竊以章句推之恐未必如此也章句曰道不可離人自不察是以有過不及之弊曰道不可離者人莫不飲食之喻也曰人自不察是以有過不及之弊者鮮能知味之喻也何嘗專主知言哉蓋此章自起首至不肖者不及也皆是正說此二句乃是譬喻說以結上文之意者奈何以譬喻之說為正說乎若曰知味是真知之意鮮能知味是不能真知之意則上文飲食亦真指飲食言耶飲食既為譬喻之辭則知味之知又豈真為知道之知乎不過亦譬喻之辭耳初不可以此知字為對行而言之知字也如此則人莫不飲食也是譬喻道不可離之意鮮能知味是人自不察是以有過不及之譬喻經中人字亦是但指飲食之人耳與章句人自不察之人不同章句人字却是指知愚賢不肖者而言察字亦非貼經文知字言者不過是言知愚者不察在己所知之過不及賢不肖者不察在己所行之過不及而已鮮能知味大概是譬喻知愚賢不肖所知所行無有不過不及者之意知字不必泥也不知識者以為然否路明又引朱伸曰知者以為不必行則失於仁賢者以為不必知則失於知飲食不知味則失於勇愚不肖又不及於知仁勇所以民鮮能久矣發明又自於章下曰此章言知仁勇之失輯釋獨引通云云後面欲說知仁勇此章為此三者發端知者以道為不足行不仁賢者以道為不足知不知愚不肖安於不及不能勉而進不勇也三說互相祖述亦皆因上並言不明不行下但以不知味承之故強說從勇上去其實不知味如何是失於勇發明前既以為知必在先而此又如此說可見所主不定彼此皆未為得之也按此數章何嘗有勇意勇意直至白刃可蹈處方發以引起下章子路問強之意正不當於此攙說勇也第五章叢說引金氏曰自第二章以來小人反中庸民鮮中庸賢知過中庸愚不肖不反中庸故至此總嘆曰道其不行矣夫故自六章以後開示擇皆中庸之方在知仁勇之三達德此雖章句所不言亦自有理可備一說第九章饒氏謂此是引起下意說勇處章句義精仁熟似缺勇字之意此通者辨此已詳然但辨得義精仁熟不賴勇之意而於似缺勇意之疑似猶未盡釋蓋章句此意只為中庸不可能設此章引起下章說勇意自在白刃可蹈一句上章句三者亦知仁勇之事此一勇字已足引起下章說勇之意矣讀者詳之第十章南方之強發明引三山陳氏曰南方之性既曰寬柔何強之有蓋守其氣質而不變是亦強也輯釋亦引之以含忍之力勝人章句所以明強之義者至矣守其氣質不變似非經注之㫖且不但可施於南方也衽金革章句衽席也金戈兵之屬革甲胄之屬通引倪氏曰衽衣衽也金鐡也革皮也聨鐡為鎧甲被之於身如衣襟然故曰衽輯釋亦引之以衽為席即請衽何趾之意况兵戈甲胄二者不可相無以衽為襟固可通然金革皆以為甲不應身衣甲胄而手無可執之具也章句衽席之說又與古人枕戈之意相類何疑之有倪說可刪強哉矯章句矯強貌詩矯矯虎臣是也饒氏謂此矯字當訓作矯揉之義言強哉其為矯揉也若以矯為強貌則為曰矯哉強又曰矯揉是用工處不應聖人只說強不說用工處發明備載饒氏此說而又自曰愚按矯揉之說出於吕與叔或問以為未然今饒氏又拈起言之輯釋亦引此之說按此四句是應抑而強歟而言雙峰謂聖人不應只說強何也且如章句說則以強為主而矯為贊其強之辭如饒說則以矯為主而強為贊其矯之辭二意雖若皆通然子路則問強非問矯也雙峰但知反章句為髙而不知求之經文以審其是不足道矣發明若以饒說為非則不當存存而不辨正愚所謂口雖非之心未嘗不是之者也於此見發明信朱子不如信饒氏之真情矣或問所辨不可不考第十一章半塗而廢章句半塗而廢則力之不足也廢明引饒氏曰冉求自謂說夫子之道而力不足正夫子所謂畫也按論語集計力不足者欲進而不能畫者能進而不欲冉求以畫為力不足誤矣故夫子辨其非是夫子非以力不足為盡也今章句以力不足釋半塗而廢之義正是倒用夫子力不足者中道而廢二句為訓宜若與畫意不同而雙峰乃如此言者蓋自遵道而行半塗而廢者觀之雖是力之不足似未可遂指為畫自夫子吾弗能己之意觀之則力不足又只是畫聖人亦人爾聖人於此不能己而學者乃以力不足中道而廢非畫而何章句於此二節皆以知行強釋之於第三節則云知之盡仁之至不賴勇而裕如也饒氏以索隱為知之過而非知行怪為行之過而非仁半塗而廢強之不足而非勇而依乎中庸為知能擇仁能守遁世不見知為勇能不變雙峰豈不以第一節索隱與行性可見知與行意而不見勇意故但以為知行之過而不言強殊不思只就隱性二字上看使可見強意若是不強於當知當行事尚不能盡力又何暇於隱惟處著力耶今乃能索隱而行怪非不當強而強何以及此况強只就知行上見知行之外何處懸空用得強雙峰亦自以為知行之過過非不當強而強之意乎雙峰於第二節自謂㑹得章句之意却又病其不得經文之意故如此改耳然章句之意實未易㑹經文之意實唯章句為得之耳何則夫遵道而行半塗而廢如章句說既曰能擇乎善知足以及則似乎知之已到了但曰力之不足行有不逮則似乎只是行上缺強者不應勇只強於行而知無預焉此雙峰所以疑也殊不思知行二者未嘗不相因強特成就結果此知行而已曰遵道而行則能擇乎善矣又曰此其知雖是以及之經文此句只說行能遵道知意蓋於遵字上見此行因知而有始也曰半塗而廢則力之不足又曰行有不逮經文此句連上句意亦當帶知意說而章句却全歸重於行者是又因其行之不至而所知亦為徒知不假言矣則知又因行而無終也經文但言行而知意自寓章句則以知行互文見意以發經文引而不發之㫖也豈非知行未嘗不相因之謂乎然知行所以有始無終如此者亦以其力不足而不能強耳故曰當強而不強者也若是能強則行之自無不力而所知亦不為徒知矣又豈非強特成就結果此知行而已之謂乎雙峰於第三節以依乎中庸為能擇能守己見知仁之意則遁世不悔一語無著落處故只得以為勇能不變殊不思章句曰不為索隱行怪則依乎中庸而已此句隱然與上節遵道而行則能能擇乎善矣之意相類皆是因其能行見其能知處知行之始事固可為知仁矣殆文言所謂知至知終之意乎不能半塗而廢是以遁世不見知而不悔此句分明與上節半塗而廢則力之不足也之意相反亦是因其行可見其知處此知行之終事所以為知之盡仁之至也殆文言所謂至之終之之意乎知有不盡仁有不至如上節半塗而廢者則不能無賴乎勇知盡矣仁至矣尚何賴於勇乎故曰不賴勇而裕如章句此言蓋因上節吾弗能已矣之意而發上節章句曰聖人於此非勉焉而不敢廢蓋至誠無息自有所不能已耳此已含不賴勇而裕如之意矣故於此發之耳雙峰蓋不知也愚嘗含而言之則首節是知行之過處過蓋由於不當強而強也次節是知行之有始無終處無終蓋由其當強而不強也末節是知行之有始有終處有終則強不足道矣故曰不賴勇而裕如也達此則經注之㫖可識矣或疑章句知盡仁至之上有中庸之成德一句正是應經文依乎中庸之意言之則知盡仁至亦是指依乎中庸而言耳曰章句中庸二字雖應依乎中庸而言成德二字則己指遁世不悔之意言矣依乎中庸固不可不謂之知仁若雖依乎中庸至於遁世不見知而猶不免於悔則亦與半塗而廢者何異謂之成德可乎謂之知盡仁至又可乎以此見成德與知盡仁至皆指遁世不悔而言無疑矣成又疑上二節章句不當強而強當強而不強皆只就本節知行上見勇意則此節不賴勇裕如亦只以為承知盡仁至意說下不必以為因上節吾不能已之意而發豈不免於侵過界分不如此之纏絆乎曰上二節兩結句己豫及此節二句界分此節二句却正是因上二節豫及界分而收拾之但其辭微涴不直致耳章句若不於此節明言之則常人之見又孰知不為索隱行怪之即是依乎中庸不能半塗而廢之即是遁世不悔哉然則不賴勇而裕如章句亦是取上節之餘意以還補此節之正意耳何纏絆之有况亦有自反之身之以造聖域者則其知盡仁至却正是因勉焉不敢廢乃能如此謂其亦不賴勇而裕如不可也唯夫子遁世不悔乃是至誠無息自有所不能己初非勉焉不敢廢者故其知盡仁至可以為不賴勇而裕如耳雙峰以為勇能不變不唯與聖人從容自然之意不賴亦與夫子吾弗能己之言相悖不知識者以為然否發明不為索隱行怪而惟依乎中庸知之盡也遵道而行仁之至也弗能半塗而廢遁世不見知不悔不待勇而自裕如也按遵道而行一句即是依乎中庸之意皆知行之始事但有淺深之不同耳只當搭在半塗而廢一傳上發明乃分章句不為索隱行怪則依乎中庸而已不能半塗而廢是以遁世不見知而不悔二句配知之盡與不賴勇而裕如之意却牽上節遵道而行一句能仁之至意然則依乎中庸反淺於遵道而行耶三句皆不勝纏絆而此句尤甚殊不思此章三節章句皆以此字言之如此節此字亦是此節自有此意又何必牽上節一句以說此節之意耶輯釋於此章之末引饒氏說又詳言首章與後章所指各異處大抵只反覆說首章未說氣質後十章方說氣質之意今撮其意之尤恃而又易見者辨其一二其餘前所己辨者更不再述其間有曰存養省察一毫矯拂之意不加而體立用行自然各臻其妙所謂必有事而勿正活潑潑者也也云云存養所以存天理之本然謂之無矯拂猶之可也省察所以遏人欲於將萌謂之皆自然則似有不可者矣况體立用行正以其有存省之工乃臻於是便是使然而然如何皆以為自然得以此見得不說氣質終費回護而罅漏終不可掩竟何益哉且必有事焉而勿正活潑潑地者程子借此以明學者洞見道體之妙耳蓋洞見道體則自然知道之不可離矣若存省之工則是因道之不可離故存天理遏人欲使不至於離道耳固非但欲為此以見道也雖存省不至則體認不真體認不真則存省不力固非判然二事然戒懼慎獨則主存省而言程子此論則主體認而言亦不可不究其所主之異乃混而言之也引彼證此似隔一膜然雙峰却謂朱子或問之說少失程子之意而其所自為說則曰子思是要人識此道程子是要人體此道又引觀川流而說謹獨之意為證則是正如孟子本文之意當以集義為事而不可預期其效不必如朱子所謂借也如此則集義是工夫生氣是功效若以賴期其效為不自然則可若付之自然而不以集義為事是則忘其所有事矣而可乎若又以集義為自然下工夫為正助而不自然則學者兩無所據天下豈有集義而不下工夫者哉亦終歸於忘其所有事而已政恐以此為自然而可以生氣可以致中和天下無此理也又有曰云云唯性無不善無不中也故但加戒懼慎獨之功則可以致中和云云此已於彼處辨之矣性者渾然太極之全體無所偏駁故其未發則為中已發則為和云云此亦已於第二章章下辨之矣四書管窺卷六
